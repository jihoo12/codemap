<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Codemap</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a21;
    --panel-2: #1d222b;
    --border: #2a303c;
    --text: #e6e9ef;
    --text-dim: #8b93a3;
    --accent: #5fb3ff;
    --accent-2: #ffb454;
    --mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100vh; }

  header {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
    flex-shrink: 0; z-index: 5;
  }
  header h1 { font-size: 15px; font-weight: 600; }
  header .sub { color: var(--text-dim); font-size: 12px; }
  header .spacer { flex: 1; }
  header input[type="text"] {
    background: var(--panel-2); border: 1px solid var(--border);
    color: var(--text); border-radius: 6px; padding: 6px 10px;
    font-size: 13px; width: 220px; outline: none;
  }
  header input[type="text"]:focus { border-color: var(--accent); }
  #search-wrap { display: flex; align-items: center; gap: 8px; }
  #search-count { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  #main { flex: 1; position: relative; overflow: hidden; }
  #viewport {
    position: absolute; inset: 0; overflow: hidden; cursor: grab;
  }
  #viewport.dragging { cursor: grabbing; }
  #world {
    position: absolute; top: 0; left: 0;
    transform-origin: 0 0;
    will-change: transform;
  }

  .group {
    position: absolute;
    border-radius: 8px;
    border: 1.5px solid;
  }
  .group-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 12px;
    border-radius: 7px 7px 0 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .group-name {
    font-family: var(--mono); font-size: 13px; font-weight: 600;
    color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 60%;
  }
  .group-meta {
    font-family: var(--mono); font-size: 10px; color: var(--text-dim);
    white-space: nowrap;
  }
  .group-toggle {
    font-family: var(--mono); font-size: 11px; color: var(--text-dim);
    cursor: pointer; padding: 2px 4px; border-radius: 3px;
    flex-shrink: 0;
  }
  .group-toggle:hover { color: var(--accent); background: rgba(255,255,255,0.05); }

  .file {
    position: absolute;
    display: flex; align-items: center; justify-content: center;
    border-radius: 5px;
    font-family: var(--mono); font-size: 11px; color: #fff;
    cursor: pointer; text-align: center;
    padding: 0 6px;
    text-shadow: 0 1px 2px rgba(0,0,0,0.4);
    transition: filter 0.1s, transform 0.1s;
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
    border: 1.5px solid rgba(0,0,0,0.25);
    user-select: none;
  }
  .file:hover { filter: brightness(1.2); transform: scale(1.03); }
  .file.selected { outline: 2.5px solid var(--accent-2); outline-offset: -1px; }
  .file.dimmed { opacity: 0.12; }
  .group.dimmed { opacity: 0.12; }

  #panel {
    position: absolute; top: 0; right: 0; bottom: 0;
    width: 460px; max-width: 90vw;
    background: var(--panel);
    border-left: 1px solid var(--border);
    transform: translateX(100%);
    transition: transform 0.18s ease;
    display: flex; flex-direction: column;
    z-index: 10;
  }
  #panel.open { transform: translateX(0); }
  #panel .panel-header {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 10px;
  }
  #panel .panel-header .titles { flex: 1; min-width: 0; }
  #panel .panel-header .fname {
    font-family: var(--mono); font-size: 13px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #panel .panel-header .fdir {
    font-size: 11px; color: var(--text-dim); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #panel .close-btn {
    background: none; border: none; color: var(--text-dim);
    font-size: 18px; cursor: pointer; line-height: 1; padding: 4px;
  }
  #panel .close-btn:hover { color: var(--text); }
  #panel .meta-row {
    padding: 8px 14px; border-bottom: 1px solid var(--border);
    font-size: 11px; color: var(--text-dim);
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  #panel .refs {
    padding: 4px 14px; border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  #panel .refs details.ref-section { margin: 4px 0; }
  #panel .refs summary {
    cursor: pointer; font-size: 11px; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.4px;
    padding: 4px 0; list-style: none;
    display: flex; align-items: center; gap: 6px; user-select: none;
  }
  #panel .refs summary:hover { color: var(--text); }
  #panel .refs summary::-webkit-details-marker { display: none; }
  #panel .refs summary::before {
    content: '\25b6'; font-size: 8px; display: inline-block;
    transition: transform 0.15s ease; color: var(--text-dim); flex-shrink: 0;
  }
  #panel .refs details[open] > summary::before { transform: rotate(90deg); }
  #panel .refs summary .count-badge {
    background: var(--panel-2); border: 1px solid var(--border);
    border-radius: 10px; padding: 0 6px; font-size: 10px; color: var(--text-dim);
  }
  #panel .refs .ref-list { padding: 2px 0 6px 14px; }
  #panel .refs .ref-item {
    display: block; color: var(--accent); text-decoration: none;
    font-family: var(--mono); font-size: 12px; padding: 2px 0; cursor: pointer;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #panel .refs .ref-item:hover { text-decoration: underline; }
  #panel .refs .none { color: var(--text-dim); font-style: italic; padding: 2px 0 6px; }
  #panel .refs .expand-all {
    background: none; border: none; color: var(--text-dim);
    font-size: 10px; cursor: pointer; padding: 4px 0; text-decoration: underline;
  }
  #panel .refs .expand-all:hover { color: var(--accent); }
  #panel .content-wrap { flex: 1; overflow: auto; }
  #panel pre {
    margin: 0; padding: 14px; font-family: var(--mono);
    font-size: 12px; line-height: 1.55; white-space: pre-wrap;
    word-break: break-word; color: #d3d8e0;
  }
  #panel .binary-note, #panel .empty-note {
    padding: 20px 14px; color: var(--text-dim); font-size: 13px; font-style: italic;
  }

  #empty-state {
    position: absolute; inset: 0; display: flex; align-items: center;
    justify-content: center; color: var(--text-dim); font-size: 14px;
    text-align: center; padding: 40px;
  }

  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1 id="proj-title">Codemap</h1>
    <span class="sub" id="proj-sub"></span>
    <div class="spacer"></div>
    <div id="search-wrap">
      <input type="text" id="search" placeholder="Filter files... ( / )" />
      <span id="search-count"></span>
    </div>
  </header>
  <div id="main">
    <div id="viewport">
      <div id="world"></div>
    </div>
    <div id="panel">
      <div class="panel-header">
        <div class="titles">
          <div class="fname" id="p-fname">&mdash;</div>
          <div class="fdir" id="p-fdir">&mdash;</div>
        </div>
        <button class="close-btn" id="p-close">&#x2715;</button>
      </div>
      <div class="meta-row" id="p-meta"></div>
      <div class="refs" id="p-refs"></div>
      <div class="content-wrap" id="p-content"></div>
    </div>
    <div id="empty-state" style="display:none;">No files found.</div>
  </div>
</div>

<script>
const DATA = /*__CODEMAP_DATA__*/;

const COLLAPSE_THRESHOLD = 150;
const FILE_W = 130;
const FILE_H = 32;
const FILE_GAP = 8;
const FILES_PER_ROW = 3;
const GROUP_PAD = 14;
const GROUP_HEADER_H = 32;
const GROUP_GAP = 24;

const GROUP_COLORS = [
  '#5fb3ff','#ffb454','#c5a3ff','#7fdbca','#ff6b6b',
  '#a8e6cf','#ffd93d','#6bcb77','#4d96ff','#ff6f91',
  '#845ec2','#ff9671','#ffc75f','#f9f871','#00c9a7',
  '#c34a36','#008f7a','#ffc0d0','#ff8066','#b0a8ff',
];

const DIR_COLOR = {};
let colorIdx = 0;
function getColor(dir) {
  if (!DIR_COLOR[dir]) {
    DIR_COLOR[dir] = GROUP_COLORS[colorIdx % GROUP_COLORS.length];
    colorIdx++;
  }
  return DIR_COLOR[dir];
}

const EXT_COLORS = {
  '.js':'#f1e05a','.jsx':'#f1e05a','.ts':'#3178c6','.tsx':'#3178c6',
  '.py':'#3572A5','.json':'#8bc34a','.md':'#888','.html':'#e34c26',
  '.css':'#563d7c','.scss':'#c6538c','.java':'#b07219','.go':'#00ADD8',
  '.rb':'#701516','.php':'#4F5D95','.c':'#555','.cpp':'#f34b7d',
  '.rs':'#dea584','.yml':'#cb171e','.yaml':'#cb171e','.sh':'#89e051',
};

function extColor(ext) { return EXT_COLORS[ext] || '#8b93a3'; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtBytes(n) {
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n/1024).toFixed(1) + ' KB';
  return (n/1048576).toFixed(1) + ' MB';
}

document.getElementById('proj-title').textContent = DATA.projectName || 'Codemap';
document.getElementById('proj-sub').textContent =
  DATA.nodes.length + ' files \u00b7 ' + DATA.dirs.length + ' directories \u00b7 ' + DATA.edges.length + ' references';

if (!DATA.nodes.length) {
  document.getElementById('empty-state').style.display = 'flex';
} else {
  run(DATA);
}

function run(data) {
  const byId = new Map(data.nodes.map(n => [n.id, n]));
  const tree = buildTree(data);
  const stats = dirStats(tree, byId);

  function buildTree(d) {
    const dirs = new Map();
    dirs.set('', { id:'', name:'(root)', parent:null, childDirs:[], files:[] });
    function ensure(p) {
      if (dirs.has(p)) return dirs.get(p);
      const i = p.lastIndexOf('/');
      const pp = i === -1 ? '' : p.slice(0, i);
      const nm = i === -1 ? p : p.slice(i+1);
      const par = ensure(pp);
      const nd = { id:p, name:nm, parent:pp, childDirs:[], files:[] };
      dirs.set(p, nd);
      par.childDirs.push(p);
      return nd;
    }
    for (const dd of d.dirs) { if (dd !== '') ensure(dd); }
    for (const n of d.nodes) ensure(n.dir).files.push(n.id);
    return dirs;
  }

  function dirStats(tr, byId) {
    const m = new Map();
    function go(p) {
      if (m.has(p)) return m.get(p);
      const nd = tr.get(p);
      let fc = nd.files.length, sz = 0;
      for (const f of nd.files) { const n = byId.get(f); sz += (n && n.size) || 0; }
      for (const c of nd.childDirs) { const s = go(c); fc += s.fc; sz += s.sz; }
      const r = { fc, sz }; m.set(p, r); return r;
    }
    for (const p of tr.keys()) go(p);
    return m;
  }

  let expanded = data.nodes.length <= COLLAPSE_THRESHOLD
    ? new Set(tree.keys())
    : new Set(['']);

  const outMap = new Map(), inMap = new Map();
  for (const n of data.nodes) { outMap.set(n.id, []); inMap.set(n.id, []); }
  for (const e of data.edges) {
    if (outMap.has(e.from) && inMap.has(e.to)) {
      outMap.get(e.from).push(e.to);
      inMap.get(e.to).push(e.from);
    }
  }

  const viewport = document.getElementById('viewport');
  const world = document.getElementById('world');
  let tx = 0, ty = 0, scale = 1;
  let dragging = false, dragStartX, dragStartY, dragTx, dragTy;
  let selectedId = null;

  function applyTransform() {
    world.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';
  }

  function fitToContent() {
    const r = world.getBoundingClientRect();
    const vw = viewport.clientWidth, vh = viewport.clientHeight;
    if (r.width < 1 || r.height < 1) return;
    const pad = 60;
    const sx = vw / (r.width + pad * 2);
    const sy = vh / (r.height + pad * 2);
    scale = Math.min(sx, sy, 1.5);
    tx = (vw - r.width * scale) / 2 - r.left * scale;
    ty = (vh - r.height * scale) / 2 - r.top * scale;
    applyTransform();
  }

  viewport.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    dragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragTx = tx;
    dragTy = ty;
    viewport.classList.add('dragging');
  });
  window.addEventListener('mousemove', e => {
    if (!dragging) return;
    tx = dragTx + (e.clientX - dragStartX);
    ty = dragTy + (e.clientY - dragStartY);
    applyTransform();
  });
  window.addEventListener('mouseup', () => {
    dragging = false;
    viewport.classList.remove('dragging');
  });

  viewport.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = viewport.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const delta = e.deltaY > 0 ? 0.9 : 1.1;
    const ns = Math.min(6, Math.max(0.05, scale * delta));
    tx = mx - (mx - tx) * (ns / scale);
    ty = my - (my - ty) * (ns / scale);
    scale = ns;
    applyTransform();
  }, { passive: false });

  let lastTouchDist = 0;
  viewport.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      dragging = true;
      dragStartX = e.touches[0].clientX;
      dragStartY = e.touches[0].clientY;
      dragTx = tx; dragTy = ty;
    } else if (e.touches.length === 2) {
      dragging = false;
      const dx = e.touches[1].clientX - e.touches[0].clientX;
      const dy = e.touches[1].clientY - e.touches[0].clientY;
      lastTouchDist = Math.sqrt(dx*dx + dy*dy);
    }
  }, { passive: true });
  viewport.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1 && dragging) {
      tx = dragTx + (e.touches[0].clientX - dragStartX);
      ty = dragTy + (e.touches[0].clientY - dragStartY);
      applyTransform();
    } else if (e.touches.length === 2) {
      const dx = e.touches[1].clientX - e.touches[0].clientX;
      const dy = e.touches[1].clientY - e.touches[0].clientY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (lastTouchDist > 0) {
        const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
        const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
        const ns = Math.min(6, Math.max(0.05, scale * (dist / lastTouchDist)));
        tx = midX - (midX - tx) * (ns / scale);
        ty = midY - (midY - ty) * (ns / scale);
        scale = ns;
        applyTransform();
      }
      lastTouchDist = dist;
    }
  }, { passive: false });
  viewport.addEventListener('touchend', () => { dragging = false; lastTouchDist = 0; });

  const searchEl = document.getElementById('search');
  const searchCountEl = document.getElementById('search-count');
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== searchEl) { e.preventDefault(); searchEl.focus(); }
    if (e.key === 'Escape') closePanel();
  });
  let searchTimer;
  searchEl.addEventListener('input', () => { clearTimeout(searchTimer); searchTimer = setTimeout(doSearch, 120); });
  searchEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const q = searchEl.value.trim().toLowerCase();
      const ids = matchIds(q);
      if (ids.size) revealFile(ids.values().next().value);
    }
  });

  function matchIds(q) {
    const s = new Set();
    if (!q) return s;
    for (const n of data.nodes) {
      if (n.name.toLowerCase().includes(q) || n.dir.toLowerCase().includes(q)) s.add(n.id);
    }
    return s;
  }

  function doSearch() {
    const q = searchEl.value.trim().toLowerCase();
    const ids = matchIds(q);
    world.querySelectorAll('.file').forEach(el => {
      el.classList.toggle('dimmed', q && !ids.has(el.dataset.id));
    });
    world.querySelectorAll('.group').forEach(el => {
      if (!q) { el.classList.remove('dimmed'); return; }
      const dp = el.dataset.dir;
      let hit = false;
      for (const fid of ids) {
        const f = byId.get(fid);
        if (f && (f.dir === dp || (dp && f.dir.startsWith(dp + '/')))) { hit = true; break; }
      }
      el.classList.toggle('dimmed', !hit);
    });
    searchCountEl.textContent = ids.size
      ? ids.size + (ids.size === 1 ? ' match' : ' matches') + ' \u2014 Enter to jump'
      : (q ? 'no matches' : '');
  }

  // ==================== LAYOUT ENGINE ====================
  // Pass 1: bottom-up compute sizes -> sizeMap
  // Pass 2: top-down assign positions using sizeMap

  const sizeMap = new Map();
  const MAX_CHILD_ROW_W = 1400;

  function computeAllSizes(dirPath) {
    const nd = tree.get(dirPath);
    const isExp = expanded.has(dirPath);

    let filesW = 0, filesH = 0;
    if (isExp && nd.files.length > 0) {
      const cols = Math.min(nd.files.length, FILES_PER_ROW);
      const rows = Math.ceil(nd.files.length / FILES_PER_ROW);
      filesW = cols * FILE_W + (cols - 1) * FILE_GAP;
      filesH = rows * FILE_H + (rows - 1) * FILE_GAP;
    }

    const childRows = [];
    if (isExp && nd.childDirs.length > 0) {
      for (const c of nd.childDirs) computeAllSizes(c);

      let curRow = [], curRowW = 0;
      for (const c of nd.childDirs) {
        const cs = sizeMap.get(c);
        const gap = curRow.length > 0 ? GROUP_GAP : 0;
        if (curRow.length > 0 && curRowW + gap + cs.w > MAX_CHILD_ROW_W) {
          childRows.push({ dirs: curRow, w: curRowW, h: Math.max(...curRow.map(d => sizeMap.get(d).h)) });
          curRow = []; curRowW = 0;
        }
        curRow.push(c);
        curRowW += gap + cs.w;
      }
      if (curRow.length) {
        childRows.push({ dirs: curRow, w: curRowW, h: Math.max(...curRow.map(d => sizeMap.get(d).h)) });
      }
    }

    const childrenW = childRows.length > 0 ? Math.max(...childRows.map(r => r.w)) : 0;
    const childrenH = childRows.reduce((s, r) => s + r.h, 0) + Math.max(0, childRows.length - 1) * GROUP_GAP;
    const contentW = Math.max(filesW, childrenW);
    const hasF = filesH > 0, hasC = childrenH > 0;
    const innerH = filesH + (hasF && hasC ? GROUP_GAP : 0) + childrenH;

    sizeMap.set(dirPath, {
      w: contentW + GROUP_PAD * 2,
      h: GROUP_HEADER_H + GROUP_PAD + innerH + GROUP_PAD,
      filesW, filesH, childRows, contentW,
    });
  }

  function positionGroup(dirPath, x, y) {
    const sz = sizeMap.get(dirPath);
    const nd = tree.get(dirPath);
    const isExp = expanded.has(dirPath);
    const results = [{ type: 'group', dir: dirPath, x, y, w: sz.w, h: sz.h }];
    if (!isExp) return results;

    let cy = y + GROUP_HEADER_H + GROUP_PAD;

    if (nd.files.length > 0) {
      const sorted = [...nd.files].sort((a, b) => (byId.get(a).name || '').localeCompare(byId.get(b).name || ''));
      let idx = 0;
      for (let row = 0; idx < sorted.length; row++) {
        const colsInRow = Math.min(sorted.length - idx, FILES_PER_ROW);
        const rowW = colsInRow * FILE_W + (colsInRow - 1) * FILE_GAP;
        const rowOffX = (sz.contentW - rowW) / 2;
        for (let col = 0; col < colsInRow; col++, idx++) {
          results.push({ type: 'file', id: sorted[idx],
            fx: x + GROUP_PAD + rowOffX + col * (FILE_W + FILE_GAP),
            fy: cy + row * (FILE_H + FILE_GAP),
          });
        }
      }
      cy += sz.filesH;
    }

    if (sz.childRows.length > 0) {
      if (sz.filesH > 0) cy += GROUP_GAP;
      for (const cr of sz.childRows) {
        const rowOffX = (sz.contentW - cr.w) / 2;
        let cx = x + GROUP_PAD + rowOffX;
        for (const dir of cr.dirs) {
          results.push(...positionGroup(dir, cx, cy));
          cx += sizeMap.get(dir).w + GROUP_GAP;
        }
        cy += cr.h + GROUP_GAP;
      }
    }

    return results;
  }

  // ==================== RENDER ====================

  function render() {
    world.innerHTML = '';
    sizeMap.clear();
    computeAllSizes('');
    const layout = positionGroup('', 0, 0);

    for (const item of layout) {
      if (item.type === 'group') {
        const nd = tree.get(item.dir);
        const st = stats.get(item.dir);
        const isExp = expanded.has(item.dir);
        const gc = getColor(item.dir);

        const el = document.createElement('div');
        el.className = 'group';
        el.dataset.dir = item.dir;
        el.style.left = item.x + 'px';
        el.style.top = item.y + 'px';
        el.style.width = item.w + 'px';
        el.style.height = item.h + 'px';
        el.style.borderColor = gc;
        el.style.background = gc + '18';

        const hdr = document.createElement('div');
        hdr.className = 'group-header';
        hdr.style.background = gc + '30';
        hdr.style.height = GROUP_HEADER_H + 'px';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'group-name';
        nameSpan.textContent = item.dir === '' ? '(root)' : nd.name;
        hdr.appendChild(nameSpan);

        const metaSpan = document.createElement('span');
        metaSpan.className = 'group-meta';
        metaSpan.textContent = st.fc + ' files \u00b7 ' + fmtBytes(st.sz);
        hdr.appendChild(metaSpan);

        if (item.dir !== '') {
          const tog = document.createElement('span');
          tog.className = 'group-toggle';
          tog.textContent = isExp ? '\u2013' : '+';
          tog.addEventListener('click', (function(dp) {
            return function(e) {
              e.stopPropagation();
              if (expanded.has(dp)) expanded.delete(dp);
              else expanded.add(dp);
              render();
            };
          })(item.dir));
          hdr.appendChild(tog);
        }

        el.appendChild(hdr);
        world.appendChild(el);
      } else if (item.type === 'file') {
        const f = byId.get(item.id);
        const fEl = document.createElement('div');
        fEl.className = 'file';
        fEl.dataset.id = item.id;
        fEl.style.left = item.fx + 'px';
        fEl.style.top = item.fy + 'px';
        fEl.style.width = FILE_W + 'px';
        fEl.style.height = FILE_H + 'px';
        fEl.style.background = extColor(f.ext);
        const displayName = f.name.length > 16 ? f.name.slice(0, 14) + '\u2026' : f.name;
        fEl.textContent = displayName;
        fEl.title = item.id;
        fEl.addEventListener('click', (function(node) {
          return function(e) {
            e.stopPropagation();
            selectFile(node);
          };
        })(f));
        world.appendChild(fEl);
      }
    }

    highlightSelected();
    if (searchEl.value.trim()) doSearch();
    setTimeout(fitToContent, 10);
  }

  // ---- side panel ----
  const panel = document.getElementById('panel');

  function selectFile(d) {
    selectedId = d.id;
    document.querySelectorAll('.file.selected').forEach(e => e.classList.remove('selected'));
    const el = world.querySelector('[data-id="' + CSS.escape(d.id) + '"]');
    if (el) el.classList.add('selected');
    highlightSelected();

    document.getElementById('p-fname').textContent = d.name;
    document.getElementById('p-fdir').textContent = d.dir === '' ? '/' : '/' + d.dir;

    const meta = document.getElementById('p-meta');
    meta.innerHTML = '';
    addMeta(meta, 'size', fmtBytes(d.size));
    addMeta(meta, 'type', d.ext || '(no ext)');
    if (d.truncated) addMeta(meta, 'note', 'truncated');

    const refsEl = document.getElementById('p-refs');
    const outs = outMap.get(d.id) || [];
    const ins = inMap.get(d.id) || [];
    let html = '<button class="expand-all" data-a="e">Expand all</button>'
      + '<button class="expand-all" data-a="c" style="margin-left:10px;">Collapse all</button>';
    html += refSec('References', outs, '\u2192', outs.length > 0 && outs.length <= 8);
    html += refSec('Referenced by', ins, '\u2190', ins.length > 0 && ins.length <= 8);
    refsEl.innerHTML = html;
    refsEl.querySelectorAll('.ref-item').forEach(a => {
      a.addEventListener('click', () => revealFile(a.dataset.id));
    });
    refsEl.querySelectorAll('.expand-all').forEach(b => {
      b.addEventListener('click', () => {
        const open = b.dataset.a === 'e';
        refsEl.querySelectorAll('details.ref-section').forEach(d => { d.open = open; });
      });
    });

    const ce = document.getElementById('p-content');
    if (d.binary) ce.innerHTML = '<div class="binary-note">Binary file.</div>';
    else if (!d.content) ce.innerHTML = '<div class="empty-note">(empty)</div>';
    else { ce.innerHTML = '<pre></pre>'; ce.querySelector('pre').textContent = d.content; }

    panel.classList.add('open');
  }

  function revealFile(fid) {
    const f = byId.get(fid);
    if (!f) return;
    const parts = f.dir === '' ? [] : f.dir.split('/');
    let p = '';
    for (const part of parts) {
      p = p === '' ? part : p + '/' + part;
      expanded.add(p);
    }
    render();
    const el = world.querySelector('[data-id="' + CSS.escape(fid) + '"]');
    if (el) {
      selectFile(f);
      const r = el.getBoundingClientRect();
      const vr = viewport.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      tx += vr.width / 2 - cx;
      ty += vr.height / 2 - cy;
      applyTransform();
    }
  }

  function refSec(title, ids, arrow, openDef) {
    const body = ids.length
      ? ids.map(id => '<a class="ref-item" data-id="' + esc(id) + '">' + arrow + ' ' + esc(id) + '</a>').join('')
      : '<div class="none">none detected</div>';
    return '<details class="ref-section"' + (openDef || !ids.length ? ' open' : '') + '>'
      + '<summary>' + esc(title) + ' <span class="count-badge">' + ids.length + '</span></summary>'
      + '<div class="ref-list">' + body + '</div></details>';
  }

  function addMeta(c, l, v) {
    const s = document.createElement('span');
    s.innerHTML = '<strong style="color:var(--text)">' + esc(l) + ':</strong> ' + esc(v);
    c.appendChild(s);
  }

  document.getElementById('p-close').addEventListener('click', closePanel);
  viewport.addEventListener('click', e => {
    if (e.target === viewport || e.target === world) closePanel();
  });

  function closePanel() {
    selectedId = null;
    panel.classList.remove('open');
    document.querySelectorAll('.file.selected').forEach(e => e.classList.remove('selected'));
    highlightSelected();
  }

  function highlightSelected() {
    if (!selectedId) {
      world.querySelectorAll('.file.dimmed').forEach(e => e.classList.remove('dimmed'));
      world.querySelectorAll('.group.dimmed').forEach(e => e.classList.remove('dimmed'));
      return;
    }
    const conn = new Set([selectedId]);
    for (const id of (outMap.get(selectedId) || [])) conn.add(id);
    for (const id of (inMap.get(selectedId) || [])) conn.add(id);
    world.querySelectorAll('.file').forEach(el => {
      el.classList.toggle('dimmed', !conn.has(el.dataset.id));
    });
    world.querySelectorAll('.group').forEach(el => {
      const dp = el.dataset.dir;
      let hit = false;
      for (const fid of conn) {
        const f = byId.get(fid);
        if (f && (f.dir === dp || (dp && f.dir.startsWith(dp + '/')))) { hit = true; break; }
      }
      el.classList.toggle('dimmed', !hit);
    });
  }

  render();
}
</script>
</body>
</html>
