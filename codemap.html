all-\u003emethod_name \u003c\u003c \"' for type '\"\n             \u003c\u003c type_name \u003c\u003c \"' has no compiled function\\n\";\n      return nullptr;\n    }\n\n    Type *obj_llvm_type = get_llvm_type(obj_type);\n    Value *obj_val = eval_expr(mcall-\u003eobject.get(), obj_llvm_type);\n    if (!obj_val) return nullptr;\n\n    if (callee-\u003earg_size() != 1 + mcall-\u003eargs.size()) {\n      errs() \u003c\u003c \"Error: wrong number of arguments for method '\"\n             \u003c\u003c mcall-\u003emethod_name \u003c\u003c \"' (expected \"\n             \u003c\u003c (callee-\u003earg_size() - 1) \u003c\u003c \", got \" \u003c\u003c mcall-\u003eargs.size() \u003c\u003c \")\\n\";\n      return nullptr;\n    }\n\n    std::vector\u003cValue *\u003e margs;\n    margs.push_back(obj_val); // self\n    for (size_t i = 0; i \u003c mcall-\u003eargs.size(); i++) {\n      Type *param_type = callee-\u003egetArg(i + 1)-\u003egetType();\n      Value *arg = eval_expr(mcall-\u003eargs[i].get(), param_type);\n      if (!arg) return nullptr;\n      margs.push_back(arg);\n    }\n    return Builder.CreateCall(callee, margs);\n  }\n\n  if (auto *atm = dynamic_cast\u003cAtomicExpr *\u003e(expr)) {\n    if (atm-\u003eop == AtomicOp::Fence) {\n      Builder.CreateFence(AtomicOrdering::SequentiallyConsistent);\n      return ConstantInt::get(Type::getInt64Ty(Context), 0);\n    }\n\n    if (atm-\u003eargs.empty()) {\n      errs() \u003c\u003c \"Error: atomic operation needs at least a pointer argument\\n\";\n      return nullptr;\n    }\n    TypeAnnotation ptr_ann = resolve_expr_type(atm-\u003eargs[0].get());\n    bool is_ref = (ptr_ann.kind == TypeKind::Ref || ptr_ann.kind == TypeKind::MutRef);\n    if (ptr_ann.pointer_depth \u003c 1 && !is_ref) {\n      errs() \u003c\u003c \"Error: first argument of atomic must be a pointer (&var or ptr)\\n\";\n      return nullptr;\n    }\n    if (is_ref)\n      ptr_ann = ptr_ann.tuple_types[0]; // get the referent type\n    else\n      ptr_ann.pointer_depth--;\n    Type *val_type = get_llvm_type(ptr_ann);\n    if (!val_type || (!val_type-\u003eisIntegerTy() && atm-\u003eop != AtomicOp::Xchg)) {\n      errs() \u003c\u003c \"Error: atomic operations require integer pointer types\\n\";\n      return nullptr;\n    }\n\n    Value *ptr = eval_expr(atm-\u003eargs[0].get(), PointerType::getUnqual(Context));\n    if (!ptr) return nullptr;\n\n    if (atm-\u003eop == AtomicOp::CmpXchg) {\n      if (atm-\u003eargs.size() \u003c 3) {\n        errs() \u003c\u003c \"Error: atomic cas needs 3 arguments (ptr, expected, desired)\\n\";\n        return nullptr;\n      }\n      Value *expected = eval_expr(atm-\u003eargs[1].get(), val_type);\n      Value *desired = eval_expr(atm-\u003eargs[2].get(), val_type);\n      if (!expected || !desired) return nullptr;\n      Value *pair = Builder.CreateAtomicCmpXchg(\n          ptr, expected, desired, MaybeAlign(),\n          AtomicOrdering::SequentiallyConsistent,\n          AtomicOrdering::SequentiallyConsistent);\n      return Builder.CreateExtractValue(pair, {0}, \"cmpxchg.old\");\n    }\n\n    if (atm-\u003eargs.size() \u003c 2) {\n      errs() \u003c\u003c \"Error: atomic \" \u003c\u003c (atm-\u003eop == AtomicOp::Xchg ? \"xchg\" : \"rmw\")\n             \u003c\u003c \" needs 2 arguments (ptr, value)\\n\";\n      return nullptr;\n    }\n    Value *val = eval_expr(atm-\u003eargs[1].get(), val_type);\n    if (!val) return nullptr;\n\n    AtomicRMWInst::BinOp rmw_op;\n    switch (atm-\u003eop) {\n      case AtomicOp::Xchg: rmw_op = AtomicRMWInst::Xchg; break;\n      case AtomicOp::Add:  rmw_op = AtomicRMWInst::Add; break;\n      case AtomicOp::Sub:  rmw_op = AtomicRMWInst::Sub; break;\n      case AtomicOp::And:  rmw_op = AtomicRMWInst::And; break;\n      case AtomicOp::Or:   rmw_op = AtomicRMWInst::Or; break;\n      case AtomicOp::Xor:  rmw_op = AtomicRMWInst::Xor; break;\n      default:\n        errs() \u003c\u003c \"Error: unsupported atomic operation\\n\";\n        return nullptr;\n    }\n    return Builder.CreateAtomicRMW(rmw_op, ptr, val, MaybeAlign(),\n                                    AtomicOrdering::SequentiallyConsistent);\n  }\n\n  if (auto *asm_ = dynamic_cast\u003cAsmExpr *\u003e(expr)) {\n    FunctionType *FT = FunctionType::get(Type::getVoidTy(Context), false);\n    InlineAsm *IA = InlineAsm::get(FT, asm_-\u003easm_code, \"\", true, false);\n    Builder.CreateCall(IA);\n    return ConstantInt::get(Type::getInt64Ty(Context), 0);\n  }\n\n  if (auto *assign = dynamic_cast\u003cAssignExpr *\u003e(expr)) {\n    Value *val = eval_expr(assign-\u003evalue.get(), expected_type);\n    if (!val) return nullptr;\n\n    Type *target_type = nullptr;\n    Value *target_ptr = get_lvalue_ptr(assign-\u003etarget.get(), &target_type);\n    if (!target_ptr) {\n      errs() \u003c\u003c \"Error: invalid assignment target\\n\";\n      return nullptr;\n    }\n    Builder.CreateStore(val, target_ptr);\n    return val;\n  }\n\n  if (auto *ifexpr = dynamic_cast\u003cIfExpr *\u003e(expr)) {\n    Function *fn = Builder.GetInsertBlock()-\u003egetParent();\n\n    Value *cond = eval_expr(ifexpr-\u003econdition.get(), nullptr);\n    if (!cond) return nullptr;\n    if (!cond-\u003egetType()-\u003eisIntegerTy(1))\n      cond = Builder.CreateICmpNE(cond, ConstantInt::get(cond-\u003egetType(), 0));\n\n    BasicBlock *then_bb = BasicBlock::Create(Context, \"if.then\", fn);\n    BasicBlock *else_bb = BasicBlock::Create(Context, \"if.else\", fn);\n    BasicBlock *merge_bb = BasicBlock::Create(Context, \"if.merge\", fn);\n\n    AllocaInst *result = Builder.CreateAlloca(expected_type, nullptr, \"if_result\");\n\n    Builder.CreateCondBr(cond, then_bb, else_bb);\n\n    Builder.SetInsertPoint(then_bb);\n    Value *then_val = eval_expr(ifexpr-\u003ethen_expr.get(), expected_type);\n    if (!then_val) return nullptr;\n    Builder.CreateStore(then_val, result);\n    Builder.CreateBr(merge_bb);\n\n    Builder.SetInsertPoint(else_bb);\n    Value *else_val = eval_expr(ifexpr-\u003eelse_expr.get(), expected_type);\n    if (!else_val) return nullptr;\n    Builder.CreateStore(else_val, result);\n    Builder.CreateBr(merge_bb);\n\n    Builder.SetInsertPoint(merge_bb);\n    return Builder.CreateLoad(expected_type, result, \"if_val\");\n  }\n\n  if (auto *compound = dynamic_cast\u003cCompoundAssignExpr *\u003e(expr)) {\n    Type *target_type = nullptr;\n    Value *target_ptr = get_lvalue_ptr(compound-\u003etarget.get(), &target_type);\n    if (!target_ptr) {\n      errs() \u003c\u003c \"Error: invalid compound assignment target\\n\";\n      return nullptr;\n    }\n    Value *current = Builder.CreateLoad(target_type, target_ptr);\n    Value *rhs = eval_expr(compound-\u003evalue.get(), target_type);\n    if (!rhs) return nullptr;\n    TypeAnnotation target_ann = resolve_expr_type(compound-\u003etarget.get());\n    bool is_unsigned = is_unsigned_type(target_ann.kind);\n    Value *result;\n    switch (compound-\u003eop) {\n      case BinOp::Add: result = Builder.CreateAdd(current, rhs); break;\n      case BinOp::Sub: result = Builder.CreateSub(current, rhs); break;\n      case BinOp::Mul: result = Builder.CreateMul(current, rhs); break;\n      case BinOp::Div: result = is_unsigned ? Builder.CreateUDiv(current, rhs) : Builder.CreateSDiv(current, rhs); break;\n      case BinOp::Mod: result = is_unsigned ? Builder.CreateURem(current, rhs) : Builder.CreateSRem(current, rhs); break;\n      case BinOp::BitAnd: result = Builder.CreateAnd(current, rhs); break;\n      case BinOp::BitOr: result = Builder.CreateOr(current, rhs); break;\n      case BinOp::Xor: result = Builder.CreateXor(current, rhs); break;\n      case BinOp::Shl: result = Builder.CreateShl(current, rhs); break;\n      case BinOp::Shr: result = is_unsigned ? Builder.CreateLShr(current, rhs) : Builder.CreateAShr(current, rhs); break;\n      default:\n        errs() \u003c\u003c \"Error: unsupported operator for compound assignment\\n\";\n        return nullptr;\n    }\n    Builder.CreateStore(result, target_ptr);\n    return result;\n  }\n\n  errs() \u003c\u003c \"Error: unknown expression type\\n\";\n  return nullptr;\n}\n\n// -------------------------------------------------------------------------\n// Capture discovery helpers for closures\n// -------------------------------------------------------------------------\n\nvoid CodeGen::discover_captures(Expr *expr,\n                                 const std::unordered_set\u003cstd::string\u003e &param_names,\n                                 std::vector\u003cstd::string\u003e &captures) {\n  if (!expr) return;\n  if (auto *id = dynamic_cast\u003cIdentExpr *\u003e(expr)) {\n    if (param_names.find(id-\u003ename) == param_names.end() &&\n        named_values.find(id-\u003ename) != named_values.end()) {\n      if (std::find(captures.begin(), captures.end(), id-\u003ename) == captures.end())\n        captures.push_back(id-\u003ename);\n    }\n    return;\n  }\n  if (auto *bin = dynamic_cast\u003cBinaryExpr *\u003e(expr)) {\n    discover_captures(bin-\u003eleft.get(), param_names, captures);\n    discover_captures(bin-\u003eright.get(), param_names, captures);\n    return;\n  }\n  if (auto *unary = dynamic_cast\u003cUnaryExpr *\u003e(expr)) {\n    discover_captures(unary-\u003eoperand.get(), param_names, captures);\n    return;\n  }\n  if (auto *call = dynamic_cast\u003cCallExpr *\u003e(expr)) {\n    if (call-\u003ecallee_expr)\n      discover_captures(call-\u003ecallee_expr.get(), param_names, captures);\n    for (auto &arg : call-\u003eargs)\n      discover_captures(arg.get(), param_names, captures);\n    return;\n  }\n  if (auto *assign = dynamic_cast\u003cAssignExpr *\u003e(expr)) {\n    discover_captures(assign-\u003etarget.get(), param_names, captures);\n    discover_captures(assign-\u003evalue.get(), param_names, captures);\n    return;\n  }\n  if (auto *compound = dynamic_cast\u003cCompoundAssignExpr *\u003e(expr)) {\n    discover_captures(compound-\u003etarget.get(), param_names, captures);\n    discover_captures(compound-\u003evalue.get(), param_names, captures);\n    return;\n  }\n  if (auto *field = dynamic_cast\u003cFieldAccessExpr *\u003e(expr)) {\n    discover_captures(field-\u003eobject.get(), param_names, captures);\n    return;\n  }\n  if (auto *mcall = dynamic_cast\u003cMethodCallExpr *\u003e(expr)) {\n    discover_captures(mcall-\u003eobject.get(), param_names, captures);\n    for (auto &arg : mcall-\u003eargs)\n      discover_captures(arg.get(), param_names, captures);\n    return;\n  }\n  if (auto *deref = dynamic_cast\u003cDerefExpr *\u003e(expr)) {\n    discover_captures(deref-\u003eoperand.get(), param_names, captures);\n    return;\n  }\n  if (auto *borrow = dynamic_cast\u003cBorrowExpr *\u003e(expr)) {\n    discover_captures(borrow-\u003eoperand.get(), param_names, captures);\n    return;\n  }\n  if (auto *sub = dynamic_cast\u003cSubscriptExpr *\u003e(expr)) {\n    discover_captures(sub-\u003earray.get(), param_names, captures);\n    discover_captures(sub-\u003eindex.get(), param_names, captures);\n    return;\n  }\n  if (auto *arr = dynamic_cast\u003cArrayLitExpr *\u003e(expr)) {\n    for (auto &el : arr-\u003eelements)\n      discover_captures(el.get(), param_names, captures);\n    return;\n  }\n  if (auto *tup = dynamic_cast\u003cTupleExpr *\u003e(expr)) {\n    for (auto &el : tup-\u003eelements)\n      discover_captures(el.get(), param_names, captures);\n    return;\n  }\n  if (auto *ctor = dynamic_cast\u003cConstructorExpr *\u003e(expr)) {\n    for (auto &[_, fexpr] : ctor-\u003efields)\n      discover_captures(fexpr.get(), param_names, captures);\n    return;\n  }\n  if (auto *match = dynamic_cast\u003cMatchExpr *\u003e(expr)) {\n    discover_captures(match-\u003evalue.get(), param_names, captures);\n    for (auto &arm : match-\u003earms)\n      discover_captures(arm.expr.get(), param_names, captures);\n    return;\n  }\n  if (auto *ifexpr = dynamic_cast\u003cIfExpr *\u003e(expr)) {\n    discover_captures(ifexpr-\u003econdition.get(), param_names, captures);\n    discover_captures(ifexpr-\u003ethen_expr.get(), param_names, captures);\n    discover_captures(ifexpr-\u003eelse_expr.get(), param_names, captures);\n    return;\n  }\n}\n\nvoid CodeGen::discover_captures_in_body(\n    const std::vector\u003cstd::unique_ptr\u003cStmt\u003e\u003e &body,\n    const std::unordered_set\u003cstd::string\u003e &param_names,\n    std::vector\u003cstd::string\u003e &captures) {\n  for (auto &stmt : body) {\n    if (auto *exprs = dynamic_cast\u003cExprStmt *\u003e(stmt.get())) {\n      discover_captures(exprs-\u003eexpr.get(), param_names, captures);\n    } else if (auto *let = dynamic_cast\u003cLetStmt *\u003e(stmt.get())) {\n      discover_captures(let-\u003einit_expr.get(), param_names, captures);\n    } else if (auto *ret = dynamic_cast\u003cReturnStmt *\u003e(stmt.get())) {\n      discover_captures(ret-\u003evalue.get(), param_names, captures);\n    } else if (auto *ifs = dynamic_cast\u003cIfStmt *\u003e(stmt.get())) {\n      discover_captures(ifs-\u003econdition.get(), param_names, captures);\n      discover_captures_in_body(ifs-\u003ethen_branch, param_names, captures);\n      discover_captures_in_body(ifs-\u003eelse_branch, param_names, captures);\n    } else if (auto *for_s = dynamic_cast\u003cForStmt *\u003e(stmt.get())) {\n      if (for_s-\u003einit) {\n        if (auto *let_init = dynamic_cast\u003cLetStmt *\u003e(for_s-\u003einit.get()))\n          discover_captures(let_init-\u003einit_expr.get(), param_names, captures);\n      }\n      discover_captures(for_s-\u003econdition.get(), param_names, captures);\n      discover_captures(for_s-\u003eupdate.get(), param_names, captures);\n      discover_captures_in_body(for_s-\u003ebody, param_names, captures);\n    }\n  }\n}\n"},{"id":"src-cpp/codegen_init.cpp","name":"codegen_init.cpp","dir":"src-cpp","ext":".cpp","size":7595,"binary":false,"truncated":false,"content":"#include \"codegen.h\"\n\n#include \u003cfilesystem\u003e\n#include \u003cfstream\u003e\n#include \u003ciostream\u003e\n\n#include \"llvm/IR/Constants.h\"\n#include \"llvm/IR/DerivedTypes.h\"\n#include \"llvm/Support/raw_ostream.h\"\n\nusing namespace llvm;\n\n// -------------------------------------------------------------------------\n// Per-type value generators\n// -------------------------------------------------------------------------\n\nValue *CodeGen::eval_int_init(Expr *expr) {\n  if (auto *id = dynamic_cast\u003cIdentExpr *\u003e(expr)) {\n    auto it = named_values.find(id-\u003ename);\n    if (it == named_values.end()) {\n      cg_error(errs(), id, \"undefined variable '\" + id-\u003ename + \"'\");\n      return nullptr;\n    }\n    return Builder.CreateLoad(Type::getInt64Ty(Context), it-\u003esecond, id-\u003ename);\n  }\n  return eval_expr(expr, Type::getInt64Ty(Context));\n}\n\nValue *CodeGen::eval_float_init(Expr *expr) {\n  return eval_expr(expr, Type::getDoubleTy(Context));\n}\n\nValue *CodeGen::eval_string_init(Expr *expr) {\n  return eval_expr(expr, PointerType::getUnqual(Context));\n}\n\n// -------------------------------------------------------------------------\n// Cubical structured value → LLVM constant\n// -------------------------------------------------------------------------\n\nType *CodeGen::build_cubical_type(const cubical_value::CubicalValue *val) {\n  switch (val-\u003ekind) {\n    case cubical_value::CubicalValue::Nat:\n      return Type::getInt64Ty(Context);\n    case cubical_value::CubicalValue::Bool:\n      return Type::getInt8Ty(Context);\n    case cubical_value::CubicalValue::Pair: {\n      Type *first = build_cubical_type(val-\u003efirst.get());\n      Type *second = build_cubical_type(val-\u003esecond.get());\n      return StructType::get(Context, {first, second});\n    }\n    case cubical_value::CubicalValue::Array: {\n      if (val-\u003eelements.empty())\n        return ArrayType::get(Type::getInt64Ty(Context), 0);\n      Type *elem = build_cubical_type(val-\u003eelements[0].get());\n      return ArrayType::get(elem, val-\u003eelements.size());\n    }\n    default:\n      return Type::getInt64Ty(Context);\n  }\n}\n\nConstant *CodeGen::build_cubical_constant(const cubical_value::CubicalValue *val) {\n  switch (val-\u003ekind) {\n    case cubical_value::CubicalValue::Nat:\n      return ConstantInt::get(Type::getInt64Ty(Context), val-\u003enat_value);\n    case cubical_value::CubicalValue::Bool:\n      return ConstantInt::get(Type::getInt8Ty(Context), val-\u003ebool_value ? 1 : 0);\n    case cubical_value::CubicalValue::Pair: {\n      Type *ty = build_cubical_type(val);\n      Constant *first = build_cubical_constant(val-\u003efirst.get());\n      Constant *second = build_cubical_constant(val-\u003esecond.get());\n      return ConstantStruct::get(cast\u003cStructType\u003e(ty), {first, second});\n    }\n    case cubical_value::CubicalValue::Array: {\n      std::vector\u003cConstant *\u003e elems;\n      for (auto &e : val-\u003eelements)\n        elems.push_back(build_cubical_constant(e.get()));\n      Type *elem_type = elems.empty() ? Type::getInt64Ty(Context) : elems[0]-\u003egetType();\n      auto *arr_ty = ArrayType::get(elem_type, elems.size());\n      return ConstantArray::get(arr_ty, elems);\n    }\n    default:\n      return nullptr;\n  }\n}\n\nValue *CodeGen::eval_cubical_init(Expr *expr, std::string *debug_out) {\n  auto *str = dynamic_cast\u003cStringExpr *\u003e(expr);\n  if (!str) {\n    errs() \u003c\u003c \"Error: cubical variable requires a string (inline source or file path)\\n\";\n    return nullptr;\n  }\n\n  std::string cubical_source = str-\u003evalue;\n\n  if (cubical_source.size() \u003e= 4 &&\n      (cubical_source.substr(cubical_source.size() - 4) == \".cub\")) {\n    namespace fs = std::filesystem;\n    fs::path file_path(cubical_source);\n    if (file_path.is_relative() && !base_dir.empty()) {\n      file_path = fs::path(base_dir) / cubical_source;\n    }\n    std::ifstream ifs(file_path);\n    if (!ifs) {\n      errs() \u003c\u003c \"Error: cannot open cubical file '\" \u003c\u003c file_path.string() \u003c\u003c \"'\\n\";\n      return nullptr;\n    }\n    cubical_source.assign((std::istreambuf_iterator\u003cchar\u003e(ifs)),\n                           std::istreambuf_iterator\u003cchar\u003e());\n  }\n\n  cubical_value cv(cubical_source);\n  if (!cv.valid()) {\n    errs() \u003c\u003c \"Error: cubical evaluation failed: \" \u003c\u003c cv.error() \u003c\u003c \"\\n\";\n    return nullptr;\n  }\n\n  int64_t int_val = cv.as_int();\n  if (int_val \u003e= 0) {\n    if (debug_out)\n      *debug_out = std::to_string(int_val) + \"  (from cubical: \" + cv.str() + \")\";\n    return ConstantInt::get(Type::getInt64Ty(Context), int_val);\n  }\n\n  std::string result_str = cv.str();\n  {\n    auto eq_pos = result_str.find(\" = \");\n    std::string val_str = (eq_pos != std::string::npos)\n                              ? result_str.substr(eq_pos + 3)\n                              : result_str;\n    while (!val_str.empty() && val_str.front() == ' ') val_str.erase(0, 1);\n    if (val_str == \"True\" || val_str == \"true\") {\n      if (debug_out)\n        *debug_out = \"true  (from cubical: \" + result_str + \")\";\n      return ConstantInt::get(Type::getInt8Ty(Context), 1);\n    }\n    if (val_str == \"False\" || val_str == \"false\") {\n      if (debug_out)\n        *debug_out = \"false  (from cubical: \" + result_str + \")\";\n      return ConstantInt::get(Type::getInt8Ty(Context), 0);\n    }\n  }\n\n  {\n    auto cv_root = cv.parse_json();\n    if (cv_root) {\n      Constant *c = build_cubical_constant(cv_root.get());\n      if (c) {\n        if (debug_out)\n          *debug_out = \"structured cubical value\";\n        return c;\n      }\n    }\n  }\n\n  if (debug_out)\n    *debug_out = \"\\\"\" + result_str + \"\\\"\";\n  Constant *StrConst = ConstantDataArray::getString(Context, result_str);\n  auto *StrGV = new GlobalVariable(M, StrConst-\u003egetType(), true,\n                                    GlobalVariable::PrivateLinkage,\n                                    StrConst, \"cubical_result\");\n  Constant *Zero = ConstantInt::get(Type::getInt32Ty(Context), 0);\n  Constant *Indices[] = {Zero, Zero};\n  return ConstantExpr::getInBoundsGetElementPtr(StrConst-\u003egetType(), StrGV, Indices);\n}\n\n// -------------------------------------------------------------------------\n// Array initialization helpers\n// -------------------------------------------------------------------------\n\nValue *CodeGen::eval_array_init(Expr *expr, ArrayType *array_type) {\n  if (auto *arr_lit = dynamic_cast\u003cArrayLitExpr *\u003e(expr)) {\n    return eval_array_literal(arr_lit, array_type);\n  }\n  return ConstantAggregateZero::get(array_type);\n}\n\nValue *CodeGen::eval_array_literal(ArrayLitExpr *arr, ArrayType *array_type) {\n  Type *elem_type = array_type-\u003egetElementType();\n  unsigned num_elems = array_type-\u003egetNumElements();\n\n  bool all_const = true;\n  for (size_t i = 0; i \u003c arr-\u003eelements.size() && i \u003c num_elems; i++) {\n    if (!dynamic_cast\u003cNumberExpr *\u003e(arr-\u003eelements[i].get())) {\n      all_const = false;\n      break;\n    }\n  }\n\n  if (all_const) {\n    std::vector\u003cConstant *\u003e init_vals;\n    for (size_t i = 0; i \u003c arr-\u003eelements.size() && i \u003c num_elems; i++) {\n      auto *num = static_cast\u003cNumberExpr *\u003e(arr-\u003eelements[i].get());\n      if (elem_type-\u003eisFPOrFPVectorTy())\n        init_vals.push_back(ConstantFP::get(elem_type, num-\u003evalue));\n      else\n        init_vals.push_back(ConstantInt::get(elem_type, (int64_t)num-\u003evalue));\n    }\n    while (init_vals.size() \u003c num_elems)\n      init_vals.push_back(Constant::getNullValue(elem_type));\n    return ConstantArray::get(array_type, init_vals);\n  }\n\n  Value *arr_val = ConstantAggregateZero::get(array_type);\n  for (size_t i = 0; i \u003c arr-\u003eelements.size() && i \u003c num_elems; i++) {\n    Value *el = eval_expr(arr-\u003eelements[i].get(), elem_type);\n    if (!el) return nullptr;\n    arr_val = Builder.CreateInsertValue(arr_val, el, {(unsigned)i}, \"arr.init\");\n  }\n  return arr_val;\n}\n"},{"id":"src-cpp/codegen_pattern.cpp","name":"codegen_pattern.cpp","dir":"src-cpp","ext":".cpp","size":6591,"binary":false,"truncated":false,"content":"#include \"codegen.h\"\n\n#include \"llvm/IR/Constants.h\"\n#include \"llvm/Support/raw_ostream.h\"\n\nusing namespace llvm;\n\n// -------------------------------------------------------------------------\n// Pattern matching helpers\n// -------------------------------------------------------------------------\n\nValue *CodeGen::gen_pattern_check(Pattern *pat, Value *val,\n                                   const TypeAnnotation &val_ann) {\n  if (auto *wc = dynamic_cast\u003cWildcardPattern *\u003e(pat)) {\n    return ConstantInt::getTrue(Context);\n  }\n\n  if (auto *lit = dynamic_cast\u003cLiteralPattern *\u003e(pat)) {\n    Value *lit_val = eval_expr(lit-\u003evalue.get(), val-\u003egetType());\n    if (!lit_val) return nullptr;\n    if (val-\u003egetType()-\u003eisIntegerTy())\n      return Builder.CreateICmpEQ(val, lit_val);\n    if (val-\u003egetType()-\u003eisFPOrFPVectorTy())\n      return Builder.CreateFCmpOEQ(val, lit_val);\n    if (val-\u003egetType()-\u003eisPointerTy())\n      return Builder.CreateICmpEQ(val, lit_val);\n    errs() \u003c\u003c \"Error: unsupported type for literal pattern\\n\";\n    return nullptr;\n  }\n\n  if (auto *var = dynamic_cast\u003cVariablePattern *\u003e(pat)) {\n    bool is_enum = (val_ann.kind == TypeKind::Enum) ||\n                   (val_ann.kind == TypeKind::Struct &&\n                    enum_types.find(val_ann.struct_name) != enum_types.end());\n    if (is_enum) {\n      int vi = get_enum_variant_index(val_ann.struct_name, var-\u003ename);\n      if (vi \u003e= 0) {\n        Value *tag = Builder.CreateExtractValue(val, {0}, \"tag\");\n        return Builder.CreateICmpEQ(tag,\n            ConstantInt::get(Type::getInt64Ty(Context), vi));\n      }\n    }\n    return ConstantInt::getTrue(Context);\n  }\n\n  if (auto *sp = dynamic_cast\u003cStructPattern *\u003e(pat)) {\n    bool is_variant = (val_ann.kind == TypeKind::Enum) ||\n                      (val_ann.kind == TypeKind::Struct &&\n                       enum_types.find(val_ann.struct_name) != enum_types.end());\n    int variant_data_idx = -1;\n\n    // Normalize variant name: strip enum prefix if present\n    std::string sp_short = sp-\u003estruct_name;\n    {\n      size_t pos = sp_short.rfind(\"::\");\n      if (pos != std::string::npos)\n        sp_short = sp_short.substr(pos + 2);\n    }\n\n    if (is_variant) {\n      int vi = get_enum_variant_index(val_ann.struct_name, sp_short);\n      if (vi \u003c 0) {\n        errs() \u003c\u003c \"Error: '\" \u003c\u003c sp-\u003estruct_name \u003c\u003c \"' is not a variant of enum '\"\n               \u003c\u003c val_ann.struct_name \u003c\u003c \"'\\n\";\n        return nullptr;\n      }\n      variant_data_idx = 1 + vi;\n\n      Value *tag = Builder.CreateExtractValue(val, {0}, \"tag\");\n      Value *tag_match = Builder.CreateICmpEQ(tag,\n          ConstantInt::get(Type::getInt64Ty(Context), vi));\n      Value *cond = tag_match;\n\n      for (auto &[field_name, sub_pat] : sp-\u003efields) {\n        std::string struct_key = val_ann.struct_name + \"::\" + sp_short;\n        int idx = get_struct_field_index(struct_key, field_name);\n        if (idx \u003c 0) {\n          errs() \u003c\u003c \"Error: variant '\" \u003c\u003c sp-\u003estruct_name\n                 \u003c\u003c \"' has no field '\" \u003c\u003c field_name \u003c\u003c \"'\\n\";\n          return nullptr;\n        }\n        Value *field_val = Builder.CreateExtractValue(val,\n            {(unsigned)variant_data_idx, (unsigned)idx}, field_name);\n        TypeAnnotation field_ann = get_struct_field_type(struct_key, field_name);\n        Value *sub_cond = gen_pattern_check(sub_pat.get(), field_val, field_ann);\n        if (!sub_cond) return nullptr;\n        cond = Builder.CreateAnd(cond, sub_cond);\n      }\n      return cond;\n    }\n\n    StructType *st = dyn_cast\u003cStructType\u003e(val-\u003egetType());\n    if (!st) {\n      errs() \u003c\u003c \"Error: struct pattern on non-struct value\\n\";\n      return nullptr;\n    }\n    Value *cond = ConstantInt::getTrue(Context);\n    for (auto &[field_name, sub_pat] : sp-\u003efields) {\n      int idx = get_struct_field_index(sp-\u003estruct_name, field_name);\n      if (idx \u003c 0) {\n        errs() \u003c\u003c \"Error: struct '\" \u003c\u003c sp-\u003estruct_name \u003c\u003c \"' has no field '\"\n               \u003c\u003c field_name \u003c\u003c \"'\\n\";\n        return nullptr;\n      }\n      Value *field_val = Builder.CreateExtractValue(val, {(unsigned)idx}, field_name);\n      TypeAnnotation field_ann = get_struct_field_type(sp-\u003estruct_name, field_name);\n      Value *sub_cond = gen_pattern_check(sub_pat.get(), field_val, field_ann);\n      if (!sub_cond) return nullptr;\n      cond = Builder.CreateAnd(cond, sub_cond);\n    }\n    return cond;\n  }\n\n  errs() \u003c\u003c \"Error: unknown pattern type\\n\";\n  return nullptr;\n}\n\nbool CodeGen::gen_pattern_bind(Pattern *pat, Value *val,\n                                const TypeAnnotation &val_ann) {\n  if (auto *wc = dynamic_cast\u003cWildcardPattern *\u003e(pat)) {\n    return true;\n  }\n\n  if (auto *lit = dynamic_cast\u003cLiteralPattern *\u003e(pat)) {\n    return true;\n  }\n\n  if (auto *var = dynamic_cast\u003cVariablePattern *\u003e(pat)) {\n    Type *ty = val-\u003egetType();\n    AllocaInst *alloca = Builder.CreateAlloca(ty, nullptr, var-\u003ename);\n    named_values[var-\u003ename] = alloca;\n    Builder.CreateStore(val, alloca);\n    return true;\n  }\n\n  if (auto *sp = dynamic_cast\u003cStructPattern *\u003e(pat)) {\n    bool is_variant = (val_ann.kind == TypeKind::Enum) ||\n                      (val_ann.kind == TypeKind::Struct &&\n                       enum_types.find(val_ann.struct_name) != enum_types.end());\n    int variant_data_idx = -1;\n\n    // Normalize variant name: strip enum prefix if present\n    std::string sp_short = sp-\u003estruct_name;\n    {\n      size_t pos = sp_short.rfind(\"::\");\n      if (pos != std::string::npos)\n        sp_short = sp_short.substr(pos + 2);\n    }\n\n    if (is_variant) {\n      int vi = get_enum_variant_index(val_ann.struct_name, sp_short);\n      if (vi \u003c 0) return false;\n      variant_data_idx = 1 + vi;\n    }\n\n    for (auto &[field_name, sub_pat] : sp-\u003efields) {\n      Value *field_val;\n      TypeAnnotation field_ann;\n      if (is_variant) {\n        std::string struct_key = val_ann.struct_name + \"::\" + sp_short;\n        int idx = get_struct_field_index(struct_key, field_name);\n        if (idx \u003c 0) return false;\n        field_val = Builder.CreateExtractValue(val,\n            {(unsigned)variant_data_idx, (unsigned)idx}, field_name);\n        field_ann = get_struct_field_type(struct_key, field_name);\n      } else {\n        int idx = get_struct_field_index(sp-\u003estruct_name, field_name);\n        if (idx \u003c 0) return false;\n        field_val = Builder.CreateExtractValue(val, {(unsigned)idx}, field_name);\n        field_ann = get_struct_field_type(sp-\u003estruct_name, field_name);\n      }\n      if (!gen_pattern_bind(sub_pat.get(), field_val, field_ann))\n        return false;\n    }\n    return true;\n  }\n\n  errs() \u003c\u003c \"Error: unknown pattern type in bind\\n\";\n  return false;\n}\n"},{"id":"src-cpp/codegen_stmt.cpp","name":"codegen_stmt.cpp","dir":"src-cpp","ext":".cpp","size":7631,"binary":false,"truncated":false,"content":"#include \"codegen.h\"\n\n#include \"llvm/IR/Constants.h\"\n#include \"llvm/Support/raw_ostream.h\"\n\nusing namespace llvm;\n\n// -------------------------------------------------------------------------\n// Region lifetime tracking\n// -------------------------------------------------------------------------\n\nvoid CodeGen::track_region_alloc_init(const std::string &name, Expr *init_expr) {\n  if (!init_expr) return;\n  if (auto *call = dynamic_cast\u003cCallExpr *\u003e(init_expr)) {\n    if (call-\u003ecallee == \"__region_alloc\" && !call-\u003ecallee_expr) {\n      if (!region_stack.empty())\n        region_allocated_vars.insert(name);\n    }\n  } else if (auto *id = dynamic_cast\u003cIdentExpr *\u003e(init_expr)) {\n    if (region_allocated_vars.count(id-\u003ename))\n      region_allocated_vars.insert(name);\n  }\n}\n\nbool CodeGen::check_region_lifetime(ReturnStmt *stmt) {\n  if (!stmt-\u003evalue) return true;\n  if (auto *id = dynamic_cast\u003cIdentExpr *\u003e(stmt-\u003evalue.get())) {\n    if (region_allocated_vars.count(id-\u003ename)) {\n      errs() \u003c\u003c \"Error: cannot return pointer '\" \u003c\u003c id-\u003ename\n             \u003c\u003c \"' — region will be freed before the function returns\\n\";\n      return false;\n    }\n  }\n  return true;\n}\n\n// -------------------------------------------------------------------------\n// Statements\n// -------------------------------------------------------------------------\n\nbool CodeGen::gen_stmt(Stmt *stmt) {\n  if (auto *let = dynamic_cast\u003cLetStmt *\u003e(stmt))\n    return gen_let_stmt(let);\n  if (auto *ret = dynamic_cast\u003cReturnStmt *\u003e(stmt))\n    return gen_return_stmt(ret);\n  if (auto *if_ = dynamic_cast\u003cIfStmt *\u003e(stmt))\n    return gen_if_stmt(if_);\n  if (auto *for_ = dynamic_cast\u003cForStmt *\u003e(stmt))\n    return gen_for_stmt(for_);\n  if (auto *brk = dynamic_cast\u003cBreakStmt *\u003e(stmt))\n    return gen_break_stmt(brk);\n  if (auto *cont = dynamic_cast\u003cContinueStmt *\u003e(stmt))\n    return gen_continue_stmt(cont);\n  if (auto *region = dynamic_cast\u003cRegionStmt *\u003e(stmt))\n    return gen_region_stmt(region);\n  if (auto *expr = dynamic_cast\u003cExprStmt *\u003e(stmt)) {\n    Value *v = eval_expr(expr-\u003eexpr.get(), Type::getInt64Ty(Context));\n    return v != nullptr;\n  }\n  errs() \u003c\u003c \"Error: unknown statement type\\n\";\n  return false;\n}\n\nbool CodeGen::gen_return_stmt(ReturnStmt *stmt) {\n  Function *fn = Builder.GetInsertBlock()-\u003egetParent();\n  Type *ret_type = fn-\u003egetReturnType();\n\n  // Reject returning region-allocated pointers\n  if (!check_region_lifetime(stmt)) return false;\n\n  if (ret_type-\u003eisVoidTy()) {\n    Builder.CreateRetVoid();\n    return true;\n  }\n\n  if (!stmt-\u003evalue) {\n    errs() \u003c\u003c \"Error: non-void function must return a value\\n\";\n    return false;\n  }\n\n  Value *val = eval_expr(stmt-\u003evalue.get(), ret_type);\n  if (!val) return false;\n  Builder.CreateRet(val);\n  return true;\n}\n\nbool CodeGen::gen_if_stmt(IfStmt *stmt) {\n  Function *fn = Builder.GetInsertBlock()-\u003egetParent();\n\n  Value *cond = eval_expr(stmt-\u003econdition.get(), nullptr);\n  if (!cond) return false;\n  if (!cond-\u003egetType()-\u003eisIntegerTy(1))\n    cond = Builder.CreateICmpNE(cond, ConstantInt::get(cond-\u003egetType(), 0));\n\n  BasicBlock *then_bb = BasicBlock::Create(Context, \"if.then\", fn);\n  BasicBlock *else_bb = BasicBlock::Create(Context, \"if.else\", fn);\n  BasicBlock *merge_bb = BasicBlock::Create(Context, \"if.end\", fn);\n\n  Builder.CreateCondBr(cond, then_bb, else_bb);\n\n  Builder.SetInsertPoint(then_bb);\n  for (auto &s : stmt-\u003ethen_branch) {\n    if (!gen_stmt(s.get())) return false;\n  }\n  if (!Builder.GetInsertBlock()-\u003egetTerminator())\n    Builder.CreateBr(merge_bb);\n\n  Builder.SetInsertPoint(else_bb);\n  for (auto &s : stmt-\u003eelse_branch) {\n    if (!gen_stmt(s.get())) return false;\n  }\n  if (!Builder.GetInsertBlock()-\u003egetTerminator())\n    Builder.CreateBr(merge_bb);\n\n  Builder.SetInsertPoint(merge_bb);\n  return true;\n}\n\nbool CodeGen::gen_for_stmt(ForStmt *stmt) {\n  Function *fn = Builder.GetInsertBlock()-\u003egetParent();\n\n  if (stmt-\u003einit) {\n    if (!gen_stmt(stmt-\u003einit.get())) return false;\n  }\n\n  BasicBlock *cond_bb = BasicBlock::Create(Context, \"for.cond\", fn);\n  BasicBlock *body_bb = BasicBlock::Create(Context, \"for.body\", fn);\n  BasicBlock *update_bb = BasicBlock::Create(Context, \"for.update\", fn);\n  BasicBlock *end_bb = BasicBlock::Create(Context, \"for.end\", fn);\n\n  Builder.CreateBr(cond_bb);\n\n  Builder.SetInsertPoint(cond_bb);\n  if (stmt-\u003econdition) {\n    Value *cond = eval_expr(stmt-\u003econdition.get(), nullptr);\n    if (!cond) return false;\n    if (!cond-\u003egetType()-\u003eisIntegerTy(1))\n      cond = Builder.CreateICmpNE(cond, ConstantInt::get(cond-\u003egetType(), 0));\n    Builder.CreateCondBr(cond, body_bb, end_bb);\n  } else {\n    Builder.CreateBr(body_bb);\n  }\n\n  Builder.SetInsertPoint(body_bb);\n  loop_stack.push_back({stmt-\u003elabel, update_bb, end_bb});\n  for (auto &s : stmt-\u003ebody) {\n    if (!gen_stmt(s.get())) return false;\n  }\n  loop_stack.pop_back();\n  if (!Builder.GetInsertBlock()-\u003egetTerminator())\n    Builder.CreateBr(update_bb);\n\n  Builder.SetInsertPoint(update_bb);\n  if (stmt-\u003eupdate) {\n    Value *v = eval_expr(stmt-\u003eupdate.get(), Type::getInt64Ty(Context));\n    if (!v) return false;\n  }\n  if (!Builder.GetInsertBlock()-\u003egetTerminator())\n    Builder.CreateBr(cond_bb);\n\n  Builder.SetInsertPoint(end_bb);\n  return true;\n}\n\nbool CodeGen::gen_break_stmt(BreakStmt *stmt) {\n  if (stmt-\u003elabel.empty()) {\n    if (loop_stack.empty()) {\n      errs() \u003c\u003c \"Error: 'break' outside of loop\\n\";\n      return false;\n    }\n    Builder.CreateBr(loop_stack.back().end_bb);\n    return true;\n  }\n  for (auto it = loop_stack.rbegin(); it != loop_stack.rend(); ++it) {\n    if (it-\u003elabel == stmt-\u003elabel) {\n      Builder.CreateBr(it-\u003eend_bb);\n      return true;\n    }\n  }\n  errs() \u003c\u003c \"Error: no loop with label '\" \u003c\u003c stmt-\u003elabel \u003c\u003c \"' for break\\n\";\n  return false;\n}\n\nbool CodeGen::gen_continue_stmt(ContinueStmt *stmt) {\n  if (stmt-\u003elabel.empty()) {\n    if (loop_stack.empty()) {\n      errs() \u003c\u003c \"Error: 'continue' outside of loop\\n\";\n      return false;\n    }\n    Builder.CreateBr(loop_stack.back().update_bb);\n    return true;\n  }\n  for (auto it = loop_stack.rbegin(); it != loop_stack.rend(); ++it) {\n    if (it-\u003elabel == stmt-\u003elabel) {\n      Builder.CreateBr(it-\u003eupdate_bb);\n      return true;\n    }\n  }\n  errs() \u003c\u003c \"Error: no loop with label '\" \u003c\u003c stmt-\u003elabel \u003c\u003c \"' for continue\\n\";\n  return false;\n}\n\nbool CodeGen::gen_region_stmt(RegionStmt *stmt) {\n  Function *fn = Builder.GetInsertBlock()-\u003egetParent();\n\n  // Allocate a 4096-byte region buffer on the stack\n  llvm::Type *i8ty = llvm::Type::getInt8Ty(Context);\n  llvm::Type *i64ty = llvm::Type::getInt64Ty(Context);\n  llvm::Type *ptr_ty = llvm::PointerType::getUnqual(Context);\n  Value *buf_size = llvm::ConstantInt::get(i64ty, 4096);\n  AllocaInst *buffer = Builder.CreateAlloca(i8ty, buf_size, \"region.buf\");\n\n  // Separate alloca for the bump pointer (stores current allocation position)\n  AllocaInst *current_ptr_alloca = Builder.CreateAlloca(ptr_ty, nullptr, \"region.cur\");\n  Value *buf_start = Builder.CreatePointerCast(buffer, ptr_ty, \"region.start\");\n  Builder.CreateStore(buf_start, current_ptr_alloca);\n  // end_ptr = buffer + 4096\n  Value *end_ptr = Builder.CreateGEP(i8ty, buffer, buf_size, \"region.end\");\n\n  // Create an end block for after the region body\n  BasicBlock *end_bb = BasicBlock::Create(Context, \"region.end\", fn);\n\n  region_stack.push_back({buffer, current_ptr_alloca, end_ptr, end_bb});\n\n  for (auto &s : stmt-\u003ebody) {\n    if (!gen_stmt(s.get())) {\n      region_stack.pop_back();\n      return false;\n    }\n  }\n\n  region_stack.pop_back();\n\n  // Branch to end block if not
