s.erase(\n        doc.decl_ranges.begin() + affected_idx,\n        doc.decl_ranges.end());\n\n    // Get boundaries for the new text\n    auto boundaries = find_decl_boundaries(doc.text);\n\n    // Find where to start in boundaries\n    int bi = 0;\n    while (bi \u003c (int)boundaries.size() &&\n           boundaries[bi].first \u003c start_offset)\n      bi++;\n\n    // Add new DeclRanges for the re-parsed portion\n    int new_idx = 0;\n    while (bi \u003c (int)boundaries.size()) {\n      DeclRange dr;\n      dr.start_offset = boundaries[bi].first;\n      dr.end_offset = boundaries[bi].second;\n      if (new_idx \u003c (int)new_decls.size()) {\n        dr.decl = std::move(new_decls[new_idx]);\n        new_idx++;\n      }\n      doc.decl_ranges.push_back(std::move(dr));\n      bi++;\n    }\n\n    // Rebuild symbol index from scratch\n    build_symbol_index(doc);\n  } else {\n    // Re-parse failed, fall back to full\n    parse_document(doc);\n  }\n}\n\nvoid LSPServer::build_symbol_index(LSPDocument &doc) {\n  for (auto &dr : doc.decl_ranges) {\n    if (dr.decl)\n      collect_decl_symbols(dr.decl.get(), doc, \"\");\n  }\n}\n\nvoid LSPServer::collect_decl_symbols(Decl *decl, LSPDocument &doc, const std::string &parent) {\n  LSPRange range{{decl-\u003eline - 1, decl-\u003ecol - 1}, {decl-\u003eline - 1, decl-\u003ecol + 1}};\n\n  if (auto *fn = dynamic_cast\u003cFnDecl *\u003e(decl)) {\n    LSPSymbol sym;\n    sym.name = fn-\u003ename;\n    sym.kind = fn-\u003eis_extern ? \"Function\" : \"Function\";\n    sym.range = range;\n    sym.selection_range = range;\n    doc.all_symbols.push_back(sym);\n    doc.symbols_by_name[fn-\u003ename].push_back(sym);\n\n    // Collect parameters as symbols\n    for (auto &param : fn-\u003eparams) {\n      LSPSymbol psym;\n      psym.name = param.name;\n      psym.kind = \"Variable\";\n      psym.range = range;\n      psym.selection_range = range;\n      doc.symbols_by_name[param.name].push_back(psym);\n    }\n\n    // Walk body for variable declarations\n    for (auto &stmt : fn-\u003ebody) {\n      collect_stmt_symbols(stmt.get(), doc, fn-\u003ename);\n    }\n  } else if (auto *sd = dynamic_cast\u003cStructDecl *\u003e(decl)) {\n    LSPSymbol sym;\n    sym.name = sd-\u003ename;\n    sym.kind = \"Struct\";\n    sym.range = range;\n    sym.selection_range = range;\n    doc.all_symbols.push_back(sym);\n    doc.symbols_by_name[sd-\u003ename].push_back(sym);\n\n    for (auto &field : sd-\u003efields) {\n      LSPSymbol fsym;\n      fsym.name = field.name;\n      fsym.kind = \"Field\";\n      fsym.range = range;\n      fsym.selection_range = range;\n      doc.symbols_by_name[field.name].push_back(fsym);\n    }\n  } else if (auto *adt = dynamic_cast\u003cAdtDecl *\u003e(decl)) {\n    LSPSymbol sym;\n    sym.name = adt-\u003ename;\n    sym.kind = \"Enum\";\n    sym.range = range;\n    sym.selection_range = range;\n    doc.all_symbols.push_back(sym);\n    doc.symbols_by_name[adt-\u003ename].push_back(sym);\n  } else if (auto *ld = dynamic_cast\u003cLetDecl *\u003e(decl)) {\n    LSPSymbol sym;\n    sym.name = ld-\u003ename;\n    sym.kind = \"Variable\";\n    sym.range = range;\n    sym.selection_range = range;\n    doc.all_symbols.push_back(sym);\n    doc.symbols_by_name[ld-\u003ename].push_back(sym);\n  } else if (auto *td = dynamic_cast\u003cTraitDecl *\u003e(decl)) {\n    LSPSymbol sym;\n    sym.name = td-\u003ename;\n    sym.kind = \"Interface\";\n    sym.range = range;\n    sym.selection_range = range;\n    doc.all_symbols.push_back(sym);\n    doc.symbols_by_name[td-\u003ename].push_back(sym);\n  } else if (auto *id = dynamic_cast\u003cImplDecl *\u003e(decl)) {\n    (void)id;\n    // Impl blocks don't create named symbols themselves\n  }\n}\n\nvoid LSPServer::collect_stmt_symbols(Stmt *stmt, LSPDocument &doc, const std::string &parent) {\n  LSPRange range{{stmt-\u003eline - 1, stmt-\u003ecol - 1}, {stmt-\u003eline - 1, stmt-\u003ecol + 1}};\n\n  if (auto *ls = dynamic_cast\u003cLetStmt *\u003e(stmt)) {\n    LSPSymbol sym;\n    sym.name = ls-\u003ename;\n    sym.kind = \"Variable\";\n    sym.range = range;\n    sym.selection_range = range;\n    doc.all_symbols.push_back(sym);\n    doc.symbols_by_name[ls-\u003ename].push_back(sym);\n  }\n}\n\nvoid LSPServer::publish_diagnostics(const std::string &uri, LSPDocument &doc) {\n  json::Array diags;\n  for (auto &d : doc.diagnostics)\n    diags.push_back(to_json(d));\n\n  auto notification = make_notification(\"textDocument/publishDiagnostics\",\n    json::Object{{\"uri\", uri}, {\"diagnostics\", std::move(diags)}});\n  write_message(notification);\n}\n\n// =========================================================================\n// Response / Notification builders\n// =========================================================================\n\nstd::string LSPServer::make_response(const json::Object &msg,\n                                     const json::Value &result) {\n  int id = 0;\n  if (auto *id_val = msg.get(\"id\")) {\n    if (id_val-\u003ekind() == json::Value::Kind::Number)\n      id = (int)id_val-\u003egetAsInteger().value_or(0);\n  }\n  json::Object resp{\n    {\"jsonrpc\", \"2.0\"},\n    {\"id\", id},\n    {\"result\", result},\n  };\n  return llvm::formatv(\"{0}\", json::Value(std::move(resp))).str();\n}\n\nstd::string LSPServer::make_error_response(const json::Object &msg,\n                                           int code, const std::string &msg_text) {\n  int id = 0;\n  if (auto *id_val = msg.get(\"id\")) {\n    if (id_val-\u003ekind() == json::Value::Kind::Number)\n      id = (int)id_val-\u003egetAsInteger().value_or(0);\n  }\n  json::Object resp{\n    {\"jsonrpc\", \"2.0\"},\n    {\"id\", id},\n    {\"error\", json::Object{{\"code\", code}, {\"message\", msg_text}}},\n  };\n  return llvm::formatv(\"{0}\", json::Value(std::move(resp))).str();\n}\n\nstd::string LSPServer::make_notification(const std::string &method,\n                                         const json::Value &params) {\n  json::Object notif{\n    {\"jsonrpc\", \"2.0\"},\n    {\"method\", method},\n    {\"params\", params},\n  };\n  return llvm::formatv(\"{0}\", json::Value(std::move(notif))).str();\n}\n\n// =========================================================================\n// LSP Method Handlers\n// =========================================================================\n\njson::Value LSPServer::handle_initialize(const json::Object &params) {\n  (void)params;\n  return json::Object{\n    {\"capabilities\", json::Object{\n      {\"textDocumentSync\", 1}, // Full sync\n      {\"hoverProvider\", true},\n      {\"completionProvider\", json::Object{\n        {\"triggerCharacters\", json::Array{\":\"}},\n      }},\n      {\"definitionProvider\", true},\n      {\"referencesProvider\", true},\n      {\"documentSymbolProvider\", true},\n    }},\n    {\"serverInfo\", json::Object{\n      {\"name\", \"hok-lsp\"},\n      {\"version\", \"0.1.0\"},\n    }},\n  };\n}\n\njson::Value LSPServer::handle_shutdown() {\n  shutdown_requested = true;\n  return nullptr;\n}\n\nvoid LSPServer::handle_did_open(const json::Object &params) {\n  auto *text_doc = params.get(\"textDocument\");\n  if (!text_doc || text_doc-\u003ekind() != json::Value::Kind::Object) return;\n  auto &obj = *text_doc-\u003egetAsObject();\n\n  std::string uri = obj.get(\"uri\")-\u003egetAsString().value_or(\"\").str();\n  std::string text = obj.get(\"text\")-\u003egetAsString().value_or(\"\").str();\n  int version = (int)obj.get(\"version\")-\u003egetAsInteger().value_or(0);\n\n  LSPDocument doc;\n  doc.uri = uri;\n  doc.text = text;\n  doc.version = version;\n  parse_document(doc);\n  documents[uri] = std::move(doc);\n\n  publish_diagnostics(uri, documents[uri]);\n}\n\nvoid LSPServer::handle_did_change(const json::Object &params) {\n  auto *text_doc = params.get(\"textDocument\");\n  if (!text_doc || text_doc-\u003ekind() != json::Value::Kind::Object) return;\n\n  auto *content_changes = params.get(\"contentChanges\");\n  if (!content_changes || content_changes-\u003ekind() != json::Value::Kind::Array) return;\n\n  std::string uri = text_doc-\u003egetAsObject()-\u003eget(\"uri\")-\u003egetAsString().value_or(\"\").str();\n\n  auto *doc = get_document(uri);\n  if (!doc) return;\n\n  std::string old_text = doc-\u003etext;\n\n  // Full sync: take the last change's text\n  auto *changes = content_changes-\u003egetAsArray();\n  if (changes && !changes-\u003eempty()) {\n    auto &last = changes-\u003eback();\n    if (last.kind() == json::Value::Kind::Object) {\n      doc-\u003etext = last.getAsObject()-\u003eget(\"text\")-\u003egetAsString().value_or(\"\").str();\n    }\n  }\n\n  // Try incremental parse, falls back to full parse if needed\n  parse_document_incremental(*doc, old_text);\n  publish_diagnostics(uri, *doc);\n}\n\nvoid LSPServer::handle_did_close(const json::Object &params) {\n  auto *text_doc = params.get(\"textDocument\");\n  if (!text_doc || text_doc-\u003ekind() != json::Value::Kind::Object) return;\n\n  std::string uri = text_doc-\u003egetAsObject()-\u003eget(\"uri\")-\u003egetAsString().value_or(\"\").str();\n  documents.erase(uri);\n}\n\njson::Value LSPServer::handle_hover(const json::Object &params) {\n  auto *text_doc = params.get(\"textDocument\");\n  auto *pos_val = params.get(\"position\");\n  if (!text_doc || !pos_val) return nullptr;\n\n  std::string uri = text_doc-\u003egetAsObject()-\u003eget(\"uri\")-\u003egetAsString().value_or(\"\").str();\n  auto *pos = pos_val-\u003egetAsObject();\n  if (!pos || uri.empty()) return nullptr;\n\n  auto *doc = get_document(uri);\n  if (!doc || doc-\u003edecl_ranges.empty()) return nullptr;\n\n  LSPPosition position;\n  position.line = (int)pos-\u003eget(\"line\")-\u003egetAsInteger().value_or(0);\n  position.character = (int)pos-\u003eget(\"character\")-\u003egetAsInteger().value_or(0);\n\n  // Find the word at cursor\n  int offset = get_offset_for_position(doc-\u003etext, position);\n  if (offset \u003c 0 || offset \u003e= (int)doc-\u003etext.size()) return nullptr;\n\n  // Scan backward to find start of word\n  int start = offset;\n  while (start \u003e 0 && (isalnum(doc-\u003etext[start - 1]) || doc-\u003etext[start - 1] == '_'))\n    start--;\n  // Scan forward to find end of word\n  int end = offset;\n  while (end \u003c (int)doc-\u003etext.size() && (isalnum(doc-\u003etext[end]) || doc-\u003etext[end] == '_'))\n    end++;\n\n  if (start \u003e= end) return nullptr;\n\n  std::string word = doc-\u003etext.substr(start, end - start);\n\n  // Look up in symbol index\n  auto it = doc-\u003esymbols_by_name.find(word);\n  if (it != doc-\u003esymbols_by_name.end() && !it-\u003esecond.empty()) {\n    auto &sym = it-\u003esecond[0];\n    std::string hover_text = \"**\" + sym.name + \"**  \\nKind: \" + sym.kind;\n    return json::Object{\n      {\"contents\", json::Object{{\"kind\", \"markdown\"}, {\"value\", hover_text}}},\n      {\"range\", to_json(sym.range)},\n    };\n  }\n\n  return nullptr;\n}\n\njson::Value LSPServer::handle_completion(const json::Object &params) {\n  (void)params;\n  // Keywords always available\n  std::vector\u003cLSPCompletionItem\u003e items = {\n    {\"fn\", \"keyword: function declaration\"},\n    {\"let\", \"keyword: variable declaration\"},\n    {\"return\", \"keyword: return from function\"},\n    {\"if\", \"keyword: conditional\"},\n    {\"else\", \"keyword: else branch\"},\n    {\"for\", \"keyword: for loop\"},\n    {\"while\", \"keyword: while loop\"},\n    {\"break\", \"keyword: break from loop\"},\n    {\"continue\", \"keyword: continue loop\"},\n    {\"struct\", \"keyword: struct declaration\"},\n    {\"enum\", \"keyword: enum declaration\"},\n    {\"impl\", \"keyword: impl block\"},\n    {\"trait\", \"keyword: trait declaration\"},\n    {\"match\", \"keyword: pattern matching\"},\n    {\"mut\", \"keyword: mutable\"},\n    {\"pub\", \"keyword: public\"},\n    {\"import\", \"keyword: import package\"},\n    {\"include\", \"keyword: include file\"},\n    {\"namespace\", \"keyword: namespace\"},\n    {\"package\", \"keyword: package declaration\"},\n    {\"extern\", \"keyword: extern function\"},\n    {\"true\", \"keyword: boolean true\"},\n    {\"false\", \"keyword: boolean false\"},\n    {\"null\", \"keyword: null value\"},\n    {\"void\", \"keyword: void type\"},\n    {\"int\", \"type: signed integer\"},\n    {\"int8\", \"type: 8-bit integer\"},\n    {\"int16\", \"type: 16-bit integer\"},\n    {\"int32\", \"type: 32-bit integer\"},\n    {\"int64\", \"type: 64-bit integer\"},\n    {\"uint8\", \"type: 8-bit unsigned integer\"},\n    {\"uint16\", \"type: 16-bit unsigned integer\"},\n    {\"uint32\", \"type: 32-bit unsigned integer\"},\n    {\"uint64\", \"type: 64-bit unsigned integer\"},\n    {\"float\", \"type: floating point\"},\n    {\"float32\", \"type: 32-bit float\"},\n    {\"float64\", \"type: 64-bit float\"},\n    {\"bool\", \"type: boolean\"},\n    {\"string\", \"type: string\"},\n    {\"char\", \"type: character\"},\n    {\"cubical\", \"type: cubical\"},\n  };\n\n  // Add known symbols from all open documents\n  for (auto &[uri, doc] : documents) {\n    (void)uri;\n    for (auto &[name, syms] : doc.symbols_by_name) {\n      (void)syms;\n      std::string detail = \"symbol: \" + doc.symbols_by_name[name][0].kind;\n      items.push_back({name, detail});\n    }\n  }\n\n  json::Array result;\n  for (auto &item : items)\n    result.push_back(to_json(item));\n\n  // Deduplicate by label\n  std::set\u003cstd::string\u003e seen;\n  json::Array deduped;\n  for (auto &item : result) {\n    auto label = item.getAsObject()-\u003eget(\"label\")-\u003egetAsString().value_or(\"\").str();\n    if (seen.insert(label).second)\n      deduped.push_back(std::move(item));\n  }\n\n  return json::Object{{\"isIncomplete\", false}, {\"items\", std::move(deduped)}};\n}\n\njson::Value LSPServer::handle_definition(const json::Object &params) {\n  auto *text_doc = params.get(\"textDocument\");\n  auto *pos_val = params.get(\"position\");\n  if (!text_doc || !pos_val) return nullptr;\n\n  std::string uri = text_doc-\u003egetAsObject()-\u003eget(\"uri\")-\u003egetAsString().value_or(\"\").str();\n  auto *pos = pos_val-\u003egetAsObject();\n  if (!pos || uri.empty()) return nullptr;\n\n  auto *doc = get_document(uri);\n  if (!doc || doc-\u003edecl_ranges.empty()) return nullptr;\n\n  LSPPosition position;\n  position.line = (int)pos-\u003eget(\"line\")-\u003egetAsInteger().value_or(0);\n  position.character = (int)pos-\u003eget(\"character\")-\u003egetAsInteger().value_or(0);\n\n  // Find word at cursor\n  int offset = get_offset_for_position(doc-\u003etext, position);\n  int start = offset;\n  while (start \u003e 0 && (isalnum(doc-\u003etext[start - 1]) || doc-\u003etext[start - 1] == '_'))\n    start--;\n  int end = offset;\n  while (end \u003c (int)doc-\u003etext.size() && (isalnum(doc-\u003etext[end]) || doc-\u003etext[end] == '_'))\n    end++;\n\n  if (start \u003e= end) return nullptr;\n\n  std::string word = doc-\u003etext.substr(start, end - start);\n\n  auto it = doc-\u003esymbols_by_name.find(word);\n  if (it != doc-\u003esymbols_by_name.end() && !it-\u003esecond.empty()) {\n    auto &sym = it-\u003esecond[0];\n    LSPLocation loc;\n    loc.uri = uri;\n    loc.range = sym.range;\n    return to_json(loc);\n  }\n\n  return nullptr;\n}\n\njson::Value LSPServer::handle_references(const json::Object &params) {\n  auto *text_doc = params.get(\"textDocument\");\n  auto *pos_val = params.get(\"position\");\n  if (!text_doc || !pos_val) return nullptr;\n\n  std::string uri = text_doc-\u003egetAsObject()-\u003eget(\"uri\")-\u003egetAsString().value_or(\"\").str();\n  auto *pos = pos_val-\u003egetAsObject();\n  if (!pos || uri.empty()) return nullptr;\n\n  auto *doc = get_document(uri);\n  if (!doc || doc-\u003edecl_ranges.empty()) return nullptr;\n\n  LSPPosition position;\n  position.line = (int)pos-\u003eget(\"line\")-\u003egetAsInteger().value_or(0);\n  position.character = (int)pos-\u003eget(\"character\")-\u003egetAsInteger().value_or(0);\n\n  // Find word at cursor\n  int offset = get_offset_for_position(doc-\u003etext, position);\n  int start = offset;\n  while (start \u003e 0 && (isalnum(doc-\u003etext[start - 1]) || doc-\u003etext[start - 1] == '_'))\n    start--;\n  int end = offset;\n  while (end \u003c (int)doc-\u003etext.size() && (isalnum(doc-\u003etext[end]) || doc-\u003etext[end] == '_'))\n    end++;\n\n  if (start \u003e= end) return nullptr;\n\n  std::string word = doc-\u003etext.substr(start, end - start);\n\n  // Find all occurrences of the word in the document text\n  json::Array locations;\n  for (int i = 0; i \u003c= (int)doc-\u003etext.size() - (int)word.size(); i++) {\n    if (doc-\u003etext.substr(i, word.size()) == word) {\n      // Check it's a word boundary\n      bool word_start = (i == 0) || (!isalnum(doc-\u003etext[i - 1]) && doc-\u003etext[i - 1] != '_');\n      bool word_end = (i + (int)word.size() \u003e= (int)doc-\u003etext.size()) ||\n                      (!isalnum(doc-\u003etext[i + word.size()]) && doc-\u003etext[i + word.size()] != '_');\n      if (word_start && word_end) {\n        auto start_pos = get_position_for_offset(doc-\u003etext, i);\n        auto end_pos = get_position_for_offset(doc-\u003etext, i + word.size());\n        LSPLocation loc;\n        loc.uri = uri;\n        loc.range = {start_pos, end_pos};\n        locations.push_back(to_json(loc));\n      }\n    }\n  }\n\n  return locations;\n}\n\njson::Value LSPServer::handle_document_symbol(const json::Object &params) {\n  auto *text_doc = params.get(\"textDocument\");\n  if (!text_doc) return nullptr;\n\n  std::string uri = text_doc-\u003egetAsObject()-\u003eget(\"uri\")-\u003egetAsString().value_or(\"\").str();\n  auto *doc = get_document(uri);\n  if (!doc) return nullptr;\n\n  json::Array symbols;\n  for (auto &sym : doc-\u003eall_symbols)\n    symbols.push_back(to_json(sym));\n\n  return symbols;\n}\n\n// =========================================================================\n// Main loop\n// =========================================================================\n\nvoid LSPServer::run() {\n  while (!shutdown_requested && !std::cin.eof()) {\n    std::string body = read_message();\n    if (body.empty()) {\n      if (std::cin.eof()) break;\n      continue;\n    }\n\n    auto parsed = json::parse(body);\n    if (!parsed) continue;\n    auto *msg = parsed-\u003egetAsObject();\n    if (!msg) continue;\n\n    // Get JSON-RPC fields\n    auto *method_val = msg-\u003eget(\"method\");\n    if (!method_val) continue;\n    std::string method = method_val-\u003egetAsString().value_or(\"\").str();\n    auto *params = msg-\u003eget(\"params\");\n\n    // Handle methods\n    std::string response;\n\n    if (method == \"initialize\") {\n      auto result = handle_initialize(params ? *params-\u003egetAsObject() : json::Object());\n      response = make_response(*msg, result);\n    } else if (method == \"shutdown\") {\n      handle_shutdown();\n      response = make_response(*msg, nullptr);\n    } else if (method == \"exit\") {\n      break;\n    } else if (method == \"textDocument/didOpen\") {\n      if (params) handle_did_open(*params-\u003egetAsObject());\n    } else if (method == \"textDocument/didChange\") {\n      if (params) handle_did_change(*params-\u003egetAsObject());\n    } else if (method == \"textDocument/didClose\") {\n      if (params) handle_did_close(*params-\u003egetAsObject());\n    } else if (method == \"textDocument/hover\") {\n      if (params) {\n        auto result = handle_hover(*params-\u003egetAsObject());\n        response = make_response(*msg, result);\n      }\n    } else if (method == \"textDocument/completion\") {\n      if (params) {\n        auto result = handle_completion(*params-\u003egetAsObject());\n        response = make_response(*msg, result);\n      }\n    } else if (method == \"textDocument/definition\") {\n      if (params) {\n        auto result = handle_definition(*params-\u003egetAsObject());\n        response = make_response(*msg, result);\n      }\n    } else if (method == \"textDocument/references\") {\n      if (params) {\n        auto result = handle_references(*params-\u003egetAsObject());\n        response = make_response(*msg, result);\n      }\n    } else if (method == \"textDocument/documentSymbol\") {\n      if (params) {\n        auto result = handle_document_symbol(*params-\u003egetAsObject());\n        response = make_response(*msg, result);\n      }\n    } else if (method == \"initialized\") {\n      // No-op\n    } else {\n      // Method not found — return error\n      response = make_error_response(*msg, -32601, \"Method not found: \" + method);\n    }\n\n    if (!response.empty()) {\n      write_message(response);\n    }\n  }\n}\n"},{"id":"src-cpp/lsp/lsp.h","name":"lsp.h","dir":"src-cpp/lsp","ext":".h","size":3871,"binary":false,"truncated":false,"content":"#pragma once\n\n#include \u003cmap\u003e\n#include \u003cmemory\u003e\n#include \u003cstring\u003e\n#include \u003cvector\u003e\n\n#include \"llvm/Support/JSON.h\"\n\n#include \"ast.h\"\n#include \"parser.h\"\n\n// =========================================================================\n// Hok LSP Server\n// =========================================================================\n\nstruct LSPPosition {\n  int line = 0;     // 0-based\n  int character = 0; // 0-based\n};\n\nstruct LSPRange {\n  LSPPosition start;\n  LSPPosition end;\n};\n\nstruct LSPLocation {\n  std::string uri;\n  LSPRange range;\n};\n\nstruct LSPDiagnostic {\n  LSPRange range;\n  std::string message;\n  std::string severity; // \"Error\", \"Warning\", \"Information\", \"Hint\"\n};\n\nstruct LSPSymbol {\n  std::string name;\n  std::string kind; // \"Function\", \"Variable\", \"Struct\", \"Enum\", etc.\n  LSPRange range;\n  LSPRange selection_range;\n};\n\nstruct LSPCompletionItem {\n  std::string label;\n  std::string detail;\n  std::string insert_text;\n};\n\n/// Byte range of a top-level declaration in the source text.\nstruct DeclRange {\n  std::unique_ptr\u003cDecl\u003e decl;\n  int start_offset = 0; // inclusive byte offset\n  int end_offset = 0;   // exclusive byte offset\n};\n\nstruct LSPDocument {\n  std::string uri;\n  std::string text;\n  int version = 0;\n  std::vector\u003cDeclRange\u003e decl_ranges; // AST + byte ranges for incremental re-parse\n  std::vector\u003cLSPDiagnostic\u003e diagnostics;\n\n  // Symbol index for quick lookup\n  std::map\u003cstd::string, std::vector\u003cLSPSymbol\u003e\u003e symbols_by_name;\n  std::vector\u003cLSPSymbol\u003e all_symbols;\n};\n\nclass LSPServer {\n  std::map\u003cstd::string, LSPDocument\u003e documents;\n  bool shutdown_requested = false;\n\n  // LSP helpers\n  std::string read_message();\n  std::string make_response(const llvm::json::Object &msg,\n                            const llvm::json::Value &result);\n  std::string make_error_response(const llvm::json::Object &msg,\n                                  int code, const std::string &msg_text);\n  std::string make_notification(const std::string &method,\n                                const llvm::json::Value &params);\n\n  // Protocol handlers\n  llvm::json::Value handle_initialize(const llvm::json::Object &params);\n  llvm::json::Value handle_shutdown();\n  void handle_did_open(const llvm::json::Object &params);\n  void handle_did_change(const llvm::json::Object &params);\n  void handle_did_close(const llvm::json::Object &params);\n  llvm::json::Value handle_hover(const llvm::json::Object &params);\n  llvm::json::Value handle_completion(const llvm::json::Object &params);\n  llvm::json::Value handle_definition(const llvm::json::Object &params);\n  llvm::json::Value handle_references(const llvm::json::Object &params);\n  llvm::json::Value handle_document_symbol(const llvm::json::Object &params);\n\n  // Internal helpers\n  LSPDocument *get_document(const std::string &uri);\n  void parse_document(LSPDocument &doc);\n  void parse_document_incremental(LSPDocument &doc,\n                                  const std::string &old_text);\n  void build_symbol_index(LSPDocument &doc);\n  void publish_diagnostics(const std::string &uri, LSPDocument &doc);\n  void collect_decl_symbols(Decl *decl, LSPDocument &doc, const std::string &parent);\n  void collect_stmt_symbols(Stmt *stmt, LSPDocument &doc, const std::string &parent);\n\n  LSPPosition get_position_for_offset(const std::string &text, int offset);\n  int get_offset_for_position(const std::string &text, LSPPosition pos);\n  std::string uri_to_path(const std::string &uri);\n  std::string path_to_uri(const std::string &path);\n\npublic:\n  void run();\n};\n\n// Helper: convert LSP types to llvm::json\nllvm::json::Object to_json(const LSPPosition &pos);\nllvm::json::Object to_json(const LSPRange &range);\nllvm::json::Object to_json(const LSPLocation &loc);\nllvm::json::Object to_json(const LSPDiagnostic &diag);\nllvm::json::Object to_json(const LSPSymbol &sym);\nllvm::json::Object to_json(const LSPCompletionItem &item);\n"},{"id":"src-cpp/lsp/README.md","name":"README.md","dir":"src-cpp/lsp","ext":".md","size":2254,"binary":false,"truncated":false,"content":"# hok-lsp — Hokkaido Language Server\n\n`hok-lsp` is an LSP (Language Server Protocol) implementation for the Hokkaido programming language, providing IDE features for editors that support LSP (VS Code, Neovim, Emacs, Helix, etc.).\n\n## Features\n\n- **Diagnostics** — parse errors reported inline as you type\n- **Hover** — shows symbol kind and name on hover\n- **Completion** — keyword suggestions + symbols from all open documents\n- **Go to Definition** — navigate to symbol declarations\n- **Find References** — find all occurrences of a symbol in the current file\n- **Document Symbols** — outline of functions, variables, structs, enums, traits\n- **Incremental Parsing** — after the first full parse, edits re-parse only the affected portion of the file\n\n## Building\n\nBuilt as part of the Hokkaido CMake project:\n\n```sh\nmkdir build && cd build\ncmake .. && make hok-lsp\n```\n\nOr with Nix (installed to `$out/bin/hok-lsp`):\n\n```sh\nnix build github:hokkaido-lang/hokkaido\n```\n\n## Usage\n\n### Neovim (via `vim.lsp`)\n\n```lua\nvim.api.nvim_create_autocmd('FileType', {\n  pattern = 'hk',\n  callback = function()\n    vim.lsp.start({\n      name = 'hok-lsp',\n      cmd = { 'hok-lsp' },\n    })\n  end,\n})\n```\n\n### Helix\n\nAdd to `~/.config/helix/languages.toml`:\n\n```toml\n[[language]]\nname = \"hokkaido\"\nscope = \"source.hk\"\nfile-types = [\"hk\"]\nlanguage-servers = [\"hok-lsp\"]\n\n[language-server.hok-lsp]\ncommand = \"hok-lsp\"\n```\n\n### VS Code\n\nCreate a simple extension or use a generic LSP client:\n\n```json\n{\n  \"languages\": [{\n    \"id\": \"hokkaido\",\n    \"extensions\": [\"hk\"]\n  }],\n  \"languageServer\": {\n    \"command\": \"hok-lsp\"\n  }\n}\n```\n\n## Protocol\n\nCommunicates over **stdio** using the standard LSP JSON-RPC transport (`Content-Length` headers).\n\nSupports `textDocument/didOpen`, `didChange`, `didClose`, `hover`, `completion`, `definition`, `references`, and `documentSymbol`.\n\n## Architecture\n\n- **`lsp.h`** — type definitions (`LSPPosition`, `LSPRange`, `LSPDiagnostic`, `LSPSymbol`, `LSPCompletionItem`, `DeclRange`, `LSPDocument`) and `LSPServer` class\n- **`lsp.cpp`** — JSON-RPC message framing, protocol handlers, symbol index construction, incremental parsing\n- **`lsp_main.cpp`** — entry point that instantiates `LSPServer` and calls `run()`\n"},{"id":"src-cpp/lsp_main.cpp","name":"lsp_main.cpp","dir":"src-cpp","ext":".cpp","size":85,"binary":false,"truncated":false,"content":"#include \"lsp/lsp.h\"\n\nint main() {\n  LSPServer server;\n  server.run();\n  return 0;\n}\n"},{"id":"src-cpp/main.cpp","name":"main.cpp","dir":"src-cpp","ext":".cpp","size":12418,"binary":false,"truncated":false,"content":"// hokkaido — LLVM-based compiler with cubical compile-time evaluation\n// The cubical type triggers compile-time evaluation of the cubical\n// expression. The result is embedded as an LLVM constant.\n\n#include \u003ccstdlib\u003e\n#include \u003cfilesystem\u003e\n#include \u003cfstream\u003e\n#include \u003ciostream\u003e\n#include \u003cmemory\u003e\n#include \u003coptional\u003e\n#include \u003cset\u003e\n#include \u003cstring\u003e\n#include \u003cvector\u003e\n\n#include \"llvm/IR/IRBuilder.h\"\n#include \"llvm/IR/LLVMContext.h\"\n#include \"llvm/IR/LegacyPassManager.h\"\n#include \"llvm/IR/Module.h\"\n#include \"llvm/MC/TargetRegistry.h\"\n#include \"llvm/Passes/PassBuilder.h\"\n#include \"llvm/Passes/OptimizationLevel.h\"\n#include \"llvm/Support/CodeGen.h\"\n#include \"llvm/Support/FileSystem.h\"\n#include \"llvm/Support/TargetSelect.h\"\n#include \"llvm/Support/raw_ostream.h\"\n#include \"llvm/Target/TargetMachine.h\"\n#include \"llvm/Target/TargetOptions.h\"\n#include \"llvm/TargetParser/Host.h\"\n\n#include \"borrow_checker.h\"\n#include \"codegen.h\"\n#include \"cubical.h\"\n#include \"lexer.h\"\n#include \"parser.h\"\n\nusing namespace llvm;\n\n// =========================================================================\n// Minimal C runtime discovery for linking with ld.lld directly\n// =========================================================================\n//\n// ld.lld is purely a linker — unlike clang, it has no built-in knowledge of\n// where a given system keeps its C runtime startup objects (crt1.o,\n// crti.o, crtn.o), libc, or the dynamic loader path. A compiler driver\n// like clang normally works that out for you from the target triple and\n// sysroot. Here we do a small best-effort search across common distro\n// layouts instead, so the toolchain doesn't need a full clang install just\n// to perform the final link step. Anything nonstandard can be overridden\n// via HOKKAIDO_CRT_DIR / HOKKAIDO_DYNAMIC_LINKER.\n\nstatic std::string find_crt_dir() {\n  if (const char *env = std::getenv(\"HOKKAIDO_CRT_DIR\")) return env;\n  static const char *candidates[] = {\n      \"/usr/lib/x86_64-linux-gnu\",   // Debian/Ubuntu x86_64\n      \"/usr/lib/aarch64-linux-gnu\",  // Debian/Ubuntu arm64\n      \"/usr/lib64\",                  // Fedora/RHEL/openSUSE\n      \"/usr/lib\",                    // Arch and others\n      \"/lib64\",\n      \"/lib\",\n  };\n  for (const char *dir : candidates) {\n    if (std::filesystem::exists(std::string(dir) + \"/crt1.o\")) return dir;\n  }\n  return \"\";\n}\n\nstatic bool find_ld_lld() {\n  if (const char *env = std::getenv(\"HOKKAIDO_LD_LLD\")) {\n    return std::filesystem::exists(env);\n  }\n  if (const char *path = std::getenv(\"PATH\")) {\n    std::string PathStr(path);\n    size_t start = 0;\n    while (start \u003c= PathStr.size()) {\n      size_t end = PathStr.find(':', start);\n      if (end == std::string::npos) end = PathStr.size();\n      std::string dir = PathStr.substr(start, end - start);\n      if (!dir.empty() && std::filesystem::exists(dir + \"/ld.lld\")) {\n        return true;\n      }\n      start = end + 1;\n    }\n  }\n  return false;\n}\n\nstatic std::string find_dynamic_linker() {\n  if (const char *env = std::getenv(\"HOKKAIDO_DYNAMIC_LINKER\")) return env;\n  static const char *candidates[] = {\n      \"/lib64/ld-linux-x86-64.so.2\",   // glibc x86_64\n      \"/lib/ld-linux-aarch64.so.1\",    // glibc arm64\n      \"/lib/ld-linux.so.2\",            // glibc i386\n      \"/lib/ld-musl-x86_64.so.1\",      // musl x86_64\n  };\n  for (const char *path : candidates) {\n    if (std::filesystem::exists(path)) return path;\n  }\n  return \"\";\n}\n\n// =========================================================================\n// Main entry point\n// =========================================================================\n\nvoid print_usage() {\n  std::cout \u003c\u003c \"hokkaido — LLVM-based compiler with cubical compile-time evaluation\\n\\n\";\n  std::cout \u003c\u003c \"Usage:\\n\";\n  std::cout \u003c\u003c \"  hokkaido input.hk                  Print LLVM IR to stdout\\n\";\n  std::cout \u003c\u003c \"  hokkaido input.hk -o output         Compile to an object file (output.o)\\n\";\n  std::cout \u003c\u003c \"  hokkaido input.hk -o output -O2     Compile with optimizations (O0, O1, O2, O3, Os, Oz)\\n\";\n  std::cout \u003c\u003c \"  hokkaido input.hk -o output --freestanding\\n\";\n  std::cout \u003c\u003c \"                                       Same, but with no CRT/libc dependency:\\n\";\n  std::cout \u003c\u003c \"                                       'main' becomes the raw ELF entry point\\n\";\n  std::cout \u003c\u003c \"                                       and exits via a direct syscall. Plain\\n\";\n  std::cout \u003c\u003c \"                                       'extern fn' declarations are rejected,\\n\";\n  std::cout \u003c\u003c \"                                       since there's no libc to resolve them.\\n\";\n  std::cout \u003c\u003c \"  hokkaido input.cub                  Evaluate a .cub file\\n\\n\";\n  std::cout \u003c\u003c \"Optimization levels:\\n\";\n  std::cout \u003c\u003c \"  -O0    No optimization (default, debug-friendly)\\n\";\n  std::cout \u003c\u003c \"  -O1    Light optimization, preserves debuggability\\n\";\n  std::cout \u003c\u003c \"  -O2    Standard optimizations (recommended for release)\\n\";\n  std::cout \u003c\u003c \"  -O3    Aggressive optimizations\\n\";\n  std::cout \u003c\u003c \"  -Os    Optimize for code size\\n\";\n  std::cout \u003c\u003c \"  -Oz    Aggressively optimize for code size\\n\";\n  std::cout \u003c\u003c \"  -O     Alias for -O2\\n\\n\";\n  std::cout \u003c\u003c \"hokkaido does not link executables itself — it only emits an object\\n\";\n  std::cout \u003c\u003c \"file. After compiling, link it yourself with 'ld.lld', 'clang', or your\\n\";\n  std::cout \u003c\u003c \"platform's usual linker. Run with -o to see a suggested link command for\\n\";\n  std::cout \u003c\u003c \"this object file once it's been emitted.\\n\";\n}\n\nint main(int argc, char *argv[]) {\n  if (argc \u003c 2) {\n    print_usage();\n    return 0;\n  }\n\n  std::filesystem::path filePath(argv[1]);\n  std::ifstream ifs(filePath);\n  if (!ifs) {\n    std::cerr \u003c\u003c \"Error: cannot open file '\" \u003c\u003c argv[1] \u003c\u003c \"'\\n\";\n    return 1;\n  }\n  std::string Content((std::istreambuf_iterator\u003cchar\u003e(ifs)),\n                       std::istreambuf_iterator\u003cchar\u003e());\n\n  // Initialize LLVM targets\n  InitializeAllTargetInfos();\n  InitializeAllTargets();\n  InitializeAllTargetMCs();\n  InitializeAllAsmParsers();\n  InitializeAllAsmPrinters();\n\n  std::string TargetTripleStr = sys::getDefaultTargetTriple();\n  Triple TargetTriple(TargetTripleStr);\n  std::string Error;\n  const Target *TheTarget = TargetRegistry::lookupTarget(TargetTripleStr, Error);\n  if (!TheTarget) {\n    errs() \u003c\u003c \"Error: \" \u003c\u003c Error;\n    return 1;\n  }\n\n  std::string CPU = \"generic\";\n  TargetOptions opt;\n  // Default to position-independent code. Modern clang/ld.lld link PIE\n  // executables by default, which requires the object file's relocations\n  // to be PIC-safe; leaving this unset previously meant LLVM picked a\n  // static/non-PIC model, producing relocations (e.g. against .rodata\n  // string literals) that a PIE link would reject with errors like\n  // \"relocation R_X86_64_32 ... can not be used when making a PIE\n  // object\". Building PIC here means `clang main.o -o main` works without\n  // the caller needing to pass `-no-pie` themselves.\n  auto RM = std::optional\u003cReloc::Model\u003e(Reloc::Model::PIC_);\n\n  // Parse optimization level (default: -O0 — no optimization, debug-friendly)\n  CodeGenOptLevel OptLevel = CodeGenOptLevel::None;\n  OptimizationLevel LLVMOptLevel = OptimizationLevel::O0;\n  // Parse optional -o flag, --freestanding, optimization flags, and any extra\n  // linker flags (e.g. -lm, -lcurl, -L/path) for linking against C libraries\n  // used by `extern fn` declarations.\n  std::string OutputPath;\n  bool Freestanding = false;\n  std::vector\u003cstd::string\u003e ExtraLinkArgs;\n  for (int i = 2; i \u003c argc; i++) {\n    std::string Arg = argv[i];\n    if (Arg == \"-o\" && i + 1 \u003c argc) {\n      OutputPath = argv[++i];\n    } else if (Arg == \"--freestanding\") {\n      Freestanding = true;\n    } else if (Arg == \"-O\") {\n      OptLevel = CodeGenOptLevel::Default;\n      LLVMOptLevel = OptimizationLevel::O2;\n    } else if (Arg.rfind(\"-O\", 0) == 0) {\n      std::string Level = Arg.substr(2);\n      if (Level == \"0\") {\n        OptLevel = CodeGenOptLevel::None;\n        LLVMOptLevel = OptimizationLevel::O0;\n      } else if (Level == \"1\") {\n        OptLevel = CodeGenOptLevel::Less;\n        LLVMOptLevel = OptimizationLevel::O1;\n      } else if (Level == \"2\") {\n        OptLevel = CodeGenOptLevel::Default;\n        LLVMOptLevel = OptimizationLevel::O2;\n      } else if (Level == \"3\") {\n        OptLevel = CodeGenOptLevel::Aggressive;\n        LLVMOptLevel = OptimizationLevel::O3;\n      } else if (Level == \"s\") {\n        OptLevel = CodeGenOptLevel::Default;\n        LLVMOptLevel = OptimizationLevel::Os;\n      } else if (Level == \"z\") {\n        OptLevel = CodeGenOptLevel::Default;\n        LLVMOptLevel = OptimizationLevel::Oz;\n      } else {\n        std::cerr \u003c\u003c \"Warning: unknown optimization level '\" \u003c\u003c Arg \u003c\u003c \"', ignoring\\n\";\n      }\n    } else {\n      ExtraLinkArgs.push_back(Arg);\n    }\n  }\n\n  std::unique_ptr\u003cTargetMachine\u003e TM(\n      TheTarget-\u003ecreateTargetMachine(TargetTriple, CPU, \"\", opt, RM,\n                                     std::nullopt, OptLevel));\n\n  LLVMContext Context;\n  std::unique_ptr\u003cModule\u003e M = std::make_unique\u003cModule\u003e(\"hokkaido\", Context);\n  M-\u003esetDataLayout(TM-\u003ecreateDataLayout());\n  M-\u003esetTargetTriple(TargetTriple);\n\n  IRBuilder\u003c\u003e Builder(Context);\n\n  // Handle .cub files (direct cubical evaluation)\n  if (filePath.extension() == \".cub\" || filePath.extension() == \".uwuc\") {\n    cubical_value cv(Content);\n    if (cv.valid()) {\n      std::cout \u003c\u003c cv.str() \u003c\u003c \"\\n\";\n    } else {\n      std::cerr \u003c\u003c \"Error: cubical evaluation failed\\n\";\n      return 1;\n    }\n    return 0;\n  }\n\n  // Handle .hk files (hokkaido language)\n  if (filePath.extension() == \".hk\") {\n    Lexer lexer(Content);\n    auto included_files = std::make_shared\u003cstd::set\u003cstd::string\u003e\u003e();\n    auto imported_packages = std::make_shared\u003cstd::set\u003cstd::string\u003e\u003e();\n    {\n      std::error_code ec;\n      auto canonical = std::filesystem::weakly_canonical(filePath, ec);\n      included_files-\u003einsert((ec ? filePath : canonical).string());\n    }\n    Parser parser(lexer, filePath.string(), filePath.parent_path().string(), included_files, imported_packages);\n    auto decls = parser.parse_program();\n\n    if (!parser.ok()) {\n      std::cerr \u003c\u003c parser.error() \u003c\u003c \"\\n\";\n      return 1;\n    }\n\n    // Run borrow checker on all function declarations\n    {\n      BorrowChecker bc;\n      for (auto &decl : decls) {\n        if (auto *fn = dynamic_cast\u003cFnDecl *\u003e(decl.get())) {\n          if (!fn-\u003eis_extern && fn-\u003etype_params.empty()) {\n            if (!bc.check_fn(fn-\u003ename, fn)) {\n              return 1;\n            }\n          }\n        }\n      }\n    }\n\n    CodeGen cg(Context, *M, Builder, Freestanding, filePath.parent_path().string());\n    if (!cg.generate(decls)) {\n      return 1;\n    }\n\n    if (OutputPath.empty()) {\n      M-\u003eprint(outs(), nullptr);\n    } else {\n      std::string ObjPath = OutputPath + \".o\";\n      std::error_code EC;\n      raw_fd_ostream Dest(ObjPath, EC, sys::fs::OF_None);\n      if (EC) {\n        errs() \u003c\u003c \"Error: cannot open '\" \u003c\u003c ObjPath \u003c\u003c \"': \" \u003c\u003c EC.message() \u003c\u003c \"\\n\";\n        return 1;\n      }\n\n      LoopAnalysisManager LAM;\n      FunctionAnalysisManager FAM;\n      CGSCCAnalysisManager CGAM;\n      ModuleAnalysisManager MAM;\n\n      PassBuilder PB(TM.get());\n      PB.registerModuleAnalyses(MAM);\n      PB.registerCGSCCAnalyses(CGAM);\n      PB.registerFunctionAnalyses(FAM);\n      PB.registerLoopAnalyses(LAM);\n      PB.crossRegisterProxies(LAM, FAM, CGAM, MAM);\n\n      // Register target-specific pass builder callbacks before building\n      // any optimization pipeline.\n      TM-\u003eregisterPassBuilderCallbacks(PB);\n\n      // Run LLVM optimization passes when optimization level \u003e 0\n      if (OptLevel != CodeGenOptLevel::None) {\n        ModulePassManager MPM = PB.buildPerModuleDefaultPipeline(LLVMOptLevel);\n        MPM.run(*M, MAM);\n      }\n\n      // TargetMachine::addPassesToEmitFile still requires the legacy PM\n      // for the codegen backend step.\n      legacy::PassManager LPM;\n      if (TM-\u003eaddPassesToEmitFile(LPM, Dest, nullptr, CodeGenFileType::ObjectFile)) {\n        errs() \u003c\u003c \"Error: target does not support object emission\\n\";\n        return 1;\n      }\n      LPM.run(*M);\n      Dest.close();\n\n      bool HaveLdLld = find_ld_lld();\n\n      std::string CrtDir = find_crt_dir();\n      std::string DynamicLinker = find_dynamic_linker();\n\n      \n    }\n    return 0;\n  }\n\n  std::cerr \u003c\u003c \"Unsupported file type: \" \u003c\u003c filePath.extension() \u003c\u003c \"\\n\";\n  std::cerr \u003c\u003c \"Supported: .hk (hokkaido), .cub\\n\";\n  return 1;\n}\n"},{"id":"src-cpp/parser.cpp","name":"parser.cpp","dir":"src-cpp","ext":".cpp","size":78120,"binary":false,"truncated":false,"content":"#include \"parser.h\"\n#include \"error.h\"\n\n#include \u003calgorithm\u003e\n#include \u003cfilesystem\u003e\n#include \u003cfstream\u003e\n#include \u003csstream\u003e\n\nvoid Parser::next_token() {\n  cur_tok = lexer.next_token();\n}\n\nvoid Parser::skip_newlines() {\n  while (cur_tok.type == TokenType::Newline)\n    cur_tok = lexer.next_token();\n}\n\nvoid Parser::set_error(const std::string &msg) {\n  has_error = true;\n  error_msg = error_at(source_file, cur_tok.line, cur_tok.col, msg);\n}\n\n// -------------------------------------------------------------------------\n// Module root discovery\n// -------------------------------------------------------------------------\n\nstd::string Parser::find_module_root(const std::string &dir) {\n  namespace fs = std::filesystem;\n  fs::path current = dir.empty() ? fs::current_path() : fs::path(dir);\n  // Walk up the directory tree looking for hk.mod\n  fs::path parent = current;\n  while (true) {\n    if (fs::exists(parent / \"hk.mod\"))\n      return parent.string();\n    fs::path next = parent.parent_path();\n    if (next == parent) break; // reached filesystem root\n    parent = next;\n  }\n  // Fall back to the entry file's directory\n  return dir.empty() ? fs::current_path().string() : std::string(dir);\n}\n\n// -------------------------------------------------------------------------\n// Top-level\n// -------------------------------------------------------------------------\n\nstd::vector\u003cstd::unique_ptr\u003cDecl\u003e\u003e Parser::parse_program(std::string known_package) {\n  std::vector\u003cstd::unique_ptr\u003cDecl\u003e\u003e decls;\n  skip_newlines();\n\n  // Parse optional `package name` declaration\n  if (cur_tok.type == TokenType::Package) {\n    if (!parse_package_decl()) return decls;\n    skip_newlines();\n  }\n\n  // If this file is being imported (known_package set), verify the package\n  // name matches.\n  if (!known_package.empty()) {\n    if (known_package != package_name) {\n      set_error(\"expected package '\" + known_package + \"' but file has '\" +\n                package_name + \"'\");\n      return decls;\n    }\n  }\n\n  while (cur_tok.type != TokenType::Eof) {\n    bool is_pub = false;\n    if (cur_tok.type == TokenType::Pub) {\n      is_pub = true;\n      next_token();\n    }\n    if (cur_tok.type == TokenType::Let) {\n      auto decl = parse_let_decl(is_pub);\n      if (decl) decls.push_back(std::move(decl));\n      else break;\n    } else if (cur_tok.type == TokenType::Fn) {\n      auto decl = parse_fn_decl(is_pub);\n      if (decl) decls.push_back(std::move(decl));\n      else break;\n    } else if (cur_tok.type == TokenType::Struct) {\n      auto decl = parse_struct_decl(is_pub);\n      if (decl) decls.push_back(std::move(decl));\n      else break;\n    } else if (cur_tok.type == TokenType::Enum) {\n      auto decl = parse_enum_decl(is_pub);\n      if (decl) decls.push_back(std::move(decl));\n      else break;\n    } else if (cur_tok.type == TokenType::Include) {\n      if (!parse_include_decl(decls)) break;\n    } else if (cur_tok.type == TokenType::Import) {\n      if (!parse_import_decl(decls)) break;\n    } else if (cur_tok.type == TokenType::Namespace) {\n      if (!parse_namespace_decl(decls)) break;\n    } else if (cur_tok.type == TokenType::Impl) {\n      auto decl = parse_impl_decl();\n      if (decl) decls.push_back(std::move(decl));\n      else break;\n    } else if (cur_tok.type == TokenType::Trait) {\n      auto decl = parse_trait_decl(is_pub);\n      if (decl) decls.push_back(std::move(decl));\n      else break;\n    } else if (cur_tok.type == TokenType::Extern) {\n      auto decl = parse_extern_fn_decl();\n      if (decl) decls.push_back(std::move(decl));\n      else break;\n    } else {\n      set_error(\"expected declaration (let, fn, struct, enum, impl, trait, include, import, namespace, extern)\");\n      break;\n    }\n    skip_newlines();\n  }\n  return decls;\n}\n\n// -------------------------------------------------------------------------\n// Package declaration\n// -------------------------------------------------------------------------\n\nbool Parser::parse_package_decl() {\n  next_token(); // consume 'package'\n  if (cur_tok.type != TokenType::Identifier) {\n    set_error(\"expected package name after 'package'\");\n    return false;\n  }\n  package_name = cur_tok.text;\n  next_token();\n  return true;\n}\n\n// -------------------------------------------------------------------------\n// Import declaration\n// -------------------------------------------------------------------------\n\nbool Parser::parse_import_decl(std::vector\u003cstd::unique_ptr\u003cDecl\u003e\u003e &decls) {\n  next_token(); // consume 'import'\n\n  std::string alias;\n  std::string path;\n\n  // import alias \"path\"   or   import \"path\"\n  if (cur_tok.type == TokenType::StringLiteral) {\n    path = cur_tok.text;\n    next_token();\n    // Derive alias from last path component\n    size_t slash = path.rfind('/');\n    alias = (slash != std::string::npos) ? path.substr(slash + 1) : path;\n  } else if (cur_tok.type == TokenType::Identifier) {\n    alias = cur_tok.text;\n    next_token();\n    if (cur_tok.type != TokenType::StringLiteral) {\n      set_error(\"expected string literal path after import alias\");\n      return false;\n    }\n    path = cur_tok.text;\n    next_token();\n  } else {\n    set_error(\"expected string literal path or alias after 'import'\");\n    return false;\n  }\n\n  // Resolve the import path relative to the module root\n  namespace fs = std::filesystem;\n  fs::path import_dir = fs::path(module_root) / path;\n\n  // Canonicalize to detect duplicate imports\n  std::error_code ec;\n  fs::path canonical_dir = fs::weakly_canonical(import_dir, ec);\n  if (ec) canonical_dir = import_dir;\n  std::string dir_key = canonical_dir.string();\n\n  if (!fs::is_directory(import_dir)) {\n    set_error(\"cannot import '\" + path + \"': not a directory\");\n    return false;\n  }\n\n  // Deduplicate: skip if this package has already been imported\n  if (imported_packages-\u003ecount(dir_key)) {\n    return true;\n  }\n  imported_packages-\u003einsert(dir_key);\n\n  // Collect and parse all .hk files in the directory\n  std::vector\u003cstd::string\u003e hk_files;\n  for (auto &entry : fs::directory_iterator(import_dir)) {\n    if (entry.path().extension() == \".hk\") {\n      hk_files.push_back(entry.path().string());\n    }\n  }\n\n  // Sort for deterministic order\n  std::sort(hk_files.begin(), hk_files.end());\n\n  for (auto &file_path : hk_files) {\n    std::ifstream ifs(file_path);\n    if (!ifs) {\n      set_error(\"cannot open '\" + file_path + \"' in imported package '\" + path + \"'\");\n      return false;\n    }\n    std::stringstream ss;\n    ss \u003c\u003c ifs.rdbuf();\n    std::string content = ss.str();\n\n    // Derive expected package name from the directory path (last segment)\n    size_t last_slash = path.rfind('/');\n    std::string expected_pkg = (last_slash != std::string::npos) ? path.substr(last_slash + 1) : path;\n\n    Lexer sub_lexer(content);\n    Parser sub_parser(sub_lexer, file_path, fs::path(file_path).parent_path().string(),\n                      included_files, imported_packages);\n    auto sub_decls = sub_parser.parse_program(expected_pkg);\n\n    if (!sub_parser.ok()) {\n      set_error(\"in imported package '\" + path + \"': \" + sub_parser.error());\n      return false;\n    }\n\n    // Prefix all declaration names with alias::\n    prefix_decl_names(sub_decls, alias);\n\n    for (auto &d : sub_decls) {\n      decls.push_back(std::move(d));\n    }\n  }\n\n  return true;\n}\n\n// -------------------------------------------------------------------------\n// Prefix declaration names with a namespace prefix\n// -------------------------------------------------------------------------\n\nvoid Parser::prefix_decl_names(std::vector\u003cstd::unique_ptr\u003cDecl\u003e\u003e &decls,\n                                const std::string &prefix) {\n  for (auto &d : decls) {\n    if (auto *fn = dynamic_cast\u003cFnDecl *\u003e(d.get())) {\n      if (!fn-\u003eis_extern)\n        fn-\u003ename = prefix + \"::\" + fn-\u003ename;\n    } else if (auto *let = dynamic_cast\u003cLetDecl *\u003e(d.get())) {\n      let-\u003ename = prefix + \"::\" + let-\u003ename;\n    } else if (auto *st = dynamic_cast\u003cStructDecl *\u003e(d.get())) {\n      st-\u003ename = prefix + \"::\" + st-\u003ename;\n    } else if (auto *adt = dynamic_cast\u003cAdtDecl *\u003e(d.get())) {\n      adt-\u003ename = prefix + \"::\" + adt-\u003ename;\n    } else if (auto *tr = dynamic_cast\u003cTraitDecl *\u003e(d.get())) {\n      tr-\u003ename = prefix + \"::\" + tr-\u003ename;\n    } else if (auto *im = dynamic_cast\u003cImplDecl *\u003e(d.get())) {\n      im-\u003etrait_name = prefix + \"::\" + im-\u003etrait_name;\n      im-\u003etype_name = prefix + \"::\" + im-\u003etype_name;\n    }\n  }\n}\n\n// -------------------------------------------------------------------------\n// Type annotations\n// -------------------------------------------------------------------------\n\nTypeAnnotation Parser::parse_type_annotation() {\n  TypeAnnotation ann;\n\n  // Reference type: &T or &mut T\n  if (cur_tok.type == TokenType::Ampersand) {\n    next_token(); // consume '&'\n    bool is_mut = false;\n    if (cur_tok.type == TokenType::Mut) {\n      is_mut = true;\n      next_token(); // consume 'mut'\n    }\n    TypeAnnotation inner = parse_type_annotation();\n    if (has_error) return ann;\n    ann = {is_mut ? TypeKind::MutRef : TypeKind::Ref};\n    ann.tuple_types.push_back(std::move(inner));\n    return ann;\n  }\n\n  if (cur_tok.type == TokenType::Void) {\n    ann = {TypeKind::Void};\n    next_token();\n  } else if (cur_tok.type == TokenType::Int8) {\n    ann = {TypeKind::Int8};\n    next_token();\n  } else if (cur_tok.type == TokenType::Int16) {\n    ann = {TypeKind::Int16};\n    next_token();\n  } else if (cur_tok.type == TokenType::Int32) {\n    ann = {TypeKind::Int32};\n    next_token();\n  } else if (cur_tok.type == TokenType::Int64) {\n    ann = {TypeKind::Int64};\n    next_token();\n  } else if (cur_tok.type == TokenType::Uint8) {\n    ann = {TypeKind::Uint8};\n    next_token();\n  } else if (cur_tok.type == TokenType::Uint16) {\n    ann = {TypeKind::Uint16};\n    next_token();\n  } else if (cur_tok.type == TokenType::Uint32) {\n    ann = {TypeKind::Uint32};\n    next_token();\n  } else if (cur_tok.type == TokenType::Uint64) {\n    ann = {TypeKind::Uint64};\n    next_token();\n  } else if (cur_tok.type == TokenType::Float16) {\n    ann = {TypeKind::Float16};\n    next_token();\n  } else if (cur_tok.type == TokenType::Float32) {\n    ann = {TypeKind::Float32};\n    next_token();\n  } else if (cur_tok.type == TokenType::Float64) {\n    ann = {TypeKind::Float64};\n    next_token();\n  } else if (cur_tok.type == TokenType::Bool) {\n    ann = {TypeKind::Bool};\n    next_token();\n  } else if (cur_tok.type == TokenType::String) {\n    ann = {TypeKind::String};\n    next_token();\n  } else if (cur_tok.type == TokenType::Char) {\n    ann = {TypeKind::Char};\n    next_token();\n  } else if (cur_tok.type == TokenType::Cubical) {\n    ann = {TypeKind::Cubical};\n    next_token();\n  } else if (cur_tok.type == TokenType::LParen) {\n    // Tuple type: (T1, T2, ...)\n    next_token(); // consume '('\n    skip_newlines();\n    std::vector\u003cTypeAnnotation\u003e elem_types;\n    while (cur_tok.type != TokenType::RParen && cur_tok.type != TokenType::Eof) {\n      if (!elem_types.empty()) {\n        if (cur_tok.type != TokenType::Comma) {\n          set_error(\"expected ',' or ')' in tuple type\");\n          return ann;\n        }\n        next_token();\n        skip_newlines();\n      }\n      elem_types.push_back(parse_type_annotation());\n      if (has_error) return ann;\n      skip_newlines();\n    }\n    if (cur_tok.type != TokenType::RParen) {\n      set_error(\"expected ')' to close tuple type\");\n      return ann;\n    }\n    next_token(); // consume ')'\n    // A 1-tuple (T) is just T, not a tuple\n    if (elem_types.size() == 1) {\n      ann = elem_types[0];\n    } else {\n      ann = {TypeKind::Tuple};\n      ann.tuple_types = std::move(elem_types);\n    }\n  } else if (cur_tok.type == TokenType::Fn) {\n    // Function type: fn(T1, T2, ...) -\u003e Ret\n    next_token(); // consume 'fn'\n    if (cur_tok.type != TokenType::LParen) {\n      set_error(\"expected '(' after 'fn' in function type\");\n      return ann;\n    }\n    next_token(); // consume '('\n    skip_newlines();\n    std::vector\u003cTypeAnnotation\u003e fn_param_types;\n    while (cur_tok.type != TokenType::RParen && cur_tok.type != TokenType::Eof) {\n      if (!fn_param_types.empty()) {\n        if (cur_tok.type != TokenType::Comma) {\n          set_error(\"expected ',' or ')' in function type parameter list\");\n          return ann;\n        }\n        next_token();\n        skip_newlines();\n      }\n      fn_param_types.push_back(parse_type_annotation());\n      if (has_error) return ann;\n      skip_newlines();\n    }\n    if (cur_tok.type != TokenType::RParen) {\n      set_error(\"expected ')' to close function type parameter list\");\n      return ann;\n    }\n    next_token(); // consume ')'\n    if (cur_tok.type != TokenType::Arrow) {\n      set_error(\"expected '-\u003e' and return type in function type\");\n      return ann;\n    }\n    next_token(); // consume '-\u003e'\n    TypeAnnotation fn_ret_type = parse_type_annotation();\n    if (has_error) return ann;\n    ann = {TypeKind::Fn};\n    ann.tuple_types = std::move(fn_param_types);\n    ann.tuple_types.push_back(std::move(fn_ret_type));\n  } else if (cur_tok.type == TokenType::Identifier) {\n    // Check if this is a type parameter name or Self\n    if (cur_tok.text == \"Self\") {\n      ann = {TypeKind::TypeParam};\n      ann.struct_name = \"Self\";\n      next_token();\n    } else if (type_param_names.find(cur_tok.text) != type_param_names.end()) {\n      ann = {TypeKind::TypeParam};\n      ann.struct_name = cur_tok.text;\n      next_token();\n    } else {\n      // Struct type: the identifier is the struct name (possibly namespaced,\n      // e.g. foo::Point or a::b::Point).\n      ann = {TypeKind::Struct};\n      ann.struct_name = cur_tok.text;\n      next_token();\n      while (cur_tok.type == TokenType::ColonColon) {\n        next_token(); // consume '::'\n        if (cur_tok.type != TokenType::Identifier) {\n          set_error(\"expected identifier after '::' in type name\");\n          return ann;\n        }\n        ann.struct_name += \"::\" + cur_tok.text;\n        next_token();\n      }\n    }\n  } else {\n    set_error(\"expected type (void, int8, int16, int32, int64, uint8, uint16, uint32, uint64, float, bool, string, char, cubical, tuple, or struct name)\");\n    ann = {TypeKind::Int64};\n    has_error = true;\n    return ann;\n  }\n\n  // Handle generic type arguments: Foo\u003cint, float\u003e\n  if (cur_tok.type == TokenType::Less && ann.kind == TypeKind::Struct) {\n    next_token();\n    while (cur_tok.type != TokenType::Greater && cur_tok.type != TokenType::Shr\n           && cur_tok.type != TokenType::Eof) {\n      if (!ann.type_args.empty()) {\n        if (cur_tok.type != TokenType::Comma) {\n          set_error(\"expected ',' or '\u003e' in generic type arguments\");\n          return ann;\n        }\n        next_token();\n      }\n      ann.type_args.push_back(parse_type_annotation());\n      if (has_error) return ann;\n    }\n    if (cur_tok.type == TokenType::Shr) {\n      cur_tok.type = TokenType::Greater;\n      // Don't consume: the caller's level will also see this as its '\u003e'\n      return ann;\n    }\n    if (cur_tok.type != TokenType::Greater) {\n      set_error(\"expected '\u003e' to close generic type arguments\");\n      return ann;\n    }\n    next_token();\n  }\n\n  // Parse pointer indirection levels (e.g. int* -\u003e pointer to int)\n  while (cur_tok.type == TokenType::Star) {\n    ann.pointer_depth++;\n    next_token();\n  }\n\n  // Parse array size (e.g. int[10]) or slice (e.g. int[])\n  if (cur_tok.type == TokenType::LSquare) {\n    next_token(); // consume '['\n    if (cur_tok.type == TokenType::RSquare) {\n      // Slice type: T[]\n      next_token(); // consume ']'\n      TypeAnnotation slice_ann = {TypeKind::Slice};\n      slice_ann.tuple_types.push_back(ann);\n      return slice_ann;\n    }\n    if (cur_tok.type != TokenType::Number) {\n      set_error(\"expected array size as number literal\");\n      return ann;\n    }\n    ann.array_size = (int)cur_tok.num_val;\n    next_token(); // consume number\n    if (cur_tok.type != TokenType::RSquare) {\n      set_error(\"expected ']' after array size\");\n      return ann;\n    }\n    next_token(); // consume ']'\n  }\n\n  return ann;\n}\n\n// -------------------------------------------------------------------------\n// Struct declarations\n// -------------------------------------------------------------------------\n\nstd::unique_ptr\u003cStructDecl\u003e Parser::parse_struct_decl(bool is_pub) {\n  next_token(); // consume 'struct'\n\n  if (cur_tok.type != TokenType::Identifier) {\n    set_error(\"expected struct name\");\n    return nullptr;\n  }\n  std::string name = cur_tok.text;\n  next_token();\n\n  std::vector\u003cstd::string\u003e type_params;\n  std::map\u003cstd::string, std::vector\u003cstd::string\u003e\u003e type_param_bounds;\n  if (cur_tok.type == TokenType::Less) {\n    next_token();\n    while (cur_tok.type != TokenType::Greater && cur_tok.type != TokenType::Eof) {\n      if (!type_params.empty()) {\n        if (cur_tok.type != TokenType::Comma) {\n          set_error(\"expected ',' or '\u003e' in generic type parameters\");\n          return nullptr;\n        }\n        next_token();\n      }\n      if (cur_tok.type != TokenType::Identifier) {\n        set_error(\"expected type parameter name\");\n        return nullptr;\n      }\n      std::string tp_name = cur_tok.text;\n      type_params.push_back(tp_name);\n      type_param_names.insert(tp_name);\n      next_token();\n\n      // Parse optional trait bound: T: TraitName\n      if (cur_tok.type == TokenType::Colon) {\n        next_token(); // consume ':'\n        std::vector\u003cstd::string\u003e bounds;\n        while (true) {\n          if (cur_tok.type != TokenType::Identifier) {\n            set_error(\"expected trait name in type parameter bound\");\n            return nullptr;\n          }\n          bounds.push_back(cur_tok.text);\n          next_token();\n          if (cur_tok.type == TokenType::Plus) {\n            next_token();\n          } else {\n            break;\n          }\n        }\n        type_param_bounds[tp_name] = bounds;\n      }\n    }\n    if (cur_tok.type != TokenType::Greater) {\n      set_error(\"expected '\u003e' to close generic type parameters\");\n      return nullptr;\n    }\n    next_token();\n  }\n\n  skip_newlines();\n  if (cur_tok.type != TokenType::LBrace) {\n    set_error(\"expected '{' after struct name\");\n    return nullptr;\n  }\n  next_token(); // consume '{'\n  skip_newlines();\n\n  std::vector\u003cStructField\u003e fields;\n  while (cur_tok.type != TokenType::RBrace && cur_tok.type != TokenType::Eof) {\n    StructField field;\n    if (cur_tok.type != TokenType::Identifier) {\n      set_error(\"expected field name\");\n      return nullptr;\n    }\n    field.name = cur_tok.text;\n    next_token();\n\n    if (cur_tok.type != TokenType::Colon) {\n      set_error(\"expected ':' after field name\");\n      return nullptr;\n    }\n    next_token();\n\n    field.type_ann = parse_type_annotation();\n    if (has_error) return nullptr;\n\n    fields.push_back(std::move(field));\n    skip_newlines();\n    if (cur_tok.type == TokenType::Comma) {\n      next_token();\n      skip_newlines();\n    }\n  }\n\n  if (cur_tok.type != TokenType::RBrace) {\n    set_error(\"expected '}' after struct fields\");\n    return nullptr;\n  }\n  next_token(); // consume '}'\n\n  auto decl = make_decl\u003cStructDecl\u003e();\n  decl-\u003ename = name;\n  known_structs.insert(name);\n  decl-\u003efields = std::move(fields);\n  decl-\u003eis_pub = is_pub;\n  decl-\u003etype_params = std::move(type_params);\n  decl-\u003etype_param_bounds = std::move(type_param_bounds);\n  for (auto &p : decl-\u003etype_params)\n    type_param_names.erase(p);\n  return decl;\n}\n\n// -------------------------------------------------------------------------\n// Enum declarations\n// -------------------------------------------------------------------------\n\nstd::unique_ptr\u003cAdtDecl\u003e Parser::parse_enum_decl(bool is_pub) {\n  next_token(); // consume 'enum'\n\n  if (cur_tok.type != TokenType::Identifier) {\n    set_error(\"expected enum name\");\n    return nullptr;\n  }\n  std::string name = cur_tok.text;\n  next_token();\n\n  skip_newlines();\n  if (cur_tok.type != TokenType::LBrace) {\n    set_error(\"expected '{' after enum name\");\n    return nullptr;\n  }\n  next_token(); // consume '{'\n  skip_newlines();\n\n  std::vector\u003cAdtVariant\u003e variants;\n  while (cur_tok.type != TokenType::RBrace && cur_tok.type != TokenType::Eof) {\n    AdtVariant variant;\n    if (cur_tok.type != TokenType::Identifier) {\n      set_error(\"expected variant name\");\n      return nullptr;\n    }\n    variant.name = cur_tok.text;\n    known_variants.insert(cur_tok.text);\n    known_variants.insert(name + \"::\" + cur_tok.text);\n    next_token();\n    skip_newlines();\n\n    // Variant with fields: Some { x: int, y: int }\n    if (cur_tok.type == TokenType::LBrace) {\n      next_token(); // consume '{'\n      skip_newlines();\n      while (cur_tok.type != TokenType::RBrace && cur_tok.type != TokenType::Eof) {\n        StructField field;\n        if (cur_tok.type != TokenType::Identifier) {\n          set_error(\"expected field name in variant\");\n          return nullptr;\n        }\n        field.name = cur_tok.text;\n        next_token();\n        if (cur_tok.type != TokenType::Colon) {\n          set_error(\"expected ':' after field name\");\n          return nullptr;\n        }\n        next_token();\n        field.type_ann = parse_type_annotation();\n        if (has_error) return nullptr;\n        variant.fields.push_back(std::move(field));\n        skip_newlines();\n        if (cur_tok.type == TokenType::Comma) {\n          next_token();\n          skip_newlines();\n        }\n      }\n      if (cur_tok.type != TokenType::RBrace) {\n        set_error(\"expected '}' to close variant fields\");\n        return nullptr;\n      }\n      next_token(); // consume '}'\n    }\n    // else: unit variant (no fields)\n\n    variants.push_back(std::move(variant));\n    skip_newlines();\n    if (cur_tok.type == TokenType::Comma) {\n      next_token();\n      skip_newlines();\n    }\n  }\n\n  if (cur_tok.type != TokenType::RBrace) {\n    set_error(\"expected '}' after enum variants\");\n    return nullptr;\n  }\n  next_token(); // consume '}'\n\n  auto decl = make_decl\u003cAdtDecl\u003e();\n  decl-\u003ename = name;\n  decl-\u003evariants = std::move(variants);\n  decl-\u003eis_pub = is_pub;\n  return decl;\n}\n\n// -------------------------------------------------------------------------\n// Trait declarations\n// -------------------------------------------------------------------------\n\nstd::unique_ptr\u003cTraitDecl\u003e Parser::parse_trait_decl(bool is_pub) {\n  next_token(); // consume 'trait'\n\n  if (cur_tok.type != TokenType::Identifier) {\n    set_error(\"expected trait name\");\n    return nullptr;\n  }\n  std::string name = cur_tok.text;\n  known_structs.insert(name); // treat trait names as known for method call resolution\n  next_token();\n\n  skip_newlines();\n  if (cur_tok.type != TokenType::LBrace) {\n    set_error(\"expected '{' after trait name\");\n    return nullptr;\n  }\n  next_token(); // consume '{'\n  skip_newlines();\n\n  std::vector\u003cTraitMethodSig\u003e methods;\n  while (cur_tok.type != TokenType::RBrace && cur_tok.type != TokenType::Eof) {\n    if (cur_tok.type != TokenType::Fn) {\n      set_error(\"expected 'fn' in trait declaration\");\n      return nullptr;\n    }\n    next_token(); // consume 'fn'\n\n    if (cur_tok.type != TokenType::Identifier) {\n      set_error(\"expected method name in trait\");\n      return nullptr;\n    }\n    TraitMethodSig sig;\n    sig.name = cur_tok.text;\n    next_token();\n\n    if (cur_tok.type != TokenType::LParen) {\n      set_error(\"expected '(' after method name in trait\");\n      return nullptr;\n    }\n    next_token();\n\n    while (cur_tok.type != TokenType::RParen) {\n      if (!sig.params.empty()) {\n        if (cur_tok.type != TokenType::Comma) {\n          set_error(\"expected ',' or ')' in trait method params\");\n          return nullptr;\n        }\n        next_token();\n      }\n      Param param;\n      if (cur_tok.type != TokenType::Identifier) {\n        set_error(\"expected parameter name in trait method\");\n        return nullptr;\n      }\n      param.name = cur_tok.text;\n      next_token();\n\n      if (cur_tok.type != TokenType::Colon) {\n        set_error(\"expected ':' after parameter name\");\n        return nullptr;\n      }\n      next_token();\n\n      param.type_ann = parse_type_annotation();\n      if (has_error) return nullptr;\n      sig.params.push_back(std::move(param));\n    }\n    next_token(); // consume ')'\n\n    if (cur_tok.type != TokenType::Arrow) {\n      set_error(\"expected '-\u003e' and return type in trait method\");\n      return nullptr;\n    }\n    next_token();\n\n    sig.return_type = parse_type_annotation();\n    if (has_error) return nullptr;\n\n    methods.push_back(std::move(sig));\n    skip_newlines();\n  }\n\n  if (cur_tok.type != TokenType::RBrace) {\n    set_error(\"expected '}' to close trait declaration\");\n    return nullptr;\n  }\n  next_token(); // consume '}'\n\n  auto decl = make_decl\u003cTraitDecl\u003e();\n  decl-\u003ename = name;\n  decl-\u003emethods = std::move(methods);\n  decl-\u003eis_pub = is_pub;\n  return decl;\n}\n\n// -------------------------------------------------------------------------\n// Impl blocks\n// -------------------------------------------------------------------------\n\nstd::unique_ptr\u003cImplDecl\u003e Parser::parse_impl_decl() {\n  next_token(); // consume 'impl'\n\n  if (cur_tok.type != TokenType::Identifier) {\n    set_error(\"expected type or trait name after 'impl'\");\n    return nullptr;\n  }\n\n  // Read the first identifier (could be trait name or type name)\n  std::string first_name = cur_tok.text;\n  next_token();\n\n  // Handle namespaced identifiers: a::b::c\n  while (cur_tok.type == TokenType::ColonColon) {\n    next_token();\n    if (cur_tok.type != TokenType::Identifier) {\n      set_error(\"expected identifier after '::' in impl\");\n      return nullptr;\n    }\n    first_name += \"::\" + cur_tok.text;\n    next_token();\n  }\n\n  skip_newlines();\n\n  std::string trait_name;\n  std::string type_name;\n\n  if (cur_tok.type == TokenType::For) {\n    // Trait impl: impl Trait for Type\n    trait_name = first_name;\n    next_token(); // consume 'for'\n    if (cur_tok.type != TokenType::Identifier) {\n      set_error(\"expected type name after 'for' in impl\");\n      return nullptr;\n    }\n    type_name = cur_tok.text;\n    next_token();\n    while (cur_tok.type == TokenType::ColonColon) {\n      next_token();\n      if (cur_tok.type != TokenType::Identifier) {\n        set_error(\"expected identifier after '::' in impl type\");\n        return nullptr;\n      }\n      type_name += \"::\" + cur_tok.text;\n      next_token();\n    }\n  } else {\n    // Inherent impl: impl Type\n    type_name = first_name;\n  }\n\n  skip_newlines();\n  if (cur_tok.type != TokenType::LBrace) {\n    set_error(\"expected '{' after impl type name\");\n    return nullptr;\n  }\n  next_token(); // consume '{'\n  skip_newlines();\n\n  std::vector\u003cstd::unique_ptr\u003cFnDecl\u003e\u003e methods;\n  while (cur_tok.type != TokenType::RBrace && cur_tok.type != TokenType::Eof) {\n    bool method_pub = false;\n    if (cur_tok.type == TokenType::Pub) {\n      method_pub = true;\n      next_token();\n    }\n    if (cur_tok.type != TokenType::Fn) {\n      set_error(\"expected function in impl block\");\n      return nullptr;\n    }\n    auto method = parse_fn_decl(method_pub);\n    if (!method) return nullptr;\n    methods.push_back(std::move(method));\n    skip_newlines();\n  }\n\n  if (cur_tok.type != TokenType::RBrace) {\n    set_error(\"expected '}' to close impl block\");\n    return nullptr;\n  }\n  next_token(); // consume '}'\n\n  auto decl = make_decl\u003cImplDecl\u003e();\n  decl-\u003etrait_name = trait_name;\n  decl-\u003etype_name = type_name;\n  decl-\u003emethods = std::move(methods);\n  return decl;\n}\n\n// -------------------------------------------------------------------------\n// Namespace declarations\n// -------------------------------------------------------------------------\n//\n// Namespaces are resolved entirely here, at parse time: every declaration\n// directly inside `namespace foo { ... }` has its name rewritten to\n// \"foo::name\" before being handed back to the caller. Nested namespaces\n// fall out for free, since each level only ever prefixes with its own\n// name — `namespace a { namespace b { fn f() {} } }` first becomes\n// `b::f` when the inner namespace returns, then `a::b::f` when the outer\n// one does. Because this happens before codegen ever sees the AST, no\n// codegen changes are needed: \"a::b::f\" is just a function name like any\n// other, and `eval_expr`/`M.getFunction`/`struct_types[...]` etc. all key\n// on plain strings already.\n\nbool Parser::parse_namespace_decl(std::vector\u003cstd::unique_ptr\u003cDecl\u003e\u003e &decls) {\n  next_token(); // consume 'namespace'\n\n  if (cur_tok.type != TokenType::Identifier) {\n    set_error(\"expected namespace name\");\n    return false;\n  }\n  std::string ns_name = cur_tok.text;\n  next_token();\n\n  skip_newlines();\n  if (cur_tok.type != TokenType::LBrace) {\n    set_error(\"expected '{' after namespace name\");\n    return false;\n  }\n  next_token(); // consume '{'\n  skip_newlines();\n\n  std::vector\u003cstd::unique_ptr\u003cDecl\u003e\u003e inner_decls;\n  while (cur_tok.type != TokenType::RBrace && cur_tok.type != TokenType::Eof) {\n    bool is_pub = false;\n    if (cur_tok.type == TokenType::Pub) {\n      is_pub = true;\n      next_token();\n    }\n    if (cur_tok.type == TokenType::Let) {\n      auto decl = parse_let_decl(is_pub);\n      if (!decl) return false;\n      inner_decls.push_back(std::move(decl));\n    } else if (cur_tok.type == TokenType::Fn) {\n      auto decl = parse_fn_decl(is_pub);\n      if (!decl) return false;\n      inner_decls.push_back(std::move(decl));\n    } else if (cur_tok.type == TokenType::Struct) {\n      auto decl = parse_struct_decl(is_pub);\n      if (!decl) return false;\n      inner_decls.push_back(std::move(decl));\n    } else if (cur_tok.type == TokenType::Enum) {\n      auto decl = parse_enum_decl(is_pub);\n      if (!decl) return false;\n      inner_decls.push_back(std::move(decl));\n    } else if (cur_tok.type == TokenType::Include) {\n      if (!parse_include_decl(inner_decls)) return false;\n    } else if (cur_tok.type == TokenType::Import) {\n      if (!parse_import_decl(inner_decls)) return false;\n    } else if (cur_tok.type == TokenType::Impl) {\n      auto decl = parse_impl_decl();\n      if (!decl) return false;\n      inner_decls.push_back(std::move(decl));\n    } else if (cur_tok.type == TokenType::Trait) {\n      auto decl = parse_trait_decl(is_pub);\n      if (!decl) return false;\n      inner_decls.push_back(std::move(decl));\n    } else if (cur_tok.type == TokenType::Namespace) {\n      if (!parse_namespace_decl(inner_decls)) return false;\n    } else {\n      set_error(\"expected declaration inside namespace (let, fn, struct, enum, impl, trait, include, import, namespace)\");\n      return false;\n    }\n    skip_newlines();\n  }\n\n  if (cur_tok.type != TokenType::RBrace) {\n    set_error(\"expected '}' to close namespace '\" + ns_name + \"'\");\n    return false;\n  }\n  next_token(); // consume '}'\n\n  for (auto &d : inner_decls) {\n    if (auto *fn = dynamic_cast\u003cFnDecl *\u003e(d.get())) {\n      fn-\u003ename = ns_name + \"::\" + fn-\u003ename;\n    } else if (auto *let = dynamic_cast\u003cLetDecl *\u003e(d.get())) {\n      let-\u003ename = ns_name + \"::\" + let-\u003ename;\n    } else if (auto *st = dynamic_cast\u003cStructDecl *\u003e(d.get())) {\n      st-\u003ename = ns_name + \"::\" + st-\u003ename;\n    } else if (auto *adt = dynamic_cast\u003cAdtDecl *\u003e(d.get())) {\n      adt-\u003ename = ns_name + \"::\" + adt-\u003ename;\n    } else if (auto *tr = dynamic_cast\u003cTraitDecl *\u003e(d.get())) {\n      tr-\u003ename = ns_name + \"::\" + tr-\u003ename;\n    } else if (auto *im = dynamic_cast\u003cImplDecl *\u003e(d.get())) {\n      im-\u003etrait_name = ns_name + \"::\" + im-\u003etrait_name;\n      im-\u003etype_name = ns_name + \"::\" + im-\u003etype_name;\n    }\n    decls.push_back(std::move(d));\n  }\n  return true;\n}\n\n// -------------------------------------------------------------------------\n// Include declarations\n// -------------------------------------------------------------------------\n\nbool Parser::parse_include_decl(std::vector\u003cstd::unique_ptr\u003cDecl\u003e\u003e &decls) {\n  next_token(); // consume 'include'\n\n  if (cur_tok.type != TokenType::StringLiteral) {\n    set_error(\"expected string literal path after 'include'\");\n    return false;\n  }\n  std::string raw_path = cur_tok.text;\n  next_token();\n\n  namespace fs = std::filesystem;\n  fs::path requested(raw_path);\n  fs::path full_path = requested.is_absolute()\n                            ? requested\n                            : fs::path(base_dir.empty() ? \".\" : base_dir) / requested;\n\n  std::error_code ec;\n  fs::path canonical = fs::weakly_canonical(full_path, ec);\n  if (ec) canonical = full_path;\n\n  std::ifstream ifs(full_path);\n  if (!ifs) {\n    set_error(\"cannot open included file '\" + raw_path + \"'\");\n    return false;\n  }\n\n  // Skip files we've already pulled in (directly or transitively), so\n  // diamond includes don't duplicate declarations and self/mutual\n  // includes don't recurse forever.\n  std::string key = canonical.string();\n  if (included_files-\u003ecount(key)) {\n    return true;\n  }\n  included_files-\u003einsert(key);\n\n  std::stringstream ss;\n  ss \u003c\u003c ifs.rdbuf();\n  std::string content = ss.str();\n\n  Lexer sub_lexer(content);\n  Parser sub_parser(sub_lexer, full_path.string(), full_path.parent_path().string(), included_files, imported_packages);\n  auto sub_decls = sub_parser.parse_program();\n\n  if (!sub_parser.ok()) {\n    set_error(\"in included file '\" + raw_path + \"': \" + sub_parser.error());\n    return false;\n  }\n\n  for (auto &d : sub_decls) {\n    decls.push_back(std::move(d));\n  }\n  return true;\n}\n\n// -------------------------------------------------------------------------\n// Let declarations (top-level)\n// -------------------------------------------------------------------------\n\nbool Parser::parse_let_common(TypeAnnotation &ann, std::string &name,\n                               std::unique_ptr\u003cExpr\u003e &init) {\n  if (cur_tok.type != TokenType::Identifier) {\n    set_error(\"expected variable name\");\n    return false;\n  }\n  name = cur_tok.text;\n  next_token();\n\n  if (cur_tok.type != TokenType::Colon) {\n    set_error(\"expected ':' after variable name\");\n    return false;\n  }\n  next_token();\n\n  ann = parse_type_annotation();\n  if (has_error) return false;\n\n  if (ann.kind == TypeKind::Void) {\n    set_error(\"variable cannot have void type\");\n    return false;\n  }\n\n  if (cur_tok.type != TokenType::Equals) {\n    set_error(\"expected '=' after type\");\n    return false;\n  }\n  next_token();\n\n  init = parse_expr();\n  if (!init && !has_error) {\n    set_error(\"expected expression\");\n    return false;\n  }\n  return !has_error;\n}\n\nstd::unique_ptr\u003cLetDecl\u003e Parser::parse_let_decl(bool is_pub) {\n  next_token(); // consume 'let'\n\n  TypeAnnotation type_ann;\n  std::string name;\n  std::unique_ptr\u003cExpr\u003e init;\n  if (!parse_let_common(type_ann, name, init)) return nullptr;\n\n  auto decl = make_decl\u003cLetDecl\u003e();\n  decl-\u003etype_ann = type_ann;\n  decl-\u003ename = name;\n  decl-\u003eis_pub = is_pub;\n  decl-\u003einit_expr = std::move(init);\n  return decl;\n}\n\n// -------------------------------------------------------------------------\n// Function declarations\n// -------------------------------------------------------------------------\n\nstd::unique_ptr\u003cFnDecl\u003e Parser::parse_fn_decl(bool is_pub) {\n  next_token(); // consume 'fn'\n\n  if (cur_tok.type != TokenType::Identifier) {\n    set_error(\"expected function name\");\n    return nullptr;\n  }\n  std::string name = cur_tok.text;\n  next_token();\n\n  // Optional generic type parameter list: \u003cT, U\u003e or \u003cT: Trait, U: Bound\u003e\n  std::vector\u003cstd::string\u003e type_params;\n  std::map\u003cstd::string, std::vector\u003cstd::string\u003e\u003e type_param_bounds;\n  if (cur_tok.type == TokenType::Less) {\n    next_token(); // consume '\u003c'\n    while (cur_tok.type != TokenType::Greater) {\n      if (!type_params.empty()) {\n        if (cur_tok.type != TokenType::Comma) {\n          set_error(\"expected ',' or '\u003e' in type parameter list\");\n          return nullptr;\n        }\n        next_token();\n      }\n      if (cur_tok.type != TokenType::Identifier) {\n        set_error(\"expected type parameter name\");\n        return nullptr;\n      }\n      std::string tp_name = cur_tok.text;\n      // Check for duplicate\n      if (type_param_names.find(tp_name) != type_param_names.end() ||\n          std::find(type_params.begin(), type_params.end(), tp_name) != type_params.end()) {\n        set_error(\"duplicate type parameter '\" + tp_name + \"'\");
