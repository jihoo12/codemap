           }\n            }\n        }\n    }\n\n    let mut hk_files: Vec\u003cString\u003e = Vec::new();\n    if let Ok(entries) = std::fs::read_dir(src_dir) {\n        for entry in entries.flatten() {\n            let path = entry.path();\n            if path.extension().map_or(false, |e| e == \"hk\") {\n                hk_files.push(path.to_string_lossy().to_string());\n            }\n        }\n    }\n\n    if hk_files.is_empty() {\n        eprintln!(\"Error: no .hk files found in src/\");\n        std::process::exit(1);\n    }\n\n    let entry = hk_files\n        .iter()\n        .find(|f| f.contains(\"main\"))\n        .unwrap_or(&hk_files[0]);\n\n    let mut cmd = Command::new(&hokkaido);\n    cmd.arg(entry).arg(\"-o\").arg(&binary);\n    cmd.arg(opt_flag(release));\n    if freestanding {\n        cmd.arg(\"--freestanding\");\n    }\n\n    let status = cmd.status().unwrap_or_else(|e| {\n        eprintln!(\"Error running hokkaido: {}\", e);\n        std::process::exit(1);\n    });\n\n    if !status.success() {\n        eprintln!(\"Compilation failed\");\n        std::process::exit(1);\n    }\n\n    if !force {\n        let cache_path = format!(\"build/.hkbuildcache.{}\", cache_suffix(release));\n        save_cache(Path::new(&cache_path), &cache_key);\n    }\n\n    let obj_path = format!(\"{}.o\", binary);\n\n    if freestanding {\n        println!(\"Compiled {} -\u003e {} (freestanding)\", entry, obj_path);\n        println!(\"Warning: freestanding object files cannot be linked with clang.\");\n        println!(\"Use ld.lld directly or a custom linker script.\");\n        return binary;\n    }\n\n    let mut all_objects = vec![obj_path];\n    if let Some(ref config) = build_config {\n        all_objects.extend(compile_extra_sources(config, force, release));\n    }\n\n    link_with_clang(&all_objects, &binary, &build_config, release);\n    println!(\"Built: {}\", binary);\n    binary\n}\n\nfn compile_extra_sources(config: &crate::manifest::Build, force: bool, release: bool) -\u003e Vec\u003cString\u003e {\n    if config.sources.is_empty() {\n        return Vec::new();\n    }\n    let sources = crate::cbuild::resolve_sources(&config.sources);\n    let mut objects = Vec::new();\n    for source in &sources {\n        let obj = crate::cbuild::compile_source(source, config, force, release);\n        objects.push(obj);\n    }\n    objects\n}\n\nfn link_with_clang(\n    obj_paths: &[String],\n    output: &str,\n    config: &Option\u003ccrate::manifest::Build\u003e,\n    release: bool,\n) {\n    let compiler = config\n        .as_ref()\n        .map(|c| c.compiler.as_str())\n        .unwrap_or(\"clang\");\n\n    let mut cmd = Command::new(compiler);\n\n    for obj in obj_paths {\n        cmd.arg(obj);\n    }\n\n    cmd.arg(\"-o\").arg(output);\n\n    if let Some(config) = config {\n        for flag in &config.ldflags {\n            cmd.arg(flag);\n        }\n\n        for dir in &config.lib_dirs {\n            cmd.arg(format!(\"-L{}\", dir));\n        }\n\n        for lib in &config.link {\n            cmd.arg(format!(\"-l{}\", lib));\n        }\n\n        for lib in &config.libraries {\n            let resolved = crate::cbuild::resolve_library(lib, &config.lib_dirs);\n            cmd.arg(&resolved);\n        }\n\n        if release {\n            cmd.arg(\"-O2\");\n        }\n    }\n\n    let status = cmd.status().unwrap_or_else(|e| {\n        eprintln!(\n            \"Error linking with {}: {} (is {} installed?)\",\n            output, e, compiler\n        );\n        std::process::exit(1);\n    });\n\n    if !status.success() {\n        eprintln!(\"Linking failed: {}\", output);\n        std::process::exit(1);\n    }\n}\n\npub fn find_hokkaido() -\u003e String {\n    if let Ok(exe) = std::env::current_exe() {\n        if let Some(dir) = exe.parent() {\n            let candidate = dir.join(\"hokkaido\");\n            if candidate.exists() {\n                return candidate.to_string_lossy().to_string();\n            }\n        }\n    }\n\n    if let Ok(path) = std::env::var(\"PATH\") {\n        for dir in path.split(':') {\n            let candidate = std::path::Path::new(dir).join(\"hokkaido\");\n            if candidate.exists() {\n                return candidate.to_string_lossy().to_string();\n            }\n        }\n    }\n\n    for candidate in &[\n        \"./build/hokkaido\",\n        \"../build/hokkaido\",\n        \"/usr/local/bin/hokkaido\",\n        \"/usr/bin/hokkaido\",\n    ] {\n        if std::path::Path::new(candidate).exists() {\n            return candidate.to_string();\n        }\n    }\n\n    if let Ok(home) = std::env::var(\"HOKKAIDO_HOME\") {\n        let path = std::path::Path::new(&home).join(\"hokkaido\");\n        if path.exists() {\n            return path.to_string_lossy().to_string();\n        }\n    }\n\n    eprintln!(\"Error: hokkaido compiler not found. Install it or add it to PATH.\");\n    eprintln!(\"Hint: set HOKKAIDO_HOME to the directory containing the hokkaido binary.\");\n    std::process::exit(1);\n}\n"},{"id":"otaru/src/cbuild.rs","name":"cbuild.rs","dir":"otaru/src","ext":".rs","size":19977,"binary":false,"truncated":false,"content":"use std::path::{Path, PathBuf};\nuse std::process::Command;\n\nuse crate::manifest::{Build, Manifest};\n\npub struct LlvmInfo {\n    pub include_dirs: Vec\u003cString\u003e,\n    pub cflags: Vec\u003cString\u003e,\n    pub ldflags: Vec\u003cString\u003e,\n    pub libraries: Vec\u003cString\u003e,\n}\n\npub fn resolve_llvm(config: &Build) -\u003e Option\u003cLlvmInfo\u003e {\n    let llvm_bin = config.llvm_config.as_deref()?;\n\n    let mut include_dirs = Vec::new();\n    let mut cflags = Vec::new();\n    let mut ldflags = Vec::new();\n    let mut libraries = Vec::new();\n\n    if let Ok(output) = Command::new(llvm_bin).arg(\"--cxxflags\").output() {\n        if output.status.success() {\n            let flags = String::from_utf8_lossy(&output.stdout);\n            for flag in flags.split_whitespace() {\n                if flag == \"-fno-exceptions\" {\n                    continue;\n                }\n                if let Some(path) = flag.strip_prefix(\"-I\") {\n                    include_dirs.push(path.to_string());\n                } else {\n                    cflags.push(flag.to_string());\n                }\n            }\n        } else {\n            eprintln!(\n                \"Warning: {} --cxxflags failed\",\n                llvm_bin\n            );\n        }\n    } else {\n        eprintln!(\n            \"Warning: could not run '{}' (is LLVM installed?)\",\n            llvm_bin\n        );\n        return None;\n    }\n\n    let mut link_args = vec![\"--ldflags\".to_string(), \"--libs\".to_string()];\n    if let Some(components) = &config.llvm_components {\n        link_args.extend(components.iter().cloned());\n    }\n\n    if let Ok(output) = Command::new(llvm_bin).args(&link_args).output() {\n        if output.status.success() {\n            let flags = String::from_utf8_lossy(&output.stdout);\n            for flag in flags.split_whitespace() {\n                if let Some(path) = flag.strip_prefix(\"-L\") {\n                    ldflags.push(format!(\"-L{}\", path));\n                } else if let Some(name) = flag.strip_prefix(\"-l\") {\n                    libraries.push(name.to_string());\n                } else {\n                    ldflags.push(flag.to_string());\n                }\n            }\n        } else {\n            eprintln!(\n                \"Warning: {} --ldflags --libs failed\",\n                llvm_bin\n            );\n        }\n    }\n\n    if let Ok(output) = Command::new(llvm_bin)\n        .arg(\"--system-libs\")\n        .args(&link_args)\n        .output()\n    {\n        if output.status.success() {\n            let flags = String::from_utf8_lossy(&output.stdout);\n            for flag in flags.split_whitespace() {\n                if let Some(path) = flag.strip_prefix(\"-L\") {\n                    ldflags.push(format!(\"-L{}\", path));\n                } else if let Some(name) = flag.strip_prefix(\"-l\") {\n                    if !libraries.contains(&name.to_string()) {\n                        libraries.push(name.to_string());\n                    }\n                } else {\n                    ldflags.push(flag.to_string());\n                }\n            }\n        }\n    }\n\n    Some(LlvmInfo {\n        include_dirs,\n        cflags,\n        ldflags,\n        libraries,\n    })\n}\n\npub fn run_prebuild(config: &Build) {\n    if let Some(cmd) = &config.prebuild {\n        eprintln!(\"$ {}\", cmd);\n        let status = Command::new(\"sh\")\n            .arg(\"-c\")\n            .arg(cmd)\n            .status()\n            .unwrap_or_else(|e| {\n                eprintln!(\"Error running prebuild command: {}\", e);\n                std::process::exit(1);\n            });\n        if !status.success() {\n            eprintln!(\n                \"Prebuild command failed (exit code: {})\",\n                status.code().unwrap_or(-1)\n            );\n            std::process::exit(1);\n        }\n    }\n}\n\npub fn run(file: Option\u003c&str\u003e, force: bool, release: bool, target: Option\u003c&str\u003e) {\n    if let Some(f) = file {\n        let path = Path::new(f);\n        if path.exists() {\n            let ext = path.extension().and_then(|e| e.to_str()).unwrap_or(\"\");\n            if ext == \"hk\" {\n                eprintln!(\n                    \"Error: {} is a Hokkaido file. Use 'otaru build {}' without the C build system.\",\n                    f, f\n                );\n                std::process::exit(1);\n            }\n            compile_single_file(f, force, release);\n            return;\n        }\n        eprintln!(\"Error: file '{}' not found\", f);\n        std::process::exit(1);\n    }\n\n    let manifest_path = Path::new(\"otaru.toml\");\n    if !manifest_path.exists() {\n        eprintln!(\"Error: otaru.toml not found\");\n        std::process::exit(1);\n    }\n\n    let manifest = Manifest::load(manifest_path).unwrap_or_else(|e| {\n        eprintln!(\"{}\", e);\n        std::process::exit(1);\n    });\n\n    let build_config = manifest.build.as_ref().unwrap_or_else(|| {\n        eprintln!(\"Error: no [build] section in otaru.toml\");\n        std::process::exit(1);\n    });\n\n    if let Some(target_name) = target {\n        let targets = build_config.targets.as_ref().unwrap_or_else(|| {\n            eprintln!(\n                \"Error: target '{}' not found (no [[build.targets]] section)\",\n                target_name\n            );\n            std::process::exit(1);\n        });\n        let target_config = targets.get(target_name).unwrap_or_else(|| {\n            eprintln!(\"Error: target '{}' not found\", target_name);\n            std::process::exit(1);\n        });\n        let merged = merge_target_config(build_config, target_config);\n        build_target(target_name, &merged, force, release);\n    } else if let Some(targets) = &build_config.targets {\n        for (name, config) in targets {\n            let merged = merge_target_config(build_config, config);\n            build_target(name, &merged, force, release);\n        }\n    } else {\n        let name = manifest.package.name.clone();\n        build_target(&name, build_config, force, release);\n    }\n}\n\nfn merge_target_config(parent: &Build, target: &Build) -\u003e Build {\n    let mut merged = target.clone();\n    if merged.llvm_config.is_none() {\n        merged.llvm_config = parent.llvm_config.clone();\n    }\n    if merged.llvm_components.is_none() {\n        merged.llvm_components = parent.llvm_components.clone();\n    }\n    if merged.prebuild.is_none() {\n        merged.prebuild = parent.prebuild.clone();\n    }\n    if merged.compiler == \"cc\" && parent.compiler != \"cc\" {\n        merged.compiler = parent.compiler.clone();\n    }\n    for dir in &parent.include_dirs {\n        if !merged.include_dirs.contains(dir) {\n            merged.include_dirs.push(dir.clone());\n        }\n    }\n    for flag in &parent.cflags {\n        if !merged.cflags.contains(flag) {\n            merged.cflags.push(flag.clone());\n        }\n    }\n    for flag in &parent.ldflags {\n        if !merged.ldflags.contains(flag) {\n            merged.ldflags.push(flag.clone());\n        }\n    }\n    for lib in &parent.link {\n        if !merged.link.contains(lib) {\n            merged.link.push(lib.clone());\n        }\n    }\n    for lib in &parent.libraries {\n        if !merged.libraries.contains(lib) {\n            merged.libraries.push(lib.clone());\n        }\n    }\n    for dir in &parent.lib_dirs {\n        if !merged.lib_dirs.contains(dir) {\n            merged.lib_dirs.push(dir.clone());\n        }\n    }\n    merged\n}\n\nfn build_target(name: &str, config: &Build, force: bool, release: bool) {\n    std::fs::create_dir_all(\"build\").unwrap_or_else(|e| {\n        eprintln!(\"Error creating build/ directory: {}\", e);\n        std::process::exit(1);\n    });\n\n    run_prebuild(config);\n\n    let llvm = resolve_llvm(config);\n\n    let mut extra_cflags = Vec::new();\n    let mut extra_include_dirs = Vec::new();\n    if let Some(ref info) = llvm {\n        extra_include_dirs.extend(info.include_dirs.iter().cloned());\n        extra_cflags.extend(info.cflags.iter().cloned());\n    }\n\n    let mut effective_config = config.clone();\n    for dir in &extra_include_dirs {\n        if !effective_config.include_dirs.contains(dir) {\n            effective_config.include_dirs.push(dir.clone());\n        }\n    }\n    for flag in &extra_cflags {\n        if !effective_config.cflags.contains(flag) {\n            effective_config.cflags.push(flag.clone());\n        }\n    }\n\n    let sources = resolve_sources(&config.sources);\n    if sources.is_empty() {\n        eprintln!(\"Error: no source files found for target '{}'\", name);\n        std::process::exit(1);\n    }\n\n    let mut objects: Vec\u003cString\u003e = Vec::new();\n    for source in &sources {\n        let obj = compile_source(source, &effective_config, force, release);\n        objects.push(obj);\n    }\n\n    let mut effective_ldflags = config.ldflags.clone();\n    let mut effective_link = config.link.clone();\n    let effective_libraries = config.libraries.clone();\n    let effective_lib_dirs = config.lib_dirs.clone();\n\n    if let Some(ref info) = llvm {\n        for flag in &info.ldflags {\n            if !effective_ldflags.contains(flag) {\n                effective_ldflags.push(flag.clone());\n            }\n        }\n        for lib in &info.libraries {\n            if !effective_link.contains(lib) {\n                effective_link.push(lib.clone());\n            }\n        }\n    }\n\n    let mut link_config = effective_config.clone();\n    link_config.ldflags = effective_ldflags;\n    link_config.link = effective_link;\n    link_config.libraries = effective_libraries;\n    link_config.lib_dirs = effective_lib_dirs;\n\n    let output = match config.kind.as_str() {\n        \"executable\" =\u003e {\n            let output = format!(\"build/{}\", name);\n            link_executable(&objects, &output, &link_config, release);\n            output\n        }\n        \"staticlib\" =\u003e {\n            let output = format!(\"build/lib{}.a\", name);\n            link_staticlib(&objects, &output);\n            output\n        }\n        \"sharedlib\" =\u003e {\n            let output = format!(\"build/lib{}.so\", name);\n            link_sharedlib(&objects, &output, &link_config, release);\n            output\n        }\n        \"object\" =\u003e {\n            if objects.len() != 1 {\n                eprintln!(\"Error: 'object' build type requires exactly one source file\");\n                std::process::exit(1);\n            }\n            objects[0].clone()\n        }\n        other =\u003e {\n            eprintln!(\"Error: unknown build type '{}'\", other);\n            std::process::exit(1);\n        }\n    };\n\n    println!(\"Built: {}\", output);\n}\n\nfn compile_single_file(file: &str, force: bool, release: bool) {\n    let path = Path::new(file);\n    let stem = path.file_stem().unwrap_or_default().to_string_lossy();\n\n    std::fs::create_dir_all(\"build\").unwrap_or_else(|e| {\n        eprintln!(\"Error creating build/ directory: {}\", e);\n        std::process::exit(1);\n    });\n\n    let obj = format!(\"build/{}.o\", stem);\n    let output = format!(\"build/{}\", stem);\n\n    if !force && Path::new(&obj).exists() {\n        if let (Ok(obj_meta), Ok(src_meta)) =\n            (std::fs::metadata(&obj), std::fs::metadata(path))\n        {\n            if let (Ok(obj_time), Ok(src_time)) = (obj_meta.modified(), src_meta.modified()) {\n                if obj_time \u003e= src_time {\n                    println!(\"Cached: {} (unchanged)\", file);\n                    return;\n                }\n            }\n        }\n    }\n\n    let compiler = detect_compiler(path);\n    let mut cmd = Command::new(&compiler);\n    cmd.arg(\"-c\").arg(file).arg(\"-o\").arg(&obj);\n    if release {\n        cmd.arg(\"-O2\");\n    } else {\n        cmd.arg(\"-O0\");\n    }\n    cmd.arg(\"-MMD\")\n        .arg(\"-MF\")\n        .arg(format!(\"build/{}.d\", stem));\n\n    let status = cmd.status().unwrap_or_else(|e| {\n        eprintln!(\"Error compiling {}: {}\", file, e);\n        std::process::exit(1);\n    });\n    if !status.success() {\n        eprintln!(\"Compilation failed: {}\", file);\n        std::process::exit(1);\n    }\n\n    let link_status = Command::new(&compiler)\n        .arg(&obj)\n        .arg(\"-o\")\n        .arg(&output)\n        .status()\n        .unwrap_or_else(|e| {\n            eprintln!(\"Error linking: {}\", e);\n            std::process::exit(1);\n        });\n    if !link_status.success() {\n        eprintln!(\"Linking failed\");\n        std::process::exit(1);\n    }\n\n    println!(\"Built: {}\", output);\n}\n\nfn detect_compiler(path: &Path) -\u003e &'static str {\n    match path.extension().and_then(|e| e.to_str()) {\n        Some(\"cpp\") | Some(\"cc\") | Some(\"cxx\") | Some(\"C\") =\u003e \"c++\",\n        _ =\u003e \"cc\",\n    }\n}\n\npub fn resolve_sources(patterns: &[String]) -\u003e Vec\u003cPathBuf\u003e {\n    let mut sources = Vec::new();\n    for pattern in patterns {\n        match glob::glob(pattern) {\n            Ok(paths) =\u003e {\n                for path in paths.flatten() {\n                    if path.is_file() {\n                        sources.push(path);\n                    }\n                }\n            }\n            Err(e) =\u003e {\n                eprintln!(\"Warning: invalid glob pattern '{}': {}\", pattern, e);\n            }\n        }\n    }\n    sources.sort();\n    sources\n}\n\npub fn compile_source(source: &Path, config: &Build, force: bool, release: bool) -\u003e String {\n    let stem = source.file_stem().unwrap_or_default().to_string_lossy();\n    let obj = format!(\"build/{}.o\", stem);\n    let dep = format!(\"build/{}.d\", stem);\n\n    if !force && Path::new(&obj).exists() {\n        if let Ok(obj_meta) = std::fs::metadata(&obj) {\n            if let Ok(src_meta) = std::fs::metadata(source) {\n                if let (Ok(obj_time), Ok(src_time)) =\n                    (obj_meta.modified(), src_meta.modified())\n                {\n                    if obj_time \u003e= src_time {\n                        if Path::new(&dep).exists() {\n                            if deps_are_up_to_date(&dep, obj_time) {\n                                return obj;\n                            }\n                        } else {\n                            return obj;\n                        }\n                    }\n                }\n            }\n        }\n    }\n\n    let mut cmd = Command::new(&config.compiler);\n    cmd.arg(\"-c\").arg(source).arg(\"-o\").arg(&obj);\n\n    for dir in &config.include_dirs {\n        cmd.arg(\"-I\").arg(dir);\n    }\n\n    for flag in &config.cflags {\n        cmd.arg(flag);\n    }\n\n    if release {\n        cmd.arg(\"-O2\");\n    } else {\n        cmd.arg(\"-O0\");\n    }\n\n    cmd.arg(\"-MMD\").arg(\"-MF\").arg(&dep);\n\n    let status = cmd.status().unwrap_or_else(|e| {\n        eprintln!(\"Error compiling {}: {}\", source.display(), e);\n        std::process::exit(1);\n    });\n\n    if !status.success() {\n        eprintln!(\"Compilation failed: {}\", source.display());\n        std::process::exit(1);\n    }\n\n    println!(\"  Compiling {}\", source.display());\n    obj\n}\n\npub fn deps_are_up_to_date(dep_file: &str, obj_time: std::time::SystemTime) -\u003e bool {\n    if let Ok(content) = std::fs::read_to_string(dep_file) {\n        let content = content.replace(\"\\\\\\n\", \" \");\n        if let Some(deps_part) = content.split_once(':') {\n            for dep in deps_part.1.split_whitespace() {\n                if !dep.is_empty() {\n                    if let Ok(meta) = std::fs::metadata(dep) {\n                        if let Ok(dep_time) = meta.modified() {\n                            if dep_time \u003e obj_time {\n                                return false;\n                            }\n                        }\n                    }\n                }\n            }\n        }\n        true\n    } else {\n        false\n    }\n}\n\nfn link_executable(objects: &[String], output: &str, config: &Build, release: bool) {\n    let mut cmd = Command::new(&config.compiler);\n\n    for obj in objects {\n        cmd.arg(obj);\n    }\n\n    cmd.arg(\"-o\").arg(output);\n\n    for flag in &config.ldflags {\n        cmd.arg(flag);\n    }\n\n    for lib in &config.link {\n        cmd.arg(format!(\"-l{}\", lib));\n    }\n\n    for lib in &config.libraries {\n        let resolved = resolve_library(lib, &config.lib_dirs);\n        cmd.arg(&resolved);\n    }\n\n    if release {\n        cmd.arg(\"-O2\");\n    }\n\n    let status = cmd.status().unwrap_or_else(|e| {\n        eprintln!(\"Error linking {}: {}\", output, e);\n        std::process::exit(1);\n    });\n\n    if !status.success() {\n        eprintln!(\"Linking failed: {}\", output);\n        std::process::exit(1);\n    }\n}\n\nfn link_staticlib(objects: &[String], output: &str) {\n    let mut cmd = Command::new(\"ar\");\n    cmd.arg(\"rcs\").arg(output);\n\n    for obj in objects {\n        cmd.arg(obj);\n    }\n\n    let status = cmd.status().unwrap_or_else(|e| {\n        eprintln!(\"Error creating static library {}: {}\", output, e);\n        std::process::exit(1);\n    });\n\n    if !status.success() {\n        eprintln!(\"Failed to create static library: {}\", output);\n        std::process::exit(1);\n    }\n}\n\nfn link_sharedlib(objects: &[String], output: &str, config: &Build, release: bool) {\n    let mut cmd = Command::new(&config.compiler);\n    cmd.arg(\"-shared\");\n\n    for obj in objects {\n        cmd.arg(obj);\n    }\n\n    cmd.arg(\"-o\").arg(output);\n\n    for flag in &config.ldflags {\n        cmd.arg(flag);\n    }\n\n    for lib in &config.link {\n        cmd.arg(format!(\"-l{}\", lib));\n    }\n\n    for lib in &config.libraries {\n        let resolved = resolve_library(lib, &config.lib_dirs);\n        cmd.arg(&resolved);\n    }\n\n    if release {\n        cmd.arg(\"-O2\");\n    }\n\n    let status = cmd.status().unwrap_or_else(|e| {\n        eprintln!(\"Error creating shared library {}: {}\", output, e);\n        std::process::exit(1);\n    });\n\n    if !status.success() {\n        eprintln!(\"Failed to create shared library: {}\", output);\n        std::process::exit(1);\n    }\n}\n\npub fn resolve_library(name: &str, lib_dirs: &[String]) -\u003e String {\n    if Path::new(name).is_absolute() {\n        if Path::new(name).exists() {\n            return name.to_string();\n        }\n        eprintln!(\"Warning: library not found: {}\", name);\n        return name.to_string();\n    }\n\n    if name.contains('/') || name.contains('\\\\') {\n        if Path::new(name).exists() {\n            return name.to_string();\n        }\n        eprintln!(\"Warning: library not found: {}\", name);\n        return name.to_string();\n    }\n\n    let mut search_dirs: Vec\u003cPathBuf\u003e = Vec::new();\n\n    for dir in lib_dirs {\n        search_dirs.push(Path::new(dir).to_path_buf());\n    }\n\n    search_dirs.extend(get_system_lib_paths());\n\n    for dir in &search_dirs {\n        let candidate = dir.join(name);\n        if candidate.exists() {\n            return candidate.to_string_lossy().to_string();\n        }\n        let candidate = dir.join(format!(\"lib{}\", name));\n        if candidate.exists() {\n            return candidate.to_string_lossy().to_string();\n        }\n    }\n\n    eprintln!(\n        \"Warning: library '{}' not found in search paths, passing to linker\",\n        name\n    );\n    name.to_string()\n}\n\nfn get_system_lib_paths() -\u003e Vec\u003cPathBuf\u003e {\n    let mut paths = Vec::new();\n\n    for dir in &[\"/usr/lib\", \"/usr/local/lib\", \"/lib\", \"/lib64\"] {\n        let path = Path::new(dir);\n        if path.is_dir() {\n            paths.push(path.to_path_buf());\n        }\n    }\n\n    if let Ok(library_path) = std::env::var(\"LIBRARY_PATH\") {\n        for dir in library_path.split(':') {\n            if !dir.is_empty() {\n                paths.push(Path::new(dir).to_path_buf());\n            }\n        }\n    }\n\n    if let Ok(ld_library_path) = std::env::var(\"LD_LIBRARY_PATH\") {\n        for dir in ld_library_path.split(':') {\n            if !dir.is_empty() {\n                paths.push(Path::new(dir).to_path_buf());\n            }\n        }\n    }\n\n    paths\n}\n\npub fn is_c_project() -\u003e bool {\n    let manifest_path = Path::new(\"otaru.toml\");\n    if manifest_path.exists() {\n        if let Ok(manifest) = Manifest::load(manifest_path) {\n            return manifest.build.is_some();\n        }\n    }\n    false\n}\n\npub fn has_build_targets() -\u003e bool {\n    let manifest_path = Path::new(\"otaru.toml\");\n    if manifest_path.exists() {\n        if let Ok(manifest) = Manifest::load(manifest_path) {\n            if let Some(build) = &manifest.build {\n                return build.targets.is_some();\n            }\n        }\n    }\n    false\n}\n"},{"id":"otaru/src/install.rs","name":"install.rs","dir":"otaru/src","ext":".rs","size":5563,"binary":false,"truncated":false,"content":"use std::path::Path;\nuse std::process::Command;\n\npub fn run() {\n    let manifest_path = Path::new(\"otaru.toml\");\n    if !manifest_path.exists() {\n        eprintln!(\"Error: otaru.toml not found\");\n        std::process::exit(1);\n    }\n\n    let manifest = crate::manifest::Manifest::load(manifest_path)\n        .unwrap_or_else(|e| { eprintln!(\"{}\", e); std::process::exit(1); });\n\n    if manifest.dependencies.is_empty() {\n        println!(\"No dependencies to install\");\n        return;\n    }\n\n    // Cache directory\n    let cache_dir = get_cache_dir();\n    let deps_dir = Path::new(\"deps\");\n    std::fs::create_dir_all(&cache_dir).ok();\n    std::fs::create_dir_all(deps_dir).ok();\n\n    for (name, dep) in &manifest.dependencies {\n        match dep {\n            crate::manifest::Dependency::Detailed { git, tag, branch, .. } =\u003e {\n                if let Some(url) = git {\n                    let cache_path = cache_dir.join(sanitize_name(name));\n                    let target_path = deps_dir.join(name);\n\n                    // Clone or fetch\n                    if cache_path.exists() {\n                        println!(\"Updating '{}'...\", name);\n                        let _ = Command::new(\"git\")\n                            .args([\"-C\", &cache_path.to_string_lossy(), \"fetch\", \"--tags\"])\n                            .output();\n                    } else {\n                        println!(\"Cloning '{}'...\", name);\n                        let status = Command::new(\"git\")\n                            .args([\"clone\", url, &cache_path.to_string_lossy()])\n                            .status()\n                            .unwrap_or_else(|e| {\n                                eprintln!(\"Error cloning {}: {}\", name, e);\n                                std::process::exit(1);\n                            });\n                        if !status.success() {\n                            eprintln!(\"Failed to clone {}\", name);\n                            std::process::exit(1);\n                        }\n                    }\n\n                    // Checkout specific tag/branch\n                    if let Some(t) = tag {\n                        let _ = Command::new(\"git\")\n                            .args([\"-C\", &cache_path.to_string_lossy(), \"checkout\", t])\n                            .output();\n                    } else if let Some(b) = branch {\n                        let _ = Command::new(\"git\")\n                            .args([\"-C\", &cache_path.to_string_lossy(), \"checkout\", b])\n                            .output();\n                    }\n\n                    // Symlink/copy to deps/\n                    let _ = std::fs::remove_file(&target_path);\n                    let _ = std::fs::remove_dir_all(&target_path);\n                    if let Err(e) = symlink_dir(&cache_path, &target_path) {\n                        // Fallback: copy the src directory\n                        copy_dep(&cache_path.join(\"src\"), &target_path);\n                        eprintln!(\"Warning: symlink failed ({}), copied src/ instead\", e);\n                    }\n                    println!(\"  Installed '{}' from git\", name);\n                } else if let Some(p) = &dep.path() {\n                    // Path dependency: symlink\n                    let abs_path = std::fs::canonicalize(Path::new(p))\n                        .unwrap_or_else(|_| Path::new(p).to_path_buf());\n                    let target_path = deps_dir.join(name);\n                    let _ = std::fs::remove_file(&target_path);\n                    let _ = std::fs::remove_dir_all(&target_path);\n                    symlink_dir(&abs_path, &target_path).ok();\n                    println!(\"  Linked '{}' from {}\", name, p);\n                }\n            }\n            crate::manifest::Dependency::Simple(version) =\u003e {\n                println!(\"  Skipping '{}' (registry not yet supported, version {})\", name, version);\n            }\n        }\n    }\n\n    println!(\"Done\");\n}\n\nimpl crate::manifest::Dependency {\n    fn path(&self) -\u003e Option\u003c&String\u003e {\n        match self {\n            crate::manifest::Dependency::Detailed { path, .. } =\u003e path.as_ref(),\n            _ =\u003e None,\n        }\n    }\n}\n\nfn get_cache_dir() -\u003e std::path::PathBuf {\n    let base = dirs::cache_dir()\n        .unwrap_or_else(|| Path::new(\"~/.cache\").to_path_buf());\n    base.join(\"otaru\")\n}\n\nfn sanitize_name(name: &str) -\u003e String {\n    name.replace(|c: char| !c.is_alphanumeric() && c != '-' && c != '_', \"_\")\n}\n\nfn symlink_dir(src: &Path, dst: &Path) -\u003e std::io::Result\u003c()\u003e {\n    #[cfg(unix)]\n    {\n        std::os::unix::fs::symlink(src, dst)\n    }\n    #[cfg(windows)]\n    {\n        std::os::windows::fs::symlink_dir(src, dst)\n    }\n}\n\nfn copy_dep(src: &Path, dst: &Path) {\n    if let Ok(entries) = std::fs::read_dir(src) {\n        std::fs::create_dir_all(dst).ok();\n        for entry in entries.flatten() {\n            let path = entry.path();\n            let dest = dst.join(entry.file_name());\n            if path.is_dir() {\n                copy_dir_recursive(&path, &dest);\n            } else {\n                let _ = std::fs::copy(&path, &dest);\n            }\n        }\n    }\n}\n\nfn copy_dir_recursive(src: &Path, dst: &Path) {\n    std::fs::create_dir_all(dst).ok();\n    if let Ok(entries) = std::fs::read_dir(src) {\n        for entry in entries.flatten() {\n            let path = entry.path();\n            let dest = dst.join(entry.file_name());\n            if path.is_dir() {\n                copy_dir_recursive(&path, &dest);\n            } else {\n                let _ = std::fs::copy(&path, &dest);\n            }\n        }\n    }\n}\n"},{"id":"otaru/src/main.rs","name":"main.rs","dir":"otaru/src","ext":".rs","size":5559,"binary":false,"truncated":false,"content":"pub mod manifest;\npub mod new;\npub mod build;\npub mod run;\npub mod add;\npub mod install;\npub mod cbuild;\n\nuse clap::{Parser, Subcommand};\nuse std::path::Path;\n\n#[derive(Parser)]\n#[command(name = \"otaru\", version, about = \"Hokkaido package manager and project manager\")]\nstruct Cli {\n    #[command(subcommand)]\n    command: Command,\n}\n\n#[derive(Subcommand)]\nenum Command {\n    /// Create a new Hokkaido project\n    New {\n        /// Project name\n        name: String,\n    },\n    /// Build the current project or a single file\n    Build {\n        /// Input file (optional — if omitted, builds the project)\n        file: Option\u003cString\u003e,\n        /// Freestanding mode (no CRT/libc, main becomes ELF entry point)\n        #[arg(long)]\n        freestanding: bool,\n        /// Force rebuild, ignoring cached artifacts\n        #[arg(long, short)]\n        force: bool,\n        /// Build in release mode (with optimizations, equivalent to -O2)\n        #[arg(long, short = 'r')]\n        release: bool,\n        /// Build a specific target (for projects with [[build.targets]])\n        #[arg(long, short)]\n        target: Option\u003cString\u003e,\n    },\n    /// Build and run the current project or a single file\n    Run {\n        /// Input .hk file (optional — if omitted, runs the project in src/)\n        file: Option\u003cString\u003e,\n        /// Freestanding mode (no CRT/libc, main becomes ELF entry point)\n        #[arg(long)]\n        freestanding: bool,\n        /// Force rebuild, ignoring cached artifacts\n        #[arg(long, short)]\n        force: bool,\n        /// Build in release mode (with optimizations, equivalent to -O2)\n        #[arg(long, short = 'r')]\n        release: bool,\n    },\n    /// Run a named shell script from otaru.toml\n    Exec {\n        /// Script name (omit to list all scripts)\n        name: Option\u003cString\u003e,\n        /// Arguments to pass to the script ($1, $2, etc.)\n        #[arg(trailing_var_arg = true)]\n        args: Vec\u003cString\u003e,\n    },\n    /// Add a dependency\n    Add {\n        /// Dependency name\n        name: String,\n        /// Git repository URL\n        #[arg(long)]\n        git: Option\u003cString\u003e,\n        /// Local path\n        #[arg(long)]\n        path: Option\u003cString\u003e,\n    },\n    /// Install all dependencies\n    Install,\n    /// Clean build artifacts\n    Clean,\n}\n\nfn main() {\n    let cli = Cli::parse();\n\n    match &cli.command {\n        Command::New { name } =\u003e new::run(name),\n        Command::Build {\n            file,\n            freestanding,\n            force,\n            release,\n            target,\n        } =\u003e {\n            if cbuild::has_build_targets() || cbuild::is_c_project() {\n                cbuild::run(file.as_deref(), *force, *release, target.as_deref());\n            } else if build::has_hk_files() {\n                build::run(file.as_deref(), *freestanding, *force, *release);\n            } else {\n                build::run(file.as_deref(), *freestanding, *force, *release);\n            }\n        }\n        Command::Run {\n            file,\n            freestanding,\n            force,\n            release,\n        } =\u003e {\n            run::run(file.as_deref(), *freestanding, *force, *release);\n        }\n        Command::Exec { name, args } =\u003e {\n            match name {\n                None =\u003e list_scripts(),\n                Some(n) =\u003e exec_script(n, args),\n            }\n        }\n        Command::Add {\n            name,\n            git,\n            path,\n        } =\u003e add::run(name, git.as_deref(), path.as_deref()),\n        Command::Install =\u003e install::run(),\n        Command::Clean =\u003e clean(),\n    }\n}\n\nfn clean() {\n    let _ = std::fs::remove_dir_all(\"build\");\n    println!(\"Cleaned build directory\");\n}\n\nfn load_scripts() -\u003e std::collections::BTreeMap\u003cString, String\u003e {\n    let manifest_path = Path::new(\"otaru.toml\");\n    if !manifest_path.exists() {\n        eprintln!(\"Error: otaru.toml not found\");\n        std::process::exit(1);\n    }\n    let manifest = manifest::Manifest::load(manifest_path)\n        .unwrap_or_else(|e| {\n            eprintln!(\"{}\", e);\n            std::process::exit(1);\n        });\n    manifest.scripts\n}\n\nfn list_scripts() {\n    let scripts = load_scripts();\n    if scripts.is_empty() {\n        println!(\"No scripts defined in otaru.toml\");\n        println!();\n        println!(\"Add scripts with:\");\n        println!(\"  [scripts]\");\n        println!(\"  test = \\\"./build/myapp --test\\\"\");\n        return;\n    }\n    println!(\"Available scripts:\");\n    for (name, cmd) in &scripts {\n        println!(\"  {} = \\\"{}\\\"\", name, cmd);\n    }\n    println!();\n    println!(\"Run with: otaru exec \u003cname\u003e\");\n}\n\nfn exec_script(name: &str, args: &[String]) {\n    let scripts = load_scripts();\n\n    let script = scripts.get(name).unwrap_or_else(|| {\n        eprintln!(\"Error: script '{}' not found in otaru.toml\", name);\n        if !scripts.is_empty() {\n            eprintln!();\n            eprintln!(\"Available scripts:\");\n            for (n, _) in &scripts {\n                eprintln!(\"  {}\", n);\n            }\n        }\n        std::process::exit(1);\n    });\n\n    let mut cmd_str = script.clone();\n    for (i, arg) in args.iter().enumerate() {\n        let placeholder = format!(\"${}\", i + 1);\n        cmd_str = cmd_str.replace(&placeholder, arg);\n    }\n\n    eprintln!(\"$ {}\", cmd_str);\n\n    let status = std::process::Command::new(\"sh\")\n        .arg(\"-c\")\n        .arg(&cmd_str)\n        .status()\n        .unwrap_or_else(|e| {\n            eprintln!(\"Error running script '{}': {}\", name, e);\n            std::process::exit(1);\n        });\n\n    std::process::exit(status.code().unwrap_or(1));\n}\n"},{"id":"otaru/src/manifest.rs","name":"manifest.rs","dir":"otaru/src","ext":".rs","size":2906,"binary":false,"truncated":false,"content":"use serde::{Deserialize, Serialize};\nuse std::collections::BTreeMap;\nuse std::fs;\nuse std::path::Path;\n\n#[derive(Debug, Serialize, Deserialize)]\npub struct Manifest {\n    pub package: Package,\n    #[serde(default)]\n    pub dependencies: BTreeMap\u003cString, Dependency\u003e,\n    #[serde(default)]\n    pub build: Option\u003cBuild\u003e,\n    #[serde(default)]\n    pub scripts: BTreeMap\u003cString, String\u003e,\n}\n\n#[derive(Debug, Serialize, Deserialize)]\npub struct Package {\n    pub name: String,\n    pub version: String,\n    #[serde(default)]\n    pub authors: Vec\u003cString\u003e,\n    #[serde(default = \"default_edition\")]\n    pub edition: String,\n}\n\nfn default_edition() -\u003e String {\n    \"2024\".to_string()\n}\n\n#[derive(Debug, Serialize, Deserialize)]\n#[serde(untagged)]\npub enum Dependency {\n    Simple(String),\n    Detailed {\n        #[serde(skip_serializing_if = \"Option::is_none\")]\n        git: Option\u003cString\u003e,\n        #[serde(skip_serializing_if = \"Option::is_none\")]\n        path: Option\u003cString\u003e,\n        #[serde(skip_serializing_if = \"Option::is_none\")]\n        tag: Option\u003cString\u003e,\n        #[serde(skip_serializing_if = \"Option::is_none\")]\n        branch: Option\u003cString\u003e,\n        #[serde(skip_serializing_if = \"Option::is_none\")]\n        version: Option\u003cString\u003e,\n    },\n}\n\n#[derive(Debug, Serialize, Deserialize, Clone)]\npub struct Build {\n    #[serde(default = \"default_build_type\", rename = \"type\")]\n    pub kind: String,\n\n    #[serde(default)]\n    pub sources: Vec\u003cString\u003e,\n\n    #[serde(default)]\n    pub include_dirs: Vec\u003cString\u003e,\n\n    #[serde(default = \"default_compiler\")]\n    pub compiler: String,\n\n    #[serde(default)]\n    pub cflags: Vec\u003cString\u003e,\n\n    #[serde(default)]\n    pub ldflags: Vec\u003cString\u003e,\n\n    #[serde(default)]\n    pub link: Vec\u003cString\u003e,\n\n    #[serde(default)]\n    pub libraries: Vec\u003cString\u003e,\n\n    #[serde(default)]\n    pub lib_dirs: Vec\u003cString\u003e,\n\n    #[serde(default)]\n    pub targets: Option\u003cBTreeMap\u003cString, Build\u003e\u003e,\n\n    #[serde(default)]\n    pub prebuild: Option\u003cString\u003e,\n\n    #[serde(default, rename = \"llvm-config\")]\n    pub llvm_config: Option\u003cString\u003e,\n\n    #[serde(default, rename = \"llvm-components\")]\n    pub llvm_components: Option\u003cVec\u003cString\u003e\u003e,\n}\n\nfn default_build_type() -\u003e String {\n    \"executable\".to_string()\n}\n\nfn default_compiler() -\u003e String {\n    \"cc\".to_string()\n}\n\nimpl Manifest {\n    pub fn load(path: &Path) -\u003e Result\u003cSelf, String\u003e {\n        let content = fs::read_to_string(path)\n            .map_err(|e| format!(\"Failed to read {}: {}\", path.display(), e))?;\n        toml::from_str(&content)\n            .map_err(|e| format!(\"Failed to parse {}: {}\", path.display(), e))\n    }\n\n    pub fn save(&self, path: &Path) -\u003e Result\u003c(), String\u003e {\n        let content = toml::to_string_pretty(self)\n            .map_err(|e| format!(\"Failed to serialize manifest: {}\", e))?;\n        fs::write(path, content)\n            .map_err(|e| format!(\"Failed to write {}: {}\", path.display(), e))\n    }\n}\n"},{"id":"otaru/src/new.rs","name":"new.rs","dir":"otaru/src","ext":".rs","size":3538,"binary":false,"truncated":false,"content":"use std::fs;\nuse std::path::Path;\n\npub fn run(name: &str) {\n    let project_dir = Path::new(name);\n    if project_dir.exists() {\n        eprintln!(\"Error: directory '{}' already exists\", name);\n        std::process::exit(1);\n    }\n\n    fs::create_dir_all(project_dir.join(\"src\"))\n        .unwrap_or_else(|e| { eprintln!(\"Error creating project: {}\", e); std::process::exit(1); });\n\n    // Create otaru.toml\n    let manifest = crate::manifest::Manifest {\n        package: crate::manifest::Package {\n            name: name.to_string(),\n            version: \"0.1.0\".to_string(),\n            authors: vec![],\n            edition: \"2024\".to_string(),\n        },\n        dependencies: Default::default(),\n        build: None,\n        scripts: Default::default(),\n    };\n    manifest.save(&project_dir.join(\"otaru.toml\"))\n        .unwrap_or_else(|e| { eprintln!(\"{}\", e); std::process::exit(1); });\n\n    // Create src/main.hk\n    let main_hk = \"fn main() -\u003e int {\\n    return 0\\n}\\n\";\n    fs::write(project_dir.join(\"src/main.hk\"), main_hk)\n        .unwrap_or_else(|e| { eprintln!(\"Error writing src/main.hk: {}\", e); std::process::exit(1); });\n\n    // Create hk.mod (project root marker)\n    fs::write(project_dir.join(\"hk.mod\"), \"\")\n        .unwrap_or_else(|e| { eprintln!(\"Error writing hk.mod: {}\", e); std::process::exit(1); });\n\n    // Copy std library from the bundled location\n    let std_dir = find_bundled_std();\n    if let Some(src) = std_dir {\n        let dst = project_dir.join(\"std\");\n        if let Err(e) = copy_dir(Path::new(&src), &dst) {\n            eprintln!(\"Warning: could not copy std library: {}\", e);\n        } else {\n            println!(\"  std/ prepared\");\n        }\n    } else {\n        eprintln!(\"Warning: std/ directory not found (stdlib features unavailable)\");\n        eprintln!(\"Hint: install otaru via Nix or build from the hokkaido repository\");\n    }\n\n    println!(\"Created project '{}'\", name);\n    println!(\"  cd {}\", name);\n    println!(\"  otaru build\");\n}\n\nfn find_bundled_std() -\u003e Option\u003cString\u003e {\n    // Check next to the running otaru binary\n    if let Ok(exe) = std::env::current_exe() {\n        if let Some(parent) = exe.parent() {\n            let mut dir = parent.to_path_buf();\n            // Walk up the directory tree looking for std/hk.mod\n            loop {\n                let candidate = dir.join(\"std\");\n                if candidate.join(\"hk.mod\").exists() {\n                    return Some(candidate.to_string_lossy().to_string());\n                }\n                // Also check share/otaru/std (Nix layout)\n                let nix_candidate = dir.join(\"share/otaru/std\");\n                if nix_candidate.join(\"hk.mod\").exists() {\n                    return Some(nix_candidate.to_string_lossy().to_string());\n                }\n                if !dir.pop() { break; }\n            }\n        }\n    }\n\n    // Fallback: HOKKAIDO_HOME points to build dir\n    if let Ok(home) = std::env::var(\"HOKKAIDO_HOME\") {\n        let candidate = Path::new(&home).join(\"../std\");\n        if candidate.exists() {\n            return Some(candidate.to_string_lossy().to_string());\n        }\n    }\n\n    None\n}\n\nfn copy_dir(src: &Path, dst: &Path) -\u003e std::io::Result\u003c()\u003e {\n    fs::create_dir_all(dst)?;\n    for entry in fs::read_dir(src)? {\n        let entry = entry?;\n        let ty = entry.file_type()?;\n        if ty.is_dir() {\n            copy_dir(&entry.path(), &dst.join(entry.file_name()))?;\n        } else {\n            fs::copy(entry.path(), dst.join(entry.file_name()))?;\n        }\n    }\n    Ok(())\n}\n"},{"id":"otaru/src/run.rs","name":"run.rs","dir":"otaru/src","ext":".rs","size":2254,"binary":false,"truncated":false,"content":"use std::path::Path;\nuse std::process::Command;\n\npub fn run(file: Option\u003c&str\u003e, freestanding: bool, force: bool, release: bool) {\n    if freestanding {\n        eprintln!(\"Error: 'otaru run' does not support --freestanding mode.\");\n        eprintln!(\"Build with 'otaru build --freestanding \u003cfile\u003e' and link manually.\");\n        std::process::exit(1);\n    }\n\n    if crate::cbuild::has_build_targets() || crate::cbuild::is_c_project() {\n        crate::cbuild::run(None, force, release, None);\n\n        let manifest_path = Path::new(\"otaru.toml\");\n        let manifest = crate::manifest::Manifest::load(manifest_path)\n            .unwrap_or_else(|e| {\n                eprintln!(\"{}\", e);\n                std::process::exit(1);\n            });\n\n        if let Some(build_config) = &manifest.build {\n            if let Some(targets) = &build_config.targets {\n                if let Some((name, _config)) =\n                    targets.iter().find(|(_, c)| c.kind == \"executable\")\n                {\n                    let binary = format!(\"build/{}\", name);\n                    run_binary(&binary);\n                    return;\n                }\n                eprintln!(\"Error: no executable target found\");\n                std::process::exit(1);\n            }\n            let binary = format!(\"build/{}\", manifest.package.name);\n            run_binary(&binary);\n            return;\n        }\n    }\n\n    if crate::build::has_hk_files() {\n        let binary = if let Some(f) = file {\n            crate::build::compile_single_or_project(Some(f), false, force, release)\n        } else {\n            crate::build::compile_single_or_project(None, false, force, release)\n        };\n        run_binary(&binary);\n        return;\n    }\n\n    let binary = if let Some(f) = file {\n        crate::build::compile_single_or_project(Some(f), false, force, release)\n    } else {\n        crate::build::compile_single_or_project(None, false, force, release)\n    };\n    run_binary(&binary);\n}\n\nfn run_binary(binary: &str) {\n    let run_status = Command::new(binary)\n        .status()\n        .unwrap_or_else(|e| {\n            eprintln!(\"Error running '{}': {}\", binary, e);\n            std::process::exit(1);\n        });\n\n    std::process::exit(run_status.code().unwrap_or(1));\n}\n"},{"id":"otaru.toml","name":"otaru.toml","dir":"","ext":".toml","size":1731,"binary":false,"truncated":false,"content":"[package]\nname = \"hokkaido\"\nversion = \"0.1.0\"\nauthors = [\"Jihoo\"]\n\n[hokkaido]\nversion = \"0.1.0\"\ndescription = \"Hokkaido programming language\"\n\n# LLVM build configuration (replaces CMakeLists.txt)\n[build]\nprebuild = \"cargo build --release\"\nllvm-config = \"/nix/store/238i6ljarh959f2dak1a8rsyiz6hnmgw-llvm-21.1.8-dev/bin/llvm-config\"\nllvm-components = [\n    \"support\", \"core\", \"irreader\", \"codegen\", \"target\",\n    \"mc\", \"mcparser\", \"asmparser\", \"option\",\n    \"AArch64\", \"AMDGPU\", \"ARM\", \"AVR\", \"BPF\", \"Hexagon\",\n    \"Lanai\", \"LoongArch\", \"Mips\", \"MSP430\", \"NVPTX\",\n    \"PowerPC\", \"RISCV\", \"Sparc\", \"SPIRV\", \"SystemZ\",\n    \"VE\", \"WebAssembly\", \"X86\", \"XCore\",\n]\nlink = [\"pthread\", \"dl\", \"m\"]\n\n# Main compiler executable\n[build.targets.hokkaido]\ntype = \"executable\"\ncompiler = \"c++\"\ncflags = [\"-fexceptions\"]\nsources = [\n    \"src-cpp/main.cpp\",\n    \"src-cpp/cubical.cpp\",\n    \"src-cpp/lexer.cpp\",\n    \"src-cpp/parser.cpp\",\n    \"src-cpp/codegen.cpp\",\n    \"src-cpp/codegen_types.cpp\",\n    \"src-cpp/codegen_expr.cpp\",\n    \"src-cpp/codegen_top.cpp\",\n    \"src-cpp/codegen_init.cpp\",\n    \"src-cpp/codegen_decl.cpp\",\n    \"src-cpp/codegen_stmt.cpp\",\n    \"src-cpp/codegen_pattern.cpp\",\n    \"src-cpp/borrow_checker.cpp\",\n]\nlibraries = [\"target/release/libcubical_c.a\"]\n\n# LSP server binary\n[build.targets.hok-lsp]\ntype = \"executable\"\ncompiler = \"c++\"\ncflags = [\"-fexceptions\"]\nsources = [\n    \"src-cpp/lsp_main.cpp\",\n    \"src-cpp/lsp/lsp.cpp\",\n    \"src-cpp/lexer.cpp\",\n    \"src-cpp/parser.cpp\",\n]\ninclude_dirs = [\"src-cpp\"]\n\n[scripts]\ntest = \"otaru build -r --target hoklsp && otaru build -r --target hoklsp\"\nrun = \"otaru build --target hokkaido && ./build/hokkaido\"\nlsp = \"otaru build --target hok-lsp && ./build/hok-lsp\"\nclean = \"rm -rf build\"\n"},{"id":"README.md","name":"README.md","dir":"","ext":".md","size":1786,"binary":false,"truncated":false,"content":"# hokkaido — LLVM-based compiler with cubical compile-time evaluation\n\n## Packages\n\nThis repository provides three tools:\n\n- **hokkaido** — the compiler (C++ with LLVM backend, Rust cubical backend)\n- **hok-lsp** — the language server ([LSP](https://microsoft.github.io/language-server-protocol/)) for IDE support\n- **otaru** — the package manager and project scaffold (Rust)\n\n## Installation\n\n### Nix (flake)\n\n```sh\nnix shell github:hokkaido-lang/hokkaido\n\n# Both otaru + hokkaido (default)\nnix build github:hokkaido-lang/hokkaido\nnix profile install github:hokkaido-lang/hokkaido\n\n# Just the hokkaido compiler\nnix build github:hokkaido-lang/hokkaido#hokkaido\nnix profile install github:hokkaido-lang/hokkaido#hokkaido\n\n# Otaru explicitly (identical to default)\nnix build github:hokkaido-lang/hokkaido#otaru\nnix profile install github:hokkaido-lang/hokkaido#otaru\n```\n\nThe Nix-built `otaru` bundles the `hokkaido` compiler automatically — everything works out of the box.\n\nThe installation includes:\n- `hokkaido` — the compiler\n- `hok-lsp` — the language server\n- `otaru` — the package manager\n\n### From source\n\n**Requirements:** clang, cmake, cargo, LLVM (19+)\n\n```sh\ngit clone https://github.com/hokkaido-lang/hokkaido.git\ncd hokkaido\n\n# Build the compiler\nmkdir build && cd build\ncmake .. && make\n\n# Build the package manager\ncd ../otaru\ncargo build --release\n```\n\nAfter building, add `build/` to your `PATH` or set `HOKKAIDO_HOME`:\n\n```sh\nexport HOKKAIDO_HOME=/path/to/hokkaido/build\n```\n\n## Quick start\n\n```sh\notaru new myapp\ncd myapp\notaru run     # builds and runs src/main.hk\n```\n\n## Docs\n\n- [Language syntax](docs/syntax.md)\n- [Function types and HOFs](docs/syntax-functions.md)\n- [LSP server](src-cpp/lsp/README.md)\n\n## License\n\n[Apache License 2.0](LICENSE)\n"},{"id":"shell.nix","name":"shell.nix","dir":"","ext":".nix","size":267,"binary":false,"truncated":false,"content":"{ pkgs ? import \u003cnixpkgs\u003e {} }:\n\npkgs.mkShell {\n\n  buildInputs = with pkgs; [\n    llvmPackages.llvm\n    llvmPackages.libllvm\n  ];\n\n  shellHook = ''\n    echo \"--- Compiler Development Environment Loaded ---\"\n    echo \"Using CMake and $(llvm-config --version)\"\n  '';\n}\n"},{"id":"src/cubical/env.rs","name":"env.rs","dir":"src/cubical","ext":".rs","size":5183,"binary":false,"truncated":false,"content":"// Cubical Env — Rust port of Env.hs\n//\n// Depends on:\n//   crate::syntax::{Name, Term, Datatype, shift, subst}\n//   crate::typechecker::{Ctx, TypeError, infer, check, infer_dt, check_dt}\n\nuse crate::cubical::syntax::{Datatype, Name, Term, shift, subst};\nuse crate::cubical::typechecker::{Ctx, TypeError, check, check_dt, infer, infer_dt};\n\n// ---------------------------------------------------------------------------\n// Global Named Environment\n// ---------------------------------------------------------------------------\n\n/// A global definition: `(name, type, value)`.\n/// Stored most-recent first.\npub type GlobalEnv = Vec\u003c(Name, Term, Term)\u003e;\n\n/// A full top-level environment: named definitions plus datatype declarations.\n///\n/// `defs` mirrors `GlobalEnv` — a list of `(name, type, value)` triples,\n/// most-recent first, whose de Bruijn indices are assigned by declaration\n/// order (most-recent = index 0 at the point of reference).\n///\n/// `datatypes` is a flat list of all declared datatypes, in declaration order.\n/// Order doesn't affect typechecking (datatype lookup is by name), but\n/// most-recent-first matches the `defs` convention so the parser can push\n/// uniformly.\n#[derive(Debug, Clone, Default)]\npub struct Env {\n    pub defs: GlobalEnv,\n    pub datatypes: Vec\u003cDatatype\u003e,\n}\n\nimpl Env {\n    pub fn new() -\u003e Self {\n        Self::default()\n    }\n\n    /// Add a definition `name : ty = val` to the front of the env.\n    /// The caller is responsible for ensuring `val` and `ty` are already\n    /// closed/resolved with respect to existing globals (i.e. `apply_globals`\n    /// has been called on them if they contain global references).\n    pub fn define(&mut self, name: Name, ty: Term, val: Term) {\n        self.defs.insert(0, (name, ty, val));\n    }\n\n    /// Register a datatype declaration.\n    pub fn declare_datatype(&mut self, dt: Datatype) {\n        self.datatypes.push(dt);\n    }\n\n    /// Look up a datatype by name.\n    #[allow(dead_code)]\n    pub fn find_datatype(&self, name: &str) -\u003e Option\u003c&Datatype\u003e {\n        self.datatypes.iter().find(|dt| dt.name == name)\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Context / substitution helpers (unchanged from GlobalEnv era)\n// ---------------------------------------------------------------------------\n\n/// Build a `Ctx` from the definitions in an `Env` (or a bare `GlobalEnv`).\n/// Variables are ordered innermost-first, matching `GlobalEnv`'s\n/// most-recent-first order (most-recent global = de Bruijn index 0).\npub fn global_ctx(genv: &GlobalEnv) -\u003e Ctx {\n    genv.iter()\n        .map(|(name, ty, _)| (name.clone(), ty.clone()))\n        .collect()\n}\n\n/// Substitute all global definitions into a term directly via de Bruijn\n/// substitution, rather than wrapping in `TApp`/`TAbs` chains.\n///\n/// The parser assigns globals indices starting at `length localEnv`.\n/// At the top level `localEnv` is empty, so globals occupy indices `0..n-1`\n/// with the most-recent global at index 0.\n///\n/// We substitute one global at a time, outermost (highest index) first,\n/// so that earlier substitutions don't disturb the indices of later ones.\n/// After substituting index `k`, we shift the term down by 1 to close the gap.\npub fn apply_globals(genv: &GlobalEnv, t: &Term) -\u003e Term {\n    // Remove globals from the outside in: the oldest definition has the\n    // highest de Bruijn index, so substituting it first cannot disturb the\n    // indices of newer globals that still need to be substituted.\n    let n = genv.len();\n    (0..n).rev().fold(t.clone(), |body, k| {\n        let (_, _, v) = &genv[k];\n        subst_global(k as i32, v, &body)\n    })\n}\n\n/// Substitute the global at de Bruijn index `k` with its value `v`,\n/// then shift the whole term down by 1 to account for the removed binding.\nfn subst_global(k: i32, v: &Term, body: &Term) -\u003e Term {\n    shift(-1, k, &subst(k, &shift(k, 0, v), body))\n}\n\n// ---------------------------------------------------------------------------\n// Typing with GlobalEnv (backward-compatible, no datatypes)\n// ---------------------------------------------------------------------------\n\n/// Infer the type of a term in the context of a `GlobalEnv` (no datatypes).\n#[allow(dead_code)]\npub fn infer_with_env(genv: &GlobalEnv, t: &Term) -\u003e Result\u003cTerm, TypeError\u003e {\n    infer(&global_ctx(genv), t)\n}\n\n/// Check a term against a type in the context of a `GlobalEnv` (no datatypes).\n#[allow(dead_code)]\npub fn check_with_env(genv: &GlobalEnv, t: &Term, ty: &Term) -\u003e Result\u003c(), TypeError\u003e {\n    check(&global_ctx(genv), t, ty)\n}\n\n// ---------------------------------------------------------------------------\n// Typing with full Env (definitions + datatypes)\n// ---------------------------------------------------------------------------\n\n/// Infer the type of a term in a full `Env`.\npub fn infer_with_full_env(env: &Env, t: &Term) -\u003e Result\u003cTerm, TypeError\u003e {\n    infer_dt(&env.datatypes, &global_ctx(&env.defs), t)\n}\n\n/// Check a term against a type in a full `Env`.\npub fn check_with_full_env(env: &Env, t: &Term, ty: &Term) -\u003e Result\u003c(), TypeError\u003e {\n    check_dt(&env.datatypes, &global_ctx(&env.defs), t, ty)\n}"},{"id":"src/cubical/equality.rs","name":"equality.rs","dir":"src/cubical","ext":".rs","size":18750,"binary":false,"truncated":false,"content":"// Cubical Equality — Rust port of Equality.hs\n//\n// Depends on:\n//   crate::interval::I\n//   crate::syntax::{Term, Name, shift, beta}\n//   crate::eval::{is_top_dnf, is_bot_dnf}\n\nuse std::collections::HashMap;\n\nuse crate::cubical::nbe::nbe_eval;\nuse crate::cubical::syntax::{Name, Term, beta, shift};\n\n/// A context maps de Bruijn names to their types.\npub type Ctx = Vec\u003c(Name, Term)\u003e;\n\n// ---------------------------------------------------------------------------\n// Term size (fuel derivation)\n// ---------------------------------------------------------------------------\n\n/// Structural node count of a term. Used to derive the initial fuel for\n/// `eta_eq`; see `initial_fuel` for the termination argument.\npub fn term_size(t: &Term) -\u003e usize {\n    match t {\n        Term::TVar(_)\n        | Term::TUniv(_)\n        | Term::TIntervalTy\n        | Term::TInterval(_)\n        | Term::TCube(_) =\u003e 1,\n\n        Term::TAbs(_, b) | Term::PLam(_, b) | Term::TUa(b) | Term::TFst(b) | Term::TSnd(b) =\u003e {\n            1 + term_size(b)\n        }\n\n        Term::TApp(f, a)\n        | Term::PApp(f, a)\n        | Term::TEquiv(f, a)\n        | Term::TEquivFwd(f, a)\n        | Term::TTransport(f, a)\n        | Term::TPair(f, a) =\u003e 1 + term_size(f) + term_size(a),\n\n        Term::TPi(_, a, b) | Term::TSigma(_, a, b) =\u003e 1 + term_size(a) + term_size(b),\n\n        Term::TPath(a, u, v)\n        | Term::TGlue(a, u, v)\n        | Term::TGlueElem(a, u, v)\n        | Term::TUnglue(a, u, v) =\u003e 1 + term_size(a) + term_size(u) + term_size(v),\n\n        Term::THComp(a, ph, u, u0) =\u003e {\n            1 + term_size(a) + term_size(ph) + term_size(u) + term_size(u0)\n        }\n\n        Term::TMkEquiv(a, b, f, g, e, s) =\u003e {\n            1 + term_size(a)\n                + term_size(b)\n                + term_size(f)\n                + term_size(g)\n                + term_size(e)\n                + term_size(s)\n        }\n\n        // Inductive types / HITs\n        Term::TData(_) =\u003e 1,\n\n        Term::TCon(_, _, args) =\u003e 1 + args.iter().map(term_size).sum::\u003cusize\u003e(),\n\n        Term::TPCon(_, _, args, r) =\u003e 1 + args.iter().map(term_size).sum::\u003cusize\u003e() + term_size(r),\n\n        Term::TElim(motive, cases, scrut) =\u003e {\n            1 + term_size(motive)\n                + cases.iter().map(|c| term_size(&c.body)).sum::\u003cusize\u003e()\n                + term_size(scrut)\n        }\n    }\n}\n\n/// Starting fuel for an eta-equality check.\n/// Floor of 16 ensures small terms get reasonable headroom.\npub fn initial_fuel(t1: &Term, t2: &Term) -\u003e usize {\n    (term_size(t1) + term_size(t2)).max(16)\n}\n\n// ---------------------------------------------------------------------------\n// Eta-equality result\n// ---------------------------------------------------------------------------\n\n/// Three-valued result of an eta-equality check.\n#[derive(Debug, Clone, Copy, PartialEq, Eq)]\npub enum EtaResult {\n    /// The two terms are definitionally equal.\n    Equal,\n    /// The two terms are definitionally distinct.\n    NotEqual,\n    /// Fuel ran out before a verdict was reached (inconclusive).\n    Exhausted,\n}\n\n/// Conjunctive combination: both sides must be `Equal`.\n/// `Exhausted` is infectious; `NotEqual` beats `Equal` but loses to `Exhausted`.\npub fn and_result(a: EtaResult, b: EtaResult) -\u003e EtaResult {\n    use EtaResult::*;\n    match (a, b) {\n        (Equal, r) =\u003e r,\n        (r, Equal) =\u003e r,\n        (Exhausted, _) =\u003e Exhausted,\n        (_, Exhausted) =\u003e Exhausted,\n        (NotEqual, NotEqual) =\u003e NotEqual,\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Context-free definitional equality\n// ---------------------------------------------------------------------------\n\n#[allow(dead_code)]\npub fn definitionally_equal(t1: &Term, t2: &Term) -\u003e bool {\n    let v1 = nbe_eval(t1);\n    let v2 = nbe_eval(t2);\n    v1 == v2 || eta_eq(initial_fuel(&v1, &v2), &Vec::new(), &v1, &v2) == EtaResult::Equal\n}\n\n#[allow(dead_code)]\npub fn definitionally_equal_ctx(ctx: &Ctx, t1: &Term, t2: &Term) -\u003e bool {\n    let v1 = nbe_eval(t1);\n    let v2 = nbe_eval(t2);\n    v1 == v2 || eta_eq(initial_fuel(&v1, &v2), ctx, &v1, &v2) == EtaResult::Equal\n}\n\n/// Like `definitionally_equal_ctx` but surfaces fuel exhaustion as a distinct\n/// `EtaResult` so callers can emit a proper error.\npub fn definitionally_equal_ctx_r(ctx: &Ctx, t1: &Term, t2: &Term) -\u003e EtaResult {\n    let v1 = nbe_eval(t1);\n    let v2 = nbe_eval(t2);\n    if v1 == v2 {\n        EtaResult::Equal\n    } else {\n        eta_eq(initial_fuel(&v1, &v2), ctx, &v1, &v2)\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Path boundary reduction\n// ---------------------------------------------------------------------------\n\n/// If `p : Path A u v` and `r` is `I0` / `I1`, return the endpoint.\npub fn reduce_papp_by_type(ctx: &Ctx, p: &Term, r: &Term) -\u003e Option\u003cTerm\u003e {\n    match infer_ty(ctx, p) {\n        Some(Term::TPath(_, u, v)) =\u003e {\n            let r_ = nbe_eval(r);\n            let d = match &r_ {\n                Term::TCube(d) =\u003e d.clone(),\n                Term::TInterval(i) =\u003e crate::cubical::interval::eval_interval(i),\n                _ =\u003e return None,\n            };\n            if d == crate::cubical::interval::dnf_bot() {\n                Some(nbe_eval(&u))\n            } else if d == crate::cubical::interval::dnf_top() {\n                Some(nbe_eval(&v))\n            } else {\n                None\n            }\n        }\n        _ =\u003e None,\n    }\n}\n\nfn infer_ty(ctx: &Ctx, t: &Term) -\u003e Option\u003cTerm\u003e {\n    match t {\n        Term::TVar(i) =\u003e {\n            let i = *i as usize;\n            if i \u003c ctx.len() {\n                Some(nbe_eval(&shift((i + 1) as i32, 0, &ctx[i].1)))\n            } else {\n                None\n            }\n        }\n        Term::TApp(f, a) =\u003e match infer_ty(ctx, f) {\n            Some(Term::TPi(_, _, b_ty)) =\u003e Some(nbe_eval(&beta(&b_ty, a))),\n            _ =\u003e None,\n        },\n        _ =\u003e None,\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Lightweight neutral type inference\n// ---------------------------------------------------------------------------\n\nfn infer_neutral_ty(ctx: &Ctx, t: &Term) -\u003e Option\u003cTerm\u003e {\n    match t {\n        Term::TVar(i) =\u003e {\n            let i = *i as usize;\n            if i \u003c ctx.len() {\n                Some(nbe_eval(&shift((i + 1) as i32, 0, &ctx[i].1)))\n            } else {\n                None\n            }\n        }\n        Term::TApp(f, a) =\u003e match infer_neutral_ty(ctx, f) {\n            Some(Term::TPi(_, _, b_ty)) =\u003e Some(nbe_eval(&beta(&b_ty, a))),\n            _ =\u003e None,\n        },\n        _ =\u003e None,\n    }\n}\n\n/// Try to infer the Pi domain of `neutral` from the context, to use as the\n/// type of the fresh variable introduced when eta-expanding `neutral` against\n/// a lambda. Returns `None` when the type cannot be determined.\npub fn infer_lam_dom(ctx: &Ctx, neutral: &Term) -\u003e Option\u003cTerm\u003e {\n    match infer_neutral_ty(ctx, neutral) {\n        Some(Term::TPi(_, dom_ty, _)) =\u003e Some(nbe_eval(&dom_ty)),\n        _ =\u003e None,\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Core eta-equality\n// ---------------------------------------------------------------------------\n\n#[derive(Debug, Clone, PartialEq, Eq, Hash)]\nstruct EtaMemoKey {\n    fuel: usize,\n    ctx: Ctx,\n    left: Term,\n    right: Term,\n}\n\ntype EtaMemo = HashMap\u003cEtaMemoKey, EtaResult\u003e;\n\n/// `eta_eq(fuel, ctx, t1, t2)` checks whether `t1` and `t2` are\n/// definitionally equal under `ctx`, consuming `fuel` for eta-expansion steps.\npub fn eta_eq(fuel: usize, ctx: &Ctx, t1: &Term, t2: &Term) -\u003e EtaResult {\n    let mut memo = EtaMemo::new();\n    eta_eq_memo(fuel, ctx, t1, t2, &mut memo)\n}\n\nfn eta_eq_memo(fuel: usize, ctx: &Ctx, t1: &Term, t2: &Term, memo: &mut EtaMemo) -\u003e EtaResult {\n    let key = EtaMemoKey {\n        fuel,\n        ctx: ctx.clone(),\n        left: t1.clone(),\n        right: t2.clone(),\n    };\n\n    if let Some(result) = memo.get(&key) {\n        return *result;\n    }\n\n    let result = eta_eq_uncached(fuel, ctx, t1, t2, memo);\n    memo.insert(key, result);\n    result\n}\n\nfn eta_eq_uncached(fuel: usize, ctx: &Ctx, t1: &Term, t2: &Term, memo: &mut EtaMemo) -\u003e EtaResult {\n    use EtaResult::*;\n\n    if fuel == 0 {\n        return Exhausted;\n    }\n\n    if t1 == t2 {\n        return Equal;\n    }\n\n    // ------------------------------------------------------------------\n    // Path boundary reduction (consumes fuel)\n    // ------------------------------------------------------------------\n    if let Term::PApp(p, r) = t1\n        && let Some(u) = reduce_papp_by_type(ctx, p, r) {\n            return eta_eq_memo(fuel - 1, ctx, &u, t2, memo);\n        }\n    if let Term::PApp(p, r) = t2\n        && let Some(u) = reduce_papp_by_type(ctx, p, r) {\n            return eta_eq_memo(fuel - 1, ctx, t1, &u, memo);\n        }\n\n    // ------------------------------------------------------------------\n    // Lambda eta (consumes fuel)\n    // ------------------------------------------------------------------\n\n    // Both sides are lambdas.\n    if let (Term::TAbs(x, b1), Term::TAbs(_, b2)) = (t1, t2) {\n        let dom = infer_lam_dom(ctx, t1)\n            .or_else(|| infer_lam_dom(ctx, t2))\n            .unwrap_or(Term::TUniv(0));\n        let mut ctx2 = vec![(x.clone(), dom)];\n        ctx2.extend_from_slice(ctx);\n        return eta_eq_memo(fuel - 1, &ctx2, &nbe_eval(b1), &nbe_eval(b2), memo);\n    }\n\n    // Only RHS is a lambda — eta-expand neutral LHS.\n    if let Term::TAbs(x, b2) = t2 {\n        return match infer_lam_dom(ctx, t1) {\n            None =\u003e Exhausted,\n            Some(dom) =\u003e {\n                let mut ctx2 = vec![(x.clone(), dom)];\n                ctx2.extend_from_slice(ctx);\n                eta_eq_memo(\n                    fuel - 1,\n                    &ctx2,\n                    &nbe_eval(&Term::TApp(\n                        Box::new(shift(1, 0, t1)),\n                        Box::new(Term::TVar(0)),\n                    )),\n                    &nbe_eval(b2),\n                    memo,\n                )\n            }\n        };\n    }\n\n    // Only LHS is a lambda — eta-expand neutral RHS.\n    if let Term::TAbs(x, b1) = t1 {\n        return match infer_lam_dom(ctx, t2) {\n            None =\u003e Exhausted,\n            Some(dom) =\u003e {\n                let mut ctx2 = vec![(x.clone(), dom)];\n                ctx2.extend_from_slice(ctx);\n                eta_eq_memo(\n                    fuel - 1,\n                    &ctx2,\n                    &nbe_eval(b1),\n                    &nbe_eval(&Term::TApp(\n                        Box::new(shift(1, 0, t2)),\n                        Box::new(Term::TVar(0)),\n                    )),\n                    memo,\n                )\n            }\n        };\n    }\n\n    // ------------------------------------------------------------------\n    // Path-lambda eta (consumes fuel)\n    // ------------------------------------------------------------------\n\n    // Both sides are path-lambdas.\n    if let (Term::PLam(i, b1), Term::PLam(_, b2)) = (t1, t2) {\n        let mut ctx2 = vec![(i.clone(), Term::TIntervalTy)];\n        ctx2.extend_from_slice(ctx);\n        return eta_eq_memo(fuel - 1, &ctx2, &nbe_eval(b1), &nbe_eval(b2), memo);\n    }\n\n    // Only RHS is a path-lambda.\n    if let Term::PLam(i, b2) = t2 {\n        let mut ctx2 = vec![(i.clone(), Term::TIntervalTy)];\n        ctx2.extend_from_slice(ctx);\n        return eta_eq_memo(\n            fuel - 1,\n            &ctx2,\n            &nbe_eval(&Term::PApp(\n                Box::new(shift(1, 0, t1)),\n                Box::new(Term::TVar(0)),\n            )),\n            &nbe_eval(b2),\n            memo,\n        );\n    }\n\n    // Only LHS is a path-lambda.\n    if let Term::PLam(i, b1) = t1 {\n        let mut ctx2 = vec![(i.clone(), Term::TIntervalTy)];\n        ctx2.extend_from_slice(ctx);\n        return eta_eq_memo(\n            fuel - 1,\n            &ctx2,\n            &nbe_eval(b1),\n            &nbe_eval(&Term::PApp(\n                Box::new(shift(1, 0, t2)),\n                Box::new(Term::TVar(0)),\n            )),\n            memo,\n        );\n    }\n\n    // ------------------------------------------------------------------\n    // Congruence on neutral spines (structural: no fuel consumed)\n    // ------------------------------------------------------------------\n    if let (Term::TApp(f1, a1), Term::TApp(f2, a2)) = (t1, t2) {\n        return and_result(\n            eta_eq_memo(fuel, ctx, f1, f2, memo),\n            eta_eq_memo(fuel, ctx, a1, a2, memo),\n        );\n    }\n    if let (Term::PApp(p1, r1), Term::PApp(p2, r2)) = (t1, t2) {\n        return and_result(\n            eta_eq_memo(fuel, ctx, p1, p2, memo),\n            eta_eq_memo(fuel, ctx, r1, r2, memo),\n        );\n    }\n\n    // ------------------------------------------------------------------\n    // Type congruence (structural: no fuel consumed)\n    // ------------------------------------------------------------------\n    if let (Term::TPi(_, a1, b1), Term::TPi(_, a2, b2)) = (t1, t2) {\n        return and_result(\n            eta_eq_memo(fuel, ctx, a1, a2, memo),\n            eta_eq_memo(fuel, ctx, b1, b2, memo),\n        );\n    }\n    if let (Term::TPath(ty1, u1, v1), Term::TPath(ty2, u2, v2)) = (t1, t2) {\n        return and_result(\n            and_result(\n                eta_eq_memo(fuel, ctx, ty1, ty2, memo),\n                eta_eq_memo(fuel, ctx, u1, u2, memo),\n            ),\n            eta_eq_memo(fuel, ctx, v1, v2, memo),\n        );\n    }\n    if let (Term::TSigma(_, a1, b1), Term::TSigma(_, a2, b2)) = (t1, t2) {\n        return and_result(\n            eta_eq_memo(fuel, ctx, a1, a2, memo),\n            eta_eq_memo(fuel, ctx, b1, b2, memo),\n        );\n    }\n\n    // ------------------------------------------------------------------\n    // Pair congruence (structural)\n    // ------------------------------------------------------------------\n    if let (Term::TPair(a1, b1), Term::TPair(a2, b2)) = (t1, t2) {\n        return and_result(\n            eta_eq_memo(fuel, ctx, a1, a2, memo),\n            eta_eq_memo(fuel, ctx, b1, b2, memo),\n        );\n    }\n\n    // ------------------------------------------------------------------\n    // Sigma eta: one side is a pair, the other is neutral (consumes fuel)\n    // ------------------------------------------------------------------\n    if let Term::TPair(a1, b1) = t1 {\n        return and_result(\n            eta_eq_memo(\n                fuel - 1,\n                ctx,\n                a1,\n                &nbe_eval(&Term::TFst(Box::new(t2.clone()))),\n                memo,\n            ),\n            eta_eq_memo(\n                fuel - 1,\n                ctx,\n                b1,\n                &nbe_eval(&Term::TSnd(Box::new(t2.clone()))),\n                memo,\n            ),\n        );\n    }\n    if let Term::TPair(a2, b2) = t2 {\n        return and_result(\n            eta_eq_memo(\n                fuel - 1,\n                ctx,\n                &nbe_eval(&Term::TFst(Box::new(t1.clone()))),\n                a2,\n                memo,\n            ),\n            eta_eq_memo(\n                fuel - 1,\n                ctx,\n                &nbe_eval(&Term::TSnd(Box::new(t1.clone()))),\n                b2,\n                memo,\n            ),\n        );\n    }\n\n    // ------------------------------------------------------------------\n    // Projection congruence on neutral spines (structural)\n    // ------------------------------------------------------------------\n    if let (Term::TFst(p1), Term::TFst(p2)) = (t1, t2) {\n        return eta_eq_memo(fuel, ctx, p1, p2, memo);\n    }\n    if let (Term::TSnd(p1), Term::TSnd(p2)) = (t1, t2) {\n        return eta_eq_memo(fuel, ctx, p1, p2, memo);\n    }\n\n    // ------------------------------------------------------------------\n    // Inductive types / HITs (structural: no fuel consumed)\n    // ------------------------------------------------------------------\n\n    // TData is an atom — equality is already handled by the `t1 == t2`\n    // check at the top (same name ↔ equal), so reaching here means\n    // different names → NotEqual.  No extra arm needed; the fall-through\n    // at the end handles it.\n\n    // Constructor congruence: same datatype, same constructor, check args.\n    if let (Term::TCon(d1, c1, args1), Term::TCon(d2, c2, args2)) = (t1, t2) {\n        if d1 != d2 || c1 != c2 || args1.len() != args2.len() {\n            return NotEqual;\n        }\n        return args1.iter().zip(args2.iter()).fold(Equal, |acc, (a1, a2)| {\n            and_result(acc, eta_eq_memo(fuel, ctx, a1, a2, memo))\n        });\n    }\n\n    // Path-constructor congruence: same datatype, same path-constructor,\n    // check ordinary args and then the interval argument.\n    if let (Term::TPCon(d1, c1, args1, r1), Term::TPCon(d2, c2, args2, r2)) = (t1, t2) {\n        if d1 != d2 || c1 != c2 || args1.len() != args2.len() {\n            return NotEqual;\n        }\n        let args_eq = args1.iter().zip(args2.iter()).fold(Equal, |acc, (a1, a2)| {\n            and_result(acc, eta_eq_memo(fuel, ctx, a1, a2, memo))\n        });\n        return and_result(args_eq, eta_eq_memo(fuel, ctx, r1, r2, memo));\n    }\n\n    // Eliminator congruence: check motive, each matching case body\n    // (case order and constructor names must agree), and the scrutinee.\n    // This only fires when both sides are stuck TElim neutrals, which\n    // requires the scrutinees to be neutral — so this is genuinely the\n    // structural congruence on eliminators, not a reduction step.\n    if let (Term::TElim(m1, cases1, s1), Term::TElim(m2, cases2, s2)) = (t1, t2) {\n        if cases1.len() != cases2.len() {\n            return NotEqual;\n        }\n        let cases_eq = cases1\n            .iter()\n            .zip(cases2.iter())\n            .fold(Equal, |acc, (c1, c2)| {\n                if c1.con != c2.con || c1.binders.len() != c2.binders.len() {\n                    return NotEqual;\n                }\n                // Build the extended context for this case's binders.\n                // binders is outermost-first; we push them innermost-first\n                // so the last binder ends up at index 0, matching the de Bruijn\n                // convention used everywhere else in this file.\n                let mut case_ctx: Vec\u003c(Name, Term)\u003e = c1\n                    .binders\n                    .iter()\n                    .rev()\n                    .map(|b| (b.clone(), Term::TUniv(0)))\n                    .collect();\n                case_ctx.extend_from_slice(ctx);\n                and_result(acc, eta_eq_memo(fuel, &case_ctx, &c1.body, &c2.body, memo))\n            });\n        return and_result(\n            and_result(cases_eq, eta_eq_memo(fuel, ctx, m1, m2, memo)),\n            eta_eq_memo(fuel, ctx, s1, s2, memo),\n        );\n    }\n\n    NotEqual\n}"},{"id":"src/cubical/ffi.rs","name":"ffi.rs","dir":"src/cubical","ext":".rs","size":11499,"binary":false,"truncated":false,"content":"use std::cell::RefCell;\nuse std::ffi::{CStr, CString};\nuse std::os::raw::c_char;\n\nuse crate::cubical::json::term_to_json;\nuse crate::cubical::syntax::show_term;\nuse crate::cubical::env::{Env, apply_globals, global_ctx};\nuse crate::cubical::nbe::{Globals, Value, Neutral, nbe_eval_with_globals, nbe_eval, eval_nbe};\nuse crate::cubical::parser::ProgramParser;\nuse crate::cubical::typechecker;\nuse crate::cubical::syntax::Term;\n\nthread_local! {\n    static LAST_ERROR: RefCell\u003cOption\u003cString\u003e\u003e = const { RefCell::new(None) };\n}\n\nfn set_last_error(msg: String) {\n    LAST_ERROR.with(|e| *e.borrow_mut() = Some(msg));\n}\n\nfn take_last_error() -\u003e Option\u003cString\u003e {\n    LAST_ERROR.with(|e| e.borrow_mut().take())\n}\n\n#[unsafe(no_mangle)]\npub extern \"C\" fn cubical_get_last_error() -\u003e *mut c_char {\n    match take_last_error() {\n        Some(msg) =\u003e match CString::new(msg) {\n            Ok(cs) =\u003e cs.into_raw(),\n            Err(_) =\u003e std::ptr::null_mut(),\n        },\n        None =\u003e std::ptr::null_mut(),\n    }\n}\n\n#[unsafe(no_mangle)]\npub extern \"C\" fn cubical_eval(source: *const c_char) -\u003e *mut c_char {\n    if source.is_null() {\n        return std::ptr::null_mut();\n    }\n    let c_str = unsafe { CStr::from_ptr(source) };\n    let src = match c_str.to_str() {\n        Ok(s) =\u003e s,\n        Err(_) =\u003e {\n            set_last_error(\"invalid UTF-8 in cubical source\".to_string());\n            return std::ptr::null_mut();\n        }\n    };\n    match eval_cubical_source(src) {\n        Ok(result) =\u003e match CString::new(result) {\n            Ok(cs) =\u003e cs.into_raw(),\n            Err(_) =\u003e {\n                set_last_error(\"cubical result contains null bytes\".to_string());\n                std::ptr::null_mut()\n            }\n        },\n        Err(e) =\u003e {\n            set_last_error(e);\n            std::ptr::null_mut(
