                       .fold(sig.arg_tys[k].clone(), |ty, prev| beta(&ty, prev));\n                    check_dt(dts, ctx, arg, &nbe_eval(&arg_ty))?;\n                    checked_args.push(nbe_eval(arg));\n                }\n                require_equal(ctx, &expected_ty_nf, &Term::TData(d.clone()))\n            } else if dt.find_pcon(c).is_some() {\n                let inferred = infer_dt(dts, ctx, &Term::TCon(d.clone(), c.clone(), args.clone()))?;\n                require_equal(ctx, &expected_ty_nf, &nbe_eval(&inferred))\n            } else {\n                Err(TypeError::UnknownConstructor(expected_d.clone(), c.clone()))\n            }\n        }\n\n        Term::TPCon(d, pc, args, r) =\u003e {\n            // Infer the full path type from the constructor signature, then\n            // unify with the expected type so endpoint annotations are checked.\n            let inferred = infer_dt(dts, ctx, &Term::TPCon(d.clone(), pc.clone(), args.clone(), r.clone()))?;\n            require_equal(ctx, &nbe_eval(ty), &nbe_eval(&inferred))\n        }\n\n        // Fall through to inference.\n        t =\u003e match infer_dt(dts, ctx, t) {\n            Ok(ty_) =\u003e require_equal(ctx, &nbe_eval(ty), &nbe_eval(&ty_)),\n            Err(e) =\u003e {\n                let reduced = nbe_eval(t);\n                if reduced == *t {\n                    Err(e)\n                } else {\n                    check_dt(dts, ctx, &reduced, ty)\n                }\n            }\n        },\n    }\n}\n\n// ---------------------------------------------------------------------------\n// EtaResult convenience\n// ---------------------------------------------------------------------------\n\nimpl EtaResult {\n    fn is_equal(&self) -\u003e bool {\n        *self == EtaResult::Equal\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Top-level helpers\n// ---------------------------------------------------------------------------\n\n#[allow(dead_code)]\npub fn infer_closed(t: &Term) -\u003e Result\u003cTerm, TypeError\u003e {\n    infer(&Vec::new(), t)\n}\n\n#[allow(dead_code)]\npub fn check_closed(t: &Term, ty: &Term) -\u003e Result\u003c(), TypeError\u003e {\n    check(&Vec::new(), t, ty)\n}\n\n#[allow(dead_code)]\npub fn infer_closed_dt(dts: &[Datatype], t: &Term) -\u003e Result\u003cTerm, TypeError\u003e {\n    infer_dt(dts, &Vec::new(), t)\n}\n\npub fn check_closed_dt(dts: &[Datatype], t: &Term, ty: &Term) -\u003e Result\u003c(), TypeError\u003e {\n    check_dt(dts, &Vec::new(), t, ty)\n}\n\n#[allow(dead_code)]\npub fn report_infer(label: &str, t: &Term) {\n    match infer_closed(t) {\n        Ok(ty) =\u003e println!(\"  ✓  {}\\n       : {}\", label, ty),\n        Err(e) =\u003e println!(\"  ✗  {}\\n{}\", label, e),\n    }\n}\n\n#[allow(dead_code)]\npub fn report_check(label: &str, t: &Term, ty: &Term) {\n    match check_closed(t, ty) {\n        Ok(()) =\u003e println!(\"  ✓  {}\\n       ⊢ {}\\n       : {}\", label, t, ty),\n        Err(e) =\u003e println!(\"  ✗  {}\\n{}\", label, e),\n    }\n}"},{"id":"src/lib.rs","name":"lib.rs","dir":"src","ext":".rs","size":16,"binary":false,"truncated":false,"content":"pub mod cubical;"},{"id":"src-cpp/ast.h","name":"ast.h","dir":"src-cpp","ext":".h","size":8887,"binary":false,"truncated":false,"content":"#pragma once\n\n#include \u003ccstdint\u003e\n#include \u003cmap\u003e\n#include \u003cmemory\u003e\n#include \u003cstring\u003e\n#include \u003cvector\u003e\n\n// =========================================================================\n// Hokkaido Language — AST\n// =========================================================================\n\nenum class TypeKind {\n  Void,\n  Int8,\n  Int16,\n  Int32,\n  Int64,\n  Uint8,\n  Uint16,\n  Uint32,\n  Uint64,\n  Float16,\n  Float32,\n  Float64,\n  Bool,\n  String,\n  Char,\n  Cubical,\n  Tuple,\n  Struct,\n  Enum,\n  TypeParam,\n  Slice,\n  Fn,\n  Ref,    // &T  — shared reference\n  MutRef, // &mut T — mutable reference\n};\n\nstruct TypeAnnotation {\n  TypeKind kind;\n  int pointer_depth = 0;\n  int array_size = 0; // 0 means not an array\n  std::string struct_name; // for Struct, Enum, TypeParam kind\n  std::vector\u003cTypeAnnotation\u003e tuple_types; // for Tuple kind / Fn (param types + return type last)\n  std::vector\u003cTypeAnnotation\u003e type_args; // for generic types like Foo\u003cint\u003e\n};\n\nenum class BinOp {\n  Add, Sub, Mul, Div, Mod,\n  Eq, Ne, Less, Greater, Le, Ge,\n  And, Or, Shr, Shl,\n  BitAnd, BitOr, Xor\n};\n\nenum class UnaryOp {\n  Neg, BitNot\n};\n\nenum class AtomicOp {\n  Xchg, Add, Sub, And, Or, Xor, CmpXchg, Fence\n};\n\nstruct Expr {\n  int line = 0;\n  int col = 0;\n  std::string file;\n  virtual ~Expr() = default;\n};\n\nstruct NumberExpr : Expr {\n  double value;\n  NumberExpr(double v) : value(v) {}\n};\n\nstruct StringExpr : Expr {\n  std::string value;\n  StringExpr(const std::string &v) : value(v) {}\n};\n\nstruct CharExpr : Expr {\n  uint8_t value;\n  CharExpr(uint8_t v) : value(v) {}\n};\n\nstruct IdentExpr : Expr {\n  std::string name;\n  IdentExpr(const std::string &n) : name(n) {}\n};\n\nstruct UnaryExpr : Expr {\n  UnaryOp op;\n  std::unique_ptr\u003cExpr\u003e operand;\n  UnaryExpr(UnaryOp o, std::unique_ptr\u003cExpr\u003e e) : op(o), operand(std::move(e)) {}\n};\n\nstruct BinaryExpr : Expr {\n  std::unique_ptr\u003cExpr\u003e left;\n  BinOp op;\n  std::unique_ptr\u003cExpr\u003e right;\n  BinaryExpr(std::unique_ptr\u003cExpr\u003e l, BinOp o, std::unique_ptr\u003cExpr\u003e r)\n    : left(std::move(l)), op(o), right(std::move(r)) {}\n};\n\nstruct CallExpr : Expr {\n  std::string callee; // for named calls (e.g. foo(x))\n  std::unique_ptr\u003cExpr\u003e callee_expr; // for expression calls (e.g. closure(x))\n  std::vector\u003cstd::unique_ptr\u003cExpr\u003e\u003e args;\n  std::vector\u003cTypeAnnotation\u003e type_args;\n};\n\nstruct AsmExpr : Expr {\n  std::string asm_code;\n};\n\nstruct AtomicExpr : Expr {\n  AtomicOp op;\n  std::vector\u003cstd::unique_ptr\u003cExpr\u003e\u003e args;\n};\n\nstruct AssignExpr : Expr {\n  std::unique_ptr\u003cExpr\u003e target;\n  std::unique_ptr\u003cExpr\u003e value;\n  AssignExpr(std::unique_ptr\u003cExpr\u003e t, std::unique_ptr\u003cExpr\u003e v)\n    : target(std::move(t)), value(std::move(v)) {}\n};\n\nstruct CompoundAssignExpr : Expr {\n  std::unique_ptr\u003cExpr\u003e target;\n  BinOp op;\n  std::unique_ptr\u003cExpr\u003e value;\n  CompoundAssignExpr(std::unique_ptr\u003cExpr\u003e t, BinOp o, std::unique_ptr\u003cExpr\u003e v)\n    : target(std::move(t)), op(o), value(std::move(v)) {}\n};\n\nstruct NullExpr : Expr {};\n\nstruct BorrowExpr : Expr {\n  std::unique_ptr\u003cExpr\u003e operand;\n  bool is_mut; // false = &T, true = &mut T\n  BorrowExpr(std::unique_ptr\u003cExpr\u003e o, bool m = false)\n    : operand(std::move(o)), is_mut(m) {}\n};\n\nstruct DerefExpr : Expr {\n  std::unique_ptr\u003cExpr\u003e operand;\n  DerefExpr(std::unique_ptr\u003cExpr\u003e o) : operand(std::move(o)) {}\n};\n\nstruct SubscriptExpr : Expr {\n  std::unique_ptr\u003cExpr\u003e array;\n  std::unique_ptr\u003cExpr\u003e index;\n  SubscriptExpr(std::unique_ptr\u003cExpr\u003e a, std::unique_ptr\u003cExpr\u003e i)\n    : array(std::move(a)), index(std::move(i)) {}\n};\n\nstruct ArrayLitExpr : Expr {\n  std::vector\u003cstd::unique_ptr\u003cExpr\u003e\u003e elements;\n};\n\nstruct TupleExpr : Expr {\n  std::vector\u003cstd::unique_ptr\u003cExpr\u003e\u003e elements;\n};\n\nstruct FieldAccessExpr : Expr {\n  std::unique_ptr\u003cExpr\u003e object;\n  std::string field;\n  FieldAccessExpr(std::unique_ptr\u003cExpr\u003e o, const std::string &f)\n    : object(std::move(o)), field(f) {}\n};\n\n// Pattern matching\n\nstruct Pattern {\n  int line = 0;\n  int col = 0;\n  std::string file;\n  virtual ~Pattern() = default;\n};\n\nstruct WildcardPattern : Pattern {};\n\nstruct LiteralPattern : Pattern {\n  std::unique_ptr\u003cExpr\u003e value;\n  LiteralPattern(std::unique_ptr\u003cExpr\u003e v) : value(std::move(v)) {}\n};\n\nstruct VariablePattern : Pattern {\n  std::string name;\n  VariablePattern(const std::string &n) : name(n) {}\n};\n\nstruct StructPattern : Pattern {\n  std::string struct_name;\n  // Each field: (field_name, sub_pattern)\n  std::vector\u003cstd::pair\u003cstd::string, std::unique_ptr\u003cPattern\u003e\u003e\u003e fields;\n};\n\nstruct VariantPattern : Pattern {\n  std::string enum_name;\n  std::string variant_name;\n  std::vector\u003cstd::pair\u003cstd::string, std::unique_ptr\u003cPattern\u003e\u003e\u003e fields;\n};\n\nstruct MatchArm {\n  std::unique_ptr\u003cPattern\u003e pattern;\n  std::unique_ptr\u003cExpr\u003e expr;\n};\n\nstruct MatchExpr : Expr {\n  std::unique_ptr\u003cExpr\u003e value;\n  std::vector\u003cMatchArm\u003e arms;\n};\n\nstruct IfExpr : Expr {\n  std::unique_ptr\u003cExpr\u003e condition;\n  std::unique_ptr\u003cExpr\u003e then_expr;\n  std::unique_ptr\u003cExpr\u003e else_expr;\n};\n\n\nstruct Decl {\n  int line = 0;\n  int col = 0;\n  std::string file;\n  virtual ~Decl() = default;\n};\n\n// =========================================================================\n// Declarations\n// =========================================================================\n\nstruct PackageDecl : Decl {\n  std::string name;\n};\n\nstruct ImportDecl : Decl {\n  std::string path;\n  std::string alias;\n};\n\nstruct LetDecl : Decl {\n  TypeAnnotation type_ann;\n  std::string name;\n  std::unique_ptr\u003cExpr\u003e init_expr;\n  bool is_pub = false;\n};\n\nstruct StructField {\n  std::string name;\n  TypeAnnotation type_ann;\n};\n\nstruct StructDecl : Decl {\n  std::string name;\n  std::vector\u003cStructField\u003e fields;\n  bool is_pub = false;\n  std::vector\u003cstd::string\u003e type_params; // generic type params like \u003cT, U\u003e\n  std::map\u003cstd::string, std::vector\u003cstd::string\u003e\u003e type_param_bounds; // T -\u003e [Trait1, Trait2]\n};\n\n// Algebraic data types (tagged unions / Rust-style enums)\n\nstruct AdtVariant {\n  std::string name;\n  std::vector\u003cStructField\u003e fields;\n};\n\nstruct AdtDecl : Decl {\n  std::string name;\n  std::vector\u003cAdtVariant\u003e variants;\n  bool is_pub = false;\n};\n\nstruct ConstructorExpr : Expr {\n  std::string enum_name;\n  std::string variant_name;\n  std::vector\u003cstd::pair\u003cstd::string, std::unique_ptr\u003cExpr\u003e\u003e\u003e fields;\n  std::vector\u003cTypeAnnotation\u003e type_args; // generic type args like \u003cint, float\u003e\n};\n\nstruct Param {\n  std::string name;\n  TypeAnnotation type_ann;\n};\n\nstruct Stmt {\n  int line = 0;\n  int col = 0;\n  std::string file;\n  virtual ~Stmt() = default;\n};\n\nstruct ExprStmt : Stmt {\n  std::unique_ptr\u003cExpr\u003e expr;\n  ExprStmt(std::unique_ptr\u003cExpr\u003e e) : expr(std::move(e)) {}\n};\n\nstruct LetStmt : Stmt {\n  TypeAnnotation type_ann;\n  std::string name;\n  std::unique_ptr\u003cExpr\u003e init_expr;\n};\n\nstruct ReturnStmt : Stmt {\n  std::unique_ptr\u003cExpr\u003e value;\n};\n\nstruct BreakStmt : Stmt {\n  std::string label;\n};\n\nstruct ContinueStmt : Stmt {\n  std::string label;\n};\n\nstruct RegionStmt : Stmt {\n  std::string name;\n  std::vector\u003cstd::unique_ptr\u003cStmt\u003e\u003e body;\n};\n\nstruct IfStmt : Stmt {\n  std::unique_ptr\u003cExpr\u003e condition;\n  std::vector\u003cstd::unique_ptr\u003cStmt\u003e\u003e then_branch;\n  std::vector\u003cstd::unique_ptr\u003cStmt\u003e\u003e else_branch;\n};\n\nstruct ForStmt : Stmt {\n  std::string label;\n  std::unique_ptr\u003cStmt\u003e init;\n  std::unique_ptr\u003cExpr\u003e condition;\n  std::unique_ptr\u003cExpr\u003e update;\n  std::vector\u003cstd::unique_ptr\u003cStmt\u003e\u003e body;\n};\n\nstruct FnDecl : Decl {\n  std::string name;\n  std::vector\u003cParam\u003e params;\n  TypeAnnotation return_type;\n  std::vector\u003cstd::unique_ptr\u003cStmt\u003e\u003e body;\n  // `extern fn foo(...) -\u003e T` declarations: no body, declares a foreign\n  // (typically C) symbol to link against rather than generating code for it.\n  bool is_extern = false;\n  // Whether the parameter list ends in `...` (a C-style variadic function,\n  // e.g. printf). Only meaningful when is_extern is true.\n  bool is_variadic = false;\n  // Generic type parameter names, e.g. [\"T\", \"U\"] for `fn foo\u003cT, U\u003e(...)`.\n  std::vector\u003cstd::string\u003e type_params;\n  // Trait bounds on type params: T -\u003e [Trait1, Trait2]\n  std::map\u003cstd::string, std::vector\u003cstd::string\u003e\u003e type_param_bounds;\n  bool is_pub = false;\n};\n\nstruct ClosureExpr : Expr {\n  std::vector\u003cParam\u003e params;\n  TypeAnnotation return_type;\n  std::vector\u003cstd::unique_ptr\u003cStmt\u003e\u003e body;\n};\n\n// Trait method signature (declaration only, no body)\nstruct TraitMethodSig {\n  std::string name;\n  std::vector\u003cParam\u003e params;\n  TypeAnnotation return_type;\n};\n\n// Trait declaration: trait Name { fn method(...) -\u003e T; ... }\nstruct TraitDecl : Decl {\n  std::string name;\n  std::vector\u003cTraitMethodSig\u003e methods;\n  bool is_pub = false;\n};\n\n// Impl block: impl Type { ... } or impl Trait for Type { ... }\nstruct ImplDecl : Decl {\n  std::string trait_name; // empty for inherent impl\n  std::string type_name;\n  std::vector\u003cstd::unique_ptr\u003cFnDecl\u003e\u003e methods;\n  bool is_pub = false;\n};\n\n// Method call expression: obj.method(args)\nstruct MethodCallExpr : Expr {\n  std::unique_ptr\u003cExpr\u003e object;\n  std::string method_name;\n  std::vector\u003cstd::unique_ptr\u003cExpr\u003e\u003e args;\n};"},{"id":"src-cpp/borrow_checker.cpp","name":"borrow_checker.cpp","dir":"src-cpp","ext":".cpp","size":10802,"binary":false,"truncated":false,"content":"#include \"borrow_checker.h\"\n#include \"error.h\"\n\n#include \u003calgorithm\u003e\n#include \u003ciostream\u003e\n#include \u003csstream\u003e\n\n// -------------------------------------------------------------------------\n// Helpers\n// -------------------------------------------------------------------------\n\nvoid BorrowChecker::set_error(const std::string &msg, Expr *expr) {\n  if (has_error_) return;\n  has_error_ = true;\n  if (expr && expr-\u003eline \u003e 0)\n    error_msg_ = error_at(expr-\u003efile, expr-\u003eline, expr-\u003ecol, msg);\n  else\n    error_msg_ = \"error: \" + msg;\n}\n\n// -------------------------------------------------------------------------\n// Scope management\n// -------------------------------------------------------------------------\n\nvoid BorrowChecker::enter_scope() {\n  current_depth++;\n}\n\nvoid BorrowChecker::exit_scope() {\n  // Release all borrows that were created at exactly this depth.\n  // We iterate the map and erase entries whose borrows are all at \u003e= depth.\n  for (auto it = active_borrows.begin(); it != active_borrows.end(); ) {\n    auto &vec = it-\u003esecond;\n    vec.erase(\n      std::remove_if(vec.begin(), vec.end(),\n                     [this](const BorrowEntry &e) {\n                       return e.scope_depth == current_depth;\n                     }),\n      vec.end());\n    if (vec.empty())\n      it = active_borrows.erase(it);\n    else\n      ++it;\n  }\n  current_depth--;\n}\n\n// -------------------------------------------------------------------------\n// Variable resolution\n// -------------------------------------------------------------------------\n\nstd::string BorrowChecker::root_variable(Expr *expr) {\n  if (auto *id = dynamic_cast\u003cIdentExpr *\u003e(expr))\n    return id-\u003ename;\n  if (auto *field = dynamic_cast\u003cFieldAccessExpr *\u003e(expr))\n    return root_variable(field-\u003eobject.get());\n  if (auto *deref = dynamic_cast\u003cDerefExpr *\u003e(expr))\n    return root_variable(deref-\u003eoperand.get());\n  if (auto *sub = dynamic_cast\u003cSubscriptExpr *\u003e(expr))\n    return root_variable(sub-\u003earray.get());\n  if (auto *unary = dynamic_cast\u003cUnaryExpr *\u003e(expr))\n    return root_variable(unary-\u003eoperand.get());\n  return \"\";\n}\n\n// -------------------------------------------------------------------------\n// Borrow registration and checks\n// -------------------------------------------------------------------------\n\nvoid BorrowChecker::check_shared_borrow(const std::string &var, Expr *expr) {\n  auto it = active_borrows.find(var);\n  if (it != active_borrows.end()) {\n    for (auto &e : it-\u003esecond) {\n      if (e.is_mut) {\n        set_error(\"cannot borrow '\" + var + \"' as shared because it is already borrowed as mutable\", expr);\n        return;\n      }\n    }\n  }\n  register_shared_borrow(var);\n}\n\nvoid BorrowChecker::check_mut_borrow(const std::string &var, Expr *expr) {\n  auto it = active_borrows.find(var);\n  if (it != active_borrows.end() && !it-\u003esecond.empty()) {\n    for (auto &e : it-\u003esecond) {\n      if (e.is_mut) {\n        set_error(\"cannot borrow '\" + var + \"' as mutable because it is already borrowed as mutable\", expr);\n        return;\n      }\n    }\n    set_error(\"cannot borrow '\" + var + \"' as mutable because it is also borrowed as shared\", expr);\n    return;\n  }\n  register_mut_borrow(var);\n}\n\nvoid BorrowChecker::register_shared_borrow(const std::string &var) {\n  active_borrows[var].push_back({current_depth, false});\n}\n\nvoid BorrowChecker::register_mut_borrow(const std::string &var) {\n  active_borrows[var].push_back({current_depth, true});\n}\n\nvoid BorrowChecker::check_var_read(const std::string &var, Expr *expr) {\n  auto it = active_borrows.find(var);\n  if (it != active_borrows.end()) {\n    for (auto &e : it-\u003esecond) {\n      if (e.is_mut) {\n        set_error(\"cannot use '\" + var + \"' because it is mutably borrowed\", expr);\n        return;\n      }\n    }\n  }\n}\n\nvoid BorrowChecker::check_var_write(const std::string &var, Expr *expr) {\n  auto it = active_borrows.find(var);\n  if (it != active_borrows.end() && !it-\u003esecond.empty()) {\n    if (it-\u003esecond.size() == 1 && !it-\u003esecond[0].is_mut) {\n      set_error(\"cannot assign to '\" + var + \"' because it is borrowed\", expr);\n    } else {\n      set_error(\"cannot assign to '\" + var + \"' because it is borrowed\", expr);\n    }\n  }\n}\n\n// -------------------------------------------------------------------------\n// Expression walker\n// -------------------------------------------------------------------------\n\nvoid BorrowChecker::walk_expr(Expr *expr, bool is_lvalue) {\n  if (!expr) return;\n\n  if (auto *num = dynamic_cast\u003cNumberExpr *\u003e(expr)) {\n    (void)num;\n    return;\n  }\n  if (auto *str = dynamic_cast\u003cStringExpr *\u003e(expr)) {\n    (void)str;\n    return;\n  }\n  if (auto *ch = dynamic_cast\u003cCharExpr *\u003e(expr)) {\n    (void)ch;\n    return;\n  }\n  if (auto *null = dynamic_cast\u003cNullExpr *\u003e(expr)) {\n    (void)null;\n    return;\n  }\n  if (auto *ident = dynamic_cast\u003cIdentExpr *\u003e(expr)) {\n    if (is_lvalue)\n      check_var_write(ident-\u003ename, expr);\n    else\n      check_var_read(ident-\u003ename, expr);\n    return;\n  }\n  if (auto *unary = dynamic_cast\u003cUnaryExpr *\u003e(expr)) {\n    walk_expr(unary-\u003eoperand.get(), false);\n    return;\n  }\n  if (auto *bin = dynamic_cast\u003cBinaryExpr *\u003e(expr)) {\n    walk_expr(bin-\u003eleft.get(), false);\n    walk_expr(bin-\u003eright.get(), false);\n    return;\n  }\n  if (auto *call = dynamic_cast\u003cCallExpr *\u003e(expr)) {\n    // Evaluate callee and arguments\n    walk_expr(call-\u003ecallee_expr.get(), false);\n    for (auto &arg : call-\u003eargs)\n      walk_expr(arg.get(), false);\n    return;\n  }\n  if (auto *asm_expr = dynamic_cast\u003cAsmExpr *\u003e(expr)) {\n    (void)asm_expr;\n    return;\n  }\n  if (auto *atomic = dynamic_cast\u003cAtomicExpr *\u003e(expr)) {\n    for (auto &arg : atomic-\u003eargs)\n      walk_expr(arg.get(), false);\n    return;\n  }\n  if (auto *assign = dynamic_cast\u003cAssignExpr *\u003e(expr)) {\n    walk_expr(assign-\u003evalue.get(), false);\n    walk_expr(assign-\u003etarget.get(), true);\n    return;\n  }\n  if (auto *compound = dynamic_cast\u003cCompoundAssignExpr *\u003e(expr)) {\n    walk_expr(compound-\u003evalue.get(), false);\n    walk_expr(compound-\u003etarget.get(), true);\n    return;\n  }\n  if (auto *borrow = dynamic_cast\u003cBorrowExpr *\u003e(expr)) {\n    // Evaluate operand\n    walk_expr(borrow-\u003eoperand.get(), false);\n    // Then record the borrow on the root variable\n    std::string var = root_variable(borrow-\u003eoperand.get());\n    if (!var.empty()) {\n      if (borrow-\u003eis_mut)\n        check_mut_borrow(var, expr);\n      else\n        check_shared_borrow(var, expr);\n    }\n    return;\n  }\n  if (auto *deref = dynamic_cast\u003cDerefExpr *\u003e(expr)) {\n    walk_expr(deref-\u003eoperand.get(), false);\n    return;\n  }\n  if (auto *sub = dynamic_cast\u003cSubscriptExpr *\u003e(expr)) {\n    walk_expr(sub-\u003earray.get(), false);\n    walk_expr(sub-\u003eindex.get(), false);\n    return;\n  }\n  if (auto *arr = dynamic_cast\u003cArrayLitExpr *\u003e(expr)) {\n    for (auto &el : arr-\u003eelements)\n      walk_expr(el.get(), false);\n    return;\n  }\n  if (auto *tup = dynamic_cast\u003cTupleExpr *\u003e(expr)) {\n    for (auto &el : tup-\u003eelements)\n      walk_expr(el.get(), false);\n    return;\n  }\n  if (auto *field = dynamic_cast\u003cFieldAccessExpr *\u003e(expr)) {\n    walk_expr(field-\u003eobject.get(), is_lvalue);\n    return;\n  }\n  if (auto *mcall = dynamic_cast\u003cMethodCallExpr *\u003e(expr)) {\n    walk_expr(mcall-\u003eobject.get(), false);\n    for (auto &arg : mcall-\u003eargs)\n      walk_expr(arg.get(), false);\n    return;\n  }\n  if (auto *ctor = dynamic_cast\u003cConstructorExpr *\u003e(expr)) {\n    for (auto &[_, fexpr] : ctor-\u003efields)\n      walk_expr(fexpr.get(), false);\n    return;\n  }\n  if (auto *ifexpr = dynamic_cast\u003cIfExpr *\u003e(expr)) {\n    walk_expr(ifexpr-\u003econdition.get(), false);\n    // For if-expressions, conservatively check both branches\n    enter_scope();\n    walk_expr(ifexpr-\u003ethen_expr.get(), false);\n    exit_scope();\n    enter_scope();\n    walk_expr(ifexpr-\u003eelse_expr.get(), false);\n    exit_scope();\n    return;\n  }\n  if (auto *closure = dynamic_cast\u003cClosureExpr *\u003e(expr)) {\n    // Closures capture by value for now — no borrow tracking through closures\n    // Just check the body with fresh borrow state\n    std::map\u003cstd::string, std::vector\u003cBorrowEntry\u003e\u003e saved_borrows;\n    saved_borrows.swap(active_borrows);\n    walk_body(closure-\u003ebody);\n    active_borrows = std::move(saved_borrows);\n    return;\n  }\n}\n\n// -------------------------------------------------------------------------\n// Statement walker\n// -------------------------------------------------------------------------\n\nvoid BorrowChecker::walk_stmt(Stmt *stmt) {\n  if (!stmt) return;\n\n  if (auto *expr_s = dynamic_cast\u003cExprStmt *\u003e(stmt)) {\n    walk_expr(expr_s-\u003eexpr.get(), false);\n    return;\n  }\n  if (auto *let = dynamic_cast\u003cLetStmt *\u003e(stmt)) {\n    // let x = expr; — the init expression may borrow, but x itself is fresh\n    if (let-\u003einit_expr)\n      walk_expr(let-\u003einit_expr.get(), false);\n    return;\n  }\n  if (auto *ret = dynamic_cast\u003cReturnStmt *\u003e(stmt)) {\n    if (ret-\u003evalue)\n      walk_expr(ret-\u003evalue.get(), false);\n    return;\n  }\n  if (auto *brk = dynamic_cast\u003cBreakStmt *\u003e(stmt)) {\n    (void)brk;\n    return;\n  }\n  if (auto *cont = dynamic_cast\u003cContinueStmt *\u003e(stmt)) {\n    (void)cont;\n    return;\n  }\n  if (auto *region = dynamic_cast\u003cRegionStmt *\u003e(stmt)) {\n    enter_scope();\n    walk_body(region-\u003ebody);\n    exit_scope();\n    return;\n  }\n  if (auto *ifs = dynamic_cast\u003cIfStmt *\u003e(stmt)) {\n    walk_expr(ifs-\u003econdition.get(), false);\n    enter_scope();\n    walk_body(ifs-\u003ethen_branch);\n    exit_scope();\n    enter_scope();\n    walk_body(ifs-\u003eelse_branch);\n    exit_scope();\n    return;\n  }\n  if (auto *for_s = dynamic_cast\u003cForStmt *\u003e(stmt)) {\n    if (for_s-\u003einit)\n      walk_stmt(for_s-\u003einit.get());\n    if (for_s-\u003econdition)\n      walk_expr(for_s-\u003econdition.get(), false);\n    if (for_s-\u003eupdate)\n      walk_expr(for_s-\u003eupdate.get(), false);\n    // Loop body — this is conservative: borrows inside the loop persist\n    enter_scope();\n    walk_body(for_s-\u003ebody);\n    exit_scope();\n    return;\n  }\n}\n\nvoid BorrowChecker::walk_body(const std::vector\u003cstd::unique_ptr\u003cStmt\u003e\u003e &body) {\n  for (auto &stmt : body) {\n    walk_stmt(stmt.get());\n    if (has_error_) return;\n  }\n}\n\n// -------------------------------------------------------------------------\n// Public API\n// -------------------------------------------------------------------------\n\nbool BorrowChecker::check_fn(const std::string &fn_name, FnDecl *decl) {\n  has_error_ = false;\n  error_msg_.clear();\n  active_borrows.clear();\n  current_depth = 0;\n\n  // Function parameters enter scope at depth 0\n  for (auto &p : decl-\u003eparams) {\n    // params are bindings — they start out uncontested\n  }\n\n  walk_body(decl-\u003ebody);\n\n  if (has_error_) {\n    std::cerr \u003c\u003c error_msg_ \u003c\u003c \"\\n\";\n    return false;\n  }\n  return true;\n}\n\nbool BorrowChecker::check_expr(Expr *expr, bool is_lvalue) {\n  has_error_ = false;\n  error_msg_.clear();\n  active_borrows.clear();\n  current_depth = 0;\n  walk_expr(expr, is_lvalue);\n  return !has_error_;\n}\n"},{"id":"src-cpp/borrow_checker.h","name":"borrow_checker.h","dir":"src-cpp","ext":".h","size":2213,"binary":false,"truncated":false,"content":"#pragma once\n\n#include \u003cmap\u003e\n#include \u003cstring\u003e\n#include \u003cvector\u003e\n\n#include \"ast.h\"\n\n// =========================================================================\n// Hokkaido Language — Borrow Checker\n// =========================================================================\n//\n// A lexical borrow checker that enforces:\n//   - At any point, a value may have either one mutable borrow (&mut T)\n//     or any number of shared borrows (&T), but not both.\n//   - While a value is borrowed, the original cannot be mutated (if\n//     immutably borrowed) or used at all (if mutably borrowed).\n//   - References cannot outlive the scope of the borrow expression.\n\nclass BorrowChecker {\n  struct BorrowEntry {\n    int scope_depth;\n    bool is_mut;\n  };\n\n  // Per-variable list of active borrows\n  std::map\u003cstd::string, std::vector\u003cBorrowEntry\u003e\u003e active_borrows;\n  int current_depth = 0;\n  bool has_error_ = false;\n  std::string error_msg_;\n\n  void set_error(const std::string &msg, Expr *expr = nullptr);\n  std::string expr_location(Expr *expr);\n\n  // Scope management\n  void enter_scope();\n  void exit_scope();\n\n  // Resolve the root variable name from a chain of field accesses, etc.\n  // Returns empty string if we can't statically determine it.\n  std::string root_variable(Expr *expr);\n\n  // Core borrow checks\n  void check_shared_borrow(const std::string &var, Expr *expr);\n  void check_mut_borrow(const std::string &var, Expr *expr);\n  void register_shared_borrow(const std::string &var);\n  void register_mut_borrow(const std::string &var);\n  void release_borrows_at_depth(int depth);\n\n  // Check access to a variable (read or write)\n  void check_var_read(const std::string &var, Expr *expr);\n  void check_var_write(const std::string &var, Expr *expr);\n\n  // AST walkers\n  void walk_expr(Expr *expr, bool is_lvalue = false);\n  void walk_stmt(Stmt *stmt);\n  void walk_body(const std::vector\u003cstd::unique_ptr\u003cStmt\u003e\u003e &body);\n  void walk_pattern(Pattern *pat);\n\npublic:\n  BorrowChecker() = default;\n\n  bool check_fn(const std::string &fn_name, FnDecl *decl);\n  bool check_expr(Expr *expr, bool is_lvalue = false);\n\n  bool ok() const { return !has_error_; }\n  const std::string &error() const { return error_msg_; }\n};\n"},{"id":"src-cpp/codegen_decl.cpp","name":"codegen_decl.cpp","dir":"src-cpp","ext":".cpp","size":16436,"binary":false,"truncated":false,"content":"#include \"codegen.h\"\n\n#include \u003ciostream\u003e\n\n#include \"llvm/IR/Constants.h\"\n#include \"llvm/IR/DerivedTypes.h\"\n#include \"llvm/Support/raw_ostream.h\"\n\nusing namespace llvm;\n\n// -------------------------------------------------------------------------\n// Alloca + store helper\n// -------------------------------------------------------------------------\n\nbool CodeGen::alloc_and_store(const std::string &name, TypeKind kind,\n                               Value *init, Type *llvm_type,\n                               TypeAnnotation ann) {\n  AllocaInst *alloca = Builder.CreateAlloca(llvm_type, nullptr, name);\n  Builder.CreateStore(init, alloca);\n  named_values[name] = alloca;\n  named_types[name] = kind;\n  if (kind == TypeKind::Fn || kind == TypeKind::Struct || kind == TypeKind::Enum || kind == TypeKind::Tuple || kind == TypeKind::Slice || kind == TypeKind::Ref || kind == TypeKind::MutRef || ann.pointer_depth \u003e 0)\n    named_type_anns[name] = ann;\n  return true;\n}\n\nbool CodeGen::alloc_and_store_array(const std::string &name, TypeKind kind,\n                                     int array_size, ArrayType *array_type,\n                                     Value *init,\n                                     TypeAnnotation ann) {\n  AllocaInst *alloca = Builder.CreateAlloca(array_type, nullptr, name);\n  Builder.CreateStore(init, alloca);\n  named_values[name] = alloca;\n  named_types[name] = kind;\n  if (kind == TypeKind::Fn || kind == TypeKind::Struct || kind == TypeKind::Enum || kind == TypeKind::Tuple || ann.array_size \u003e 0)\n    named_type_anns[name] = ann;\n  return true;\n}\n\n// -------------------------------------------------------------------------\n// Let declarations (top-level)\n// -------------------------------------------------------------------------\n\nbool CodeGen::gen_global_let_decl(LetDecl *decl) {\n  Type *llvm_type = get_llvm_type(decl-\u003etype_ann);\n  if (!llvm_type) return false;\n\n  if (decl-\u003etype_ann.kind == TypeKind::Cubical) {\n    std::string debug;\n    Value *init = eval_cubical_init(decl-\u003einit_expr.get(), &debug);\n    if (!init) return false;\n    std::cout \u003c\u003c \"  \" \u003c\u003c decl-\u003ename \u003c\u003c \" = \" \u003c\u003c debug \u003c\u003c \"\\n\";\n\n    auto *gv = new GlobalVariable(M, init-\u003egetType(), true,\n                                   GlobalVariable::InternalLinkage,\n                                   cast\u003cConstant\u003e(init), decl-\u003ename);\n    gv-\u003esetUnnamedAddr(GlobalValue::UnnamedAddr::Global);\n    global_values[decl-\u003ename] = gv;\n    named_types[decl-\u003ename] = TypeKind::Int64;\n    return true;\n  }\n\n  Value *init = eval_expr(decl-\u003einit_expr.get(), llvm_type);\n  if (!init) return false;\n\n  auto *gv = new GlobalVariable(M, llvm_type, true,\n                                 GlobalVariable::InternalLinkage,\n                                 cast\u003cConstant\u003e(init), decl-\u003ename);\n  gv-\u003esetUnnamedAddr(GlobalValue::UnnamedAddr::Global);\n  global_values[decl-\u003ename] = gv;\n  named_types[decl-\u003ename] = decl-\u003etype_ann.kind;\n    if (decl-\u003etype_ann.kind == TypeKind::Fn ||\n      decl-\u003etype_ann.kind == TypeKind::Struct ||\n      decl-\u003etype_ann.kind == TypeKind::Enum ||\n      decl-\u003etype_ann.kind == TypeKind::Tuple ||\n      decl-\u003etype_ann.kind == TypeKind::Ref ||\n      decl-\u003etype_ann.kind == TypeKind::MutRef ||\n      decl-\u003etype_ann.pointer_depth \u003e 0)\n    named_type_anns[decl-\u003ename] = decl-\u003etype_ann;\n  return true;\n}\n\n// -------------------------------------------------------------------------\n// Let declarations (local)\n// -------------------------------------------------------------------------\n\nbool CodeGen::gen_let_decl(LetDecl *decl) {\n  Type *llvm_type = get_llvm_type(decl-\u003etype_ann);\n  if (!llvm_type) return false;\n\n  if (decl-\u003etype_ann.array_size \u003e 0) {\n    ArrayType *arr_type = cast\u003cArrayType\u003e(llvm_type);\n    Value *init = eval_array_init(decl-\u003einit_expr.get(), arr_type);\n    if (!init) return false;\n    return alloc_and_store_array(decl-\u003ename, decl-\u003etype_ann.kind,\n                                  decl-\u003etype_ann.array_size, arr_type, init,\n                                  decl-\u003etype_ann);\n  }\n\n  if (decl-\u003etype_ann.kind == TypeKind::Struct) {\n    Value *init = nullptr;\n    if (decl-\u003einit_expr) {\n      bool skip = false;\n      if (auto *id = dynamic_cast\u003cIdentExpr *\u003e(decl-\u003einit_expr.get()))\n        skip = named_values.find(id-\u003ename) == named_values.end();\n      if (!skip)\n        init = eval_expr(decl-\u003einit_expr.get(), llvm_type);\n    }\n    if (!init)\n      init = ConstantAggregateZero::get(llvm_type);\n    return alloc_and_store(decl-\u003ename, decl-\u003etype_ann.kind, init, llvm_type,\n                            decl-\u003etype_ann);\n  }\n\n  if (decl-\u003etype_ann.kind == TypeKind::Tuple) {\n    Value *init = nullptr;\n    if (decl-\u003einit_expr)\n      init = eval_expr(decl-\u003einit_expr.get(), llvm_type);\n    if (!init)\n      init = ConstantAggregateZero::get(llvm_type);\n    return alloc_and_store(decl-\u003ename, decl-\u003etype_ann.kind, init, llvm_type,\n                            decl-\u003etype_ann);\n  }\n\n  Value *init = nullptr;\n  std::string debug;\n\n  if (decl-\u003etype_ann.pointer_depth \u003e 0) {\n    init = eval_expr(decl-\u003einit_expr.get(), llvm_type);\n    if (!init) return false;\n    if (!alloc_and_store(decl-\u003ename, decl-\u003etype_ann.kind, init, llvm_type,\n                          decl-\u003etype_ann))\n      return false;\n    track_region_alloc_init(decl-\u003ename, decl-\u003einit_expr.get());\n    return true;\n  }\n\n  switch (decl-\u003etype_ann.kind) {\n    case TypeKind::Void:\n      errs() \u003c\u003c \"Error: variable cannot have void type\\n\";\n      return false;\n    case TypeKind::Int8:\n      init = eval_expr(decl-\u003einit_expr.get(), Type::getInt8Ty(Context));\n      break;\n    case TypeKind::Int16:\n      init = eval_expr(decl-\u003einit_expr.get(), Type::getInt16Ty(Context));\n      break;\n    case TypeKind::Int32:\n      init = eval_expr(decl-\u003einit_expr.get(), Type::getInt32Ty(Context));\n      break;\n    case TypeKind::Int64:\n      init = eval_int_init(decl-\u003einit_expr.get());\n      break;\n    case TypeKind::Uint8:\n      init = eval_expr(decl-\u003einit_expr.get(), Type::getInt8Ty(Context));\n      break;\n    case TypeKind::Uint16:\n      init = eval_expr(decl-\u003einit_expr.get(), Type::getInt16Ty(Context));\n      break;\n    case TypeKind::Uint32:\n      init = eval_expr(decl-\u003einit_expr.get(), Type::getInt32Ty(Context));\n      break;\n    case TypeKind::Uint64:\n      init = eval_int_init(decl-\u003einit_expr.get());\n      break;\n    case TypeKind::Float16:\n      init = eval_expr(decl-\u003einit_expr.get(), Type::getHalfTy(Context));\n      break;\n    case TypeKind::Float32:\n      init = eval_expr(decl-\u003einit_expr.get(), Type::getFloatTy(Context));\n      break;\n    case TypeKind::Float64:\n      init = eval_float_init(decl-\u003einit_expr.get());\n      break;\n    case TypeKind::Bool:\n      init = eval_expr(decl-\u003einit_expr.get(), Type::getInt1Ty(Context));\n      break;\n    case TypeKind::Char:\n      init = eval_expr(decl-\u003einit_expr.get(), Type::getInt8Ty(Context));\n      break;\n    case TypeKind::String:\n      init = eval_string_init(decl-\u003einit_expr.get());\n      break;\n    case TypeKind::Cubical:\n      init = eval_cubical_init(decl-\u003einit_expr.get(), &debug);\n      if (init) std::cout \u003c\u003c \"  \" \u003c\u003c decl-\u003ename \u003c\u003c \" = \" \u003c\u003c debug \u003c\u003c \"\\n\";\n      break;\n    case TypeKind::Tuple:\n      init = eval_expr(decl-\u003einit_expr.get(), llvm_type);\n      break;\n    case TypeKind::Slice:\n      init = eval_expr(decl-\u003einit_expr.get(), llvm_type);\n      if (!init) return false;\n      break;\n    case TypeKind::Fn:\n      init = eval_expr(decl-\u003einit_expr.get(), llvm_type);\n      if (!init) return false;\n      break;\n    case TypeKind::Ref:\n    case TypeKind::MutRef:\n      init = eval_expr(decl-\u003einit_expr.get(), llvm_type);\n      if (!init) return false;\n      break;\n    default:\n      break;\n  }\n  if (!init) return false;\n  return alloc_and_store(decl-\u003ename, decl-\u003etype_ann.kind, init, llvm_type,\n                          decl-\u003etype_ann);\n}\n\n// -------------------------------------------------------------------------\n// Let statements\n// -------------------------------------------------------------------------\n\nbool CodeGen::gen_let_stmt(LetStmt *stmt) {\n  Type *llvm_type = get_llvm_type(stmt-\u003etype_ann);\n  if (!llvm_type) return false;\n\n  if (stmt-\u003etype_ann.array_size \u003e 0) {\n    ArrayType *arr_type = cast\u003cArrayType\u003e(llvm_type);\n    Value *init = eval_array_init(stmt-\u003einit_expr.get(), arr_type);\n    if (!init) return false;\n    return alloc_and_store_array(stmt-\u003ename, stmt-\u003etype_ann.kind,\n                                  stmt-\u003etype_ann.array_size, arr_type, init,\n                                  stmt-\u003etype_ann);\n  }\n\n  if (stmt-\u003etype_ann.kind == TypeKind::Struct) {\n    Value *init = nullptr;\n    if (stmt-\u003einit_expr) {\n      bool skip = false;\n      if (auto *id = dynamic_cast\u003cIdentExpr *\u003e(stmt-\u003einit_expr.get()))\n        skip = named_values.find(id-\u003ename) == named_values.end();\n      if (!skip)\n        init = eval_expr(stmt-\u003einit_expr.get(), llvm_type);\n    }\n    if (!init)\n      init = ConstantAggregateZero::get(llvm_type);\n    return alloc_and_store(stmt-\u003ename, stmt-\u003etype_ann.kind, init, llvm_type,\n                            stmt-\u003etype_ann);\n  }\n\n  if (stmt-\u003etype_ann.kind == TypeKind::Tuple) {\n    Value *init = nullptr;\n    if (stmt-\u003einit_expr)\n      init = eval_expr(stmt-\u003einit_expr.get(), llvm_type);\n    if (!init)\n      init = ConstantAggregateZero::get(llvm_type);\n    return alloc_and_store(stmt-\u003ename, stmt-\u003etype_ann.kind, init, llvm_type,\n                            stmt-\u003etype_ann);\n  }\n\n  Value *init = nullptr;\n\n  if (stmt-\u003etype_ann.pointer_depth \u003e 0) {\n    init = eval_expr(stmt-\u003einit_expr.get(), llvm_type);\n    if (!init) return false;\n    if (!alloc_and_store(stmt-\u003ename, stmt-\u003etype_ann.kind, init, llvm_type,\n                          stmt-\u003etype_ann))\n      return false;\n    track_region_alloc_init(stmt-\u003ename, stmt-\u003einit_expr.get());\n    return true;\n  }\n\n  switch (stmt-\u003etype_ann.kind) {\n    case TypeKind::Void:\n      errs() \u003c\u003c \"Error: variable cannot have void type\\n\";\n      return false;\n    case TypeKind::Int8:\n      init = eval_expr(stmt-\u003einit_expr.get(), Type::getInt8Ty(Context));\n      break;\n    case TypeKind::Int16:\n      init = eval_expr(stmt-\u003einit_expr.get(), Type::getInt16Ty(Context));\n      break;\n    case TypeKind::Int32:\n      init = eval_expr(stmt-\u003einit_expr.get(), Type::getInt32Ty(Context));\n      break;\n    case TypeKind::Int64:\n      init = eval_int_init(stmt-\u003einit_expr.get());\n      break;\n    case TypeKind::Uint8:\n      init = eval_expr(stmt-\u003einit_expr.get(), Type::getInt8Ty(Context));\n      break;\n    case TypeKind::Uint16:\n      init = eval_expr(stmt-\u003einit_expr.get(), Type::getInt16Ty(Context));\n      break;\n    case TypeKind::Uint32:\n      init = eval_expr(stmt-\u003einit_expr.get(), Type::getInt32Ty(Context));\n      break;\n    case TypeKind::Uint64:\n      init = eval_int_init(stmt-\u003einit_expr.get());\n      break;\n    case TypeKind::Float16:\n      init = eval_expr(stmt-\u003einit_expr.get(), Type::getHalfTy(Context));\n      break;\n    case TypeKind::Float32:\n      init = eval_expr(stmt-\u003einit_expr.get(), Type::getFloatTy(Context));\n      break;\n    case TypeKind::Float64:\n      init = eval_float_init(stmt-\u003einit_expr.get());\n      break;\n    case TypeKind::Bool:\n      init = eval_expr(stmt-\u003einit_expr.get(), Type::getInt1Ty(Context));\n      break;\n    case TypeKind::Char:\n      init = eval_expr(stmt-\u003einit_expr.get(), Type::getInt8Ty(Context));\n      break;\n    case TypeKind::String:\n      init = eval_string_init(stmt-\u003einit_expr.get());\n      break;\n    case TypeKind::Cubical:\n      init = eval_cubical_init(stmt-\u003einit_expr.get(), nullptr);\n      break;\n    case TypeKind::Tuple:\n      init = eval_expr(stmt-\u003einit_expr.get(), llvm_type);\n      break;\n    case TypeKind::Slice:\n      init = eval_expr(stmt-\u003einit_expr.get(), llvm_type);\n      if (!init) return false;\n      break;\n    case TypeKind::Fn:\n      init = eval_expr(stmt-\u003einit_expr.get(), llvm_type);\n      if (!init) return false;\n      break;\n    case TypeKind::Ref:\n    case TypeKind::MutRef:\n      init = eval_expr(stmt-\u003einit_expr.get(), llvm_type);\n      if (!init) return false;\n      break;\n    default:\n      break;\n  }\n  if (!init) return false;\n  return alloc_and_store(stmt-\u003ename, stmt-\u003etype_ann.kind, init, llvm_type,\n                          stmt-\u003etype_ann);\n}\n\n// -------------------------------------------------------------------------\n// Functions\n// -------------------------------------------------------------------------\n\nbool CodeGen::gen_fn_body(FnDecl *decl, Function *fn) {\n  BasicBlock *BB = BasicBlock::Create(Context, \"entry\", fn);\n  Builder.SetInsertPoint(BB);\n\n  auto saved_values = std::move(named_values);\n  auto saved_types = std::move(named_types);\n  auto saved_type_anns = std::move(named_type_anns);\n  named_values.clear();\n  named_types.clear();\n  named_type_anns.clear();\n\n  size_t i = 0;\n  for (auto &arg : fn-\u003eargs()) {\n    arg.setName(decl-\u003eparams[i].name);\n    AllocaInst *alloca = Builder.CreateAlloca(arg.getType(), nullptr, arg.getName());\n    Builder.CreateStore(&arg, alloca);\n    std::string pname = std::string(arg.getName());\n    named_values[pname] = alloca;\n    named_types[pname] = decl-\u003eparams[i].type_ann.kind;\n    {\n      auto &ta = decl-\u003eparams[i].type_ann;\n      if (ta.kind == TypeKind::Fn || ta.kind == TypeKind::Struct || ta.kind == TypeKind::Enum || ta.kind == TypeKind::Tuple || ta.kind == TypeKind::Slice || ta.kind == TypeKind::Ref || ta.kind == TypeKind::MutRef || ta.pointer_depth \u003e 0 || ta.array_size \u003e 0)\n        named_type_anns[pname] = ta;\n    }\n    i++;\n  }\n\n  for (auto &stmt : decl-\u003ebody) {\n      if (!gen_stmt(stmt.get())) {\n        named_values = std::move(saved_values);\n        named_types = std::move(saved_types);\n        named_type_anns = std::move(saved_type_anns);\n        return false;\n      }\n  }\n\n  Type *ret_type = fn-\u003egetReturnType();\n  if (!Builder.GetInsertBlock()-\u003egetTerminator()) {\n    if (ret_type-\u003eisVoidTy())\n      Builder.CreateRetVoid();\n    else if (ret_type-\u003eisIntegerTy())\n      Builder.CreateRet(ConstantInt::get(ret_type, 0));\n    else if (ret_type-\u003eisFPOrFPVectorTy())\n      Builder.CreateRet(ConstantFP::get(ret_type, 0.0));\n    else\n      Builder.CreateRet(ConstantPointerNull::get(cast\u003cPointerType\u003e(ret_type)));\n  }\n\n  named_values = std::move(saved_values);\n  named_types = std::move(saved_types);\n  named_type_anns = std::move(saved_type_anns);\n  return true;\n}\n\n// -------------------------------------------------------------------------\n// Impl registration\n// -------------------------------------------------------------------------\n\nbool CodeGen::register_impl_decl(ImplDecl *decl) {\n  for (auto &method : decl-\u003emethods) {\n    // Determine mangled function name\n    std::string mangled_name;\n    if (!decl-\u003etrait_name.empty()) {\n      mangled_name = \"impl_\" + decl-\u003etrait_name + \"_for_\" + decl-\u003etype_name + \"_\" + method-\u003ename;\n    } else {\n      mangled_name = \"impl_\" + decl-\u003etype_name + \"_\" + method-\u003ename;\n    }\n\n    // Substitute Self -\u003e type_name for trait impls\n    if (!decl-\u003etrait_name.empty()) {\n      TypeAnnotation self_type = {TypeKind::Struct, 0, 0, decl-\u003etype_name};\n      for (auto &p : method-\u003eparams) {\n        substitute_type_params_recursive(p.type_ann, {\"Self\"}, {self_type});\n      }\n      substitute_type_params_recursive(method-\u003ereturn_type, {\"Self\"}, {self_type});\n    }\n\n    // Create LLVM function\n    std::vector\u003cType *\u003e param_types;\n    for (auto &p : method-\u003eparams)\n      param_types.push_back(get_llvm_type(p.type_ann));\n\n    FunctionType *FT = FunctionType::get(\n        get_llvm_type(method-\u003ereturn_type), param_types, method-\u003eis_variadic);\n    Function::Create(FT, Function::ExternalLinkage, mangled_name, &M);\n\n    // Register in impl lookup maps\n    impl_methods[{decl-\u003etype_name, method-\u003ename}] = mangled_name;\n    impl_method_ret_types[mangled_name] = method-\u003ereturn_type;\n\n    // Codegen the method body\n    auto saved_named_values = named_values;\n    auto saved_named_types = named_types;\n    auto saved_named_type_anns = named_type_anns;\n    auto saved_insert_block = Builder.GetInsertBlock();\n\n    bool ok = gen_fn_body(method.get(), M.getFunction(mangled_name));\n\n    if (saved_insert_block)\n      Builder.SetInsertPoint(saved_insert_block);\n    named_values = std::move(saved_named_values);\n    named_types = std::move(saved_named_types);\n    named_type_anns = std::move(saved_named_type_anns);\n\n    if (!ok) return false;\n  }\n\n  // Register trait impl relationship\n  if (!decl-\u003etrait_name.empty()) {\n    type_impls[{decl-\u003etype_name, decl-\u003etrait_name}] = true;\n  }\n\n  return true;\n}\n"},{"id":"src-cpp/codegen_expr.cpp","name":"codegen_expr.cpp","dir":"src-cpp","ext":".cpp","size":61682,"binary":false,"truncated":false,"content":"#include \"codegen.h\"\n\n#include \"llvm/IR/Constants.h\"\n#include \"llvm/IR/DerivedTypes.h\"\n#include \"llvm/IR/InlineAsm.h\"\n#include \"llvm/Support/raw_ostream.h\"\n\nusing namespace llvm;\n\n// -------------------------------------------------------------------------\n// Expression type resolution\n// -------------------------------------------------------------------------\n\nTypeAnnotation CodeGen::resolve_expr_type(Expr *expr) {\n  if (auto *id = dynamic_cast\u003cIdentExpr *\u003e(expr)) {\n    auto it = named_type_anns.find(id-\u003ename);\n    if (it != named_type_anns.end())\n      return it-\u003esecond;\n    auto kt = named_types.find(id-\u003ename);\n    if (kt != named_types.end())\n      return {kt-\u003esecond};\n    auto gi = global_values.find(id-\u003ename);\n    if (gi != global_values.end()) {\n      return {TypeKind::Int64};\n    }\n    return {TypeKind::Void};\n  }\n  if (auto *field = dynamic_cast\u003cFieldAccessExpr *\u003e(expr)) {\n    TypeAnnotation base = resolve_expr_type(field-\u003eobject.get());\n    if (base.kind == TypeKind::Void || base.kind == TypeKind::Struct) {\n      std::string struct_key = base.struct_name;\n      if (!base.type_args.empty())\n        struct_key = struct_mangled_name(base.struct_name, base.type_args);\n      return get_struct_field_type(struct_key, field-\u003efield);\n    }\n    return {TypeKind::Void};\n  }\n  if (auto *borrow = dynamic_cast\u003cBorrowExpr *\u003e(expr)) {\n    TypeAnnotation base = resolve_expr_type(borrow-\u003eoperand.get());\n    TypeAnnotation ref_ann;\n    ref_ann.kind = borrow-\u003eis_mut ? TypeKind::MutRef : TypeKind::Ref;\n    ref_ann.tuple_types.push_back(base);\n    return ref_ann;\n  }\n  if (auto *deref = dynamic_cast\u003cDerefExpr *\u003e(expr)) {\n    TypeAnnotation base = resolve_expr_type(deref-\u003eoperand.get());\n    if (base.pointer_depth \u003e 0) {\n      base.pointer_depth--;\n      return base;\n    }\n    return {TypeKind::Void};\n  }\n  if (auto *sub = dynamic_cast\u003cSubscriptExpr *\u003e(expr)) {\n    TypeAnnotation base = resolve_expr_type(sub-\u003earray.get());\n    if (base.array_size \u003e 0) {\n      base.array_size = 0;\n      return base;\n    }\n    if (base.kind == TypeKind::Slice) {\n      return base.tuple_types[0];\n    }\n    if (base.pointer_depth \u003e 0) {\n      base.pointer_depth--;\n      return base;\n    }\n    return {base.kind};\n  }\n  if (auto *bin = dynamic_cast\u003cBinaryExpr *\u003e(expr)) {\n    TypeAnnotation l = resolve_expr_type(bin-\u003eleft.get());\n    TypeAnnotation r = resolve_expr_type(bin-\u003eright.get());\n    if (l.pointer_depth \u003e 0) return l;\n    if (r.pointer_depth \u003e 0) return r;\n    switch (bin-\u003eop) {\n      case BinOp::Eq: case BinOp::Ne:\n      case BinOp::Less: case BinOp::Greater: case BinOp::Le: case BinOp::Ge:\n      case BinOp::And: case BinOp::Or:\n        return {TypeKind::Bool};\n      default:\n        if (l.kind != TypeKind::Void) return l;\n        return {TypeKind::Int64};\n    }\n  }\n  if (dynamic_cast\u003cNumberExpr *\u003e(expr))\n    return {TypeKind::Int64};\n  if (auto *ctor = dynamic_cast\u003cConstructorExpr *\u003e(expr)) {\n    for (auto &[ename, _] : enum_types) {\n      int vi = get_enum_variant_index(ename, ctor-\u003evariant_name);\n      if (vi \u003e= 0)\n        return {TypeKind::Enum, 0, 0, ename};\n    }\n    std::string struct_key = ctor-\u003evariant_name;\n    if (struct_types.count(struct_key) == 0 && struct_templates.count(struct_key) \u003e 0)\n      struct_key = struct_mangled_name(ctor-\u003evariant_name, ctor-\u003etype_args);\n    if (struct_types.count(struct_key) \u003e 0)\n      return {TypeKind::Struct, 0, 0, struct_key};\n    return {TypeKind::Void};\n  }\n  if (auto *atm = dynamic_cast\u003cAtomicExpr *\u003e(expr)) {\n    if (atm-\u003eop == AtomicOp::Fence)\n      return {TypeKind::Void};\n    if (!atm-\u003eargs.empty()) {\n      TypeAnnotation ptr_ann = resolve_expr_type(atm-\u003eargs[0].get());\n      if (ptr_ann.pointer_depth \u003e 0) {\n        ptr_ann.pointer_depth--;\n        return ptr_ann;\n      }\n      if (ptr_ann.kind == TypeKind::Ref || ptr_ann.kind == TypeKind::MutRef) {\n        // Return the referent type\n        return ptr_ann.tuple_types[0];\n      }\n    }\n    return {TypeKind::Int64};\n  }\n  if (auto *ifexpr = dynamic_cast\u003cIfExpr *\u003e(expr)) {\n    return resolve_expr_type(ifexpr-\u003ethen_expr.get());\n  }\n  if (auto *tup = dynamic_cast\u003cTupleExpr *\u003e(expr)) {\n    TypeAnnotation ann = {TypeKind::Tuple};\n    for (auto &el : tup-\u003eelements)\n      ann.tuple_types.push_back(resolve_expr_type(el.get()));\n    return ann;\n  }\n  if (auto *closure = dynamic_cast\u003cClosureExpr *\u003e(expr)) {\n    TypeAnnotation ann = {TypeKind::Fn};\n    for (auto &p : closure-\u003eparams)\n      ann.tuple_types.push_back(p.type_ann);\n    ann.tuple_types.push_back(closure-\u003ereturn_type);\n    return ann;\n  }\n  if (auto *call = dynamic_cast\u003cCallExpr *\u003e(expr)) {\n    if (call-\u003ecallee_expr) {\n      TypeAnnotation callee_ann = resolve_expr_type(call-\u003ecallee_expr.get());\n      if (callee_ann.kind == TypeKind::Fn && callee_ann.tuple_types.size() \u003e= 1)\n        return callee_ann.tuple_types.back();\n      return {TypeKind::Void};\n    }\n    if (!call-\u003etype_args.empty()) {\n      auto it = generic_templates.find(call-\u003ecallee);\n      if (it != generic_templates.end()) {\n        TypeAnnotation ret = it-\u003esecond-\u003ereturn_type;\n        for (size_t i = 0; i \u003c it-\u003esecond-\u003etype_params.size() && i \u003c call-\u003etype_args.size(); i++) {\n          if (ret.kind == TypeKind::TypeParam && ret.struct_name == it-\u003esecond-\u003etype_params[i]) {\n            ret = call-\u003etype_args[i];\n            break;\n          }\n        }\n        return ret;\n      }\n      return {TypeKind::Void};\n    }\n    Function *f = M.getFunction(call-\u003ecallee);\n    if (f) {\n      Type *ret_type = f-\u003egetReturnType();\n      if (ret_type-\u003eisIntegerTy(1)) return {TypeKind::Bool};\n      if (ret_type-\u003eisIntegerTy(8)) return {TypeKind::Int8};\n      if (ret_type-\u003eisIntegerTy(16)) return {TypeKind::Int16};\n      if (ret_type-\u003eisIntegerTy(32)) return {TypeKind::Int32};\n      if (ret_type-\u003eisIntegerTy(64)) return {TypeKind::Int64};\n      if (ret_type-\u003eisHalfTy()) return {TypeKind::Float16};\n      if (ret_type-\u003eisFloatTy()) return {TypeKind::Float32};\n      if (ret_type-\u003eisDoubleTy()) return {TypeKind::Float64};\n      if (ret_type-\u003eisPointerTy()) return {TypeKind::String};\n      if (ret_type-\u003eisStructTy()) {\n        if (auto *st = dyn_cast\u003cStructType\u003e(ret_type)) {\n          if (st-\u003ehasName())\n            return {TypeKind::Struct, 0, 0, std::string(st-\u003egetName())};\n        }\n        return {TypeKind::Void};\n      }\n    }\n    return {TypeKind::Void};\n  }\n  if (auto *mcall = dynamic_cast\u003cMethodCallExpr *\u003e(expr)) {\n    TypeAnnotation obj_type = resolve_expr_type(mcall-\u003eobject.get());\n    std::string type_name;\n    if (obj_type.kind == TypeKind::Struct)\n      type_name = obj_type.struct_name;\n    else if (obj_type.kind == TypeKind::Enum)\n      type_name = obj_type.struct_name;\n    else\n      return {TypeKind::Void};\n    auto it = impl_methods.find({type_name, mcall-\u003emethod_name});\n    if (it != impl_methods.end()) {\n      auto rit = impl_method_ret_types.find(it-\u003esecond);\n      if (rit != impl_method_ret_types.end())\n        return rit-\u003esecond;\n    }\n    return {TypeKind::Void};\n  }\n  return {TypeKind::Void};\n}\n\n// -------------------------------------------------------------------------\n// Lvalue pointer resolution\n// -------------------------------------------------------------------------\n\nValue *CodeGen::get_lvalue_ptr(Expr *expr, Type **out_type) {\n  if (auto *id = dynamic_cast\u003cIdentExpr *\u003e(expr)) {\n    auto it = named_values.find(id-\u003ename);\n    if (it == named_values.end()) {\n      auto gi = global_values.find(id-\u003ename);\n      if (gi != global_values.end()) {\n        if (out_type) *out_type = gi-\u003esecond-\u003egetValueType();\n        return gi-\u003esecond;\n      }\n      cg_error(errs(), id, \"undefined variable '\" + id-\u003ename + \"'\");\n      return nullptr;\n    }\n    if (out_type) *out_type = it-\u003esecond-\u003egetAllocatedType();\n    return it-\u003esecond;\n  }\n  if (auto *deref = dynamic_cast\u003cDerefExpr *\u003e(expr)) {\n    Value *ptr = eval_expr(deref-\u003eoperand.get(), PointerType::getUnqual(Context));\n    if (!ptr) return nullptr;\n    if (out_type) {\n      TypeAnnotation ann = resolve_expr_type(deref);\n      *out_type = get_llvm_type(ann);\n    }\n    return ptr;\n  }\n  if (auto *sub = dynamic_cast\u003cSubscriptExpr *\u003e(expr)) {\n    TypeAnnotation base_ann = resolve_expr_type(sub-\u003earray.get());\n    Value *index = eval_expr(sub-\u003eindex.get(), Type::getInt64Ty(Context));\n    if (!index) return nullptr;\n\n    if (base_ann.kind == TypeKind::Slice) {\n      // Slice subscript: extract ptr from slice struct, then GEP\n      Type *slice_type = get_llvm_type(base_ann);\n      Value *slice_val = eval_expr(sub-\u003earray.get(), slice_type);\n      if (!slice_val) return nullptr;\n      Value *ptr = Builder.CreateExtractValue(slice_val, {0}, \"slice_ptr\");\n      TypeAnnotation elem_ann = base_ann.tuple_types[0];\n      Type *elem_type = get_llvm_type(elem_ann);\n      Value *elem_ptr = Builder.CreateGEP(elem_type, ptr, index, \"slice_elem_ptr\");\n      if (out_type) *out_type = elem_type;\n      return elem_ptr;\n    }\n\n    if (base_ann.array_size \u003e 0) {\n      Type *arr_llvm_type = nullptr;\n      Value *arr_ptr = get_lvalue_ptr(sub-\u003earray.get(), &arr_llvm_type);\n      if (!arr_ptr) return nullptr;\n      Value *indices[] = {\n        ConstantInt::get(Type::getInt64Ty(Context), 0),\n        index\n      };\n      Value *gep = Builder.CreateGEP(arr_llvm_type, arr_ptr, indices, \"elem_ptr\");\n      if (out_type) {\n        if (auto *arr = dyn_cast_or_null\u003cArrayType\u003e(arr_llvm_type))\n          *out_type = arr-\u003egetElementType();\n      }\n      return gep;\n    }\n\n    if (base_ann.pointer_depth \u003e 0) {\n      Type *base_llvm = get_llvm_type(base_ann);\n      if (!base_llvm) return nullptr;\n      Value *arr_ptr = eval_expr(sub-\u003earray.get(), base_llvm);\n      if (!arr_ptr) return nullptr;\n      base_ann.pointer_depth--;\n      Type *pointee = get_llvm_type(base_ann);\n      if (!pointee) pointee = Type::getInt8Ty(Context);\n      Value *gep = Builder.CreateGEP(pointee, arr_ptr, index, \"elem_ptr\");\n      if (out_type) *out_type = pointee;\n      return gep;\n    }\n\n    errs() \u003c\u003c \"Error: subscript requires an array or pointer\\n\";\n    return nullptr;\n  }\n  if (auto *field = dynamic_cast\u003cFieldAccessExpr *\u003e(expr)) {\n    TypeAnnotation base_ann = resolve_expr_type(field-\u003eobject.get());\n\n    if (base_ann.kind == TypeKind::Tuple) {\n      int idx = std::stoi(field-\u003efield);\n      Type *tup_type = nullptr;\n      Value *tup_ptr = get_lvalue_ptr(field-\u003eobject.get(), &tup_type);\n      if (!tup_ptr) return nullptr;\n      Value *field_ptr = Builder.CreateStructGEP(tup_type, tup_ptr, idx, field-\u003efield);\n      if (out_type) {\n        if (idx \u003c (int)base_ann.tuple_types.size())\n          *out_type = get_llvm_type(base_ann.tuple_types[idx]);\n      }\n      return field_ptr;\n    }\n\n    Type *struct_type = nullptr;\n    Value *struct_ptr = get_lvalue_ptr(field-\u003eobject.get(), &struct_type);\n    if (!struct_ptr) return nullptr;\n\n    StructType *st = dyn_cast\u003cStructType\u003e(struct_type);\n    if (!st) {\n      errs() \u003c\u003c \"Error: field access on non-struct type\\n\";\n      return nullptr;\n    }\n\n    std::string struct_name = st-\u003egetName().str();\n    int field_idx = get_struct_field_index(struct_name, field-\u003efield);\n    if (field_idx \u003c 0) {\n      errs() \u003c\u003c \"Error: struct '\" \u003c\u003c struct_name \u003c\u003c \"' has no field named '\"\n             \u003c\u003c field-\u003efield \u003c\u003c \"'\\n\";\n      return nullptr;\n    }\n\n    Value *field_ptr = Builder.CreateStructGEP(\n        struct_type, struct_ptr, field_idx, field-\u003efield);\n    if (out_type) {\n      TypeAnnotation field_ann = get_struct_field_type(struct_name, field-\u003efield);\n      *out_type = get_llvm_type(field_ann);\n    }\n    return field_ptr;\n  }\n  return nullptr;\n}\n\n// -------------------------------------------------------------------------\n// Expression evaluation\n// -------------------------------------------------------------------------\n\nValue *CodeGen::eval_expr(Expr *expr, Type *expected_type) {\n  // Handle __region_alloc builtin: allocate from the current region\n  if (auto *call = dynamic_cast\u003cCallExpr *\u003e(expr)) {\n    if (call-\u003ecallee == \"__region_alloc\" && !call-\u003ecallee_expr) {\n      if (region_stack.empty()) {\n        errs() \u003c\u003c \"Error: __region_alloc called outside of a region\\n\";\n        return nullptr;\n      }\n      RegionInfo &ri = region_stack.back();\n      Value *size_val = eval_expr(call-\u003eargs[0].get(), Type::getInt64Ty(Context));\n      if (!size_val) return nullptr;\n\n      // Load curr
