    }\n        generic_templates[fn-\u003ename] = fn;\n        continue;\n      }\n\n      std::vector\u003cType *\u003e param_types;\n      for (auto &p : fn-\u003eparams)\n        param_types.push_back(get_llvm_type(p.type_ann));\n\n      FunctionType *FT = FunctionType::get(\n          get_llvm_type(fn-\u003ereturn_type), param_types, fn-\u003eis_variadic);\n      std::string llvm_name = fn-\u003ename;\n      if (!fn-\u003eis_extern && fn-\u003ename == \"main\") {\n        llvm_name = \"__user_main\";\n        user_main = fn;\n      }\n      Function::Create(FT, Function::ExternalLinkage, llvm_name, &M);\n      fn_decls.push_back(fn);\n    }\n  }\n\n  // Register trait impls and inherent impls\n  for (auto &decl : decls) {\n    if (auto *im = dynamic_cast\u003cImplDecl *\u003e(decl.get())) {\n      if (!register_impl_decl(im)) return false;\n    }\n  }\n\n  if (!user_main) {\n    errs() \u003c\u003c \"Error: no main function defined (add 'fn main() -\u003e int { ... }')\\n\";\n    return false;\n  }\n\n  if (user_main-\u003ereturn_type.kind != TypeKind::Int64) {\n    errs() \u003c\u003c \"Error: main function must return int64\\n\";\n    return false;\n  }\n\n  if (user_main-\u003eparams.size() != 0 && user_main-\u003eparams.size() != 2) {\n    errs() \u003c\u003c \"Error: main function must have 0 or 2 parameters\"\n              \" (argc: int, argv: int8**)\\n\";\n    return false;\n  }\n  if (user_main-\u003eparams.size() == 2) {\n    auto &p0 = user_main-\u003eparams[0];\n    auto &p1 = user_main-\u003eparams[1];\n    if (p0.type_ann.kind != TypeKind::Int64 ||\n        p1.type_ann.kind != TypeKind::Int8 ||\n        p1.type_ann.pointer_depth != 2) {\n      errs() \u003c\u003c \"Error: main parameters must be (argc: int, argv: int8**)\\n\";\n      return false;\n    }\n  }\n\n  for (auto &decl : decls) {\n    if (auto *let = dynamic_cast\u003cLetDecl *\u003e(decl.get())) {\n      if (!gen_global_let_decl(let)) return false;\n    }\n  }\n\n  for (auto *fn : fn_decls) {\n    if (fn-\u003eis_extern) continue;\n    std::string llvm_name = (fn-\u003ename == \"main\") ? \"__user_main\" : fn-\u003ename;\n    if (!gen_fn_body(fn, M.getFunction(llvm_name)))\n      return false;\n  }\n\n  if (!gen_main_body(decls))\n    return false;\n\n  if (verifyModule(M, &errs())) {\n    errs() \u003c\u003c \"Error: module verification failed\\n\";\n    return false;\n  }\n  return true;\n}\n\nbool CodeGen::gen_main_body(const std::vector\u003cstd::unique_ptr\u003cDecl\u003e\u003e &decls) {\n  Function *user_main = M.getFunction(\"__user_main\");\n  bool needs_args = (user_main && user_main-\u003earg_size() == 2 && !freestanding);\n\n  std::vector\u003cType *\u003e main_param_types;\n  if (freestanding) {\n    main_param_types = {};\n  } else {\n    main_param_types = {Type::getInt32Ty(Context),\n                        PointerType::getUnqual(Context)};\n  }\n  FunctionType *FT = FunctionType::get(Type::getInt32Ty(Context), main_param_types, false);\n  MainFn = Function::Create(FT, Function::ExternalLinkage, \"main\", &M);\n  EntryBB = BasicBlock::Create(Context, \"entry\", MainFn);\n  Builder.SetInsertPoint(EntryBB);\n  named_values.clear();\n  named_types.clear();\n\n  Value *result;\n  if (user_main) {\n    if (needs_args) {\n      Function::arg_iterator ai = MainFn-\u003earg_begin();\n      Value *argc_i32 = ai;\n      Value *argv = ++ai;\n      argc_i32-\u003esetName(\"argc\");\n      argv-\u003esetName(\"argv\");\n      Value *argc_i64 = Builder.CreateSExt(argc_i32, Type::getInt64Ty(Context), \"argc.ext\");\n      result = Builder.CreateCall(user_main, {argc_i64, argv});\n    } else {\n      result = Builder.CreateCall(user_main, {});\n    }\n  } else {\n    result = ConstantInt::get(Type::getInt64Ty(Context), 0);\n  }\n\n  if (freestanding) {\n    FunctionType *AsmFT =\n        FunctionType::get(Type::getVoidTy(Context), {Type::getInt64Ty(Context)}, false);\n    InlineAsm *ExitSyscall = InlineAsm::get(\n        AsmFT, \"movq $60, %rax\\n\\tsyscall\",\n        \"{rdi},~{rax},~{rcx},~{r11},~{memory}\",\n        /*hasSideEffects=*/true);\n    Builder.CreateCall(ExitSyscall, {result});\n    Builder.CreateUnreachable();\n  } else {\n    Value *truncated = Builder.CreateTrunc(result, Type::getInt32Ty(Context));\n    Builder.CreateRet(truncated);\n  }\n  return true;\n}\n\n// -------------------------------------------------------------------------\n// Generics / monomorphization helpers\n// -------------------------------------------------------------------------\n\nstd::string CodeGen::mangle_ann(const TypeAnnotation &ann) {\n  auto fn = [&](const TypeAnnotation &a) -\u003e std::string {\n    switch (a.kind) {\n      case TypeKind::Void:    return \"void\";\n      case TypeKind::Int8:    return \"i8\";\n      case TypeKind::Int16:   return \"i16\";\n      case TypeKind::Int32:   return \"i32\";\n      case TypeKind::Int64:   return \"i64\";\n      case TypeKind::Uint8:   return \"u8\";\n      case TypeKind::Uint16:  return \"u16\";\n      case TypeKind::Uint32:  return \"u32\";\n      case TypeKind::Uint64:  return \"u64\";\n      case TypeKind::Float16: return \"f16\";\n      case TypeKind::Float32: return \"f32\";\n      case TypeKind::Float64: return \"f64\";\n      case TypeKind::Bool:    return \"bool\";\n      case TypeKind::String:  return \"str\";\n      case TypeKind::Char:    return \"char\";\n      case TypeKind::Cubical: return \"cub\";\n      case TypeKind::Struct:\n      case TypeKind::TypeParam: {\n        std::string s = a.struct_name;\n        for (auto &c : s) if (c == ':') c = '_';\n        for (auto &ta : a.type_args)\n          s += \"$\" + mangle_ann(ta);\n        return s;\n      }\n      case TypeKind::Tuple: {\n        std::string s = \"tup\";\n        for (auto &et : a.tuple_types)\n          s += \"_\" + mangle_ann(et);\n        return s;\n      }\n      case TypeKind::Slice:\n        return \"slice_\" + mangle_ann(a.tuple_types[0]);\n      case TypeKind::Ref:\n        return \"ref_\" + mangle_ann(a.tuple_types[0]);\n      case TypeKind::MutRef:\n        return \"mutref_\" + mangle_ann(a.tuple_types[0]);\n      case TypeKind::Fn: {\n        std::string s = \"fn\";\n        for (size_t pi = 0; pi + 1 \u003c a.tuple_types.size(); pi++)\n          s += \"_\" + mangle_ann(a.tuple_types[pi]);\n        s += \"_to_\" + mangle_ann(a.tuple_types.back());\n        return s;\n      }\n    }\n    return \"?\";\n  };\n  std::string s = fn(ann);\n  for (int i = 0; i \u003c ann.pointer_depth; i++)\n    s += \"p\";\n  if (ann.array_size \u003e 0)\n    s += \"a\" + std::to_string(ann.array_size);\n  return s;\n}\n\nstd::string CodeGen::mangle_name(const std::string &fn_name,\n                                  const std::vector\u003cTypeAnnotation\u003e &type_args) {\n  std::string result = fn_name;\n  for (auto &ta : type_args)\n    result += \"$\" + mangle_ann(ta);\n  return result;\n}\n\nvoid CodeGen::substitute_type_params(TypeAnnotation &ann,\n                                      const std::vector\u003cstd::string\u003e &param_names,\n                                      const std::vector\u003cTypeAnnotation\u003e &type_args) {\n  if (ann.kind == TypeKind::TypeParam) {\n    for (size_t i = 0; i \u003c param_names.size(); i++) {\n      if (ann.struct_name == param_names[i]) {\n        ann = type_args[i];\n        return;\n      }\n    }\n    errs() \u003c\u003c \"Internal error: unresolved type parameter '\" \u003c\u003c ann.struct_name \u003c\u003c \"'\\n\";\n  }\n}\n\nbool CodeGen::monomorphize_and_codegen(FnDecl *template_decl,\n                                        const std::vector\u003cTypeAnnotation\u003e &type_args,\n                                        const std::string &mangled_name) {\n  std::vector\u003cstd::pair\u003cTypeAnnotation *, TypeAnnotation\u003e\u003e saved_anns;\n\n  auto substitute_in = [&](TypeAnnotation &ann) {\n    saved_anns.push_back({&ann, ann});\n    substitute_type_params_recursive(ann, template_decl-\u003etype_params, type_args);\n  };\n\n  for (auto &p : template_decl-\u003eparams)\n    substitute_in(p.type_ann);\n\n  substitute_in(template_decl-\u003ereturn_type);\n\n  // Verify trait bounds on type parameters\n  for (size_t i = 0; i \u003c template_decl-\u003etype_params.size() && i \u003c type_args.size(); i++) {\n    auto &tp_name = template_decl-\u003etype_params[i];\n    auto &tp_type = type_args[i];\n    auto bit = template_decl-\u003etype_param_bounds.find(tp_name);\n    if (bit != template_decl-\u003etype_param_bounds.end()) {\n      for (auto &bound_trait : bit-\u003esecond) {\n        std::string type_key;\n        if (tp_type.kind == TypeKind::Struct)\n          type_key = tp_type.struct_name;\n        else\n          type_key = mangle_ann(tp_type);\n        if (type_impls.find({type_key, bound_trait}) == type_impls.end()) {\n          errs() \u003c\u003c \"Error: type '\" \u003c\u003c type_key \u003c\u003c \"' does not implement trait '\"\n                 \u003c\u003c bound_trait \u003c\u003c \"' required by bound on '\" \u003c\u003c tp_name \u003c\u003c \"'\\n\";\n          return false;\n        }\n      }\n    }\n  }\n\n  std::function\u003cvoid(std::vector\u003cstd::unique_ptr\u003cStmt\u003e\u003e&)\u003e walk_body;\n  std::function\u003cvoid(Expr*)\u003e walk_expr;\n  walk_expr = [&](Expr *expr) {\n    if (!expr) return;\n    if (auto *atm = dynamic_cast\u003cAtomicExpr *\u003e(expr)) {\n      for (auto &arg : atm-\u003eargs)\n        walk_expr(arg.get());\n      return;\n    }\n    if (auto *call = dynamic_cast\u003cCallExpr *\u003e(expr)) {\n      for (auto &ta : call-\u003etype_args)\n        substitute_in(ta);\n      for (auto &arg : call-\u003eargs)\n        walk_expr(arg.get());\n      if (call-\u003ecallee_expr)\n        walk_expr(call-\u003ecallee_expr.get());\n    } else if (auto *bin = dynamic_cast\u003cBinaryExpr *\u003e(expr)) {\n      walk_expr(bin-\u003eleft.get());\n      walk_expr(bin-\u003eright.get());\n    } else if (auto *unary = dynamic_cast\u003cUnaryExpr *\u003e(expr)) {\n      walk_expr(unary-\u003eoperand.get());\n    } else if (auto *assign = dynamic_cast\u003cAssignExpr *\u003e(expr)) {\n      walk_expr(assign-\u003etarget.get());\n      walk_expr(assign-\u003evalue.get());\n    } else if (auto *compound = dynamic_cast\u003cCompoundAssignExpr *\u003e(expr)) {\n      walk_expr(compound-\u003etarget.get());\n      walk_expr(compound-\u003evalue.get());\n    } else if (auto *field = dynamic_cast\u003cFieldAccessExpr *\u003e(expr)) {\n      walk_expr(field-\u003eobject.get());\n    } else if (auto *mcall = dynamic_cast\u003cMethodCallExpr *\u003e(expr)) {\n      walk_expr(mcall-\u003eobject.get());\n      for (auto &arg : mcall-\u003eargs)\n        walk_expr(arg.get());\n    } else if (auto *deref = dynamic_cast\u003cDerefExpr *\u003e(expr)) {\n      walk_expr(deref-\u003eoperand.get());\n    } else if (auto *borrow = dynamic_cast\u003cBorrowExpr *\u003e(expr)) {\n      walk_expr(borrow-\u003eoperand.get());\n    } else if (auto *sub = dynamic_cast\u003cSubscriptExpr *\u003e(expr)) {\n      walk_expr(sub-\u003earray.get());\n      walk_expr(sub-\u003eindex.get());\n    } else if (auto *arr = dynamic_cast\u003cArrayLitExpr *\u003e(expr)) {\n      for (auto &el : arr-\u003eelements)\n        walk_expr(el.get());\n    } else if (auto *tup = dynamic_cast\u003cTupleExpr *\u003e(expr)) {\n      for (auto &el : tup-\u003eelements)\n        walk_expr(el.get());\n    } else if (auto *ctor = dynamic_cast\u003cConstructorExpr *\u003e(expr)) {\n      for (auto &[_, fexpr] : ctor-\u003efields)\n        walk_expr(fexpr.get());\n    } else if (auto *match = dynamic_cast\u003cMatchExpr *\u003e(expr)) {\n      walk_expr(match-\u003evalue.get());\n      for (auto &arm : match-\u003earms)\n        walk_expr(arm.expr.get());\n    } else if (auto *ifexpr_e = dynamic_cast\u003cIfExpr *\u003e(expr)) {\n      walk_expr(ifexpr_e-\u003econdition.get());\n      walk_expr(ifexpr_e-\u003ethen_expr.get());\n      walk_expr(ifexpr_e-\u003eelse_expr.get());\n    } else if (auto *closure = dynamic_cast\u003cClosureExpr *\u003e(expr)) {\n      walk_body(closure-\u003ebody);\n    } else if (auto *ret = dynamic_cast\u003cReturnStmt *\u003e(expr)) {\n      walk_expr(ret-\u003evalue.get());\n    }\n  };\n  walk_body = [&](std::vector\u003cstd::unique_ptr\u003cStmt\u003e\u003e &body) {\n    for (auto &stmt : body) {\n      if (auto *let = dynamic_cast\u003cLetStmt *\u003e(stmt.get())) {\n        substitute_in(let-\u003etype_ann);\n        walk_expr(let-\u003einit_expr.get());\n      } else if (auto *exprs = dynamic_cast\u003cExprStmt *\u003e(stmt.get())) {\n        walk_expr(exprs-\u003eexpr.get());\n      } else if (auto *ret = dynamic_cast\u003cReturnStmt *\u003e(stmt.get())) {\n        walk_expr(ret-\u003evalue.get());\n      } else if (auto *ifs = dynamic_cast\u003cIfStmt *\u003e(stmt.get())) {\n        walk_expr(ifs-\u003econdition.get());\n        walk_body(ifs-\u003ethen_branch);\n        walk_body(ifs-\u003eelse_branch);\n      } else if (auto *for_s = dynamic_cast\u003cForStmt *\u003e(stmt.get())) {\n        walk_expr(for_s-\u003econdition.get());\n        walk_expr(for_s-\u003eupdate.get());\n        walk_body(for_s-\u003ebody);\n      } else if (dynamic_cast\u003cBreakStmt *\u003e(stmt.get())) {\n      } else if (dynamic_cast\u003cContinueStmt *\u003e(stmt.get())) {\n      }\n    }\n  };\n  walk_body(template_decl-\u003ebody);\n\n  std::vector\u003cType *\u003e param_types;\n  for (auto &p : template_decl-\u003eparams)\n    param_types.push_back(get_llvm_type(p.type_ann));\n\n  FunctionType *FT = FunctionType::get(\n      get_llvm_type(template_decl-\u003ereturn_type), param_types,\n      template_decl-\u003eis_variadic);\n  Function::Create(FT, Function::ExternalLinkage, mangled_name, &M);\n\n  auto saved_named_values = named_values;\n  auto saved_named_types = named_types;\n  auto saved_named_type_anns = named_type_anns;\n  auto saved_insert_block = Builder.GetInsertBlock();\n\n  bool ok = gen_fn_body(template_decl, M.getFunction(mangled_name));\n\n  if (saved_insert_block)\n    Builder.SetInsertPoint(saved_insert_block);\n  named_values = std::move(saved_named_values);\n  named_types = std::move(saved_named_types);\n  named_type_anns = std::move(saved_named_type_anns);\n\n  for (auto &[ptr, saved] : saved_anns)\n    *ptr = saved;\n\n  return ok;\n}\n\nllvm::GlobalVariable *CodeGen::get_fnval_wrapper(const std::string &fn_name,\n                                                   llvm::Function *f) {\n  auto it = fnval_globals.find(fn_name);\n  if (it != fnval_globals.end())\n    return it-\u003esecond;\n\n  std::string wrapper_name = \"__fnval_wrapper_\" + fn_name;\n  std::string global_name = \"__fnval_s_\" + fn_name;\n\n  // Build wrapper function type: Ret (i8*, ParamTypes...)\n  std::vector\u003cType *\u003e wrapper_param_types;\n  wrapper_param_types.push_back(PointerType::getUnqual(Context));\n  for (auto &arg : f-\u003eargs())\n    wrapper_param_types.push_back(arg.getType());\n\n  Type *ret_type = f-\u003egetReturnType();\n  FunctionType *wrapper_ft = FunctionType::get(ret_type, wrapper_param_types, false);\n  Function *wrapper = Function::Create(wrapper_ft, Function::InternalLinkage,\n                                        wrapper_name, &M);\n\n  // Emit wrapper body — save/restore builder insert point\n  BasicBlock *saved_bb = Builder.GetInsertBlock();\n  BasicBlock *bb = BasicBlock::Create(Context, \"entry\", wrapper);\n  Builder.SetInsertPoint(bb);\n\n  std::vector\u003cValue *\u003e call_args;\n  size_t ai = 1; // skip context arg (index 0)\n  for (auto &arg : f-\u003eargs()) {\n    call_args.push_back(wrapper-\u003egetArg(ai));\n    ai++;\n  }\n  Value *result = Builder.CreateCall(f, call_args, \"fnval_call\");\n  if (ret_type-\u003eisVoidTy())\n    Builder.CreateRetVoid();\n  else\n    Builder.CreateRet(result);\n\n  // Restore builder insert point\n  if (saved_bb)\n    Builder.SetInsertPoint(saved_bb);\n\n  // Create global constant { i8* } pointing to the wrapper\n  Constant *bitcast_wrapper = ConstantExpr::getBitCast(wrapper,\n      PointerType::getUnqual(Context));\n  StructType *fnval_st = StructType::create(Context, {PointerType::getUnqual(Context)},\n                                             global_name);\n  Constant *init_val = ConstantStruct::get(fnval_st, {bitcast_wrapper});\n  GlobalVariable *gv = new GlobalVariable(M, fnval_st, true,\n      GlobalVariable::InternalLinkage, init_val, global_name);\n\n  fnval_globals[fn_name] = gv;\n  return gv;\n}\n"},{"id":"src-cpp/codegen_types.cpp","name":"codegen_types.cpp","dir":"src-cpp","ext":".cpp","size":13993,"binary":false,"truncated":false,"content":"#include \"codegen.h\"\n\n#include \"llvm/IR/Constants.h\"\n#include \"llvm/IR/DerivedTypes.h\"\n#include \"llvm/Support/raw_ostream.h\"\n\nusing namespace llvm;\n\n// -------------------------------------------------------------------------\n// LLVM type mapping\n// -------------------------------------------------------------------------\n\nType *CodeGen::get_llvm_type(TypeKind kind) {\n  switch (kind) {\n    case TypeKind::Void:    return Type::getVoidTy(Context);\n    case TypeKind::Int8:    return Type::getInt8Ty(Context);\n    case TypeKind::Int16:   return Type::getInt16Ty(Context);\n    case TypeKind::Int32:   return Type::getInt32Ty(Context);\n    case TypeKind::Int64:   return Type::getInt64Ty(Context);\n    case TypeKind::Uint8:   return Type::getInt8Ty(Context);\n    case TypeKind::Uint16:  return Type::getInt16Ty(Context);\n    case TypeKind::Uint32:  return Type::getInt32Ty(Context);\n    case TypeKind::Uint64:  return Type::getInt64Ty(Context);\n    case TypeKind::Float16: return Type::getHalfTy(Context);\n    case TypeKind::Float32: return Type::getFloatTy(Context);\n    case TypeKind::Float64: return Type::getDoubleTy(Context);\n    case TypeKind::Bool:    return Type::getInt1Ty(Context);\n    case TypeKind::String:  return PointerType::getUnqual(Context);\n    case TypeKind::Char:    return Type::getInt8Ty(Context);\n    case TypeKind::Cubical: return Type::getInt64Ty(Context);\n    case TypeKind::Ref:\n    case TypeKind::MutRef:  return PointerType::getUnqual(Context);\n    case TypeKind::Tuple:   return nullptr; // must use annotation overload\n    case TypeKind::Struct:  return nullptr; // must use annotation overload\n    case TypeKind::Slice:\n      return nullptr; // must use annotation overload\n    case TypeKind::Fn:\n      return nullptr; // must use annotation overload\n    case TypeKind::TypeParam:\n      errs() \u003c\u003c \"Internal error: unresolved type parameter in codegen\\n\";\n      return nullptr;\n  }\n  return nullptr;\n}\n\nType *CodeGen::get_llvm_type(const TypeAnnotation &ann) {\n  Type *base = nullptr;\n  if (ann.kind == TypeKind::Tuple) {\n    base = get_tuple_type(ann.tuple_types);\n    for (int i = 0; i \u003c ann.pointer_depth; i++)\n      base = PointerType::getUnqual(Context);\n    return base;\n  }\n  if (ann.kind == TypeKind::Struct) {\n    if (!ann.type_args.empty()) {\n      StructType *st = monomorphize_struct(ann.struct_name, ann.type_args);\n      if (!st) return nullptr;\n      base = st;\n      for (int i = 0; i \u003c ann.pointer_depth; i++)\n        base = PointerType::getUnqual(Context);\n      return base;\n    }\n    auto it = struct_types.find(ann.struct_name);\n    if (it != struct_types.end()) {\n      base = it-\u003esecond;\n      for (int i = 0; i \u003c ann.pointer_depth; i++)\n        base = PointerType::getUnqual(Context);\n      return base;\n    }\n    auto eit = enum_types.find(ann.struct_name);\n    if (eit != enum_types.end()) {\n      base = eit-\u003esecond;\n      for (int i = 0; i \u003c ann.pointer_depth; i++)\n        base = PointerType::getUnqual(Context);\n      return base;\n    }\n    errs() \u003c\u003c \"Error: unknown struct/enum type '\" \u003c\u003c ann.struct_name \u003c\u003c \"'\\n\";\n    return nullptr;\n  }\n  if (ann.kind == TypeKind::Slice) {\n    return get_slice_type(ann.tuple_types[0]);\n  }\n  if (ann.kind == TypeKind::Ref || ann.kind == TypeKind::MutRef) {\n    // References are just pointers at the LLVM level\n    base = PointerType::getUnqual(Context);\n    for (int i = 0; i \u003c ann.pointer_depth; i++)\n      base = PointerType::getUnqual(Context);\n    return base;\n  }\n  if (ann.kind == TypeKind::Fn) {\n    std::vector\u003cType *\u003e fn_param_types;\n    fn_param_types.push_back(PointerType::getUnqual(Context)); // captures context\n    for (size_t pi = 0; pi + 1 \u003c ann.tuple_types.size(); pi++)\n      fn_param_types.push_back(get_llvm_type(ann.tuple_types[pi]));\n    Type *ret_type = get_llvm_type(ann.tuple_types.back());\n    FunctionType *fn_type = FunctionType::get(ret_type, fn_param_types, false);\n    base = PointerType::getUnqual(Context);\n    for (int i = 0; i \u003c ann.pointer_depth; i++)\n      base = PointerType::getUnqual(Context);\n    return base;\n  }\n  if (ann.kind == TypeKind::Enum) {\n    auto it = enum_types.find(ann.struct_name);\n    if (it == enum_types.end()) {\n      errs() \u003c\u003c \"Error: unknown enum type '\" \u003c\u003c ann.struct_name \u003c\u003c \"'\\n\";\n      return nullptr;\n    }\n    base = it-\u003esecond;\n    for (int i = 0; i \u003c ann.pointer_depth; i++)\n      base = PointerType::getUnqual(Context);\n    return base;\n  }\n  base = get_llvm_type(ann.kind);\n  if (ann.array_size \u003e 0) {\n    return ArrayType::get(base, ann.array_size);\n  }\n  for (int i = 0; i \u003c ann.pointer_depth; i++)\n    base = PointerType::getUnqual(Context);\n  return base;\n}\n\n// -------------------------------------------------------------------------\n// Struct helpers\n// -------------------------------------------------------------------------\n\nvoid CodeGen::register_struct_decl(StructDecl *decl) {\n  if (!decl-\u003etype_params.empty()) {\n    struct_templates[decl-\u003ename] = decl;\n    for (auto &field : decl-\u003efields)\n      struct_fields[decl-\u003ename].push_back({field.name, field.type_ann});\n    return;\n  }\n\n  StructType *st = StructType::create(Context, decl-\u003ename);\n\n  std::vector\u003cType *\u003e member_types;\n  std::vector\u003cstd::pair\u003cstd::string, TypeAnnotation\u003e\u003e fields_info;\n\n  for (auto &field : decl-\u003efields) {\n    Type *field_type = get_llvm_type(field.type_ann);\n    if (!field_type) {\n      errs() \u003c\u003c \"Error: invalid field type in struct '\" \u003c\u003c decl-\u003ename \u003c\u003c \"'\\n\";\n      return;\n    }\n    member_types.push_back(field_type);\n    fields_info.push_back({field.name, field.type_ann});\n  }\n\n  st-\u003esetBody(member_types);\n  struct_types[decl-\u003ename] = st;\n  struct_fields[decl-\u003ename] = fields_info;\n}\n\nStructType *CodeGen::get_struct_type(const std::string &name) {\n  auto it = struct_types.find(name);\n  if (it == struct_types.end()) return nullptr;\n  return it-\u003esecond;\n}\n\nint CodeGen::get_struct_field_index(const std::string &struct_name,\n                                     const std::string &field_name) {\n  auto it = struct_fields.find(struct_name);\n  if (it == struct_fields.end()) return -1;\n  for (size_t i = 0; i \u003c it-\u003esecond.size(); i++) {\n    if (it-\u003esecond[i].first == field_name)\n      return (int)i;\n  }\n  return -1;\n}\n\nTypeAnnotation CodeGen::get_struct_field_type(const std::string &struct_name,\n                                               const std::string &field_name) {\n  auto it = struct_fields.find(struct_name);\n  if (it == struct_fields.end()) return {TypeKind::Void};\n  for (auto &f : it-\u003esecond) {\n    if (f.first == field_name)\n      return f.second;\n  }\n  return {TypeKind::Void};\n}\n\n// -------------------------------------------------------------------------\n// Enum helpers\n// -------------------------------------------------------------------------\n\nvoid CodeGen::register_enum_decl(AdtDecl *decl) {\n  SmallVector\u003cType *, 8\u003e member_types;\n  member_types.push_back(Type::getInt64Ty(Context));\n  for (auto &var : decl-\u003evariants) {\n    SmallVector\u003cType *, 4\u003e field_types;\n    for (auto &f : var.fields) {\n      Type *ft = get_llvm_type(f.type_ann);\n      if (!ft) ft = Type::getInt64Ty(Context);\n      field_types.push_back(ft);\n    }\n    StructType *var_st = StructType::create(Context, field_types,\n                                            decl-\u003ename + \"::\" + var.name);\n    member_types.push_back(var_st);\n  }\n  StructType *st = StructType::create(Context, member_types, decl-\u003ename);\n  enum_types[decl-\u003ename] = st;\n\n  std::vector\u003cstd::pair\u003cstd::string, std::vector\u003cStructField\u003e\u003e\u003e var_list;\n  for (auto &var : decl-\u003evariants) {\n    std::vector\u003cstd::pair\u003cstd::string, TypeAnnotation\u003e\u003e fields_info;\n    std::vector\u003cStructField\u003e sf_list;\n    for (auto &f : var.fields) {\n      fields_info.push_back({f.name, f.type_ann});\n      sf_list.push_back({f.name, f.type_ann});\n    }\n    struct_fields[decl-\u003ename + \"::\" + var.name] = fields_info;\n    var_list.push_back({var.name, sf_list});\n  }\n  enum_variants[decl-\u003ename] = var_list;\n}\n\nint CodeGen::get_enum_variant_index(const std::string &enum_name,\n                                     const std::string &variant_name) {\n  auto it = enum_variants.find(enum_name);\n  if (it == enum_variants.end()) return -1;\n  // variant_name may be \"Some\" or \"EnumName::Some\" — strip prefix\n  std::string short_name = variant_name;\n  size_t pos = short_name.rfind(\"::\");\n  if (pos != std::string::npos)\n    short_name = short_name.substr(pos + 2);\n  for (size_t i = 0; i \u003c it-\u003esecond.size(); i++) {\n    if (it-\u003esecond[i].first == short_name) return (int)i;\n  }\n  return -1;\n}\n\n// -------------------------------------------------------------------------\n// Type annotation helpers\n// -------------------------------------------------------------------------\n\nstatic std::string type_ann_to_string(const TypeAnnotation &ann) {\n  switch (ann.kind) {\n    case TypeKind::Void:    return \"void\";\n    case TypeKind::Int8:    return \"i8\";\n    case TypeKind::Int16:   return \"i16\";\n    case TypeKind::Int32:   return \"i32\";\n    case TypeKind::Int64:   return \"i64\";\n    case TypeKind::Uint8:   return \"u8\";\n    case TypeKind::Uint16:  return \"u16\";\n    case TypeKind::Uint32:  return \"u32\";\n    case TypeKind::Uint64:  return \"u64\";\n    case TypeKind::Float16: return \"f16\";\n    case TypeKind::Float32: return \"f32\";\n    case TypeKind::Float64: return \"f64\";\n    case TypeKind::Bool:    return \"bool\";\n    case TypeKind::String:  return \"str\";\n    case TypeKind::Char:    return \"char\";\n    case TypeKind::Cubical: return \"cub\";\n    case TypeKind::Struct:\n    case TypeKind::TypeParam: {\n      std::string s = ann.struct_name;\n      for (auto &c : s) if (c == ':') c = '_';\n      return s;\n    }\n    case TypeKind::Tuple: {\n      std::string s = \"tup\";\n      for (auto &et : ann.tuple_types)\n        s += \"_\" + type_ann_to_string(et);\n      return s;\n    }\n    case TypeKind::Slice:\n      return \"slice_\" + type_ann_to_string(ann.tuple_types[0]);\n    case TypeKind::Ref:\n      return \"ref_\" + type_ann_to_string(ann.tuple_types[0]);\n    case TypeKind::MutRef:\n      return \"mutref_\" + type_ann_to_string(ann.tuple_types[0]);\n    case TypeKind::Fn: {\n      std::string s = \"fn\";\n      for (size_t pi = 0; pi + 1 \u003c ann.tuple_types.size(); pi++)\n        s += \"_\" + type_ann_to_string(ann.tuple_types[pi]);\n      s += \"_to_\" + type_ann_to_string(ann.tuple_types.back());\n      return s;\n    }\n  }\n  return \"?\";\n}\n\nstd::string CodeGen::tuple_type_key(const std::vector\u003cTypeAnnotation\u003e &elem_types) {\n  std::string key = \"tuple\";\n  for (auto &et : elem_types)\n    key += \"_\" + type_ann_to_string(et);\n  return key;\n}\n\nllvm::StructType *CodeGen::get_tuple_type(const std::vector\u003cTypeAnnotation\u003e &elem_types) {\n  std::string key = tuple_type_key(elem_types);\n  auto it = tuple_type_cache.find(key);\n  if (it != tuple_type_cache.end()) return it-\u003esecond;\n\n  std::vector\u003cType *\u003e llvm_elem_types;\n  for (auto &et : elem_types) {\n    Type *t = get_llvm_type(et);\n    if (!t) t = Type::getInt64Ty(Context);\n    llvm_elem_types.push_back(t);\n  }\n\n  StructType *st = StructType::create(Context, llvm_elem_types, key);\n  tuple_type_cache[key] = st;\n  return st;\n}\n\nllvm::StructType *CodeGen::get_slice_type(const TypeAnnotation &elem_ann) {\n  Type *elem_type = get_llvm_type(elem_ann);\n  std::string key = \"slice_\" + type_ann_to_string(elem_ann);\n  auto it = slice_type_cache.find(key);\n  if (it != slice_type_cache.end()) return it-\u003esecond;\n\n  Type *ptr = PointerType::getUnqual(Context);\n  Type *len = Type::getInt64Ty(Context);\n  StructType *st = StructType::create(Context, {ptr, len}, key);\n  slice_type_cache[key] = st;\n  return st;\n}\n\n// -------------------------------------------------------------------------\n// Generic struct helpers\n// -------------------------------------------------------------------------\n\nstd::string CodeGen::struct_mangled_name(const std::string &name,\n                                          const std::vector\u003cTypeAnnotation\u003e &type_args) {\n  std::string result = name;\n  for (auto &ta : type_args)\n    result += \"$\" + mangle_ann(ta);\n  return result;\n}\n\nllvm::StructType *CodeGen::monomorphize_struct(const std::string &name,\n                                                const std::vector\u003cTypeAnnotation\u003e &type_args) {\n  std::string mangled = struct_mangled_name(name, type_args);\n\n  auto it = struct_types.find(mangled);\n  if (it != struct_types.end()) return it-\u003esecond;\n\n  auto template_it = struct_templates.find(name);\n  if (template_it == struct_templates.end()) {\n    errs() \u003c\u003c \"Error: struct '\" \u003c\u003c name \u003c\u003c \"' is not a generic struct\\n\";\n    return nullptr;\n  }\n\n  StructDecl *decl = template_it-\u003esecond;\n  StructType *st = StructType::create(Context, mangled);\n\n  std::vector\u003cType *\u003e member_types;\n  std::vector\u003cstd::pair\u003cstd::string, TypeAnnotation\u003e\u003e fields_info;\n\n  for (auto &field : decl-\u003efields) {\n    TypeAnnotation field_ann = field.type_ann;\n    substitute_type_params_recursive(field_ann, decl-\u003etype_params, type_args);\n    Type *field_type = get_llvm_type(field_ann);\n    if (!field_type) {\n      errs() \u003c\u003c \"Error: monomorphization failed for field '\" \u003c\u003c field.name \u003c\u003c \"' in struct '\"\n             \u003c\u003c name \u003c\u003c \"'\\n\";\n      return nullptr;\n    }\n    member_types.push_back(field_type);\n    fields_info.push_back({field.name, field_ann});\n  }\n\n  st-\u003esetBody(member_types);\n  struct_types[mangled] = st;\n  struct_fields[mangled] = std::move(fields_info);\n\n  return st;\n}\n\nvoid CodeGen::substitute_type_params_recursive(TypeAnnotation &ann,\n                                                const std::vector\u003cstd::string\u003e &param_names,\n                                                const std::vector\u003cTypeAnnotation\u003e &type_args) {\n  if (ann.kind == TypeKind::TypeParam) {\n    for (size_t i = 0; i \u003c param_names.size(); i++) {\n      if (ann.struct_name == param_names[i]) {\n        ann = type_args[i];\n        return;\n      }\n    }\n  }\n  for (auto &ta : ann.tuple_types)\n    substitute_type_params_recursive(ta, param_names, type_args);\n  for (auto &ta : ann.type_args)\n    substitute_type_params_recursive(ta, param_names, type_args);\n}\n"},{"id":"src-cpp/codegen.cpp","name":"codegen.cpp","dir":"src-cpp","ext":".cpp","size":341,"binary":false,"truncated":false,"content":"#include \"codegen.h\"\n\n#include \u003cfilesystem\u003e\n#include \u003cfstream\u003e\n#include \u003cfunctional\u003e\n#include \u003ciostream\u003e\n\n#include \"llvm/IR/Constants.h\"\n#include \"llvm/IR/DerivedTypes.h\"\n#include \"llvm/IR/InlineAsm.h\"\n#include \"llvm/IR/Type.h\"\n#include \"llvm/IR/Verifier.h\"\n#include \"llvm/Support/raw_ostream.h\"\n\n#include \"cubical.h\"\n\nusing namespace llvm;\n"},{"id":"src-cpp/codegen.h","name":"codegen.h","dir":"src-cpp","ext":".h","size":10012,"binary":false,"truncated":false,"content":"#pragma once\n\n#include \u003cmap\u003e\n#include \u003cmemory\u003e\n#include \u003cstring\u003e\n#include \u003cunordered_set\u003e\n#include \u003cvector\u003e\n\n#include \"llvm/IR/BasicBlock.h\"\n#include \"llvm/IR/Function.h\"\n#include \"llvm/IR/IRBuilder.h\"\n#include \"llvm/IR/LLVMContext.h\"\n#include \"llvm/IR/Module.h\"\n#include \"llvm/Support/raw_ostream.h\"\n\n#include \"ast.h\"\n#include \"cubical.h\"\n#include \"error.h\"\n\n/// Write a compiler error with source location to the given output stream.\n/// If expr is non-null and has line info, includes file:line:col.\ninline void cg_error(llvm::raw_ostream &os, Expr *expr, const std::string &msg) {\n  if (expr && expr-\u003eline \u003e 0)\n    os \u003c\u003c error_at(expr-\u003efile, expr-\u003eline, expr-\u003ecol, msg) \u003c\u003c \"\\n\";\n  else\n    os \u003c\u003c \"error: \" \u003c\u003c msg \u003c\u003c \"\\n\";\n}\n\n// =========================================================================\n// Hokkaido Language — Code Generator\n// =========================================================================\n\ninline bool is_unsigned_type(TypeKind kind) {\n  return kind == TypeKind::Uint8 || kind == TypeKind::Uint16 ||\n         kind == TypeKind::Uint32 || kind == TypeKind::Uint64;\n}\n\nclass CodeGen {\n  llvm::LLVMContext &Context;\n  llvm::Module &M;\n  llvm::IRBuilder\u003c\u003e &Builder;\n  llvm::Function *MainFn = nullptr;\n  llvm::BasicBlock *EntryBB = nullptr;\n\n  std::map\u003cstd::string, llvm::AllocaInst *\u003e named_values;\n  std::map\u003cstd::string, TypeKind\u003e named_types;\n  std::map\u003cstd::string, TypeAnnotation\u003e named_type_anns;\n  // Module-level global variables (created for top-level lets)\n  std::map\u003cstd::string, llvm::GlobalVariable *\u003e global_values;\n\n  // Registered struct types (name -\u003e LLVM struct type)\n  std::map\u003cstd::string, llvm::StructType *\u003e struct_types;\n  // Cached tuple types (mangled key -\u003e LLVM struct type)\n  std::map\u003cstd::string, llvm::StructType *\u003e tuple_type_cache;\n  // Cached slice types (mangled key -\u003e LLVM struct type)\n  std::map\u003cstd::string, llvm::StructType *\u003e slice_type_cache;\n  // Struct field types (name -\u003e vector of (field_name, annotation))\n  std::map\u003cstd::string, std::vector\u003cstd::pair\u003cstd::string, TypeAnnotation\u003e\u003e\u003e struct_fields;\n\n  // Registered enum types (name -\u003e LLVM struct type)\n  std::map\u003cstd::string, llvm::StructType *\u003e enum_types;\n  // Enum variant info: enum name -\u003e vector of (variant_name, fields_vector)\n  std::map\u003cstd::string, std::vector\u003cstd::pair\u003cstd::string, std::vector\u003cStructField\u003e\u003e\u003e\u003e enum_variants;\n\n  // Impl method registry: (type_name, method_name) -\u003e mangled function name\n  std::map\u003cstd::pair\u003cstd::string, std::string\u003e, std::string\u003e impl_methods;\n  // Impl method return types: mangled_name -\u003e return type annotation\n  std::map\u003cstd::string, TypeAnnotation\u003e impl_method_ret_types;\n  // Trait declarations: trait_name -\u003e method signatures\n  std::map\u003cstd::string, std::vector\u003cTraitMethodSig\u003e\u003e trait_decls;\n  // Type impl registry: (type_name, trait_name) -\u003e true (for bound checking)\n  std::map\u003cstd::pair\u003cstd::string, std::string\u003e, bool\u003e type_impls;\n\n  // Generic function templates (name -\u003e AST)\n  std::map\u003cstd::string, FnDecl *\u003e generic_templates;\n  // Monomorphized instantiations (mangled_name -\u003e cloned FnDecl)\n  std::map\u003cstd::string, std::unique_ptr\u003cFnDecl\u003e\u003e monomorphized_fns;\n\npublic:\n  CodeGen(llvm::LLVMContext &Ctx, llvm::Module &Mod, llvm::IRBuilder\u003c\u003e &Bld,\n          bool Freestanding = false, std::string BaseDir = \"\")\n      : Context(Ctx), M(Mod), Builder(Bld), freestanding(Freestanding),\n        base_dir(std::move(BaseDir)) {}\n\n  bool generate(const std::vector\u003cstd::unique_ptr\u003cDecl\u003e\u003e &decls);\n\nprivate:\n  // When true, `main` is generated as a raw ELF entry point (no CRT/libc):\n  // instead of returning normally, it terminates via a direct `exit`\n  // syscall, and `extern fn` declarations are rejected at compile time\n  // since there is no libc to resolve them against.\n  bool freestanding;\n\n  // Top-level codegen\n  bool gen_main_body(const std::vector\u003cstd::unique_ptr\u003cDecl\u003e\u003e &decls);\n\n  // Impl registration\n  bool register_impl_decl(ImplDecl *decl);\n\n  // Struct declarations\n  void register_struct_decl(StructDecl *decl);\n  llvm::StructType *get_struct_type(const std::string &name);\n  int get_struct_field_index(const std::string &struct_name, const std::string &field_name);\n  TypeAnnotation get_struct_field_type(const std::string &struct_name, const std::string &field_name);\n  // Generic struct templates (name -\u003e AST)\n  std::map\u003cstd::string, StructDecl *\u003e struct_templates;\n  std::string struct_mangled_name(const std::string &name,\n                                   const std::vector\u003cTypeAnnotation\u003e &type_args);\n  llvm::StructType *monomorphize_struct(const std::string &name,\n                                         const std::vector\u003cTypeAnnotation\u003e &type_args);\n\n  // Enum declarations\n  void register_enum_decl(AdtDecl *decl);\n  int get_enum_variant_index(const std::string &enum_name, const std::string &variant_name);\n  const std::vector\u003cStructField\u003e *get_enum_variant_fields(\n      const std::string &enum_name, const std::string &variant_name);\n\n  // Resolve the type annotation for an expression without evaluating it\n  TypeAnnotation resolve_expr_type(Expr *expr);\n\n  // Get a pointer to the memory location of an lvalue expression\n  llvm::Value *get_lvalue_ptr(Expr *expr, llvm::Type **out_type = nullptr);\n\n  // Let declarations / statements\n  bool gen_let_decl(LetDecl *decl);\n  bool gen_global_let_decl(LetDecl *decl);\n  bool gen_let_stmt(LetStmt *stmt);\n  bool alloc_and_store(const std::string &name, TypeKind kind,\n                       llvm::Value *init, llvm::Type *llvm_type,\n                       TypeAnnotation ann = {});\n  bool alloc_and_store_array(const std::string &name, TypeKind kind,\n                             int array_size, llvm::ArrayType *array_type,\n                             llvm::Value *init,\n                             TypeAnnotation ann = {});\n\n  // Functions\n  bool gen_fn_decl(FnDecl *decl);\n  bool gen_fn_body(FnDecl *decl, llvm::Function *fn);\n\n  // Statements\n  bool gen_stmt(Stmt *stmt);\n  bool gen_return_stmt(ReturnStmt *stmt);\n  bool gen_if_stmt(IfStmt *stmt);\n  bool gen_for_stmt(ForStmt *stmt);\n\n  // Expression evaluation\n  llvm::Value *eval_expr(Expr *expr, llvm::Type *expected_type);\n\n  // Value generators (per-type)\n  llvm::Value *eval_int_init(Expr *expr);\n  llvm::Value *eval_float_init(Expr *expr);\n  llvm::Value *eval_string_init(Expr *expr);\n  llvm::Value *eval_cubical_init(Expr *expr, std::string *debug_out);\n\n  // Array helpers\n  llvm::Value *eval_array_init(Expr *expr, llvm::ArrayType *array_type);\n  llvm::Value *eval_array_literal(ArrayLitExpr *arr, llvm::ArrayType *array_type);\n\n  // LLVM type helpers\n  llvm::Type *get_llvm_type(TypeKind kind);\n  llvm::Type *get_llvm_type(const TypeAnnotation &ann);\n  llvm::StructType *get_tuple_type(const std::vector\u003cTypeAnnotation\u003e &elem_types);\n  static std::string tuple_type_key(const std::vector\u003cTypeAnnotation\u003e &elem_types);\n  llvm::StructType *get_slice_type(const TypeAnnotation &elem_ann);\n\n  // Pattern matching helpers\n  llvm::Value *gen_pattern_check(Pattern *pat, llvm::Value *val,\n                                  const TypeAnnotation &val_ann);\n  bool gen_pattern_bind(Pattern *pat, llvm::Value *val,\n                         const TypeAnnotation &val_ann);\n\n  // Cubical structured value helpers\n  llvm::Constant *build_cubical_constant(const cubical_value::CubicalValue *val);\n  llvm::Type *build_cubical_type(const cubical_value::CubicalValue *val);\n  std::string mangle_ann(const TypeAnnotation &ann);\n  std::string mangle_name(const std::string &fn_name,\n                           const std::vector\u003cTypeAnnotation\u003e &type_args);\n  void substitute_type_params(TypeAnnotation &ann,\n                                const std::vector\u003cstd::string\u003e &param_names,\n                                const std::vector\u003cTypeAnnotation\u003e &type_args);\n  void substitute_type_params_recursive(TypeAnnotation &ann,\n                                         const std::vector\u003cstd::string\u003e &param_names,\n                                         const std::vector\u003cTypeAnnotation\u003e &type_args);\n  bool monomorphize_and_codegen(FnDecl *template_decl,\n                                  const std::vector\u003cTypeAnnotation\u003e &type_args,\n                                  const std::string &mangled_name);\n\n  // Closure helpers\n  int closure_counter = 0;\n  void discover_captures(Expr *expr,\n                           const std::unordered_set\u003cstd::string\u003e &param_names,\n                           std::vector\u003cstd::string\u003e &captures);\n  void discover_captures_in_body(const std::vector\u003cstd::unique_ptr\u003cStmt\u003e\u003e &body,\n                                   const std::unordered_set\u003cstd::string\u003e &param_names,\n                                   std::vector\u003cstd::string\u003e &captures);\n\n  // Function pointer wrapper helpers (for &fn_name expressions)\n  std::map\u003cstd::string, llvm::GlobalVariable *\u003e fnval_globals;\n  llvm::GlobalVariable *get_fnval_wrapper(const std::string &fn_name,\n                                           llvm::Function *f);\n\n  // Source file base directory, used to resolve .cub file paths.\n  std::string base_dir;\n\n  // Region state\n  struct RegionInfo {\n    llvm::AllocaInst *buffer;\n    llvm::Value *current_ptr;\n    llvm::Value *end_ptr;\n    llvm::BasicBlock *end_bb;\n  };\n  std::vector\u003cRegionInfo\u003e region_stack;\n\n  // Region lifetime tracking: variables whose value comes from __region_alloc\n  // (i.e., they point into a region buffer). A return that references any of\n  // these is an error — the region will be freed before the function returns.\n  std::unordered_set\u003cstd::string\u003e region_allocated_vars;\n\n  // Loop state for break/continue\n  struct LoopInfo {\n    std::string label;\n    llvm::BasicBlock *update_bb;\n    llvm::BasicBlock *end_bb;\n  };\n  std::vector\u003cLoopInfo\u003e loop_stack;\n  bool gen_break_stmt(BreakStmt *stmt);\n  bool gen_continue_stmt(ContinueStmt *stmt);\n  bool gen_region_stmt(RegionStmt *stmt);\n\n  // Region lifetime tracking helpers\n  void track_region_alloc_init(const std::string &name, Expr *init_expr);\n  bool check_region_lifetime(ReturnStmt *stmt);\n};"},{"id":"src-cpp/cubical.cpp","name":"cubical.cpp","dir":"src-cpp","ext":".cpp","size":7787,"binary":false,"truncated":false,"content":"#include \"cubical.h\"\n#include \u003calgorithm\u003e\n#include \u003ccctype\u003e\n#include \u003ccstdlib\u003e\n#include \u003cstring\u003e\n#include \u003cutility\u003e\n\nstatic std::string fetch_last_error() {\n  char *err = cubical_get_last_error();\n  if (!err) return {};\n  std::string msg(err);\n  cubical_free_string(err);\n  return msg;\n}\n\ncubical_value::cubical_value(const std::string &source) {\n  {\n    char *res = cubical_eval(source.c_str());\n    if (res) {\n      result_ = res;\n      valid_ = true;\n      cubical_free_string(res);\n      error_msg_.clear();\n    } else {\n      error_msg_ = fetch_last_error();\n      if (error_msg_.empty())\n        error_msg_ = \"cubical evaluation failed (unknown error)\";\n    }\n  }\n  {\n    char *res = cubical_eval_json(source.c_str());\n    if (res) {\n      json_ = res;\n      cubical_free_string(res);\n    }\n  }\n}\n\nconst std::string &cubical_value::error() const {\n  return error_msg_;\n}\n\nint64_t cubical_value::as_int() const {\n  if (!valid_) return -1;\n  auto eq_pos = result_.find(\" = \");\n  if (eq_pos == std::string::npos) return -1;\n  std::string nat_str = result_.substr(eq_pos + 3);\n  return parse_nat(nat_str);\n}\n\nint64_t cubical_value::parse_nat(const std::string &s) const {\n  std::string t = s;\n  while (!t.empty() && t.front() == ' ') t.erase(0, 1);\n  while (!t.empty() && t.back() == ' ') t.pop_back();\n  if (t.empty()) return -1;\n\n  // Try decimal first (Nat may now be displayed as \"253\" instead of\n  // \"suc (suc ... zero)\").\n  try {\n    size_t pos;\n    int64_t val = std::stoll(t, &pos);\n    if (pos == t.length() && val \u003e= 0) {\n      return val;\n    }\n  } catch (...) {}\n\n  while (t.size() \u003e= 2 && t.front() == '(' && t.back() == ')') {\n    t = t.substr(1, t.size() - 2);\n    while (!t.empty() && t.front() == ' ') t.erase(0, 1);\n    while (!t.empty() && t.back() == ' ') t.pop_back();\n\n    try {\n      size_t pos;\n      int64_t val = std::stoll(t, &pos);\n      if (pos == t.length() && val \u003e= 0) {\n        return val;\n      }\n    } catch (...) {}\n  }\n\n  if (t == \"zero\") return 0;\n  if (t.size() \u003e= 4 && t.substr(0, 4) == \"suc \") {\n    int64_t inner = parse_nat(t.substr(4));\n    return (inner \u003e= 0) ? inner + 1 : -1;\n  }\n  if (t.size() \u003e= 4 && t.substr(0, 4) == \"suc(\") {\n    int64_t inner = parse_nat(\"(\" + t.substr(3));\n    return (inner \u003e= 0) ? inner + 1 : -1;\n  }\n  return -1;\n}\n\n// ---------------------------------------------------------------------------\n// Minimal JSON parser for cubical structured values\n// ---------------------------------------------------------------------------\n\nnamespace {\n\nstruct JsonLoc {\n  const std::string &s;\n  size_t pos = 0;\n\n  void skip_ws() {\n    while (pos \u003c s.size() && (s[pos] == ' ' || s[pos] == '\\t' ||\n                              s[pos] == '\\n' || s[pos] == '\\r'))\n      pos++;\n  }\n\n  bool peek(char c) {\n    skip_ws();\n    return pos \u003c s.size() && s[pos] == c;\n  }\n\n  char next() {\n    skip_ws();\n    return pos \u003c s.size() ? s[pos++] : '\\0';\n  }\n\n  bool match(char c) {\n    skip_ws();\n    if (pos \u003c s.size() && s[pos] == c) {\n      pos++;\n      return true;\n    }\n    return false;\n  }\n\n  std::string parse_string() {\n    skip_ws();\n    if (!match('\"')) return {};\n    std::string out;\n    while (pos \u003c s.size() && s[pos] != '\"') {\n      if (s[pos] == '\\\\') {\n        pos++;\n        if (pos \u003e= s.size()) break;\n        switch (s[pos]) {\n          case '\"': out += '\"'; break;\n          case '\\\\': out += '\\\\'; break;\n          case 'n': out += '\\n'; break;\n          case 'r': out += '\\r'; break;\n          case 't': out += '\\t'; break;\n          default: out += s[pos]; break;\n        }\n      } else {\n        out += s[pos];\n      }\n      pos++;\n    }\n    match('\"');\n    return out;\n  }\n\n  int64_t parse_number() {\n    skip_ws();\n    size_t start = pos;\n    if (pos \u003c s.size() && s[pos] == '-') pos++;\n    while (pos \u003c s.size() && s[pos] \u003e= '0' && s[pos] \u003c= '9') pos++;\n    return std::stoll(s.substr(start, pos - start));\n  }\n\n  bool parse_bool() {\n    skip_ws();\n    if (s.substr(pos, 4) == \"true\") { pos += 4; return true; }\n    if (s.substr(pos, 5) == \"false\") { pos += 5; return false; }\n    return false;\n  }\n\n  std::unique_ptr\u003ccubical_value::CubicalValue\u003e parse_value();\n\n  std::unique_ptr\u003ccubical_value::CubicalValue\u003e parse_object() {\n    skip_ws();\n    if (!match('{')) return nullptr;\n    auto val = std::make_unique\u003ccubical_value::CubicalValue\u003e();\n\n    while (!peek('}') && pos \u003c s.size()) {\n      std::string key = parse_string();\n      if (key.empty()) break;\n      match(':');\n      auto v = parse_value();\n      if (!v) break;\n\n      if (key == \"kind\") {\n        if (v-\u003ekind == cubical_value::CubicalValue::String) {\n          if (v-\u003estr_value == \"nat\") val-\u003ekind = cubical_value::CubicalValue::Nat;\n          else if (v-\u003estr_value == \"bool\") val-\u003ekind = cubical_value::CubicalValue::Bool;\n          else if (v-\u003estr_value == \"string\") val-\u003ekind = cubical_value::CubicalValue::String;\n          else if (v-\u003estr_value == \"pair\") val-\u003ekind = cubical_value::CubicalValue::Pair;\n          else if (v-\u003estr_value == \"array\") val-\u003ekind = cubical_value::CubicalValue::Array;\n          else if (v-\u003estr_value == \"constructor\") val-\u003ekind = cubical_value::CubicalValue::Constructor;\n        }\n      } else if (key == \"value\") {\n        if (val-\u003ekind == cubical_value::CubicalValue::Nat) val-\u003enat_value = v-\u003enat_value;\n        else if (val-\u003ekind == cubical_value::CubicalValue::Bool) val-\u003ebool_value = v-\u003ebool_value;\n        else if (val-\u003ekind == cubical_value::CubicalValue::String) val-\u003estr_value = std::move(v-\u003estr_value);\n      } else if (key == \"first\") {\n        val-\u003efirst = std::move(v);\n      } else if (key == \"second\") {\n        val-\u003esecond = std::move(v);\n      } else if (key == \"elements\") {\n        if (v-\u003ekind == cubical_value::CubicalValue::Array) val-\u003eelements = std::move(v-\u003eelements);\n      } else if (key == \"data\") {\n        if (v-\u003ekind == cubical_value::CubicalValue::String) val-\u003edata_name = std::move(v-\u003estr_value);\n      } else if (key == \"constructor\") {\n        if (v-\u003ekind == cubical_value::CubicalValue::String) val-\u003econ_name = std::move(v-\u003estr_value);\n      } else if (key == \"args\") {\n        if (v-\u003ekind == cubical_value::CubicalValue::Array) val-\u003eargs = std::move(v-\u003eelements);\n      }\n\n      match(',');\n    }\n    match('}');\n    return val;\n  }\n};\n\nstd::unique_ptr\u003ccubical_value::CubicalValue\u003e JsonLoc::parse_value() {\n  skip_ws();\n  if (pos \u003e= s.size()) return nullptr;\n\n  if (s[pos] == '{') return parse_object();\n  if (s[pos] == '[') {\n    // Array value\n    match('[');\n    auto arr = std::make_unique\u003ccubical_value::CubicalValue\u003e();\n    arr-\u003ekind = cubical_value::CubicalValue::Array;\n    while (!peek(']') && pos \u003c s.size()) {\n      auto elem = parse_value();\n      if (elem) {\n        arr-\u003eelements.push_back(std::move(elem));\n      }\n      match(',');\n    }\n    match(']');\n    return arr;\n  }\n  if (s[pos] == '\"') {\n    auto str = std::make_unique\u003ccubical_value::CubicalValue\u003e();\n    str-\u003ekind = cubical_value::CubicalValue::String;\n    str-\u003estr_value = parse_string();\n    return str;\n  }\n  if (s[pos] == 't' || s[pos] == 'f') {\n    bool b = parse_bool();\n    auto val = std::make_unique\u003ccubical_value::CubicalValue\u003e();\n    val-\u003ekind = cubical_value::CubicalValue::Bool;\n    val-\u003ebool_value = b;\n    return val;\n  }\n  if (s[pos] == '-' || (s[pos] \u003e= '0' && s[pos] \u003c= '9')) {\n    auto val = std::make_unique\u003ccubical_value::CubicalValue\u003e();\n    val-\u003ekind = cubical_value::CubicalValue::Nat;\n    val-\u003enat_value = parse_number();\n    return val;\n  }\n  return nullptr;\n}\n\n} // anonymous namespace\n\nstd::unique_ptr\u003ccubical_value::CubicalValue\u003e cubical_value::CubicalValue::parse(const std::string &json) {\n  JsonLoc loc{json, 0};\n  return loc.parse_value();\n}\n\nstd::unique_ptr\u003ccubical_value::CubicalValue\u003e cubical_value::parse_json() const {\n  return CubicalValue::parse(json_);\n}\n"},{"id":"src-cpp/cubical.h","name":"cubical.h","dir":"src-cpp","ext":".h","size":2881,"binary":false,"truncated":false,"content":"#pragma once\n\n#include \u003ccstdint\u003e\n#include \u003cmemory\u003e\n#include \u003cstring\u003e\n#include \u003cvector\u003e\n\n// =========================================================================\n// Cubical FFI — link against the Rust cubical_c static library\n// =========================================================================\n\nextern \"C\" {\n/// Evaluate a cubical source string. Returns a C string (caller must free\n/// with cubical_free_string), or nullptr on error.\nchar *cubical_eval(const char *source);\n\n/// Evaluate a cubical source string and return the result as JSON.\n/// Returns a C string (caller must free with cubical_free_string),\n/// or nullptr on error.\nchar *cubical_eval_json(const char *source);\n\n/// Evaluate a cubical source string and return the result as a 64-bit\n/// integer. The expression must evaluate to a natural number (Nat).\n/// Returns -1 on error.\nint64_t cubical_eval_int(const char *source);\n\n/// Get the last error message (caller must free with cubical_free_string).\n/// Returns nullptr if no error.\nchar *cubical_get_last_error();\n\n/// Free a string returned by cubical_eval or cubical_get_last_error.\nvoid cubical_free_string(char *s);\n}\n\n// =========================================================================\n// Cubical C++ Wrapper\n// =========================================================================\n\n/// A compile-time evaluated cubical expression.\nclass cubical_value {\n  std::string result_;\n  bool valid_ = false;\n  std::string error_msg_;\n  std::string json_;\n\npublic:\n  explicit cubical_value(const std::string &source);\n\n  bool valid() const { return valid_; }\n  const std::string &str() const { return result_; }\n  const std::string &error() const;\n\n  /// If the result is a natural number, return its value. Returns -1 if\n  /// the result is not a Nat or evaluation failed.\n  int64_t as_int() const;\n\n  /// Return the raw JSON result string from cubical_eval_json.\n  /// Only valid if valid() is true.\n  const std::string &json() const { return json_; }\n\n  /// Parse the JSON result into a structured value tree.\n  /// Returns nullptr on parse failure.\n  struct CubicalValue;\n  std::unique_ptr\u003cCubicalValue\u003e parse_json() const;\n\n  /// A structured cubical value parsed from JSON.\n  struct CubicalValue {\n    enum Kind { Nat, Bool, Pair, Array, Constructor, String };\n    Kind kind;\n    int64_t nat_value = 0;\n    bool bool_value = false;\n    std::unique_ptr\u003cCubicalValue\u003e first;\n    std::unique_ptr\u003cCubicalValue\u003e second;\n    std::vector\u003cstd::unique_ptr\u003cCubicalValue\u003e\u003e elements;\n    std::string data_name;      // for Constructor\n    std::string con_name;      // for Constructor\n    std::vector\u003cstd::unique_ptr\u003cCubicalValue\u003e\u003e args; // for Constructor\n    std::string str_value;     // for String\n\n    static std::unique_ptr\u003cCubicalValue\u003e parse(const std::string &json);\n  };\n\nprivate:\n  int64_t parse_nat(const std::string &s) const;\n};"},{"id":"src-cpp/error.h","name":"error.h","dir":"src-cpp","ext":".h","size":484,"binary":false,"truncated":false,"content":"#pragma once\n\n#include \u003cstring\u003e\n\n/// Format a compiler error message with optional source location.\n/// When line \u003c= 0, the location is omitted (location unknown).\n/// Output format:\n///   error: \u003cmessage\u003e\n///    --\u003e \u003cfile\u003e:\u003cline\u003e:\u003ccol\u003e\ninline std::string error_at(const std::string &file, int line, int col, const std::string &msg) {\n  if (line \u003c= 0)\n    return \"error: \" + msg;\n  return \"error: \" + msg + \"\\n --\u003e \" + file + \":\" + std::to_string(line) + \":\" + std::to_string(col);\n}\n"},{"id":"src-cpp/lexer.cpp","name":"lexer.cpp","dir":"src-cpp","ext":".cpp","size":12135,"binary":false,"truncated":false,"content":"#include \"lexer.h\"\n\n#include \u003ccctype\u003e\n\nchar Lexer::peek() {\n  if (pos \u003e= input.size()) return '\\0';\n  return input[pos];\n}\n\nchar Lexer::advance() {\n  char c = input[pos++];\n  if (c == '\\n') { line++; col = 1; }\n  else { col++; }\n  return c;\n}\n\nvoid Lexer::skip_whitespace() {\n  while (pos \u003c input.size() && (input[pos] == ' ' || input[pos] == '\\t' || input[pos] == '\\r'))\n    advance();\n}\n\nvoid Lexer::skip_line_comment() {\n  while (pos \u003c input.size() && input[pos] != '\\n') advance();\n}\n\nvoid Lexer::skip_block_comment() {\n  while (pos \u003c input.size()) {\n    if (peek() == '*' && pos + 1 \u003c input.size() && input[pos + 1] == '/') {\n      advance(); advance(); // skip */\n      return;\n    }\n    advance();\n  }\n}\n\nToken Lexer::next_token() {\n  skip_whitespace();\n\n  if (pos \u003e= input.size()) return {TokenType::Eof, \"\", 0, line, col};\n\n  int l = line, c = col;\n  char ch = peek();\n\n  // Line comments and block comments\n  if (ch == '/') {\n    if (pos + 1 \u003c input.size() && input[pos + 1] == '/') {\n      skip_line_comment();\n      return next_token();\n    }\n    if (pos + 1 \u003c input.size() && input[pos + 1] == '*') {\n      advance(); advance(); // skip /*\n      skip_block_comment();\n      return next_token();\n    }\n    if (pos + 1 \u003c input.size() && input[pos + 1] == '=') {\n      advance(); advance();\n      return {TokenType::SlashEq, \"/=\", 0, l, c};\n    }\n    advance();\n    return {TokenType::Slash, \"/\", 0, l, c};\n  }\n\n  // Newlines (statement separators)\n  if (ch == '\\n') {\n    advance();\n    return {TokenType::Newline, \"\\\\n\", 0, l, c};\n  }\n\n  // Single-character tokens\n  if (ch == ';') { advance(); return {TokenType::Semicolon, \";\", 0, l, c}; }\n  if (ch == '(') { advance(); return {TokenType::LParen, \"(\", 0, l, c}; }\n  if (ch == ')') { advance(); return {TokenType::RParen, \")\", 0, l, c}; }\n  if (ch == '{') { advance(); return {TokenType::LBrace, \"{\", 0, l, c}; }\n  if (ch == '}') { advance(); return {TokenType::RBrace, \"}\", 0, l, c}; }\n  if (ch == ',') { advance(); return {TokenType::Comma, \",\", 0, l, c}; }\n  if (ch == '+') {\n    if (pos + 1 \u003c input.size() && input[pos + 1] == '=') {\n      advance(); advance();\n      return {TokenType::PlusEq, \"+=\", 0, l, c};\n    }\n    advance(); return {TokenType::Plus, \"+\", 0, l, c};\n  }\n  if (ch == ':') {\n    if (pos + 1 \u003c input.size() && input[pos + 1] == ':') {\n      advance(); advance();\n      return {TokenType::ColonColon, \"::\", 0, l, c};\n    }\n    advance();\n    return {TokenType::Colon, \":\", 0, l, c};\n  }\n  if (ch == '.') {\n    if (pos + 2 \u003c input.size() && input[pos + 1] == '.' && input[pos + 2] == '.') {\n      advance(); advance(); advance();\n      return {TokenType::Ellipsis, \"...\", 0, l, c};\n    }\n    advance();\n    return {TokenType::Dot, \".\", 0, l, c};\n  }\n  if (ch == '&') {\n    if (pos + 1 \u003c input.size() && input[pos + 1] == '&') {\n      advance(); advance();\n      return {TokenType::AndAnd, \"&&\", 0, l, c};\n    }\n    if (pos + 1 \u003c input.size() && input[pos + 1] == '=') {\n      advance(); advance();\n      return {TokenType::AndEq, \"&=\", 0, l, c};\n    }\n    advance();\n    return {TokenType::Ampersand, \"&\", 0, l, c};\n  }\n  if (ch == '|') {\n    if (pos + 1 \u003c input.size() && input[pos + 1] == '|') {\n      advance(); advance();\n      return {TokenType::OrOr, \"||\", 0, l, c};\n    }\n    if (pos + 1 \u003c input.size() && input[pos + 1] == '=') {\n      advance(); advance();\n      return {TokenType::OrEq, \"|=\", 0, l, c};\n    }\n    advance();\n    return {TokenType::BitOr, \"|\ n    return lex_number(l, c);\n  }\n\n  // Identifiers and keywords\n  if (std::isalpha(ch) || ch == '_') {\n    return lex_identifier(l, c);\n  }\n\n  // Unknown character\n  std::string err = \"unexpected character '\";\n  err += ch;\n  err += \"'\";\n  advance();\n  return {TokenType::Eof, err, 0, l, c};\n}\n\nToken Lexer::lex_string(int l, int c) {\n  advance(); // skip opening \"\n  std::string val;\n  while (pos \u003c input.size() && peek() != '\"') {\n    if (peek() == '\\\\') {\n      advance();\n      if (peek() == 'n') val += '\\n';\n      else if (peek() == 't') val += '\\t';\n      else if (peek() == '\"') val += '\"';\n      else if (peek() == '\\\\') val += '\\\\';\n      else val += peek();\n      advance();\n    } else {\n      val += advance();\n    }\n  }\n  if (pos \u003e= input.size()) {\n    return {TokenType::Eof, \"unterminated string\", 0, l, c};\n  }\n  advance(); // skip closing \"\n  return {TokenType::StringLiteral, val, 0, l, c};\n}\n\nToken Lexer::lex_number(int l, int c) {\n  std::string num;\n  bool is_float = false;\n  if (peek() == '-') { num += advance(); }\n  while (pos \u003c input.size() && std::isdigit(peek())) {\n    num += advance();\n  }\n  if (pos \u003c input.size() && peek() == '.') {\n    is_float = true;\n    num += advance();\n    while (pos \u003c input.size() && std::isdigit(peek())) {\n      num += advance();\n    }\n  }\n  double val = std::stod(num);\n  return {TokenType::Number, num, val, l, c};\n}\n\nToken Lexer::lex_identifier(int l, int c) {\n  std::string id;\n  while (pos \u003c input.size() && (std::isalnum(peek()) || peek() == '_')) {\n    id += advance();\n  }\n\n  if (id == \"let\") return {TokenType::Let, id, 0, l, c};\n  if (id == \"include\") return {TokenType::Include, id, 0, l, c};\n  if (id == \"import\") return {TokenType::Import, id, 0, l, c};\n  if (id == \"package\") return {TokenType::Package, id, 0, l, c};\n  if (id == \"pub\") return {TokenType::Pub, id, 0, l, c};\n  if (id == \"namespace\") return {TokenType::Namespace, id, 0, l, c};\n  if (id == \"extern\") return {TokenType::Extern, id, 0, l, c};\n  if (id == \"fn\") return {TokenType::Fn, id, 0, l, c};\n  if (id == \"lambda\") return {TokenType::Lambda, id, 0, l, c};\n  if (id == \"return\") return {TokenType::Return, id, 0, l, c};\n  if (id == \"asm\") return {TokenType::Asm, id, 0, l, c};\n  if (id == \"atomic\") return {TokenType::Atomic, id, 0, l, c};\n  if (id == \"if\") return {TokenType::If, id, 0, l, c};\n  if (id == \"else\") return {TokenType::Else, id, 0, l, c};\n  if (id == \"for\") return {TokenType::For, id, 0, l, c};\n  if (id == \"break\") return {TokenType::Break, id, 0, l, c};\n  if (id == \"continue\") return {TokenType::Continue, id, 0, l, c};\n  if (id == \"match\") return {TokenType::Match, id, 0, l, c};\n  if (id == \"mut\") return {TokenType::Mut, id, 0, l, c};\n  if (id == \"enum\") return {TokenType::Enum, id, 0, l, c};\n  if (id == \"null\") return {TokenType::Null, id, 0, l, c};\n  if (id == \"cubical\") return {TokenType::Cubical, id, 0, l, c};\n  if (id == \"int\") return {TokenType::Int64, id, 0, l, c};\n  if (id == \"int8\") return {TokenType::Int8, id, 0, l, c};\n  if (id == \"int16\") return {TokenType::Int16, id, 0, l, c};\n  if (id == \"int32\") return {TokenType::Int32, id, 0, l, c};\n  if (id == \"int64\") return {TokenType::Int64, id, 0, l, c};\n  if (id == \"uint8\") return {TokenType::Uint8, id, 0, l, c};\n  if (id == \"uint16\") return {TokenType::Uint16, id, 0, l, c};\n  if (id == \"uint32\") return {TokenType::Uint32, id, 0, l, c};\n  if (id == \"uint64\") return {TokenType::Uint64, id, 0, l, c};\n  if (id == \"float\") return {TokenType::Float64, id, 0, l, c};\n  if (id == \"float16\") return {TokenType::Float16, id, 0, l, c};\n  if (id == \"float32\") return {TokenType::Float32, id, 0, l, c};\n  if (id == \"float64\") return {TokenType::Float64, id, 0, l, c};\n  if (id == \"bool\") return {TokenType::Bool, id, 0, l, c};\n  if (id == \"string\") return {TokenType::String, id, 0, l, c};\n  if (id == \"void\") return {TokenType::Void, id, 0, l, c};\n  if (id == \"char\") return {TokenType::Char, id, 0, l, c};\n  if (id == \"struct\") return {TokenType::Struct, id, 0, l, c};\n  if (id == \"trait\") return {TokenType::Trait, id, 0, l, c};\n  if (id == \"impl\") return {TokenType::Impl, id, 0, l, c};\n  if (id == \"region\") return {TokenType::Region, id, 0, l, c};\n  if (id == \"true\") return {TokenType::True, id, 1.0, l, c};\n  if (id == \"false\") return {TokenType::False, id, 0.0, l, c};\n\n  return {TokenType::Identifier, id, 0, l, c};\n}\n\nToken Lexer::lex_char_literal(int l, int c) {\n  advance(); // skip opening '\n  char val;\n  if (peek() == '\\\\') {\n    advance();\n    switch (peek()) {\n      case 'n': val = '\\n'; break;\n      case 't': val = '\\t'; break;\n      case '\\\\': val = '\\\\'; break;\n      case '\\'': val = '\\''; break;\n      default: val = peek(); break;\n    }\n    advance();\n  } else {\n    if (peek() == '\\'') {\n      return {TokenType::Eof, \"empty char literal\", 0, l, c};\n    }\n    val = advance();\n  }\n  if (peek() != '\\'') {\n    return {TokenType::Eof, \"unterminated char literal\", 0, l, c};\n  }\n  advance(); // skip closing '\n  return {TokenType::CharLiteral, std::string(1, val), (double)(unsigned char)val, l, c};\n}"},{"id":"src-cpp/lexer.h","name":"lexer.h","dir":"src-cpp","ext":".h","size":1557,"binary":false,"truncated":false,"content":"#pragma once\n\n#include \u003cstring\u003e\n\n// =========================================================================\n// Hokkaido Language — Lexer\n// =========================================================================\n\nenum class TokenType {\n  Eof,\n  Let, Fn, Lambda, Return, Asm, If, Else, For, Break, Continue, Atomic, Struct, Include, Namespace, Extern,\n  Trait, Impl,\n  Pub, Import, Package,\n  Match, Enum,\n  Null, Mut,\n  Cubical, Tick,\n  Int8, Int16, Int32, Int64, Uint8, Uint16, Uint32, Uint64, Float16, Float32, Float64, Bool, String, Char, Void,\n  Region,\n  Identifier,\n  Number, True, False,\n  StringLiteral, CharLiteral,\n  Equals, Arrow, FatArrow,\n  Eq, Ne, Less, Greater, LessEqual, GreaterEqual,\n  AndAnd, OrOr, BitOr, Xor, Shr, Shl,\n  PlusEq, MinusEq, StarEq, SlashEq, PercentEq,\n  AndEq, OrEq, XorEq, ShlEq, ShrEq,\n  Semicolon, Comma, Colon, ColonColon, Dot, Ellipsis,\n  Newline,\n  LParen, RParen, LBrace, RBrace,\n  LSquare, RSquare,\n  Plus, Minus, Star, Slash, Percent, Ampersand, BitNot,\n};\n\nstruct Token {\n  TokenType type;\n  std::string text;\n  double num_val = 0;\n  int line = 0;\n  int col = 0;\n};\n\nclass Lexer {\n  std::string input;\n  size_t pos = 0;\n  int line = 1;\n  int col = 1;\n\n  char peek();\n  char advance();\n  void skip_whitespace();\n  void skip_line_comment();\n  void skip_block_comment();\n\npublic:\n  Lexer(const std::string &src) : input(src) {}\n\n  Token next_token();\n\nprivate:\n  Token lex_string(int l, int c);\n  Token lex_number(int l, int c);\n  Token lex_char_literal(int l, int c);\n  Token lex_identifier(int l, int c);\n};"},{"id":"src-cpp/lsp/lsp.cpp","name":"lsp.cpp","dir":"src-cpp/lsp","ext":".cpp","size":30927,"binary":false,"truncated":false,"content":"#include \"lsp/lsp.h\"\n\n#include \u003ccctype\u003e\n#include \u003ccstring\u003e\n#include \u003cfstream\u003e\n#include \u003ciostream\u003e\n#include \u003cset\u003e\n#include \u003csstream\u003e\n\n#include \"llvm/Support/JSON.h\"\n#include \"llvm/Support/raw_ostream.h\"\n\nusing namespace llvm;\n\n// =========================================================================\n// JSON conversion helpers\n// =========================================================================\n\njson::Object to_json(const LSPPosition &pos) {\n  return json::Object{{\"line\", pos.line}, {\"character\", pos.character}};\n}\n\njson::Object to_json(const LSPRange &range) {\n  return json::Object{{\"start\", to_json(range.start)}, {\"end\", to_json(range.end)}};\n}\n\njson::Object to_json(const LSPLocation &loc) {\n  return json::Object{{\"uri\", loc.uri}, {\"range\", to_json(loc.range)}};\n}\n\njson::Object to_json(const LSPDiagnostic &diag) {\n  return json::Object{\n    {\"range\", to_json(diag.range)},\n    {\"message\", diag.message},\n    {\"severity\", diag.severity},\n  };\n}\n\njson::Object to_json(const LSPSymbol &sym) {\n  return json::Object{\n    {\"name\", sym.name},\n    {\"kind\", sym.kind},\n    {\"range\", to_json(sym.range)},\n    {\"selectionRange\", to_json(sym.selection_range)},\n  };\n}\n\njson::Object to_json(const LSPCompletionItem &item) {\n  return json::Object{\n    {\"label\", item.label},\n    {\"detail\", item.detail},\n  };\n}\n\n// =========================================================================\n// Message framing: Content-Length header + JSON body\n// =========================================================================\n\nstd::string LSPServer::read_message() {\n  std::string line;\n  int content_length = -1;\n\n  // Read headers\n  while (true) {\n    line.clear();\n    if (!std::getline(std::cin, line)) {\n      // EOF or error\n      return \"\";\n    }\n    if (line.empty() || line == \"\\r\") break; // end of headers\n\n    // Remove trailing \\r\n    if (!line.empty() && line.back() == '\\r') line.pop_back();\n\n    if (line.rfind(\"Content-Length: \", 0) == 0) {\n      content_length = std::stoi(line.substr(16));\n    }\n  }\n\n  if (content_length \u003c 0) return \"\";\n\n  // Read body\n  std::string body(content_length, '\\0');\n  std::cin.read(&body[0], content_length);\n  if (std::cin.gcount() != content_length) return \"\"; // short read = EOF\n  return body;\n}\n\nvoid write_message(const std::string &body) {\n  std::string header = \"Content-Length: \" + std::to_string(body.size()) + \"\\r\\n\\r\\n\";\n  llvm::outs() \u003c\u003c header \u003c\u003c body;\n  llvm::outs().flush();\n}\n\n// =========================================================================\n// Helpers\n// =========================================================================\n\nstd::string LSPServer::uri_to_path(const std::string &uri) {\n  // file:///path/to/file.hk -\u003e /path/to/file.hk\n  if (uri.rfind(\"file://\", 0) == 0)\n    return uri.substr(7);\n  return uri;\n}\n\nstd::string LSPServer::path_to_uri(const std::string &path) {\n  return \"file://\" + path;\n}\n\nLSPPosition LSPServer::get_position_for_offset(const std::string &text, int offset) {\n  LSPPosition pos;\n  for (int i = 0; i \u003c offset && i \u003c (int)text.size(); i++) {\n    if (text[i] == '\\n') {\n      pos.line++;\n      pos.character = 0;\n    } else {\n      pos.character++;\n    }\n  }\n  return pos;\n}\n\nint LSPServer::get_offset_for_position(const std::string &text, LSPPosition pos) {\n  int line = 0;\n  int col = 0;\n  for (int i = 0; i \u003c (int)text.size(); i++) {\n    if (line == pos.line && col == pos.character)\n      return i;\n    if (text[i] == '\\n') {\n      line++;\n      col = 0;\n    } else {\n      col++;\n    }\n  }\n  return (int)text.size();\n}\n\n// =========================================================================\n// Document management\n// =========================================================================\n\nLSPDocument *LSPServer::get_document(const std::string &uri) {\n  auto it = documents.find(uri);\n  if (it != documents.end()) return &it-\u003esecond;\n  return nullptr;\n}\n\n// =========================================================================\n// Declaration boundary scanner for incremental parsing\n// =========================================================================\n\n/// Find the end offset of a top-level declaration starting at 'start'.\n/// Handles brace-delimited declarations (fn, struct, enum, impl, trait,\n/// namespace) by matching the first { at depth 0 to its matching }.\n/// For other declarations (let, import, include, extern, package),\n/// tracks balanced braces and ends at the first newline at depth 0.\nstatic int find_decl_end(const std::string &text, int start) {\n  bool in_string = false;\n  bool in_char = false;\n  int brace_depth = 0;\n  int text_len = (int)text.size();\n\n  // Determine whether this is a brace-delimited declaration keyword\n  int kw_start = start;\n  // Skip 'pub'\n  if (text.compare(kw_start, 3, \"pub\") == 0 &&\n      (kw_start + 3 \u003e= text_len ||\n       (!isalnum(text[kw_start + 3]) && text[kw_start + 3] != '_'))) {\n    kw_start += 3;\n    while (kw_start \u003c text_len &&\n           (text[kw_start] == ' ' || text[kw_start] == '\\t'))\n      kw_start++;\n  }\n\n  bool brace_delimited = false;\n  {\n    int p = kw_start;\n    while (p \u003c text_len && (isalpha(text[p]) || text[p] == '_')) p++;\n    std::string kw = text.substr(kw_start, p - kw_start);\n    brace_delimited =\n        (kw == \"fn\" || kw == \"struct\" || kw == \"enum\" || kw == \"impl\" ||\n         kw == \"trait\" || kw == \"namespace\");\n  }\n\n  for (int pos = start; pos \u003c text_len; pos++) {\n    char c = text[pos];\n\n    if (c == '\"' && !in_char) {\n      in_string = !in_string;\n      continue;\n    }\n    if (c == '\\'' && !in_string) {\n      in_char = !in_char;\n      continue;\n    }\n    if (in_string || in_char)\n      continue;\n\n    // Skip line comments\n    if (c == '/' && pos + 1 \u003c text_len) {\n      if (text[pos + 1] == '/') {\n        while (pos \u003c text_len && text[pos] != '\\n')\n          pos++;\n        continue;\n      }\n      if (text[pos + 1] == '*') {\n        pos += 2;\n        while (pos + 1 \u003c text_len &&\n               !(text[pos] == '*' && text[pos + 1] == '/'))\n          pos++;\n        if (pos + 1 \u003c text_len)\n          pos++;\n        continue;\n      }\n    }\n\n    if (c == '{') {\n      brace_depth++;\n    } else if (c == '}') {\n      if (brace_delimited && brace_depth == 1) {\n        // Closing the top-level brace block\n        return pos + 1;\n      }\n      brace_depth--;\n      if (brace_depth \u003c 0)\n        brace_depth = 0;\n    }\n\n    // Non-brace declaration ends at newline when not inside braces\n    if (!brace_delimited && brace_depth == 0 && c == '\\n') {\n      return pos + 1;\n    }\n  }\n\n  return text_len;\n}\n\n/// Scan the full source text and return byte ranges for each top-level\n/// declaration.\nstatic std::vector\u003cstd::pair\u003cint, int\u003e\u003e find_decl_boundaries(\n    const std::string &text) {\n  std::vector\u003cstd::pair\u003cint, int\u003e\u003e boundaries;\n  int pos = 0;\n  int text_len = (int)text.size();\n\n  static const char *decl_kw[] = {\"fn\",     \"let\",       \"struct\", \"enum\",\n                                  \"impl\",   \"trait\",     \"namespace\",\n                                  \"package\",\"include\",   \"import\", \"extern\"};\n\n  while (pos \u003c text_len) {\n    // Skip whitespace and blank lines\n    while (pos \u003c text_len && (text[pos] == ' ' || text[pos] == '\\t' ||\n                              text[pos] == '\\n' || text[pos] == '\\r'))\n      pos++;\n\n    if (pos \u003e= text_len)\n      break;\n\n    int start = pos;\n\n    // Check for 'pub' prefix\n    int check = pos;\n    if (text.compare(check, 3, \"pub\") == 0 &&\n        (check + 3 \u003e= text_len ||\n         (!isalnum(text[check + 3]) && text[check + 3] != '_'))) {\n      check += 3;\n      while (check \u003c text_len &&\n             (text[check] == ' ' || text[check] == '\\t'))\n        check++;\n    }\n\n    // Check for declaration-starting keywords\n    bool is_decl = false;\n    for (auto *kw : decl_kw) {\n      size_t klen = std::strlen(kw);\n      if (text.compare(check, klen, kw) == 0 &&\n          (check + (int)klen \u003e= text_len ||\n           (!isalnum(text[check + klen]) && text[check + klen] != '_'))) {\n        is_decl = true;\n        break;\n      }\n    }\n\n    if (is_decl) {\n      int end = find_decl_end(text, start);\n      boundaries.push_back({start, end});\n      pos = end;\n    } else {\n      // Not a declaration - skip to next line\n      while (pos \u003c text_len && text[pos] != '\\n')\n        pos++;\n      if (pos \u003c text_len)\n        pos++;\n    }\n  }\n\n  return boundaries;\n}\n\nvoid LSPServer::parse_document(LSPDocument &doc) {\n  doc.diagnostics.clear();\n  doc.symbols_by_name.clear();\n  doc.all_symbols.clear();\n  doc.decl_ranges.clear();\n\n  Lexer lexer(doc.text);\n  std::string path = uri_to_path(doc.uri);\n  std::string base_dir = \".\";\n  auto slash = path.rfind('/');\n  if (slash != std::string::npos)\n    base_dir = path.substr(0, slash);\n\n  Parser parser(lexer, path, base_dir);\n  auto ast = parser.parse_program();\n\n  // Build decl_ranges by pairing AST with text boundaries\n  auto boundaries = find_decl_boundaries(doc.text);\n  int decl_idx = 0;\n  for (auto &[start, end] : boundaries) {\n    DeclRange dr;\n    dr.start_offset = start;\n    dr.end_offset = end;\n    // Match AST decls to text boundaries (skip side-effect-only decls)\n    while (decl_idx \u003c (int)ast.size()) {\n      dr.decl = std::move(ast[decl_idx]);\n      decl_idx++;\n      break; // Take one decl per boundary (some may produce no AST)\n    }\n    doc.decl_ranges.push_back(std::move(dr));\n  }\n\n  // Build diagnostics from parser errors\n  if (!parser.ok()) {\n    std::string err = parser.error();\n    int err_line = 0, err_col = 0;\n    auto colon_pos = err.rfind(':');\n    if (colon_pos != std::string::npos) {\n      auto colon2 = err.rfind(':', colon_pos - 1);\n      if (colon2 != std::string::npos) {\n        try {\n          err_line = std::stoi(err.substr(colon2 + 1, colon_pos - colon2 - 1)) - 1;\n          err_col = std::stoi(err.substr(colon_pos + 1)) - 1;\n        } catch (...) {}\n      }\n    }\n\n    LSPDiagnostic diag;\n    diag.range.start = {err_line, err_col};\n    diag.range.end = {err_line, err_col + 1};\n    diag.message = err;\n    diag.severity = \"Error\";\n    doc.diagnostics.push_back(diag);\n  }\n\n  build_symbol_index(doc);\n}\n\nvoid LSPServer::parse_document_incremental(LSPDocument &doc,\n                                           const std::string &old_text) {\n  // Find first byte where old and new text differ\n  size_t min_len = std::min(old_text.size(), doc.text.size());\n  size_t diff_pos = 0;\n  while (diff_pos \u003c min_len && old_text[diff_pos] == doc.text[diff_pos])\n    diff_pos++;\n\n  // No change or both empty\n  if (diff_pos == old_text.size() && diff_pos == doc.text.size())\n    return;\n\n  // If no existing decl_ranges, do full parse\n  if (doc.decl_ranges.empty()) {\n    parse_document(doc);\n    return;\n  }\n\n  // Find which declaration in the OLD text contains the change\n  int affected_idx = -1;\n  for (int i = 0; i \u003c (int)doc.decl_ranges.size(); i++) {\n    if (doc.decl_ranges[i].end_offset \u003e (int)diff_pos) {\n      affected_idx = i;\n      break;\n    }\n  }\n\n  // Change is past all decls (appending at EOF), parse from last decl\n  if (affected_idx \u003c 0)\n    affected_idx = (int)doc.decl_ranges.size() - 1;\n\n  // Include one decl before the affected one for safety\n  if (affected_idx \u003e 0)\n    affected_idx--;\n\n  // If re-parsing most of the file, just do full parse\n  if (affected_idx \u003c= (int)doc.decl_ranges.size() / 4) {\n    parse_document(doc);\n    return;\n  }\n\n  // Extract new text from affected position to EOF\n  int start_offset = doc.decl_ranges[affected_idx].start_offset;\n  std::string reparse_text = doc.text.substr(start_offset);\n\n  Lexer re_lexer(reparse_text);\n  std::string path = uri_to_path(doc.uri);\n  std::string base_dir = \".\";\n  auto slash = path.rfind('/');\n  if (slash != std::string::npos)\n    base_dir = path.substr(0, slash);\n\n  Parser re_parser(re_lexer, path, base_dir);\n  auto new_decls = re_parser.parse_program();\n\n  // If re-parse succeeded, replace affected decls\n  if (re_parser.ok() || !new_decls.empty()) {\n    // Remove affected decls from end\n    doc.decl_range
