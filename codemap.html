\n        return nullptr;\n      }\n      type_params.push_back(tp_name);\n      next_token();\n\n      // Parse optional trait bound: T: TraitName\n      if (cur_tok.type == TokenType::Colon) {\n        next_token(); // consume ':'\n        std::vector\u003cstd::string\u003e bounds;\n        while (true) {\n          if (cur_tok.type != TokenType::Identifier) {\n            set_error(\"expected trait name in type parameter bound\");\n            return nullptr;\n          }\n          bounds.push_back(cur_tok.text);\n          next_token();\n          // Support T: Trait1 + Trait2 syntax\n          if (cur_tok.type == TokenType::Plus) {\n            next_token();\n          } else {\n            break;\n          }\n        }\n        type_param_bounds[tp_name] = bounds;\n      }\n    }\n    next_token(); // consume '\u003e'\n  }\n\n  // Push type params into scope for parsing parameter/return types and body\n  for (auto &tp : type_params)\n    type_param_names.insert(tp);\n\n  if (cur_tok.type != TokenType::LParen) {\n    set_error(\"expected '(' after function name\");\n    return nullptr;\n  }\n  next_token();\n\n  std::vector\u003cParam\u003e params;\n  while (cur_tok.type != TokenType::RParen) {\n    if (!params.empty()) {\n      if (cur_tok.type != TokenType::Comma) {\n        set_error(\"expected ',' or ')' in parameter list\");\n        return nullptr;\n      }\n      next_token();\n    }\n    Param param;\n    if (cur_tok.type != TokenType::Identifier) {\n      set_error(\"expected parameter name\");\n      return nullptr;\n    }\n    param.name = cur_tok.text;\n    next_token();\n\n    if (cur_tok.type != TokenType::Colon) {\n      set_error(\"expected ':' after parameter name\");\n      return nullptr;\n    }\n    next_token();\n\n    param.type_ann = parse_type_annotation();\n    if (has_error) return nullptr;\n    params.push_back(std::move(param));\n  }\n  next_token(); // consume ')'\n\n  if (cur_tok.type != TokenType::Arrow) {\n    set_error(\"expected '-\u003e' and return type\");\n    return nullptr;\n  }\n  next_token();\n\n  TypeAnnotation return_type = parse_type_annotation();\n  if (has_error) return nullptr;\n\n  skip_newlines();\n  auto body = parse_block();\n  if (has_error) return nullptr;\n\n  auto decl = make_decl\u003cFnDecl\u003e();\n  decl-\u003ename = name;\n  decl-\u003eparams = std::move(params);\n  decl-\u003ereturn_type = return_type;\n  decl-\u003ebody = std::move(body);\n  decl-\u003etype_params = std::move(type_params);\n  decl-\u003etype_param_bounds = std::move(type_param_bounds);\n  decl-\u003eis_pub = is_pub;\n  // Pop type params from scope\n  for (auto &tp : decl-\u003etype_params)\n    type_param_names.erase(tp);\n  return decl;\n}\n\n// `extern fn name(params, ...) -\u003e T` declares a foreign symbol (typically\n// from a C library) to link against. It has no body — codegen emits an\n// LLVM function declaration only, never a definition — and its parameter\n// list may end in a bare `...` to mark it variadic (e.g. printf).\nstd::unique_ptr\u003cFnDecl\u003e Parser::parse_extern_fn_decl() {\n  next_token(); // consume 'extern'\n\n  if (cur_tok.type != TokenType::Fn) {\n    set_error(\"expected 'fn' after 'extern'\");\n    return nullptr;\n  }\n  next_token(); // consume 'fn'\n\n  if (cur_tok.type != TokenType::Identifier) {\n    set_error(\"expected function name\");\n    return nullptr;\n  }\n  std::string name = cur_tok.text;\n  next_token();\n\n  if (cur_tok.type != TokenType::LParen) {\n    set_error(\"expected '(' after function name\");\n    return nullptr;\n  }\n  next_token();\n\n  std::vector\u003cParam\u003e params;\n  bool is_variadic = false;\n  while (cur_tok.type != TokenType::RParen) {\n    if (!params.empty()) {\n      if (cur_tok.type != TokenType::Comma) {\n        set_error(\"expected ',' or ')' in parameter list\");\n        return nullptr;\n      }\n      next_token();\n    }\n    if (cur_tok.type == TokenType::Ellipsis) {\n      next_token(); // consume '... el: for ...\n  if (cur_tok.type == TokenType::Tick) {\n    next_token();\n    if (cur_tok.type != TokenType::Identifier) {\n      set_error(\"expected identifier after label prefix '\");\n      return nullptr;\n    }\n    std::string label = cur_tok.text;\n    next_token();\n    skip_newlines();\n    if (cur_tok.type != TokenType::Colon) {\n      set_error(\"expected ':' after label name\");\n      return nullptr;\n    }\n    next_token();\n    skip_newlines();\n    if (cur_tok.type != TokenType::For) {\n      set_error(\"expected 'for' after label\");\n      return nullptr;\n    }\n    auto stmt = parse_for_stmt();\n    if (stmt)\n      static_cast\u003cForStmt *\u003e(stmt.get())-\u003elabel = label;\n    return stmt;\n  }\n  if (cur_tok.type == TokenType::Let) {\n    return parse_let_stmt();\n  }\n  if (cur_tok.type == TokenType::Return) {\n    return parse_return_stmt();\n  }\n  if (cur_tok.type == TokenType::If) {\n    return parse_if_stmt();\n  }\n  if (cur_tok.type == TokenType::For) {\n    return parse_for_stmt();\n  }\n  if (cur_tok.type == TokenType::Break) {\n    return parse_break_stmt();\n  }\n  if (cur_tok.type == TokenType::Continue) {\n    return parse_continue_stmt();\n  }\n  if (cur_tok.type == TokenType::Region) {\n    return parse_region_stmt();\n  }\n  auto expr = parse_expr();\n  if (!expr) return nullptr;\n  return make_stmt\u003cExprStmt\u003e(std::move(expr));\n}\n\nstd::unique_ptr\u003cLetStmt\u003e Parser::parse_let_stmt() {\n  next_token(); // consume 'let'\n\n  TypeAnnotation type_ann;\n  std::string name;\n  std::unique_ptr\u003cExpr\u003e init;\n  if (!parse_let_common(type_ann, name, init)) return nullptr;\n\n  auto stmt = make_stmt\u003cLetStmt\u003e();\n  stmt-\u003etype_ann = type_ann;\n  stmt-\u003ename = name;\n  stmt-\u003einit_expr = std::move(init);\n  return stmt;\n}\n\nstd::unique_ptr\u003cReturnStmt\u003e Parser::parse_return_stmt() {\n  next_token(); // consume 'return'\n\n  if (cur_tok.type == TokenType::Number ||\n      cur_tok.type == TokenType::True ||\n      cur_tok.type == TokenType::False ||\n      cur_tok.type == TokenType::CharLiteral ||\n      cur_tok.type == TokenType::StringLiteral ||\n      cur_tok.type == TokenType::Identifier ||\n      cur_tok.type == TokenType::Asm ||\n      cur_tok.type == TokenType::Match ||\n      cur_tok.type == TokenType::Enum ||\n      cur_tok.type == TokenType::LParen ||\n      cur_tok.type == TokenType::LSquare ||\n      cur_tok.type == TokenType::Minus ||\n      cur_tok.type == TokenType::BitNot ||\n      cur_tok.type == TokenType::Star ||\n      cur_tok.type == TokenType::Ampersand ||\n      cur_tok.type == TokenType::Null ||\n      cur_tok.type == TokenType::Lambda) {\n    auto expr = parse_expr();\n    if (!expr) return nullptr;\n    auto stmt = make_stmt\u003cReturnStmt\u003e();\n    stmt-\u003evalue = std::move(expr);\n    return stmt;\n  }\n\n  return make_stmt\u003cReturnStmt\u003e(); // bare return (void)\n}\n\nstd::unique_ptr\u003cIfStmt\u003e Parser::parse_if_stmt() {\n  next_token(); // consume 'if'\n\n  auto cond = parse_expr();\n  if (!cond) return nullptr;\n\n  skip_newlines();\n  auto then_branch = parse_block();\n  if (has_error) return nullptr;\n\n  skip_newlines();\n  std::vector\u003cstd::unique_ptr\u003cStmt\u003e\u003e else_branch;\n  if (cur_tok.type == TokenType::Else) {\n    next_token(); // consume 'else'\n    skip_newlines();\n    if (cur_tok.type == TokenType::If) {\n      // `else if ...` chains: parse the nested if as a single statement\n      // rather than requiring a `{ }` block. gen_if_stmt() runs\n      // else_branch through gen_stmt(), which dynamic_casts back to\n      // IfStmt and recurses, so no codegen changes are needed.\n      auto elseif_stmt = parse_if_stmt();\n      if (!elseif_stmt) return nullptr;\n      else_branch.push_back(std::move(elseif_stmt));\n    } else {\n      else_branch = parse_block();\n      if (has_error) return nullptr;\n    }\n  }\n\n  auto stmt = make_stmt\u003cIfStmt\u003e();\n  stmt-\u003econdition = std::move(cond);\n  stmt-\u003ethen_branch = std::move(then_branch);\n  stmt-\u003eelse_branch = std::move(else_branch);\n  return stmt;\n}\n\nstd::unique_ptr\u003cForStmt\u003e Parser::parse_for_stmt() {\n  next_token(); // consume 'for'\n  skip_newlines();\n\n  std::unique_ptr\u003cStmt\u003e init;\n  if (cur_tok.type == TokenType::Let) {\n    init = parse_let_stmt();\n    if (!init) return nullptr;\n  } else if (cur_tok.type != TokenType::Semicolon) {\n    auto expr = parse_expr();\n    if (!expr) return nullptr;\n    init = make_stmt\u003cExprStmt\u003e(std::move(expr));\n  }\n\n  if (cur_tok.type != TokenType::Semicolon) {\n    set_error(\"expected ';' after for init\");\n    return nullptr;\n  }\n  next_token();\n  skip_newlines();\n\n  std::unique_ptr\u003cExpr\u003e cond;\n  if (cur_tok.type != TokenType::Semicolon) {\n    cond = parse_expr();\n    if (!cond) return nullptr;\n  }\n\n  if (cur_tok.type != TokenType::Semicolon) {\n    set_error(\"expected ';' after for condition\");\n    return nullptr;\n  }\n  next_token();\n  skip_newlines();\n\n  std::unique_ptr\u003cExpr\u003e update;\n  if (cur_tok.type != TokenType::LBrace) {\n    update = parse_expr();\n    if (!update) return nullptr;\n  }\n\n  skip_newlines();\n  auto body = parse_block();\n  if (has_error) return nullptr;\n\n  auto stmt = make_stmt\u003cForStmt\u003e();\n  stmt-\u003einit = std::move(init);\n  stmt-\u003econdition = std::move(cond);\n  stmt-\u003eupdate = std::move(update);\n  stmt-\u003ebody = std::move(body);\n  return stmt;\n}\n\nstd::unique_ptr\u003cBreakStmt\u003e Parser::parse_break_stmt() {\n  next_token(); // consume 'break'\n  skip_newlines();\n  std::string label;\n  if (cur_tok.type == TokenType::Tick) {\n    next_token(); // consume '\n    if (cur_tok.type != TokenType::Identifier) {\n      set_error(\"expected identifier after ' in break\");\n      return nullptr;\n    }\n    label = cur_tok.text;\n    next_token();\n  }\n  auto stmt = make_stmt\u003cBreakStmt\u003e();\n  stmt-\u003elabel = label;\n  return stmt;\n}\n\nstd::unique_ptr\u003cContinueStmt\u003e Parser::parse_continue_stmt() {\n  next_token(); // consume 'continue'\n  skip_newlines();\n  std::string label;\n  if (cur_tok.type == TokenType::Tick) {\n    next_token(); // consume '\n    if (cur_tok.type != TokenType::Identifier) {\n      set_error(\"expected identifier after ' in continue\");\n      return nullptr;\n    }\n    label = cur_tok.text;\n    next_token();\n  }\n  auto stmt = make_stmt\u003cContinueStmt\u003e();\n  stmt-\u003elabel = label;\n  return stmt;\n}\n\nstd::unique_ptr\u003cStmt\u003e Parser::parse_region_stmt() {\n  next_token(); // consume 'region'\n\n  std::string name;\n  if (cur_tok.type == TokenType::Identifier) {\n    name = cur_tok.text;\n    next_token();\n    skip_newlines();\n  }\n\n  if (cur_tok.type != TokenType::LBrace) {\n    set_error(\"expected '{' after region\" + (name.empty() ? \"\" : \" '\" + name + \"'\"));\n    return nullptr;\n  }\n\n  auto body = parse_block();\n  if (has_error) return nullptr;\n\n  auto stmt = make_stmt\u003cRegionStmt\u003e();\n  stmt-\u003ename = name;\n  stmt-\u003ebody = std::move(body);\n  return stmt;\n}\n\n// -------------------------------------------------------------------------\n// Expressions (recursive descent, operator precedence)\n// -------------------------------------------------------------------------\n\nstd::unique_ptr\u003cExpr\u003e Parser::parse_expr() {\n  return parse_assignment();\n}\n\nstd::unique_ptr\u003cExpr\u003e Parser::parse_assignment() {\n  auto left = parse_logical_or();\n  if (!left) return nullptr;\n\n  auto is_lvalue = [](Expr *e) {\n    return dynamic_cast\u003cIdentExpr *\u003e(e) ||\n           dynamic_cast\u003cDerefExpr *\u003e(e) ||\n           dynamic_cast\u003cSubscriptExpr *\u003e(e) ||\n           dynamic_cast\u003cFieldAccessExpr *\u003e(e);\n  };\n\n  BinOp compound_op;\n  bool is_compound = false;\n  if (cur_tok.type == TokenType::PlusEq) { compound_op = BinOp::Add; is_compound = true; }\n  else if (cur_tok.type == TokenType::MinusEq) { compound_op = BinOp::Sub; is_compound = true; }\n  else if (cur_tok.type == TokenType::StarEq) { compound_op = BinOp::Mul; is_compound = true; }\n  else if (cur_tok.type == TokenType::SlashEq) { compound_op = BinOp::Div; is_compound = true; }\n  else if (cur_tok.type == TokenType::PercentEq) { compound_op = BinOp::Mod; is_compound = true; }\n  else if (cur_tok.type == TokenType::AndEq) { compound_op = BinOp::BitAnd; is_compound = true; }\n  else if (cur_tok.type == TokenType::OrEq) { compound_op = BinOp::BitOr; is_compound = true; }\n  else if (cur_tok.type == TokenType::XorEq) { compound_op = BinOp::Xor; is_compound = true; }\n  else if (cur_tok.type == TokenType::ShlEq) { compound_op = BinOp::Shl; is_compound = true; }\n  else if (cur_tok.type == TokenType::ShrEq) { compound_op = BinOp::Shr; is_compound = true; }\n\n  if (is_compound) {\n    if (!is_lvalue(left.get())) {\n      set_error(\"left side of compound assignment must be a variable, dereference, subscript, or field access\");\n      return nullptr;\n    }\n    next_token(); // consume the compound operator\n    auto value = parse_assignment();\n    if (!value) return nullptr;\n    return make_expr\u003cCompoundAssignExpr\u003e(std::move(left), compound_op, std::move(value));\n  }\n\n  if (cur_tok.type == TokenType::Equals) {\n    if (!is_lvalue(left.get())) {\n      set_error(\"left side of assignment must be a variable, dereference, subscript, or field access\");\n      return nullptr;\n    }\n    next_token(); // consume '='\n    auto value = parse_assignment(); // right-associative\n    if (!value) return nullptr;\n    return make_expr\u003cAssignExpr\u003e(std::move(left), std::move(value));\n  }\n  return left;\n}\n\nstd::unique_ptr\u003cExpr\u003e Parser::parse_logical_or() {\n  auto left = parse_logical_and();\n  if (!left) return nullptr;\n\n  while (cur_tok.type == TokenType::OrOr) {\n    next_token();\n    auto right = parse_logical_and();\n    if (!right) return nullptr;\n    left = make_expr\u003cBinaryExpr\u003e(std::move(left), BinOp::Or, std::move(right));\n  }\n  return left;\n}\n\nstd::unique_ptr\u003cExpr\u003e Parser::parse_logical_and() {\n  auto left = parse_bitwise_or();\n  if (!left) return nullptr;\n\n  while (cur_tok.type == TokenType::AndAnd) {\n    next_token();\n    auto right = parse_bitwise_or();\n    if (!right) return nullptr;\n    left = make_expr\u003cBinaryExpr\u003e(std::move(left), BinOp::And, std::move(right));\n  }\n  return left;\n}\n\nstd::unique_ptr\u003cExpr\u003e Parser::parse_bitwise_or() {\n  auto left = parse_bitwise_xor();\n  if (!left) return nullptr;\n\n  while (cur_tok.type == TokenType::BitOr) {\n    next_token();\n    auto right = parse_bitwise_xor();\n    if (!right) return nullptr;\n    left = make_expr\u003cBinaryExpr\u003e(std::move(left), BinOp::BitOr, std::move(right));\n  }\n  return left;\n}\n\nstd::unique_ptr\u003cExpr\u003e Parser::parse_bitwise_xor() {\n  auto left = parse_bitwise_and();\n  if (!left) return nullptr;\n\n  while (cur_tok.type == TokenType::Xor) {\n    next_token();\n    auto right = parse_bitwise_and();\n    if (!right) return nullptr;\n    left = make_expr\u003cBinaryExpr\u003e(std::move(left), BinOp::Xor, std::move(right));\n  }\n  return left;\n}\n\nstd::unique_ptr\u003cExpr\u003e Parser::parse_bitwise_and() {\n  auto left = parse_comparison();\n  if (!left) return nullptr;\n\n  while (cur_tok.type == TokenType::Ampersand) {\n    next_token();\n    auto right = parse_comparison();\n    if (!right) return nullptr;\n    left = make_expr\u003cBinaryExpr\u003e(std::move(left), BinOp::BitAnd, std::move(right));\n  }\n  return left;\n}\n\nstd::unique_ptr\u003cExpr\u003e Parser::parse_comparison() {\n  auto left = parse_shift();\n  if (!left) return nullptr;\n\n  while (cur_tok.type == TokenType::Eq ||\n         cur_tok.type == TokenType::Ne ||\n         cur_tok.type == TokenType::Less r(\"expected ')' to close argument list\");\n      return nullptr;\n    }\n    next_token(); // consume ')'\n    left = std::move(call);\n  }\n  // Handle subscript access: arr[i]\n  while (cur_tok.type == TokenType::LSquare) {\n    next_token(); // consume '['\n    auto index = parse_expr();\n    if (!index) return nullptr;\n    if (cur_tok.type != TokenType::RSquare) {\n      set_error(\"expected ']' after index expression\");\n      return nullptr;\n    }\n    next_token(); // consume ']'\n    left = make_expr\u003cSubscriptExpr\u003e(std::move(left), std::move(index));\n  }\n  // Handle field access: obj.field or obj.0 (tuple positional access)\n  // and method call: obj.method(args)\n  while (cur_tok.type == TokenType::Dot) {\n    next_token(); // consume '.'\n    if (cur_tok.type == TokenType::Number) {\n      // Tuple positional access: .0, .1, etc.\n      std::string field = std::to_string((int)cur_tok.num_val);\n      next_token();\n      left = make_expr\u003cFieldAccessExpr\u003e(std::move(left), field);\n    } else if (cur_tok.type == TokenType::Identifier) {\n      std::string name = cur_tok.text;\n      next_token();\n      // If followed by '(', it's a method call: obj.method(args)\n      if (cur_tok.type == TokenType::LParen) {\n        auto mcall = make_expr\u003cMethodCallExpr\u003e();\n        mcall-\u003eobject = std::move(left);\n        mcall-\u003emethod_name = name;\n        next_token(); // consume '('\n        while (cur_tok.type != TokenType::RParen && cur_tok.type != TokenType::Eof) {\n          if (!mcall-\u003eargs.empty()) {\n            if (cur_tok.type != TokenType::Comma) {\n              set_error(\"expected ',' or ')' in method arguments\");\n              return nullptr;\n            }\n            next_token();\n          }\n          auto arg = parse_expr();\n          if (!arg) return nullptr;\n          mcall-\u003eargs.push_back(std::move(arg));\n        }\n        if (cur_tok.type != TokenType::RParen) {\n          set_erro es();\n      auto ctor = make_expr\u003cConstructorExpr\u003e();\n      ctor-\u003evariant_name = variant_name;\n      ctor-\u003etype_args = std::move(ctor_type_args);\n      bool is_named = false;\n      bool has_fields = false;\n      while (cur_tok.type != TokenType::RBrace && cur_tok.type != TokenType::Eof) {\n        std::string field_name;\n        std::unique_ptr\u003cExpr\u003e field_val;\n        if (cur_tok.type == TokenType::Identifier) {\n          std::string possible_name = cur_tok.text;\n          next_token();\n          skip_newlines();\n          if (cur_tok.type == TokenType::Colon) {\n            // Named field\n            is_named = true;\n            field_name = possible_name;\n            next_token(); // consume ':'\n            skip_newlines();\n            field_val = parse_expr();\n            if (!field_val) return nullptr;\n          } else {\n            // Positional: the identifier is an expression\n            if (is_named && has_fields) {\n              set_error(\"cannot mix named and positional fields\");\n              return nullptr;\n            }\n            field_val = make_expr\u003cIdentExpr\u003e(possible_name);\n          }\n        } else {\n          if (is_named && has_fields) {\n            set_error(\"cannot mix named and positional fields\");\n            return nullptr;\n          }\n          field_val = parse_expr();\n          if (!field_val) return nullptr;\n        }\n        ctor-\u003efields.push_back({field_name, std::move(field_val)});\n        has_fields = true;\n        skip_newlines();\n        if (cur_tok.type == TokenType::Comma) {\n          next_token();\n          skip_newlines();\n        }\n      }\n      if (cur_tok.type != TokenType::RBrace) {\n        set_error(\"expected '}' to close constructor\");\n        return nullptr;\n      }\n      next_token(); // consume '}'\n      return ctor;\n    }\n  }\n  return left;\n}\n\nstd::unique_ptr\u003cExpr\u003e Parser::parse_primary() {\n  if (cur_tok.type == TokenType::True) {\n    auto expr = make_expr\u003cNumberExpr\u003e(cur_tok.num_val);\n    next_token();\n    return expr;\n  }\n  if (cur_tok.type == TokenType::False) {\n    auto expr = make_expr\u003cNumberExpr\u003e(cur_tok.num_val);\n    next_token();\n    return expr;\n  }\n  if (cur_tok.type == TokenType::Number) {\n    auto expr = make_expr\u003cNumberExpr\u003e(cur_tok.num_val);\n    next_token();\n    return expr;\n  }\n  if (cur_tok.type == TokenType::CharLiteral) {\n    auto expr = make_expr\u003cCharExpr\u003e((uint8_t)cur_tok.num_val);\n    next_token();\n    return expr;\n  }\n  if (cur_tok.type == TokenType::StringLiteral) {\n    auto expr = make_expr\u003cStringExpr\u003e(cur_tok.text);\n    next_token();\n    return expr;\n  }\n  if (cur_tok.type == TokenType::Null) {\n    next_token();\n    return make_expr\u003cNullExpr\u003e();\n  }\n  if (cur_tok.type == TokenType::Ampersand) {\n    next_token(); // consume '&'\n    bool is_mut = false;\n    if (cur_tok.type == TokenType::Mut) {\n      is_mut = true;\n      next_token(); // consume 'mut'\n    }\n    auto operand = parse_unary();\n    if (!operand) return nullptr;\n    return make_expr\u003cBorrowExpr\u003e(std::move(operand), is_mut);\n  }\n  if (cur_tok.type == TokenType::LSquare) {\n    return parse_array_literal();\n  }\n  if (cur_tok.type == TokenType::Identifier) {\n    std::string name = cur_tok.text;\n    next_token();\n    while (cur_tok.type == TokenType::ColonColon) {\n      next_token(); // consume '::'\n      // Turbofish: fn::\u003ctype1, type2\u003e(args)\n      if (cur_tok.type == TokenType::Less) {\n        return parse_turbofish_call(name);\n      }\n      if (cur_tok.type != TokenType::Identifier) {\n        set_error(\"expected identifier after '::'\");\n        return nullptr;\n      }\n      name += \"::\" + cur_tok.text;\n      next_token();\n    }\n    if (cur_tok.type == TokenType::LParen) {\n      return parse_call_rest(name);\n    }\n    return make_expr\u003cIdentExpr\u003e(name);\n  }\n  if (cur_tok.type == TokenType::Asm) {\n    next_token(); // consume 'asm'\n    if (cur_tok.type != TokenType::LParen) {\n      set_error(\"expected '(' after asm\");\n      return nullptr;\n    }\n    next_token(); // consume '('\n    if (cur_tok.type != TokenType::StringLiteral) {\n      set_error(\"expected string literal in asm\");\n      return nullptr;\n    }\n    auto expr = make_expr\u003cAsmExpr\u003e();\n    expr-\u003easm_code = cur_tok.text;\n    next_token();\n    if (cur_tok.type != TokenType::RParen) {\n      set_error(\"expected ')'\");\n      return nullptr;\n    }\n    next_token(); // consume ')'\n    return expr;\n  }\n  if (cur_tok.type == TokenType::LParen) {\n    next_token();\n    skip_newlines();\n    auto first = parse_expr();\n    if (!first) return nullptr;\n    skip_newlines();\n    // If followed by a comma, this is a tuple expression\n    if (cur_tok.type == TokenType::Comma) {\n      auto tup = make_expr\u003cTupleExpr\u003e();\n      tup-\u003eelements.push_back(std::move(first));\n      while (cur_tok.type == TokenType::Comma) {\n        next_token(); // consume ','\n        skip_newlines();\n        auto el = parse_expr();\n        if (!el) return nullptr;\n        tup-\u003eelements.push_back(std::move(el));\n        skip_newlines();\n      }\n      if (cur_tok.type != TokenType::RParen) {\n        set_error(\"expected ')' to close tuple expression\");\n        return nullptr;\n      }\n      next_token(); // consume ')'\n      return tup;\n    }\n    // Single expression in parens\n    if (cur_tok.type != TokenType::RParen) {\n      set_error(\"expected ')'\");\n      return nullptr;\n    }\n    next_token();\n    return first;\n  }\n  if (cur_tok.type == TokenType::Match) {\n    return parse_match_expr();\n  }\n  if (cur_tok.type == TokenType::If) {\n    return parse_if_expr();\n  }\n  if (cur_tok.type == TokenType::Atomic) {\n    return parse_atomic_expr();\n  }\n  if (cur_tok.type == TokenType::Lambda) {\n    return parse_lambda_expr();\n  }\n  set_error(\"expected expression\");\n  return nullptr;\n}\n\nstd::unique_ptr\u003cExpr\u003e Parser::parse_if_expr() {\n  next_token(); // consume 'if'\n  auto cond = parse_expr();\n  if (!cond) return nullptr;\n  skip_newlines();\n\n  // if-expression body is a single expression or a block { ... }\n  std::unique_ptr\u003cExpr\u003e then_expr;\n  if (cur_tok.type == TokenType::LBrace) {\n    auto block_stmts = parse_block();\n    if (has_error || block_stmts.empty()) return nullptr;\n    // Wrap the last statement as an expression, or use the single expression\n    then_expr = make_expr\u003cNumberExpr\u003e(0);\n    // For blocks, we need to pick the last expression-stmt as the value.\n    // Currently blocks produce void — this is a simplification.\n    // We evaluate the last expr-stmt's expression.\n    if (auto *es = dynamic_cast\u003cExprStmt *\u003e(block_stmts.back().get())) {\n      then_expr = std::move(es-\u003eexpr);\n      block_stmts.pop_back();\n    }\n    // If there are statements before the final expression, they're side effects.\n    // For now, if-expression blocks must be a single expression or end with one.\n    if (!block_stmts.empty()) {\n      // Still use the last expression as the value; previous stmts are side-effectful\n    }\n  } else {\n    then_expr = parse_expr();\n    if (!then_expr) return nullptr;\n  }\n\n  skip_newlines();\n  if (cur_tok.type != TokenType::Else) {\n    set_error(\"expected 'else' for if-expression\");\n    return nullptr;\n  }\n  next_token(); // consume 'else'\n  skip_newlines();\n\n  std::unique_ptr\u003cExpr\u003e else_expr;\n  if (cur_tok.type == TokenType::If) {\n    else_expr = parse_if_expr();\n    if (!else_expr) return nullptr;\n  } else if (cur_tok.type == TokenType::LBrace) {\n    auto block_stmts = parse_block();\n    if (has_error || block_stmts.empty()) return nullptr;\n    else_expr = make_expr\u003cNumberExpr\u003e(0);\n    if (auto *es = dynamic_cast\u003cExprStmt *\u003e(block_stmts.back().get())) {\n      else_expr = std::move(es-\u003eexpr);\n      block_stmts.pop_back();\n    }\n  } else {\n    else_expr = parse_expr();\n    if (!else_expr) return nullptr;\n  }\n\n  auto expr = make_expr\u003cIfExpr\u003e();\n  expr-\u003econdition = std::move(cond);\n  expr-\u003ethen_expr = std::move(then_expr);\n  expr-\u003eelse_expr = std::move(else_expr);\n  return expr;\n}\n\nstd::unique_ptr\u003cExpr\u003e Parser::parse_array_literal() {\n  next_token(); // consume '['\n  std::vector\u003cstd::unique_ptr\u003cExpr\u003e\u003e elements;\n  while (cur_tok.type != TokenType::RSquare) {\n    if (!elements.empty()) {\n      if (cur_tok.type != TokenType::Comma) {\n        set_error(\"expected ',' or ']' in array literal\");\n        return nullptr;\n      }\n      next_token();\n    }\n    auto el = parse_expr();\n    if (!el) return nullptr;\n    elements.push_back(std::move(el));\n  }\n  next_token(); // consume ']'\n  auto expr = make_expr\u003cArrayLitExpr\u003e();\n  expr-\u003eelements = std::move(elements);\n  return expr;\n}\n\nstd::unique_ptr\u003cExpr\u003e Parser::parse_call_rest(const std::string &name) {\n  next_token(); // consume '('\n\n  std::vector\u003cstd::unique_ptr\u003cExpr\u003e\u003e args;\n  while (cur_tok.type != TokenType::RParen) {\n    if (!args.empty()) {\n      if (cur_tok.type != TokenType::Comma) {\n        set_error(\"expected ',' or ')' in arguments\");\n        return nullptr;\n      }\n      next_token();\n    }\n    auto arg = parse_expr();\n    if (!arg) return nullptr;\n    args.push_back(std::move(arg));\n  }\n  next_token(); // consume ')'\n\n  auto expr = make_expr\u003cCallExpr\u003e();\n  expr-\u003ecallee = name;\n  expr-\u003eargs = std::move(args);\n  return expr;\n}\n\n// Parse a turbofish generic call: name::\u003ctype1, type2\u003e(args...)\n// The current token is '\u003c' (consumed after '::' by parse_primary).\nstd::unique_ptr\u003cExpr\u003e Parser::parse_turbofish_call(const std::string &name) {\n  next_token(); // consume '\u003c'\n\n  std::vector\u003cTypeAnnotation\u003e type_args;\n  while (cur_tok.type != TokenType::Greater) {\n    if (!type_args.empty()) {\n      if (cur_tok.type != TokenType::Comma) {\n        set_error(\"expected ',' or '\u003e' in type arguments\");\n        return nullptr;\n      }\n      next_token();\n    }\n    TypeAnnotation ta = parse_type_annotation();\n    if (has_error) return nullptr;\n    type_args.push_back(ta);\n  }\n  next_token(); // consume '\u003e'\n\n  if (cur_tok.type != TokenType::LParen) {\n    set_error(\"expected '(' after type arguments in generic call\");\n    return nullptr;\n  }\n  next_token(); // consume '('\n\n  std::vector\u003cstd::unique_ptr\u003cExpr\u003e\u003e args;\n  while (cur_tok.type != TokenType::RParen) {\n    if (!args.empty()) {\n      if (cur_tok.type != TokenType::Comma) {\n        set_error(\"expected ',' or ')' in arguments\");\n        return nullptr;\n      }\n      next_token();\n    }\n    auto arg = parse_expr();\n    if (!arg) return nullptr;\n    args.push_back(std::move(arg));\n  }\n  next_token(); // consume ')'\n\n  auto expr = make_expr\u003cCallExpr\u003e();\n  expr-\u003ecallee = name;\n  expr-\u003eargs = std::move(args);\n  expr-\u003etype_args = std::move(type_args);\n  return expr;\n}\n\nstd::unique_ptr\u003cExpr\u003e Parser::parse_match_expr() {\n  next_token(); // consume 'match'\n  auto value = parse_expr();\n  if (!value) return nullptr;\n  skip_newlines();\n  if (cur_tok.type != TokenType::LBrace) {\n    set_error(\"expected '{' after match expression\");\n    return nullptr;\n  }\n  next_token(); // consume '{'\n  skip_newlines();\n\n  auto mexpr = make_expr\u003cMatchExpr\u003e();\n  mexpr-\u003evalue = std::move(value);\n\n  while (cur_tok.type != TokenType::RBrace && cur_tok.type != TokenType::Eof) {\n    auto pattern = parse_pattern();\n    if (!pattern) return nullptr;\n    skip_newlines();\n    if (cur_tok.type != TokenType::FatArrow) {\n      set_error(\"expected '=\u003e' after pattern in match arm\");\n      return nullptr;\n    }\n    next_token(); // consume '=\u003e'\n    skip_newlines();\n    auto body = parse_expr();\n    if (!body) return nullptr;\n    MatchArm arm;\n    arm.pattern = std::move(pattern);\n    arm.expr = std::move(body);\n    mexpr-\u003earms.push_back(std::move(arm));\n    skip_newlines();\n    // Optional comma separator between arms\n    if (cur_tok.type == TokenType::Comma) {\n      next_token();\n      skip_newlines();\n    }\n  }\n  if (cur_tok.type != TokenType::RBrace) {\n    set_error(\"expected '}' to close match\");\n    return nullptr;\n  }\n  next_token(); // consume '}'\n  return mexpr;\n}\n\nstd::unique_ptr\u003cExpr\u003e Parser::parse_lambda_expr() {\n  next_token(); // consume 'lambda'\n\n  if (cur_tok.type != TokenType::LParen) {\n    set_error(\"expected '(' after 'lambda'\");\n    return nullptr;\n  }\n  next_token(); // consume '('\n\n  auto closure = make_expr\u003cClosureExpr\u003e();\n  while (cur_tok.type != TokenType::RParen && cur_tok.type != TokenType::Eof) {\n    if (!closure-\u003eparams.empty()) {\n      if (cur_tok.type != TokenType::Comma) {\n        set_error(\"expected ',' or ')' in lambda parameter list\");\n        return nullptr;\n      }\n      next_token();\n    }\n    Param param;\n    if (cur_tok.type != TokenType::Identifier) {\n      set_error(\"expected parameter name in lambda\");\n      return nullptr;\n    }\n    param.name = cur_tok.text;\n    next_token();\n\n    if (cur_tok.type != TokenType::Colon) {\n      set_error(\"expected ':' after lambda parameter name\");\n      return nullptr;\n    }\n    next_token();\n\n    param.type_ann = parse_type_annotation();\n    if (has_error) return nullptr;\n    closure-\u003eparams.push_back(std::move(param));\n  }\n  next_token(); // consume ')'\n\n  if (cur_tok.type != TokenType::Arrow) {\n    set_error(\"expected '-\u003e' and return type in lambda\");\n    return nullptr;\n  }\n  next_token();\n\n  closure-\u003ereturn_type = parse_type_annotation();\n  if (has_error) return nullptr;\n\n  skip_newlines();\n  closure-\u003ebody = parse_block();\n  if (has_error) return nullptr;\n\n  return closure;\n}\n\nstd::unique_ptr\u003cExpr\u003e Parser::parse_atomic_expr() {\n  next_token(); // consume 'atomic'\n\n  if (cur_tok.type != TokenType::LParen) {\n    set_error(\"expected '(' in atomic expression\");\n    return nullptr;\n  }\n  next_token(); // consume '('\n\n  if (cur_tok.type != TokenType::Identifier) {\n    set_error(\"expected atomic operation name (xchg, add, sub, and, or, xor, cas, fence)\");\n    return nullptr;\n  }\n  std::string op_name = cur_tok.text;\n  next_token();\n\n  AtomicOp op;\n  if (op_name == \"xchg\") op = AtomicOp::Xchg;\n  else if (op_name == \"add\") op = AtomicOp::Add;\n  else if (op_name == \"sub\") op = AtomicOp::Sub;\n  else if (op_name == \"and\") op = AtomicOp::And;\n  else if (op_name == \"or\") op = AtomicOp::Or;\n  else if (op_name == \"xor\") op = AtomicOp::Xor;\n  else if (op_name == \"cas\") op = AtomicOp::CmpXchg;\n  else if (op_name == \"fence\") op = AtomicOp::Fence;\n  else {\n    set_error(\"unknown atomic operation '\" + op_name + \"'\");\n    return nullptr;\n  }\n\n  // Expect comma before first argument (separates op name from args)\n  if (cur_tok.type == TokenType::Comma) {\n    next_token(); // consume comma\n  }\n\n  std::vector\u003cstd::unique_ptr\u003cExpr\u003e\u003e args;\n  while (cur_tok.type != TokenType::RParen && cur_tok.type != TokenType::Eof) {\n    if (!args.empty()) {\n      if (cur_tok.type != TokenType::Comma) {\n        set_error(\"expected ',' or ')' in atomic args\");\n        return nullptr;\n      }\n      next_token();\n    }\n    auto arg = parse_expr();\n    if (!arg) return nullptr;\n    args.push_back(std::move(arg));\n  }\n\n  if (cur_tok.type != TokenType::RParen) {\n    set_error(\"expected ')' after atomic arguments\");\n    return nullptr;\n  }\n  next_token(); // consume ')'\n\n  auto expr = make_expr\u003cAtomicExpr\u003e();\n  expr-\u003eop = op;\n  expr-\u003eargs = std::move(args);\n  return expr;\n}\n\nstd::unique_ptr\u003cPattern\u003e Parser::parse_pattern() {\n  if (cur_tok.type == TokenType::Identifier) {\n    std::string name = cur_tok.text;\n    next_token();\n    // Wildcard\n    if (name == \"_\")\n      return make_pattern\u003cWildcardPattern\u003e();\n    // Qualified enum variant: EnumName::VariantName or VariantName\n    while (cur_tok.type == TokenType::ColonColon) {\n      next_token(); // consume '::'\n      if (cur_tok.type != TokenType::Identifier) {\n        set_error(\"expected variant name after '::'\");\n        return nullptr;\n      }\n      name += \"::\" + cur_tok.text;\n      next_token();\n    }\n    // Struct pattern: Identifier { ... }\n    skip_newlines();\n    if (cur_tok.type == TokenType::LBrace) {\n      next_token(); // consume '{'\n      skip_newlines();\n      auto pat = make_pattern\u003cStructPattern\u003e();\n      pat-\u003estruct_name = name;\n      while (cur_tok.type != TokenType::RBrace && cur_tok.type != TokenType::Eof) {\n        if (cur_tok.type != TokenType::Identifier) {\n          set_error(\"expected field name in struct pattern\");\n          return nullptr;\n        }\n        std::string field_name = cur_tok.text;\n        next_token();\n        skip_newlines();\n        std::unique_ptr\u003cPattern\u003e field_pat;\n        if (cur_tok.type == TokenType::Colon) {\n          next_token(); // consume ':'\n          skip_newlines();\n          field_pat = parse_pattern();\n          if (!field_pat) return nullptr;\n        } else {\n          // Shorthand: field_name acts as both the field name and variable binding\n          field_pat = make_pattern\u003cVariablePattern\u003e(field_name);\n        }\n        pat-\u003efields.push_back({field_name, std::move(field_pat)});\n        skip_newlines();\n        if (cur_tok.type == TokenType::Comma) {\n          next_token();\n          skip_newlines();\n        }\n      }\n      if (cur_tok.type != TokenType::RBrace) {\n        set_error(\"expected '}' to close struct pattern\");\n        return nullptr;\n      }\n      next_token(); // consume '}'\n      return pat;\n    }\n    // Variable pattern\n    return make_pattern\u003cVariablePattern\u003e(name);\n  }\n  if (cur_tok.type == TokenType::Number ||\n      cur_tok.type == TokenType::True ||\n      cur_tok.type == TokenType::False) {\n    auto expr = make_expr\u003cNumberExpr\u003e(cur_tok.num_val);\n    next_token();\n    return make_pattern\u003cLiteralPattern\u003e(std::move(expr));\n  }\n  if (cur_tok.type == TokenType::StringLiteral) {\n    auto expr = make_expr\u003cStringExpr\u003e(cur_tok.text);\n    next_token();\n    return make_pattern\u003cLiteralPattern\u003e(std::move(expr));\n  }\n  if (cur_tok.type == TokenType::Null) {\n    next_token();\n    return make_pattern\u003cLiteralPattern\u003e(make_expr\u003cNullExpr\u003e());\n  }\n  if (cur_tok.type == TokenType::Minus) {\n    next_token();\n    if (cur_tok.type != TokenType::Number) {\n      set_error(\"expected number after '-' in pattern\");\n      return nullptr;\n    }\n    auto expr = make_expr\u003cNumberExpr\u003e(-cur_tok.num_val);\n    next_token();\n    return make_pattern\u003cLiteralPattern\u003e(std::move(expr));\n  }\n  set_error(\"expected pattern\");\n  return nullptr;\n}"},{"id":"src-cpp/parser.h","name":"parser.h","dir":"src-cpp","ext":".h","size":6303,"binary":false,"truncated":false,"content":"#pragma once\n\n#include \u003cmemory\u003e\n#include \u003cset\u003e\n#include \u003cstring\u003e\n#include \u003cunordered_set\u003e\n#include \u003cvector\u003e\n\n#include \"ast.h\"\n#include \"lexer.h\"\n\n// =========================================================================\n// Hokkaido Language — Parser\n// =========================================================================\n\nclass Parser {\n  Lexer &lexer;\n  Token cur_tok;\n  bool has_error = false;\n  std::string error_msg;\n\n  // Directory the current source file lives in; used to resolve relative\n  // `include \"...\"` paths.\n  std::string base_dir;\n  // Module root directory — the nearest parent of base_dir that contains\n  // an `hk.mod` file, or base_dir itself if not found.\n  std::string module_root;\n  // Set of canonical file paths already included, shared across the whole\n  // include tree, so a file (directly or transitively) cannot include\n  // itself and get stuck in infinite recursion.\n  std::shared_ptr\u003cstd::set\u003cstd::string\u003e\u003e included_files;\n  // Set of canonical directory paths already imported (to deduplicate).\n  std::shared_ptr\u003cstd::set\u003cstd::string\u003e\u003e imported_packages;\n\n  void next_token();\n  void skip_newlines();\n  void set_error(const std::string &msg);\n\npublic:\n  Parser(Lexer &lex, std::string source_file, std::string base_dir,\n         std::shared_ptr\u003cstd::set\u003cstd::string\u003e\u003e included_files = nullptr,\n         std::shared_ptr\u003cstd::set\u003cstd::string\u003e\u003e imported_packages = nullptr)\n      : lexer(lex), source_file(std::move(source_file)), base_dir(std::move(base_dir)),\n        included_files(included_files ? std::move(included_files)\n                                       : std::make_shared\u003cstd::set\u003cstd::string\u003e\u003e()),\n        imported_packages(imported_packages ? std::move(imported_packages)\n                                            : std::make_shared\u003cstd::set\u003cstd::string\u003e\u003e()) {\n    module_root = find_module_root(this-\u003ebase_dir);\n    next_token();\n  }\n\n  bool ok() const { return !has_error; }\n  const std::string &error() const { return error_msg; }\n\n  std::vector\u003cstd::unique_ptr\u003cDecl\u003e\u003e parse_program(std::string known_package = \"\");\n\nprivate:\n  // Package name of the current file (set by parse_package_decl).\n  std::string package_name;\n\n  std::string find_module_root(const std::string &dir);\n  bool parse_package_decl();\n  bool parse_import_decl(std::vector\u003cstd::unique_ptr\u003cDecl\u003e\u003e &decls);\n  bool parse_include_decl(std::vector\u003cstd::unique_ptr\u003cDecl\u003e\u003e &decls);\n  bool parse_namespace_decl(std::vector\u003cstd::unique_ptr\u003cDecl\u003e\u003e &decls);\n  void prefix_decl_names(std::vector\u003cstd::unique_ptr\u003cDecl\u003e\u003e &decls, const std::string &prefix);\n  std::unique_ptr\u003cLetDecl\u003e parse_let_decl(bool is_pub);\n  std::unique_ptr\u003cFnDecl\u003e parse_fn_decl(bool is_pub);\n  std::unique_ptr\u003cFnDecl\u003e parse_extern_fn_decl();\n  std::unique_ptr\u003cStructDecl\u003e parse_struct_decl(bool is_pub);\n  std::unique_ptr\u003cAdtDecl\u003e parse_enum_decl(bool is_pub);\n  std::unique_ptr\u003cTraitDecl\u003e parse_trait_decl(bool is_pub);\n  std::unique_ptr\u003cImplDecl\u003e parse_impl_decl();\n  TypeAnnotation parse_type_annotation();\n  TypeAnnotation parse_ref_type(); // parse &T or &mut T\n\n  // Statements\n  std::vector\u003cstd::unique_ptr\u003cStmt\u003e\u003e parse_block();\n  std::unique_ptr\u003cStmt\u003e parse_stmt();\n  std::unique_ptr\u003cLetStmt\u003e parse_let_stmt();\n  std::unique_ptr\u003cReturnStmt\u003e parse_return_stmt();\n  std::unique_ptr\u003cIfStmt\u003e parse_if_stmt();\n  std::unique_ptr\u003cForStmt\u003e parse_for_stmt();\n  std::unique_ptr\u003cBreakStmt\u003e parse_break_stmt();\n  std::unique_ptr\u003cContinueStmt\u003e parse_continue_stmt();\n  std::unique_ptr\u003cStmt\u003e parse_region_stmt();\n\n  // Expressions\n  std::unique_ptr\u003cExpr\u003e parse_expr();\n  std::unique_ptr\u003cExpr\u003e parse_if_expr();\n  std::unique_ptr\u003cExpr\u003e parse_assignment();\n  std::unique_ptr\u003cExpr\u003e parse_logical_or();\n  std::unique_ptr\u003cExpr\u003e parse_logical_and();\n  std::unique_ptr\u003cExpr\u003e parse_bitwise_or();\n  std::unique_ptr\u003cExpr\u003e parse_bitwise_xor();\n  std::unique_ptr\u003cExpr\u003e parse_bitwise_and();\n  std::unique_ptr\u003cExpr\u003e parse_comparison();\n  std::unique_ptr\u003cExpr\u003e parse_shift();\n  std::unique_ptr\u003cExpr\u003e parse_additive();\n  std::unique_ptr\u003cExpr\u003e parse_multiplicative();\n  std::unique_ptr\u003cExpr\u003e parse_unary();\n  std::unique_ptr\u003cExpr\u003e parse_primary();\n  std::unique_ptr\u003cExpr\u003e parse_postfix(std::unique_ptr\u003cExpr\u003e left);\n  std::unique_ptr\u003cExpr\u003e parse_call_rest(const std::string &name);\n  std::unique_ptr\u003cExpr\u003e parse_turbofish_call(const std::string &name);\n  std::unique_ptr\u003cExpr\u003e parse_array_literal();\n  std::unique_ptr\u003cExpr\u003e parse_match_expr();\n  std::unique_ptr\u003cExpr\u003e parse_atomic_expr();\n  std::unique_ptr\u003cExpr\u003e parse_lambda_expr();\n\n  // Patterns\n  std::unique_ptr\u003cPattern\u003e parse_pattern();\n\n  // Set of known enum variant names and struct names — used to distinguish\n  // constructors from other identifier + { patterns (e.g. match arm patterns).\n  std::unordered_set\u003cstd::string\u003e known_variants;\n  std::unordered_set\u003cstd::string\u003e known_structs;\n\n  // Names of type parameters in scope (for generic function bodies).\n  std::unordered_set\u003cstd::string\u003e type_param_names;\n\n  // Source file path for error reporting.\n  std::string source_file;\n\n  // Helpers to create AST nodes with source location pre-filled.\n  template\u003ctypename T, typename... Args\u003e\n  std::unique_ptr\u003cT\u003e make_expr(Args&&... args) {\n    auto node = std::make_unique\u003cT\u003e(std::forward\u003cArgs\u003e(args)...);\n    node-\u003eline = cur_tok.line;\n    node-\u003ecol = cur_tok.col;\n    node-\u003efile = source_file;\n    return node;\n  }\n\n  template\u003ctypename T, typename... Args\u003e\n  std::unique_ptr\u003cT\u003e make_stmt(Args&&... args) {\n    auto node = std::make_unique\u003cT\u003e(std::forward\u003cArgs\u003e(args)...);\n    node-\u003eline = cur_tok.line;\n    node-\u003ecol = cur_tok.col;\n    node-\u003efile = source_file;\n    return node;\n  }\n\n  template\u003ctypename T, typename... Args\u003e\n  std::unique_ptr\u003cT\u003e make_decl(Args&&... args) {\n    auto node = std::make_unique\u003cT\u003e(std::forward\u003cArgs\u003e(args)...);\n    node-\u003eline = cur_tok.line;\n    node-\u003ecol = cur_tok.col;\n    node-\u003efile = source_file;\n    return node;\n  }\n\n  template\u003ctypename T, typename... Args\u003e\n  std::unique_ptr\u003cT\u003e make_pattern(Args&&... args) {\n    auto node = std::make_unique\u003cT\u003e(std::forward\u003cArgs\u003e(args)...);\n    node-\u003eline = cur_tok.line;\n    node-\u003ecol = cur_tok.col;\n    node-\u003efile = source_file;\n    return node;\n  }\n\n  // Shared let helper\n  bool parse_let_common(TypeAnnotation &ann, std::string &name,\n                        std::unique_ptr\u003cExpr\u003e &init);\n};"},{"id":"std/functional.hk","name":"functional.hk","dir":"std","ext":".hk","size":1255,"binary":false,"truncated":false,"content":"package std\n\npub fn twice(f: fn(int) -\u003e int, x: int) -\u003e int {\n    return f(f(x))\n}\n\npub fn thrice(f: fn(int) -\u003e int, x: int) -\u003e int {\n    return f(f(f(x)))\n}\n\npub fn compose(f: fn(int) -\u003e int, g: fn(int) -\u003e int, x: int) -\u003e int {\n    return f(g(x))\n}\n\npub fn apply_n(f: fn(int) -\u003e int, n: int, x: int) -\u003e int {\n    if n \u003c= 0 {\n        return x\n    }\n    return apply_n(f, n - 1, f(x))\n}\n\npub fn fold_int(f: fn(int, int) -\u003e int, init: int, arr: int[], len: int) -\u003e int {\n    if len \u003c= 0 {\n        return init\n    }\n    let i: int = len - 1\n    return f(arr[i], fold_int(f, init, arr, i))\n}\n\npub fn any_int(f: fn(int) -\u003e bool, arr: int[], len: int) -\u003e bool {\n    if len \u003c= 0 {\n        return false\n    }\n    let i: int = len - 1\n    if f(arr[i]) {\n        return true\n    }\n    return any_int(f, arr, i)\n}\n\npub fn all_int(f: fn(int) -\u003e bool, arr: int[], len: int) -\u003e bool {\n    if len \u003c= 0 {\n        return true\n    }\n    let i: int = len - 1\n    let val: int = arr[i]\n    if f(val) {\n        return all_int(f, arr, i)\n    }\n    return false\n}\n\npub fn map_int_into(f: fn(int) -\u003e int, src: int[], dst: int[], len: int) -\u003e int {\n    if len \u003c= 0 {\n        return 0\n    }\n    let i: int = len - 1\n    dst[i] = f(src[i])\n    return map_int_into(f, src, dst, i)\n}\n"},{"id":"std/hk.mod","name":"hk.mod","dir":"std","ext":".mod","size":0,"binary":false,"truncated":false,"content":""},{"id":"std/mem.hk","name":"mem.hk","dir":"std","ext":".hk","size":784,"binary":false,"truncated":false,"content":"package std\n\nextern fn memcpy(dst: int8*, src: int8*, n: int64) -\u003e int8*\nextern fn memset(ptr: int8*, val: int8, n: int64) -\u003e int8*\n\npub fn mem_copy(dst: int8*, src: int8*, n: int64) -\u003e void {\n    memcpy(dst, src, n)\n    return\n}\n\npub fn mem_set(ptr: int8*, val: int8, n: int64) -\u003e void {\n    memset(ptr, val, n)\n    return\n}\n\npub fn mem_zero(ptr: int8*, n: int64) -\u003e void {\n    memset(ptr, 0, n)\n    return\n}\n\npub fn mem_eq(a: int8*, b: int8*, n: int64) -\u003e bool {\n    for let i: int64 = 0; i \u003c n; i = i + 1 {\n        if a[i] != b[i] {\n            return false\n        }\n    }\n    return true\n}\n\npub fn mem_swap(a: int8*, b: int8*, n: int64) -\u003e void {\n    for let i: int64 = 0; i \u003c n; i = i + 1 {\n        let tmp: int8 = a[i]\n        a[i] = b[i]\n        b[i] = tmp\n    }\n    return\n}\n"},{"id":"test/cubical_bool.cub","name":"cubical_bool.cub","dir":"test","ext":".cub","size":70,"binary":false,"truncated":false,"content":"data Bool =\n  | true  : Bool\n  | false : Bool\n\ndef main : Bool = true\n"},{"id":"test/cubical_list.cub","name":"cubical_list.cub","dir":"test","ext":".cub","size":161,"binary":false,"truncated":false,"content":"data Nat  = | zero : Nat | suc : Nat -\u003e Nat\ndata List = | nil : List | cons : Nat -\u003e List -\u003e List\n\ndef main : List = cons (suc zero) (cons (suc (suc zero)) nil)\n"},{"id":"test/cubical_pair.cub","name":"cubical_pair.cub","dir":"test","ext":".cub","size":100,"binary":false,"truncated":false,"content":"data Nat =\n  | zero : Nat\n  | suc  : Nat -\u003e Nat\n\ndef main : Nat * Nat = (suc (suc zero) , suc zero)\n"},{"id":"test/example_cffi.hk","name":"example_cffi.hk","dir":"test","ext":".hk","size":286,"binary":false,"truncated":false,"content":"extern fn puts(s: string) -\u003e int\nextern fn printf(fmt: string, ...) -\u003e int\nextern fn malloc(size: int) -\u003e int8*\nextern fn free(ptr: int8*) -\u003e void\n\nfn main() -\u003e int {\n  puts(\"hello from ffi\")\n  for let i: int = 0; i\u003c 10; i += 1 {\n      printf(\"x = %d, y = %d\\n\", 1, 2)\n  }\n  return 0\n}\n"},{"id":"test/example.cub","name":"example.cub","dir":"test","ext":".cub","size":4905,"binary":false,"truncated":false,"content":"data Nat =\n  | zero : Nat\n  | suc : Nat -\u003e Nat\n\ndef id : (A : U0) -\u003e A -\u003e A = \\A x. x\n\ndef plus : Nat -\u003e Nat -\u003e Nat =\n  \\m n. elim (\\_. Nat)\n    { | zero =\u003e n\n      | suc m' =\u003e suc (plus m' n)\n    } m\n\ndef two : Nat = suc (suc zero)\ndef four : Nat = plus two two\n\ndef isZero : Nat -\u003e Nat =\n  \\n. match n return Nat with\n    | zero =\u003e suc zero\n    | suc m =\u003e zero\n\ndata S1 =\n  | base : S1\n  | loop : S1 [ base , base ]\n\n-- A path is built with interval abstraction\ndef loopPath : Path S1 base base = \u003ci\u003e loop @ i\n\ndef flipLoop : S1 -\u003e S1 =\n  \\x. match x return S1 with\n    | base =\u003e base\n    | loop i =\u003e \u003ci\u003e loop @ (~ i)\n\ndef swap : (A : U0) -\u003e (B : U0) -\u003e A * B -\u003e B * A =\n  \\A B p. (snd p , fst p)\n\ndef compose : (A : U0) -\u003e (B : U0) -\u003e (C : U0)\n            -\u003e (B -\u003e C) -\u003e (A -\u003e B) -\u003e A -\u003e C =\n  \\A B C g f x. g (f x)\n\ndef symPath : (A : U0) -\u003e (x y : A) -\u003e Path A x y -\u003e Path A y x =\n  \\A x y p. \u003ci\u003e p @ (~ i)\n\ndef both : I -\u003e I -\u003e I =\n  \\i j. (i /\\ j) \\/ (~ i)\n\ndef cast : (A B : U0) -\u003e Equiv A B -\u003e A -\u003e B =\n  \\A B e a. equivFwd e a\n\ndef transportExample : (A B : U0) -\u003e Equiv A B -\u003e A -\u003e B =\n  \\A B e a. transport (\u003ci\u003e ua e @ i) a\n\ndef glueExample : (A B : U0) -\u003e (e : Equiv A B) -\u003e (a : A) -\u003e Glue B i1 (\\_. (A, e)) =\n  \\A B e a. glueElem i1 (\\_. a) (equivFwd e a)\n\n-- ── Ordinary datatypes ──────────────────────────────────────\n\ndata Nat =\n  | zero : Nat\n  | suc  : Nat -\u003e Nat\n\ndata Bool =\n  | true  : Bool\n  | false : Bool\n\n-- ── Basic functions ─────────────────────────────────────────\n\ndef id : (A : U0) -\u003e A -\u003e A\n  = \\A x. x\n\ndef not : Bool -\u003e Bool\n  = \\b. match b return Bool with\n      | true  =\u003e false\n      | false =\u003e true\n\ndef add : Nat -\u003e Nat -\u003e Nat\n  = \\m n. match m return Nat with\n      | zero  =\u003e n\n      | suc k =\u003e suc (add k n)\n\ndef mul : Nat -\u003e Nat -\u003e Nat\n  = \\m n. match m return Nat with\n      | zero  =\u003e zero\n      | suc k =\u003e add n (mul k n)\n\ndef fac : Nat -\u003e Nat\n  = \\n. match n return Nat with\n      | zero  =\u003e suc zero\n      | suc k =\u003e mul (suc k) (fac k)\n\ndef fib : Nat -\u003e Nat\n  = \\n. match n return Nat with\n      | zero          =\u003e zero\n      | suc k         =\u003e match k return Nat with\n          | zero          =\u003e suc zero\n          | suc k2        =\u003e add (fib k) (fib k2)\n\n-- ── Higher-order functions ────────────────────────────────────\n\ndef apply : (Nat -\u003e Nat) -\u003e Nat -\u003e Nat\n  = \\f x. f x\n\ndef twice : (Nat -\u003e Nat) -\u003e Nat -\u003e Nat\n  = \\f x. f (f x)\n\n-- ── Higher inductive type: the circle S1 ────────────────────\n-- `loop` is a path constructor: it returns S1, but is decorated\n-- with [base, base], meaning it's a path from base to base.\n\ndata S1 =\n  | base : S1\n  | loop : S1 [ base , base ]\n\n-- A path value built directly via path abstraction (interval lambda).\n-- `\u003ci\u003e base` is the constant path at `base`.\n\ndef reflBase : Path S1 base base\n  = \u003ci\u003e base\n\n-- The loop, viewed as a path, is just the constructor `loop`\n-- applied via path application at the endpoints.\n\ndef loopPath : Path S1 base base\n  = loop\n\n-- Using path application explicitly: loop @ i0 = base, loop @ i1 = base\ndef loopAtStart : S1\n  = loop @ i0\n\ndef loopAtEnd : S1\n  = loop @ i1\n\n-- ── Interval expressions ────────────────────────────────────\n-- meet (/\\), join (\\/), and negation (~) on interval variables.\n\ndef intervalDemo : I -\u003e I -\u003e I\n  = \\i j. (i /\\ j) \\/ (~ i)\n\n-- Using Unicode aliases (∧, ∨, ¬) is equivalent:\ndef intervalDemoUnicode : I -\u003e I -\u003e I\n  = \\i j. (i ∧ j) ∨ (¬ i)\n\n-- ── Pattern matching on a path constructor ──────────────────\n-- Path-constructor cases list ordinary binders first, then the\n-- interval variable last.\n\ndef s1ToBool : S1 -\u003e Bool\n  = \\x. match x return Bool with\n      | base    =\u003e true\n      | loop i  =\u003e \u003ci\u003e true   -- constant on the loop, since endpoints agree\n\n-- ── Sigma (pair) types ───────────────────────────────────────\n\ndef natPair : Nat * Nat\n  = (suc zero, suc (suc zero))\n\ndef fstOfPair : Nat\n  = fst natPair\n\n-- A dependent Sigma: a Bool paired with a Nat that depends on it\n-- (here trivially, but showing the dependent-binder form).\n\ndef depPair : (b : Bool) * Nat\n  = (true, zero)\n\n-- ── Stress test computation ──────────────────────────────────\n-- main = 2 * fac 5 + fib 7\n--      = 2 * 120 + 13\n--      = 253\n\ndef main : Nat\n  = add\n      (mul (suc (suc zero)) (fac (suc (suc (suc (suc (suc zero)))))))\n      (fib (suc (suc (suc (suc (suc (suc (suc zero))))))))\n"},{"id":"test/example.hk","name":"example.hk","dir":"test","ext":".hk","size":350,"binary":false,"truncated":false,"content":"namespace math {\n  fn square(x: int) -\u003e int { return x * x }\n\n  namespace trig {\n    fn double_it(x: int) -\u003e int { return x + x }\n  }\n\n  struct Point { x: int  y: int }\n}\n\nfn main() -\u003e int {\n    let n: cubical = \"../test/example.cub\"\n    let a: int = math::square(5)\n    let b: int = math::trig::double_it(3)\n    let p: math::Point = p\n    return b\n}"},{"id":"test/guessing_game.hk","name":"guessing_game.hk","dir":"test","ext":".hk","size":758,"binary":false,"truncated":false,"content":"extern fn puts(s: string) -\u003e int\nextern fn printf(fmt: string, ...) -\u003e int\nextern fn scanf(fmt: string, ...) -\u003e int\nextern fn rand() -\u003e int\nextern fn srand(seed: int) -\u003e void\nextern fn time(t: int*) -\u003e int\n\nfn main() -\u003e int {\n    let t: int = 0\n    srand(time(&t))\n\n    let secret: int = rand() % 100 + 1\n\n    let guess: int = 0\n    let attempts: int = 0\n\n    puts(\"Guess the number (1-100)!\")\n\n    for ;; {\n        printf(\"Enter guess: \")\n        scanf(\"%ld\", &guess)\n        attempts = attempts + 1\n\n        if guess \u003c secret {\n            puts(\"Too low!\")\n        } else if guess \u003e secret {\n            puts(\"Too high!\")\n        } else {\n            printf(\"Correct! You got it in %ld tries!\\n\", attempts)\n            break\n        }\n    }\n\n    return 0\n}"},{"id":"test/pkgtest/hk.mod","name":"hk.mod","dir":"test/pkgtest","ext":".mod","size":0,"binary":false,"truncated":false,"content":""},{"id":"test/pkgtest/main_alias.hk","name":"main_alias.hk","dir":"test/pkgtest","ext":".hk","size":203,"binary":false,"truncated":false,"content":"package main\n\nextern fn printf(fmt: string, ...) -\u003e int\n\nimport math \"util\"\n\nfn main() -\u003e int {\n    let x: int = math::add(10, 20)\n    printf(\"math::add(10, 20) = %ld\\n\", x)  // expect 30\n    return 0\n}\n"},{"id":"test/pkgtest/main_multi.hk","name":"main_multi.hk","dir":"test/pkgtest","ext":".hk","size":287,"binary":false,"truncated":false,"content":"package main\n\nextern fn printf(fmt: string, ...) -\u003e int\n\nimport \"util\"\n\nfn main() -\u003e int {\n    let x: int = util::add(20, 5)\n    printf(\"add = %ld\\n\", x)             // expect 25\n    let y: int = util::subtract(20, 5)\n    printf(\"subtract = %ld\\n\", y)        // expect 15\n    return 0\n}\n"},{"id":"test/pkgtest/main.hk","name":"main.hk","dir":"test/pkgtest","ext":".hk","size":285,"binary":false,"truncated":false,"content":"package main\n\nextern fn printf(fmt: string, ...) -\u003e int\n\nimport \"util\"\n\nfn main() -\u003e int {\n    let x: int = util::add(10, 20)\n    printf(\"10 + 20 = %ld\\n\", x)       // expect 30\n\n    let y: int = util::multiply(3, 4)\n    printf(\"3 * 4 = %ld\\n\", y)         // expect 12\n\n    return 0\n}\n"},{"id":"test/pkgtest/util/extra.hk","name":"extra.hk","dir":"test/pkgtest/util","ext":".hk","size":74,"binary":false,"truncated":false,"content":"package util\n\npub fn subtract(a: int, b: int) -\u003e int {\n    return a - b\n}\n"},{"id":"test/pkgtest/util/util.hk","name":"util.hk","dir":"test/pkgtest/util","ext":".hk","size":236,"binary":false,"truncated":false,"content":"package util\n\npub fn add(a: int, b: int) -\u003e int {\n    return a + b\n}\n\npub fn multiply(a: int, b: int) -\u003e int {\n    return a * b\n}\n\n// private function — not accessible from other packages\nfn helper(x: int) -\u003e int {\n    return x * 2\n}\n"},{"id":"test/test_atomic.hk","name":"test_atomic.hk","dir":"test","ext":".hk","size":1572,"binary":false,"truncated":false,"content":"extern fn printf(fmt: string, ...) -\u003e int\n\nfn main() -\u003e int {\n    // Test atomic exchange\n    let val: int = 42\n    let old: int = atomic(xchg, &val, 100)\n    printf(\"xchg: old=%ld, new=%ld\\n\", old, val)       // expect old=42, new=100\n\n    // Test atomic add\n    let counter: int = 10\n    let prev: int = atomic(add, &counter, 5)\n    printf(\"add: prev=%ld, now=%ld\\n\", prev, counter)   // expect prev=10, now=15\n\n    // Test atomic sub\n    let x: int = 20\n    let s: int = atomic(sub, &x, 7)\n    printf(\"sub: prev=%ld, now=%ld\\n\", s, x)             // expect prev=20, now=13\n\n    // Test atomic and/or/xor\n    let flags: int = 255\n    let a: int = atomic(and, &flags, 15)\n    printf(\"and: prev=%ld, now=%ld\\n\", a, flags)         // expect prev=255, now=15\n\n    let flags2: int = 240\n    let o: int = atomic(or, &flags2, 15)\n    printf(\"or: prev=%ld, now=%ld\\n\", o, flags2)         // expect prev=240, now=255\n\n    let flags3: int = 255\n    let xr: int = atomic(xor, &flags3, 240)\n    printf(\"xor: prev=%ld, now=%ld\\n\", xr, flags3)        // expect prev=255, now=15\n\n    // Test compare-and-swap\n    let target: int = 50\n    // cas succeeds (target == 50, swap to 99)\n    let old2: int = atomic(cas, &target, 50, 99)\n    printf(\"cas(success): old=%ld, now=%ld\\n\", old2, target)  // expect old=50, now=99\n\n    // cas fails (target != 10, no swap)\n    let old3: int = atomic(cas, &target, 10, 200)\n    printf(\"cas(fail): old=%ld, now=%ld\\n\", old3, target)     // expect old=99, now=99\n\n    // Test fence\n    atomic(fence)\n\n    printf(\"all atomics passed!\\n\")\n    return 0\n}\n"},{"id":"test/test_cubical_bool.hk","name":"test_cubical_bool.hk","dir":"test","ext":".hk","size":375,"binary":false,"truncated":false,"content":"extern fn printf(fmt: string, ...) -\u003e int\n\n// Cubical Bool → int8 (1 for True, 0 for False)\nlet b1: cubical = \"data Bool = | true : Bool | false : Bool\\ndef main : Bool = true\"\nlet b2: cubical = \"data Bool = | false : Bool | true : Bool\\ndef main : Bool = false\"\n\nfn main() -\u003e int {\n    printf(\"b1 = %d (expected 1)\\n\", b1)\n    printf(\"b2 = %d (expected 0)\\n\", b2)\n    0\n}\n"},{"id":"test/test_cubical_comprehensive.hk","name":"test_cubical_comprehensive.hk","dir":"test","ext":".hk","size":2013,"binary":false,"truncated":false,"content":"extern fn printf(fmt: string, ...) -\u003e int\n\n// ── 1. Nat (int64) ──────────────────────────────────────────\nlet n: cubical = \"data Nat = | zero : Nat | suc : Nat -\u003e Nat\\ndef main : Nat = suc (suc (suc (suc (suc zero))))\"\n\n// ── 2. Bool (int8) ──────────────────────────────────────────\nlet t: cubical = \"data Bool = | true : Bool | false : Bool\\ndef main : Bool = true\"\nlet f: cubical = \"data Bool = | false : Bool | true : Bool\\ndef main : Bool = false\"\nlet b2: cubical = \"../test/cubical_bool.cub\"\n\n// ── 3. Pair (LLVM struct) ───────────────────────────────────\nlet pair: cubical = \"data Nat = | zero : Nat | suc : Nat -\u003e Nat\\ndef main : Nat * Nat = (suc (suc zero) , suc zero)\"\nlet pair_file: cubical = \"../test/cubical_pair.cub\"\n\n// ── 4. Nested pair ──────────────────────────────────────────\nlet nested: cubical = \"data Nat = | zero : Nat | suc : Nat -\u003e Nat\\ndef main : Nat * (Nat * Nat) = (suc zero , (suc (suc zero) , suc (suc (suc zero))))\"\n\n// ── 5. Cons-chain (LLVM array) ──────────────────────────────\nlet list: cubical = \"data Nat  = | zero : Nat | suc : Nat -\u003e Nat\\ndata List = | nil : List | cons : Nat -\u003e List -\u003e List\\ndef main : List = cons (suc zero) (cons (suc (suc zero)) nil)\"\n\n// ── 6. String fallback (constructor / universe) ──────────────\nlet flag: cubical = \"def main : U1 = U0\"\nlet constructor: cubical = \"data Nat = | zero : Nat | suc : Nat -\u003e Nat\\ndef main : Nat = zero\"\n\nfn main() -\u003e int {\n    printf(\"n = %ld (expected 5)\\n\", n)\n    printf(\"t = %d (expected 1)\\n\", t)\n    printf(\"f = %d (expected 0)\\n\", f)\n    printf(\"flag = %s\\n\", flag)\n    0\n}\n"},{"id":"test/test_cubical_file.hk","name":"test_cubical_file.hk","dir":"test","ext":".hk","size":157,"binary":false,"truncated":false,"content":"extern fn printf(fmt: string, ...) -\u003e int\n\nlet n: cubical = \"../test/example.cub\"\n\nfn main() -\u003e int {\n    printf(\"n = %ld (expected 5)\\n\", n)\n    return 0\n}\n"},{"id":"test/test_cubical_pair.hk","name":"test_cubical_pair.hk","dir":"test","ext":".hk","size":762,"binary":false,"truncated":false,"content":"extern fn printf(fmt: string, ...) -\u003e int\n\n// Inline pair: (suc (suc zero) , suc zero) = (2, 1)\nlet p1: cubical = \"data Nat = | zero : Nat | suc : Nat -\u003e Nat\\ndef main : Nat * Nat = (suc (suc zero) , suc zero)\"\n\n// Pair from .cub file\nlet p2: cubical = \"../test/cubical_pair.cub\"\n\n// Nested pair: (1, (2, 0))\nlet p3: cubical = \"data Nat = | zero : Nat | suc : Nat -\u003e Nat\\ndef main : Nat * (Nat * Nat) = (suc zero , (suc (suc zero) , zero))\"\n\n// Triple nested: ((1, 2), (3, 4))\nlet p4: cubical = \"data Nat = | zero : Nat | suc : Nat -\u003e Nat\\ndef main : (Nat * Nat) * (Nat * Nat) = ((suc zero , suc (suc zero)) , (suc (suc (suc zero)) , suc (suc (suc (suc zero)))))\"\n\nfn main() -\u003e int {\n    printf(\"all pair tests passed (check IR for struct constants)\\n\")\n    0\n}\n"},{"id":"test/test_cubical.hk","name":"test_cubical.hk","dir":"test","ext":".hk","size":586,"binary":false,"truncated":false,"content":"extern fn printf(fmt: string, ...) -\u003e int\n\n// Inline cubical expression (no .cub file needed)\nlet n: cubical = \"data Nat = | zero : Nat | suc : Nat -\u003e Nat\\ndef main : Nat = suc (suc (suc zero))\"\n\n// Cubical evaluated as string (non-Nat/non-Bool result)\n// U0 has type U1, so this type-checks and evaluates to \"U0\"\nlet flag: cubical = \"def main : U1 = U0\"\n\nfn main() -\u003e int {\n    printf(\"n = %ld (expected 3)\\n\", n)\n\n    // cubical=inline resolves to string for non-Nat/non-Bool results\n    // \"main : U1 = U0\" should be parsed as a string\n    printf(\"flag = %s\\n\", flag)\n    return 0\n}\n"},{"id":"test/test_hof.hk","name":"test_hof.hk","dir":"test","ext":".hk","size":1156,"binary":false,"truncated":false,"content":"// Hokkaido HOF (Higher-Order Function) Test\n// ==========================================\n\n// Test 1: function type annotation with fn(T) -\u003e Ret\nfn add_one(x: int) -\u003e int {\n    return x + 1\n}\n\nfn test_fn_type_param(f: fn(int) -\u003e int, x: int) -\u003e int {\n    return f(x)\n}\n\n// Test 2: &fn_name creates a function value\nfn test_fn_value() -\u003e int {\n    return test_fn_type_param(&add_one, 41)\n}\n\n// Test 3: lambda passed directly\nfn test_lambda_hof() -\u003e int {\n    return test_fn_type_param(lambda (x: int) -\u003e int { return x + 2 }, 40)\n}\n\n// Test 4: lambda with capture passed to HOF\nfn test_capture_hof() -\u003e int {\n    let offset: int = 3\n    return test_fn_type_param(lambda (x: int) -\u003e int { return x + offset }, 39)\n}\n\n// Test 5: closures stored in fn-typed variables\nfn test_fn_variable() -\u003e int {\n    let f: fn(int) -\u003e int = &add_one\n    return f(42)\n}\n\nfn main() -\u003e int {\n    let r1: int = test_fn_value()\n    let r2: int = test_lambda_hof()\n    let r3: int = test_capture_hof()\n    let r4: int = test_fn_variable()\n\n    let total: int = r1 + r2 + r3 + r4\n    // r1 = 42, r2 = 42, r3 = 42, r4 = 43\n    // total = 42 + 42 + 42 + 43 = 169\n    return total\n}\n"},{"id":"test/test_mod_break.hk","name":"test_mod_break.hk","dir":"test","ext":".hk","size":1070,"binary":false,"truncated":false,"content":"extern fn printf(fmt: string, ...) -\u003e int\n\nfn main() -\u003e int {\n    // Test modulo\n    let a: int = 17\n    let b: int = 5\n    let m: int = a % b\n    printf(\"17 %% 5 = %ld\\n\", m)       // expect 2\n\n    // Test compound modulo\n    let x: int = 20\n    x %= 7\n    printf(\"20 %% 7 = %ld\\n\", x)      // expect 6\n\n    // Test break\n    let i: int = 0\n    for ;; {\n        if i \u003e= 3 {\n            break\n        }\n        i = i + 1\n    }\n    printf(\"after break loop, i = %ld\\n\", i)  // expect 3\n\n    // Test continue (find first even \u003e 0)\n    let found: int = 0\n    for let j: int = 1; j \u003c= 20; j = j + 1 {\n        let rem: int = j % 2\n        if rem != 0 {\n            continue\n        }\n        found = j\n        break\n    }\n    printf(\"first even \u003e= 1 = %ld\\n\", found)  // expect 2\n\n    // All features together: sum of evens via modulo\n    let sum: int = 0\n    for let k: int = 1; k \u003c= 10; k = k + 1 {\n        if (k % 2) != 0 {\n            continue\n        }\n        sum = sum + k\n    }\n    printf(\"sum of evens 1..10 = %ld\\n\", sum)  // expect 2+4+6+8+10 = 30\n\n    return 0\n}\n"},{"id":"test/test_phase1_comprehensive.hk","name":"test_phase1_comprehensive.hk","dir":"test","ext":".hk","size":1760,"binary":false,"truncated":false,"content":"extern fn printf(str: int8*) -\u003e int32\n\nfn identity_i16(x: int16) -\u003e int16 {\n  return x\n}\n\nfn add_uint32(a: uint32, b: uint32) -\u003e uint32 {\n  return a + b\n}\n\nfn get_char() -\u003e char {\n  return 'Z'\n}\n\nfn make_tuple(a: int64, b: int64) -\u003e (int64, int64) {\n  return (a, b)\n}\n\nfn main() -\u003e int {\n  // ---- int16 ----\n  let a: int16 = 1000\n  let b: int16 = 3\n  let div_i16: int16 = a / b   // sdiv: 1000/3 = 333\n\n  // ---- unsigned types ----\n  let ua: uint8 = 200\n  let ub: uint8 = 2\n  let udiv_u8: uint8 = ua / ub  // udiv: 200/2 = 100\n  let umod_u8: uint8 = ua % ub  // urem: 0\n\n  // uint32 division with large value\n  let uc: uint32 = 3000000000\n  let ud: uint32 = 3\n  let udiv_u32: uint32 = uc / ud  // udiv\n\n  // uint64 shift (lshr)\n  let ue: uint64 = 100\n  let uf: uint64 = ue \u003e\u003e 1       // lshr → 50\n\n  // unsigned comparison\n  let ug: uint32 = 1\n  let uh: uint32 = 40000\n  let cmp_ult: uint32 = ug \u003c uh   // icmp ult → 1\n\n  // ---- char ----\n  let ca: char = 'A'          // 65\n  let cb: char = '\\t'         // 9\n  let cc: char = '\\\\'         // 92\n  let cd: char = '\\''         // 39\n  let ce: char = get_char()   // 90 ('Z')\n  let cf: char = 65           // numeric literal\n\n  // ---- tuples ----\n  let t1: (int64, int64) = (100, 200)\n  let t1_0: int64 = t1.0\n  let t1_1: int64 = t1.1\n\n  let t2: (int32, int32, int32) = (10, 20, 30)\n  let t2_0: int32 = t2.0\n  let t2_1: int32 = t2.1\n  let t2_2: int32 = t2.2\n\n  // tuple from function\n  let t3: (int64, int64) = make_tuple(42, 99)\n  let t3_0: int64 = t3.0\n  let t3_1: int64 = t3.1\n\n  // ---- function calls with new types ----\n  let fi: int16 = identity_i16(42)\n  let fu: uint32 = add_uint32(1000, 2000)\n\n  // compute final result without mixing widths\n  let result: int64 = t1_0 + t3_1\n  return result\n}\n"},{"id":"test/test_phase1.hk","name":"test_phase1.hk","dir":"test","ext":".hk","size":849,"binary":false,"truncated":false,"content":"extern fn printf(str: int8*) -\u003e int32\n\nfn main() -\u003e int {\n  // Test int16\n  let a: int16 = 100\n  let b: int16 = 200\n  let c: int16 = a + b\n  let d: int16 = a - b\n  let e: int16 = a * b\n  let f: int16 = b / a\n\n  // Test unsigned types\n  let ua: uint8 = 10\n  let ub: uint16 = 20\n  let uc: uint32 = 30\n  let ud: uint64 = 40\n\n  let ue: uint8 = ua + ua\n  let uf: uint32 = uc / uc\n  let ug: uint32 = uc % uc\n\n  // Test char type\n  let ca: char = 'A'\n  let cb: char = '\\n'\n  let cc: char = 65\n\n  // Test tuples\n  let t1: (int32, int32) = (1, 2)\n  let t2: (int64, int64, int64) = (10, 20, 30)\n\n  // Test tuple field access\n  let ta: int32 = t1.0\n  let tb: int32 = t1.1\n\n  let tc: int64 = t2.0\n  let td: int64 = t2.1\n  let te: int64 = t2.2\n\n  // Test nested tuple expression in return (no capture needed)\n  let result: int64 = tc + td + te\n  return result\n}\n"},{"id":"test/test_phase2.hk","name":"test_phase2.hk","dir":"test","ext":".hk","size":943,"binary":false,"truncated":false,"content":"fn main() -\u003e int64 {\n  // ---------- if-expression ----------\n  let a: int64 = if 1 \u003e 0 { 42 } else { 0 }\n  // a should be 42\n\n  // else-if chain\n  let b: int64 = if 2 \u003e 5 { 10 } else if 3 \u003c 4 { 20 } else { 30 }\n  // b should n}\n\n// --- 5. Positional struct constructors ---\nstruct PosPoint { a: int64  b: int64 }\n\nfn test_positional_ctor() -\u003e int64 {\n    let p: PosPoint = PosPoint { 10, 20 }\n    return p.a + p.b\n}\n\n// --- 6. Named struct constructors ---\nstruct NamedPoint { x: int64  y: int64 }\n\nfn test_named_ctor() -\u003e int64 {\n    let p: NamedPoint = NamedPoint { x: 30, y: 40 }\n    return p.x + p.y\n}\n\n// --- 7. Enum variant positional constructor ---\nenum Opt {\n    Some { val: int64 }\n    None\n}\n\nfn test_enum_ctor() -\u003e int64 {\n    let v: Opt = Opt::Some { 42 }\n    return match v {\n        Opt::Some { val: n } =\u003e n\n        Opt::None =\u003e 0\n    }\n}\n\n// --- 8. Enum variant named constructor ---\nfn test_enum_named_ctor() -\u003e int64 {\n    let v: Opt = Opt::Some { val: 99 }\n    return match v {\n        Opt::Some { val: n } =\u003e n\n        Opt::None =\u003e 0\n    }\n}\n\n// --- 9. extern fn malloc/free with raw pointers ---\nextern fn malloc(size: int64) -\u003e int8*\nextern fn free(ptr: int8*) -\u003e void\n\nfn test_malloc_free() -\u003e int64 {\n    let ptr: int8* = malloc(8)\n    let p: int64* = ptr\n    p[0] = 42\n    let r: int64 = p[0]\n    free(ptr)\n    return r\n}\n\nfn main() -\u003e int {\n    let a: int64 = test_array_to_slice()\n    let b: int64 = test_slice_subscript()\n    let c: int = test_slice_int()\n    let d: int64 = test_multi_slice()\n    let e: int64 = test_positional_ctor()\n    let f: int64 = test_named_ctor()\n    let g: int64 = test_enum_ctor()\n    let h: int64 = test_enum_named_ctor()\n    let i: int64 = test_malloc_free()\n    return 0\n}\n"},{"id":"test/test_phase4.hk","name":"test_phase4.hk","dir":"test","ext":".hk","size":1195,"binary":false,"truncated":false,"content":"// Hokkaido Phase 4 — Closures\n// ============================\n\n// Test 1: basic lambda with immediate call\nfn test_basic_call() -\u003e int {\n    return lambda (x: int) -\u003e int { return x + 1 }(5)\n}\n\n// Test 2: closure with capture\nfn test_capture() -\u003e int {\n    let base: int = 7\n    return lambda (x: int) -\u003e int { return x + base }(3)\n}\n\n// Test 3: closure with multiple captures\nfn test_multi_capture() -\u003e int {\n    let a: int = 2\n    let b: int = 3\n    let c: int = 5\n    return lambda (x: int) -\u003e int { return x * a + b * c }(4)\n}\n\n// Test 4: closure with a param\nfn test_multi_param() -\u003e int {\n    return lambda (x: int) -\u003e int { return x + 1 }(10)\n}\n\n// Test 5: nested closure\nfn test_nested() -\u003e int {\n    return lambda (x: int) -\u003e int {\n        return lambda (y: int) -\u003e int { return y + x }(20)\n    }(10)\n}\n\nfn main() -\u003e int {\n    let r1: int = test_basic_call()\n    let r2: int = test_capture()\n    let r3: int = test_multi_capture()\n    let r4: int = test_multi_param()\n    let r5: int = test_nested()\n\n    let total: int = r1 + r2 + r3 + r4 + r5\n    // r1 = 6, r2 = 10, r3 = 4*2 + 3*5 = 8 + 15 = 23\n    // r4 = 11, r5 = 30\n    // total = 6 + 10 + 23 + 11 + 30 = 80\n    return total\n}\n"},{"id":"test/test_phase5.hk","name":"test_phase5.hk","dir":"test","ext":".hk","size":1319,"binary":false,"truncated":false,"content":"// Phase 5a: Generic Structs\n// Tests: generic struct declaration, instantiation, field access,\n// multiple type params, nested generics, generics with functions\n\nstruct Pair\u003cT\u003e {\n    first: T\n    second: T\n}\n\nstruct Triple\u003cA, B, C\u003e {\n    a: A\n    b: B\n    c: C\n}\n\nstruct PairPair {\n    first: Pair\u003cint64\u003e\n    second: Pair\u003cint64\u003e\n}\n\nfn test_basic_generic() -\u003e int64 {\n    let p: Pair\u003cint64\u003e = Pair\u003cint64\u003e { first: 100, second: 200 }\n    return p.first + p.second\n}\n\nfn test_multi_param() -\u003e int64 {\n    let t: Triple\u003cint64, bool, int64\u003e = Triple\u003cint64, bool, int64\u003e { a: 1, b: true, c: 3 }\n    return t.a + t.c\n}\n\nfn test_nested_generic() -\u003e int64 {\n    let inner: Pair\u003cint64\u003e = Pair\u003cint64\u003e { first: 3, second: 7 }\n    let outer: Pair\u003cPair\u003cint64\u003e\u003e = Pair\u003cPair\u003cint64\u003e\u003e { first: inner, second: inner }\n    return outer.first.first + outer.first.second + outer.second.first + outer.second.second\n}\n\nfn test_generic_field() -\u003e int64 {\n    let inner: Pair\u003cint64\u003e = Pair\u003cint64\u003e { first: 5, second: 10 }\n    let p: PairPair = PairPair { first: inner, second: inner }\n    return p.first.first + p.second.second\n}\n\nfn main() -\u003e int {\n    let r1: int64 = test_basic_generic()\n    let r2: int64 = test_multi_param()\n    let r3: int64 = test_nested_generic()\n    let r4: int64 = test_generic_field()\n    return r1 + r2 + r3 + r4\n}\n"},{"id":"test/test_phase5b.hk","name":"test_phase5b.hk","dir":"test","ext":".hk","size":2991,"binary":false,"truncated":false,"content":"// Phase 5b — Traits, Impls, Method Calls, and Trait Bounds\n// Exit code: 370 (= 300 + 50 + 15 + 5)\n\n// --- 1. Inherent impl with method call ---\nstruct Point {\n    x: int64,\n    y: int64,\n}\n\nimpl Point {\n    fn area(self: Point) -\u003e int64 {\n        return self.x * self.y\n    }\n    fn double_area(self: Point) -\u003e int64 {\n        return (self.x * 2) * (self.y * 2)\n    }\n}\n\nfn test_inherent_impl() -\u003e int64 {\n    let p: Point = Point { x: 10, y: 20 }\n    let a: int64 = p.area()\n    if a != 200 {\n        return 1\n    }\n    let da: int64 = p.double_area()\n    if da != 800 {\n        return 2\n    }\n    return 0\n}\n\n// --- 2. Trait decl + impl ---\ntrait Area {\n    fn area(self: Self) -\u003e int64\n}\n\nimpl Area for Point {\n    fn area(self: Point) -\u003e int64 {\n        return self.x * self.y\n    }\n}\n\nfn test_trait_impl() -\u003e int64 {\n    let p: Point = Point { x: 3, y: 7 }\n    let a: int64 = p.area()\n    if a != 21 {\n        return 1\n    }\n    return 0\n}\n\n// --- 3. Method with args ---\nstruct Foo {\n    val: int64,\n}\n\nimpl Foo {\n    fn get(self: Foo) -\u003e int64 {\n        return self.val\n    }\n    fn add(self: Foo, n: int64) -\u003e int64 {\n        return self.val + n\n    }\n}\n\nfn test_method_with_args() -\u003e int64 {\n    let f: Foo = Foo { val: 42 }\n    let v: int64 = f.get()\n    if v != 42 {\n        return 1\n    }\n    let s: int64 = f.add(8)\n    if s != 50 {\n        return 2\n    }\n    return 0\n}\n\n// --- 4. Generic function with trait bound ---\nstruct Rect {\n    w: int64,\n    h: int64,\n}\n\nimpl Area for Rect {\n    fn area(self: Rect) -\u003e int64 {\n        return self.w * self.h\n    }\n}\n\nfn double_area\u003cT: Area\u003e(x: T) -\u003e int64 {\n    return x.area() * 2\n}\n\nfn test_generic_trait_bound() -\u003e int64 {\n    let r: Rect = Rect { w: 3, h: 4 }\n    let da: int64 = double_area::\u003cRect\u003e(r)\n    if da != 24 {\n        return 1\n    }\n    let p: Point = Point { x: 5, y: 6 }\n    let pa: int64 = double_area::\u003cPoint\u003e(p)\n    if pa != 60 {\n        return 2\n    }\n    return 0\n}\n\n// --- 5. Multiple trait methods ---\ntrait Describe {\n    fn name(self: Self) -\u003e int64\n    fn value(self: Self) -\u003e int64\n}\n\nstruct Widget {\n    id: int64,\n    data: int64,\n}\n\nimpl Describe for Widget {\n    fn name(self: Widget) -\u003e int64 {\n        return self.id\n    }\n    fn value(self: Widget) -\u003e int64 {\n        return self.data\n    }\n}\n\nfn test_multi_method_trait() -\u003e int64 {\n    let w: Widget = Widget { id: 7, data: 42 }\n    let n: int64 = w.name()\n    if n != 7 {\n        return 1\n    }\n    let v: int64 = w.value()\n    if v != 42 {\n        return 2\n    }\n    return 0\n}\n\nfn main() -\u003e int64 {\n    let r1: int64 = test_inherent_impl()\n    if r1 != 0 { return 300 + 1 }\n\n    let r2: int64 = test_trait_impl()\n    if r2 != 0 { return 300 + r2 }\n\n    let r3: int64 = test_method_with_args()\n    if r3 != 0 { return 300 + 10 + r3 }\n\n    let r4: int64 = test_multi_method_trait()\n    if r4 != 0 { return 300 + 20 + r4 }\n\n    let r5: int64 = test_generic_trait_bound()\n    if r5 != 0 { return 300 + 30 + r5 }\n\n    return 300 + 50 + 15 + 5\n}\n"},{"id":"testnix/hk.mod","name":"hk.mod","dir":"testnix","ext":".mod","size":0,"binary":false,"truncated":false,"content":""},{"id":"testnix/otaru.toml","name":"otaru.toml","dir":"testnix","ext":".toml","size":91,"binary":false,"truncated":false,"content":"[package]\nname = \"testnix\"\nversion = \"0.1.0\"\nauthors = []\nedition = \"2024\"\n\n[dependencies]\n"},{"id":"testnix/src/main.hk","name":"main.hk","dir":"testnix/src","ext":".hk","size":34,"binary":false,"truncated":false,"content":"fn main() -\u003e int {\n    return 0\n}\n"}],"edges":[{"from":".github/workflows/release.yml","to":"docs/lsp.md","via":"lsp"},{"from":".github/workflows/release.yml","to":"src-cpp/lsp/lsp.cpp","via":"lsp"},{"from":".github/workflows/release.yml","to":"src-cpp/lsp/lsp.h","via":"lsp"},{"from":".github/workflows/release.yml","to":"flake.lock","via":"flake"},{"from":".github/workflows/release.yml","to":"flake.nix","via":"flake"},{"from":".github/workflows/release.yml","to":"otaru/src/build.rs","via":"build"},{"from":".github/workflows/release.yml","to":"otaru/src/install.rs","via":"install"},{"from":".github/workflows/release.yml","to":"otaru/src/run.rs","via":"run"},{"from":".github/workflows/release.yml","to":"otaru.toml","via":"otaru"},{"from":".github/workflows/release.yml","to":"testnix/otaru.toml","via":"otaru"},{"from":".gitignore","to":"otaru/src/build.rs","via":"build"},{"from":".gitignore","to":"otaru.toml","via":"otaru"},{"from":".gitignore","to":"testnix/otaru.toml","via":"otaru"},{"from":"Cargo.toml","to":"src/lib.rs","via":"lib"},{"from":"Cargo.toml","to":"src-cpp/cubical.cpp","via":"cubical"},{"from":"Cargo.toml","to":"src-cpp/cubical.h","via":"cubical"},{"from":"CMakeLists.txt","to":"src-cpp/borrow_checker.cpp","via":"borrow_checker.cpp"},{"from":"CMakeLists.txt","to":"src-cpp/codegen_decl.cpp","via":"cod
