)\n        }\n    }\n}\n\n#[unsafe(no_mangle)]\npub extern \"C\" fn cubical_eval_json(source: *const c_char) -\u003e *mut c_char {\n    if source.is_null() {\n        return std::ptr::null_mut();\n    }\n    let c_str = unsafe { CStr::from_ptr(source) };\n    let src = match c_str.to_str() {\n        Ok(s) =\u003e s,\n        Err(_) =\u003e {\n            set_last_error(\"invalid UTF-8 in cubical source\".to_string());\n            return std::ptr::null_mut();\n        }\n    };\n    match eval_cubical_json(src) {\n        Ok(result) =\u003e match CString::new(result) {\n            Ok(cs) =\u003e cs.into_raw(),\n            Err(_) =\u003e {\n                set_last_error(\"cubical result contains null bytes\".to_string());\n                std::ptr::null_mut()\n            }\n        },\n        Err(e) =\u003e {\n            set_last_error(e);\n            std::ptr::null_mut()\n        }\n    }\n}\n\n#[unsafe(no_mangle)]\npub extern \"C\" fn cubical_eval_int(source: *const c_char) -\u003e i64 {\n    if source.is_null() {\n        set_last_error(\"null cubical source pointer\".to_string());\n        return -1;\n    }\n    let c_str = unsafe { CStr::from_ptr(source) };\n    let src = match c_str.to_str() {\n        Ok(s) =\u003e s,\n        Err(_) =\u003e {\n            set_last_error(\"invalid UTF-8 in cubical source\".to_string());\n            return -1;\n        }\n    };\n    match eval_cubical_source(src) {\n        Ok(result_str) =\u003e {\n            let eq_pos = match result_str.find(\" = \") {\n                Some(p) =\u003e p,\n                None =\u003e {\n                    set_last_error(format!(\"unexpected cubical output format: {}\", result_str));\n                    return -1;\n                }\n            };\n            let nat_str = result_str[eq_pos + 3..].trim();\n            let val = parse_nat_str(nat_str);\n            if val \u003c 0 {\n                set_last_error(format!(\"cannot parse '{}' as a natural number\", nat_str));\n            }\n            val\n        }\n        Err(e) =\u003e {\n            set_last_error(e);\n            -1\n        }\n    }\n}\n\nfn parse_nat_str(s: &str) -\u003e i64 {\n    let t = s.trim();\n    if t.is_empty() {\n        return -1;\n    }\n\n    if let Ok(n) = t.parse::\u003ci64\u003e() {\n        if n \u003e= 0 {\n            return n;\n        }\n    }\n\n    let inner = if t.starts_with('(') && t.ends_with(')') {\n        t[1..t.len() - 1].trim()\n    } else {\n        t\n    };\n    if inner == \"zero\" {\n        return 0;\n    }\n    if let Some(rest) = inner.strip_prefix(\"suc \") {\n        let n = parse_nat_str(rest);\n        return if n \u003e= 0 { n + 1 } else { -1 };\n    }\n    if let Some(rest) = inner.strip_prefix(\"suc(\") {\n        let wrapped = format!(\"({}\", rest);\n        let n = parse_nat_str(&wrapped);\n        return if n \u003e= 0 { n + 1 } else { -1 };\n    }\n    if t.starts_with('(') && t.ends_with(')') {\n        let inner2 = t[1..t.len() - 1].trim();\n        if let Ok(n) = inner2.parse::\u003ci64\u003e() {\n            if n \u003e= 0 {\n                return n;\n            }\n        }\n    }\n    -1\n}\n\n#[unsafe(no_mangle)]\npub extern \"C\" fn cubical_free_string(s: *mut c_char) {\n    if !s.is_null() {\n        unsafe {\n            let _ = CString::from_raw(s);\n        }\n    }\n}\n\n/// Build a shared globals Vec from env.defs and evaluate all definition bodies,\n/// replacing placeholders with computed values.\n///\n/// Definitions are evaluated oldest-first so that earlier (older) definitions\n/// are available when evaluating later (newer) ones.  The shared `Globals`\n/// ensures that closures created during evaluation see updated values when\n/// recursive calls unfold.\nfn build_def_values(env: &Env) -\u003e Globals {\n    let n = env.defs.len();\n    // Placeholder for every definition (to be replaced after evaluation).\n    let placeholder = Value::VNeutral(Neutral::NVar(0));\n    let globals: Globals = std::rc::Rc::new(std::cell::RefCell::new(vec![placeholder; n]));\n\n    // Evaluate oldest (highest index) to newest (index 0).\n    for idx in (0..n).rev() {\n        let (_, _, val) = &env.defs[idx];\n        let v = eval_nbe(&[], &globals, idx, val);\n        globals.borrow_mut()[idx] = v;\n    }\n\n    globals\n}\n\nfn eval_cubical_source(source: &str) -\u003e Result\u003cString, String\u003e {\n    let mut env = Env::new();\n    let mut parser = ProgramParser::new(source).map_err(|e| e.to_string())?;\n    let mut last_name = String::new();\n    let mut last_term: Option\u003cTerm\u003e = None;\n\n    while let Some(decl) = parser.next_decl().map_err(|e| e.to_string())? {\n        match decl {\n            crate::cubical::parser::Decl::Import { .. } =\u003e {\n                return Err(\"import not supported\".to_string());\n            }\n            crate::cubical::parser::Decl::Data(dt) =\u003e {\n                env.declare_datatype(dt);\n            }\n            crate::cubical::parser::Decl::Def { name, ty, val } =\u003e {\n                let closed_ty = apply_globals(&env.defs, &ty);\n                env.define(name.clone(), closed_ty.clone(), val.clone());\n                typechecker::check_dt(\n                    &env.datatypes,\n                    &global_ctx(&env.defs),\n                    &val,\n                    &closed_ty,\n                )\n                .map_err(|e| format!(\"type error in '{}': {}\", name, e))?;\n                last_name = name;\n                last_term = Some(val);\n            }\n        }\n    }\n\n    let (name, val) = if let Some(entry) = env.defs.iter().find(|(n, _, _)| n == \"main\") {\n        (entry.0.clone(), entry.2.clone())\n    } else if let (Some(n), Some(v)) = (Some(last_name), last_term) {\n        (n, v)\n    } else {\n        return Err(\"no definition to evaluate\".to_string());\n    };\n\n    // Build global definition values with shared globals (Rc\u003cRefCell\u003cVec\u003cValue\u003e\u003e\u003e).\n    // Closures created during evaluation share the same globals, so recursive\n    // self-references resolve correctly after placeholder replacement.\n    let globals = build_def_values(&env);\n\n    let global_names: Vec\u003cString\u003e = env.defs.iter().map(|(n, _, _)| n.clone()).collect();\n\n    // The target term is the most recently parsed definition, so global_offset = 0\n    // (meaning TVar(0) is the most recent global = the target itself at env.defs[0]).\n    let nf = nbe_eval_with_globals(&val, &globals, 0);\n    let result = show_term(&global_names, &nf);\n\n    Ok(format!(\"{} = {}\", name, result))\n}\n\nfn eval_cubical_json(source: &str) -\u003e Result\u003cString, String\u003e {\n    let mut env = Env::new();\n    let mut parser = ProgramParser::new(source).map_err(|e| e.to_string())?;\n\n    while let Some(decl) = parser.next_decl().map_err(|e| e.to_string())? {\n        match decl {\n            crate::cubical::parser::Decl::Import { .. } =\u003e {\n                return Err(\"import not supported\".to_string());\n            }\n            crate::cubical::parser::Decl::Data(dt) =\u003e {\n                env.declare_datatype(dt);\n            }\n            crate::cubical::parser::Decl::Def { name, ty, val } =\u003e {\n                let closed_ty = apply_globals(&env.defs, &ty);\n                env.define(name.clone(), closed_ty.clone(), val.clone());\n                typechecker::check_dt(\n                    &env.datatypes,\n                    &global_ctx(&env.defs),\n                    &val,\n                    &closed_ty,\n                )\n                .map_err(|e| format!(\"type error in '{}': {}\", name, e))?;\n            }\n        }\n    }\n\n    let val = if let Some(entry) = env.defs.iter().find(|(n, _, _)| n == \"main\") {\n        entry.2.clone()\n    } else if let Some(entry) = env.defs.last() {\n        entry.2.clone()\n    } else {\n        return Err(\"no definition to evaluate\".to_string());\n    };\n\n    let nf = nbe_eval(&val);\n    let json = term_to_json(&nf);\n    Ok(json.to_string())\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn test_eval_simple() {\n        let src = \"def main : U1 = U0\";\n        let result = eval_cubical_source(src).unwrap();\n        assert!(result.contains(\"main\"));\n    }\n\n    #[test]\n    fn test_eval_nat() {\n        let src = \"data Nat = | zero : Nat | suc : Nat -\u003e Nat\\n\\\n                   def main : Nat = suc (suc zero)\";\n        let result = eval_cubical_source(src).unwrap();\n        assert!(result.contains(\"2\") || result.contains(\"suc (suc zero)\"));\n    }\n\n    #[test]\n    fn test_eval_plus() {\n        let src = \"data Nat = | zero : Nat | suc : Nat -\u003e Nat\\n\\\n                   def plus : Nat -\u003e Nat -\u003e Nat = \\\\m n. elim (\\\\_. Nat) { \\\n                   | zero =\u003e n | suc m' =\u003e suc (plus m' n) } m\\n\\\n                   def main : Nat = plus (suc (suc zero)) (suc (suc (suc zero)))\";\n        let result = eval_cubical_source(src).unwrap();\n        eprintln!(\"plus result: {}\", result);\n        assert!(result.contains(\"main\"));\n    }\n\n    #[test]\n    fn test_eval_fact() {\n        let src = \"data Nat = | zero : Nat | suc : Nat -\u003e Nat\\n\\\n                   def plus : Nat -\u003e Nat -\u003e Nat = \\\\m n. elim (\\\\_. Nat) { \\\n                   | zero =\u003e n | suc m' =\u003e suc (plus m' n) } m\\n\\\n                   def mul : Nat -\u003e Nat -\u003e Nat = \\\\m n. elim (\\\\_. Nat) { \\\n                   | zero =\u003e zero | suc m' =\u003e plus n (mul m' n) } m\\n\\\n                   def fact : Nat -\u003e Nat = \\\\n. elim (\\\\_. Nat) { \\\n                   | zero =\u003e suc zero | suc n' =\u003e mul (suc n') (fact n') } n\\n\\\n                   def main : Nat = fact (suc (suc (suc zero)))\";\n        let result = eval_cubical_source(src).unwrap();\n        eprintln!(\"fact result: {}\", result);\n        assert!(result.contains(\"6\") || result.contains(\"suc\") || result.contains(\"main\"));\n    }\n\n    #[test]\n    fn test_eval_int_ffi() {\n        let src = \"data Nat = | zero : Nat | suc : Nat -\u003e Nat\\n\\\n                   def main : Nat = suc (suc (suc zero))\";\n        let c_src = CString::new(src).unwrap();\n        let result = cubical_eval_int(c_src.as_ptr());\n        assert_eq!(result, 3);\n    }\n}\n"},{"id":"src/cubical/interval.rs","name":"interval.rs","dir":"src/cubical","ext":".rs","size":6283,"binary":false,"truncated":false,"content":"// Cubical Interval — Rust port of interval.hs\n\nuse std::collections::BTreeSet;\nuse std::fmt;\n\n// ---------------------------------------------------------------------------\n// Interval Syntax\n// ---------------------------------------------------------------------------\n\n#[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]\npub enum I {\n    I0,\n    I1,\n    Var(i32),\n    Meet(Box\u003cI\u003e, Box\u003cI\u003e),\n    Join(Box\u003cI\u003e, Box\u003cI\u003e),\n    Neg(Box\u003cI\u003e),\n}\n\nimpl fmt::Display for I {\n    fn fmt(&self, f: &mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        match self {\n            I::I0 =\u003e write!(f, \"0\"),\n            I::I1 =\u003e write!(f, \"1\"),\n            I::Var(n) =\u003e write!(f, \"i{}\", n),\n            I::Meet(i, j) =\u003e write!(f, \"({} ∧ {})\", i, j),\n            I::Join(i, j) =\u003e write!(f, \"({} ∨ {})\", i, j),\n            I::Neg(i) =\u003e write!(f, \"¬{}\", i),\n        }\n    }\n}\n\n#[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]\npub enum Literal {\n    Pos(i32),\n    NegVar(i32),\n}\n\nimpl fmt::Display for Literal {\n    fn fmt(&self, f: &mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        match self {\n            Literal::Pos(n) =\u003e write!(f, \"i{}\", n),\n            Literal::NegVar(n) =\u003e write!(f, \"¬i{}\", n),\n        }\n    }\n}\n\n// DNF = Disjunctive Normal Form: a set of cubes, each cube a set of literals.\n#[derive(Debug, Clone, PartialEq, Eq, PartialOrd, Ord, Hash)]\n#[allow(clippy::upper_case_acronyms)]\npub struct DNF {\n    pub cubes: BTreeSet\u003cBTreeSet\u003cLiteral\u003e\u003e,\n}\n\nimpl fmt::Display for DNF {\n    fn fmt(&self, f: &mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        if self.cubes.is_empty() {\n            return write!(f, \"0\");\n        }\n        // Single empty cube =\u003e top (⊤ / 1)\n        if self.cubes.len() == 1 && self.cubes.iter().next().unwrap().is_empty() {\n            return write!(f, \"1\");\n        }\n        let parts: Vec\u003cString\u003e = self.cubes.iter().map(show_cube).collect();\n        write!(f, \"{}\", parts.join(\" ∨ \"))\n    }\n}\n\nfn show_cube(c: &BTreeSet\u003cLiteral\u003e) -\u003e String {\n    if c.is_empty() {\n        \"1\".to_string()\n    } else {\n        let lits: Vec\u003cString\u003e = c.iter().map(|l| l.to_string()).collect();\n        format!(\"({})\", lits.join(\" ∧ \"))\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Interval Algebra\n// ---------------------------------------------------------------------------\n\n/// Top element: a single empty cube (always true).\npub fn dnf_top() -\u003e DNF {\n    let mut cubes = BTreeSet::new();\n    cubes.insert(BTreeSet::new());\n    DNF { cubes }\n}\n\n/// Bottom element: no cubes (always false).\npub fn dnf_bot() -\u003e DNF {\n    DNF {\n        cubes: BTreeSet::new(),\n    }\n}\n\n/// Remove any cube that is a strict superset of another cube in the set\n/// (absorption / redundancy elimination).\nfn simplify(cubes: BTreeSet\u003cBTreeSet\u003cLiteral\u003e\u003e) -\u003e BTreeSet\u003cBTreeSet\u003cLiteral\u003e\u003e {\n    cubes\n        .iter()\n        .filter(|c| cube_consistent(c))\n        .filter(|c| {\n            !cubes\n                .iter()\n                .filter(|other| cube_consistent(other))\n                .any(|other| other != *c && other.is_subset(c))\n        })\n        .cloned()\n        .collect()\n}\n\n/// A cube is contradictory when it contains both `i` and `¬i`.\npub fn cube_consistent(cube: &BTreeSet\u003cLiteral\u003e) -\u003e bool {\n    cube.iter().all(|lit| !cube.contains(&neg_lit(lit)))\n}\n\n/// Evaluate an interval expression to its DNF.\npub fn eval_interval(i: &I) -\u003e DNF {\n    match i {\n        I::I0 =\u003e dnf_bot(),\n        I::I1 =\u003e dnf_top(),\n        I::Var(n) =\u003e {\n            let mut inner = BTreeSet::new();\n            inner.insert(Literal::Pos(*n));\n            let mut cubes = BTreeSet::new();\n            cubes.insert(inner);\n            DNF { cubes }\n        }\n        I::Neg(i) =\u003e dnf_neg(&eval_interval(i)),\n        I::Meet(i, j) =\u003e dnf_meet(&eval_interval(i), &eval_interval(j)),\n        I::Join(i, j) =\u003e dnf_join(&eval_interval(i), &eval_interval(j)),\n    }\n}\n\n/// Disjunction (join / union of cube sets).\npub fn dnf_join(a: &DNF, b: &DNF) -\u003e DNF {\n    let union: BTreeSet\u003c_\u003e = a.cubes.union(&b.cubes).cloned().collect();\n    DNF {\n        cubes: simplify(union),\n    }\n}\n\n/// Conjunction (meet / pairwise union of cubes).\npub fn dnf_meet(a: &DNF, b: &DNF) -\u003e DNF {\n    let mut product = BTreeSet::new();\n    for ca in &a.cubes {\n        for cb in &b.cubes {\n            let merged: BTreeSet\u003c_\u003e = ca.union(cb).cloned().collect();\n            if cube_consistent(&merged) {\n                product.insert(merged);\n            }\n        }\n    }\n    DNF {\n        cubes: simplify(product),\n    }\n}\n\n/// Negation (De Morgan / distribute negation over DNF).\npub fn dnf_neg(d: &DNF) -\u003e DNF {\n    if d.cubes.is_empty() {\n        // ¬⊥ = ⊤\n        return dnf_top();\n    }\n    // ¬(c₁ ∨ c₂ ∨ …) = ¬c₁ ∧ ¬c₂ ∧ …\n    // ¬cube = join of negated literals\n    let top = dnf_top();\n    d.cubes.iter().fold(top, |acc, cube| {\n        let neg_cube = neg_cube(cube);\n        dnf_meet(&acc, &neg_cube)\n    })\n}\n\nfn neg_cube(c: &BTreeSet\u003cLiteral\u003e) -\u003e DNF {\n    let mut cubes = BTreeSet::new();\n    for lit in c {\n        let mut singleton = BTreeSet::new();\n        singleton.insert(neg_lit(lit));\n        cubes.insert(singleton);\n    }\n    DNF { cubes }\n}\n\nfn neg_lit(l: &Literal) -\u003e Literal {\n    match l {\n        Literal::Pos(n) =\u003e Literal::NegVar(*n),\n        Literal::NegVar(n) =\u003e Literal::Pos(*n),\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    #[test]\n    fn meet_drops_contradictory_cube() {\n        let dnf = eval_interval(&I::Meet(\n            Box::new(I::Var(0)),\n            Box::new(I::Neg(Box::new(I::Var(0)))),\n        ));\n\n        assert_eq!(dnf, dnf_bot());\n    }\n\n    #[test]\n    fn simplify_drops_inconsistent_cubes_before_absorption() {\n        let mut inconsistent = BTreeSet::new();\n        inconsistent.insert(Literal::Pos(0));\n        inconsistent.insert(Literal::NegVar(0));\n\n        let mut consistent = BTreeSet::new();\n        consistent.insert(Literal::Pos(1));\n\n        let dnf = dnf_join(\n            &DNF {\n                cubes: [inconsistent].into_iter().collect(),\n            },\n            &DNF {\n                cubes: [consistent.clone()].into_iter().collect(),\n            },\n        );\n\n        assert_eq!(dnf.cubes, [consistent].into_iter().collect());\n    }\n}"},{"id":"src/cubical/json.rs","name":"json.rs","dir":"src/cubical","ext":".rs","size":4151,"binary":false,"truncated":false,"content":"use crate::cubical::syntax::{Term, nat_to_int, show_term};\n\n// Minimal JSON value type (no external dependencies)\npub enum JsVal {\n    Null,\n    Bool(bool),\n    Num(i64),\n    Str(String),\n    Arr(Vec\u003cJsVal\u003e),\n    Obj(Vec\u003c(String, JsVal)\u003e),\n}\n\nimpl JsVal {\n    fn esc(s: &str) -\u003e String {\n        let mut out = String::with_capacity(s.len() + 2);\n        out.push('\"');\n        for c in s.chars() {\n            match c {\n                '\\\\' =\u003e out.push_str(\"\\\\\\\\\"),\n                '\"' =\u003e out.push_str(\"\\\\\\\"\"),\n                '\\n' =\u003e out.push_str(\"\\\\n\"),\n                '\\r' =\u003e out.push_str(\"\\\\r\"),\n                '\\t' =\u003e out.push_str(\"\\\\t\"),\n                c =\u003e out.push(c),\n            }\n        }\n        out.push('\"');\n        out\n    }\n\n    pub fn to_string(&self) -\u003e String {\n        match self {\n            JsVal::Null =\u003e \"null\".into(),\n            JsVal::Bool(b) =\u003e (if *b { \"true\" } else { \"false\" }).into(),\n            JsVal::Num(n) =\u003e n.to_string(),\n            JsVal::Str(s) =\u003e Self::esc(s),\n            JsVal::Arr(a) =\u003e {\n                let items: Vec\u003cString\u003e = a.iter().map(|v| v.to_string()).collect();\n                format!(\"[{}]\", items.join(\",\"))\n            }\n            JsVal::Obj(pairs) =\u003e {\n                let items: Vec\u003cString\u003e = pairs\n                    .iter()\n                    .map(|(k, v)| format!(\"{}:{}\", Self::esc(k), v.to_string()))\n                    .collect();\n                format!(\"{{{}}}\", items.join(\",\"))\n            }\n        }\n    }\n}\n\nfn kv(k: &str, v: JsVal) -\u003e (String, JsVal) {\n    (k.to_string(), v)\n}\n\nfn nat_json(t: &Term) -\u003e JsVal {\n    if let Some(n) = nat_to_int(t) {\n        JsVal::Obj(vec![\n            kv(\"kind\", JsVal::Str(\"nat\".into())),\n            kv(\"value\", JsVal::Num(n)),\n        ])\n    } else {\n        term_to_json(t)\n    }\n}\n\nfn bool_json(val: bool) -\u003e JsVal {\n    JsVal::Obj(vec![\n        kv(\"kind\", JsVal::Str(\"bool\".into())),\n        kv(\"value\", JsVal::Bool(val)),\n    ])\n}\n\nfn constructor_json(data: &str, con: &str, args: &[Term]) -\u003e JsVal {\n    let elem_json: Vec\u003cJsVal\u003e = args.iter().map(term_to_json).collect();\n    JsVal::Obj(vec![\n        kv(\"kind\", JsVal::Str(\"constructor\".into())),\n        kv(\"data\", JsVal::Str(data.into())),\n        kv(\"constructor\", JsVal::Str(con.into())),\n        kv(\"args\", JsVal::Arr(elem_json)),\n    ])\n}\n\nfn detect_cons_chain(t: &Term) -\u003e Option\u003cVec\u003c&Term\u003e\u003e {\n    match t {\n        Term::TCon(_, c, args) if c == \"nil\" && args.is_empty() =\u003e Some(vec![]),\n        Term::TCon(_, c, args) if c == \"cons\" && args.len() \u003e= 2 =\u003e {\n            let head = &args[0];\n            let tail = &args[1];\n            detect_cons_chain(tail).map(|mut rest| {\n                rest.insert(0, head);\n                rest\n            })\n        }\n        _ =\u003e None,\n    }\n}\n\npub fn term_to_json(t: &Term) -\u003e JsVal {\n    match t {\n        Term::TCon(d, c, args) if d == \"Nat\" =\u003e match (c.as_str(), args.as_slice()) {\n            (\"zero\", []) =\u003e nat_json(t),\n            (\"suc\", [_]) =\u003e nat_json(t),\n            _ =\u003e constructor_json(d, c, args),\n        },\n        Term::TCon(d, c, args)\n            if d == \"Bool\" && c == \"true\" && args.is_empty() =\u003e\n        {\n            bool_json(true)\n        }\n        Term::TCon(d, c, args)\n            if d == \"Bool\" && c == \"false\" && args.is_empty() =\u003e\n        {\n            bool_json(false)\n        }\n        Term::TPair(a, b) =\u003e JsVal::Obj(vec![\n            kv(\"kind\", JsVal::Str(\"pair\".into())),\n            kv(\"first\", term_to_json(a)),\n            kv(\"second\", term_to_json(b)),\n        ]),\n        Term::TCon(d, c, args) if detect_cons_chain(t).is_some() =\u003e {\n            let elems = detect_cons_chain(t).unwrap();\n            JsVal::Obj(vec![\n                kv(\"kind\", JsVal::Str(\"array\".into())),\n                kv(\n                    \"elements\",\n                    JsVal::Arr(elems.iter().map(|e| term_to_json(e)).collect()),\n                ),\n            ])\n        }\n        Term::TCon(d, c, args) =\u003e constructor_json(d, c, args),\n        _ =\u003e JsVal::Obj(vec![\n            kv(\"kind\", JsVal::Str(\"string\".into())),\n            kv(\"value\", JsVal::Str(show_term(&[], t))),\n        ]),\n    }\n}\n"},{"id":"src/cubical/mod.rs","name":"mod.rs","dir":"src/cubical","ext":".rs","size":10029,"binary":false,"truncated":false,"content":"pub mod env;\npub mod equality;\npub mod ffi;\npub mod interval;\npub mod json;\npub mod nbe;\npub mod parser;\npub mod syntax;\npub mod typechecker;\n\nuse std::collections::HashSet;\nuse std::fmt;\nuse std::path::{Path, PathBuf};\n\nuse self::env::{Env, apply_globals, check_with_full_env, infer_with_full_env};\nuse self::nbe::nbe_eval;\nuse self::parser::{Decl, ParseError, ProgramParser};\nuse self::syntax::{Name, Term};\nuse self::typechecker::{TypeError, check_closed_dt};\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct RunOutput {\n    pub name: Name,\n    pub ty: Term,\n    pub value: Term,\n    pub global_names: Vec\u003cName\u003e,\n}\n\nimpl fmt::Display for RunOutput {\n    fn fmt(&self, f: &mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        write!(\n            f,\n            \"{} : {} = {}\",\n            self.name,\n            syntax::show_term(&self.global_names, &self.ty),\n            syntax::show_term(&self.global_names, &self.value),\n        )\n    }\n}\n\n#[derive(Debug)]\npub enum RunError {\n    Io(std::io::Error),\n    Parse(ParseError),\n    Type(Box\u003cTypeError\u003e),\n    Import(String),\n    NoEntryPoint,\n}\n\nimpl fmt::Display for RunError {\n    fn fmt(&self, f: &mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        match self {\n            RunError::Io(err) =\u003e write!(f, \"I/O error: {}\", err),\n            RunError::Parse(err) =\u003e write!(f, \"parse error: {}\", err),\n            RunError::Type(err) =\u003e write!(f, \"type error:\\n{}\", err),\n            RunError::Import(msg) =\u003e write!(f, \"import error: {}\", msg),\n            RunError::NoEntryPoint =\u003e write!(f, \"program has no definition to run\"),\n        }\n    }\n}\n\nimpl std::error::Error for RunError {}\n\nimpl From\u003cstd::io::Error\u003e for RunError {\n    fn from(err: std::io::Error) -\u003e Self {\n        RunError::Io(err)\n    }\n}\n\nimpl From\u003cParseError\u003e for RunError {\n    fn from(err: ParseError) -\u003e Self {\n        RunError::Parse(err)\n    }\n}\n\nimpl From\u003cTypeError\u003e for RunError {\n    fn from(err: TypeError) -\u003e Self {\n        RunError::Type(Box::new(err))\n    }\n}\n\n/// Read, typecheck, and evaluate a cubical source file.\n///\n/// Top-level declarations are processed in order. Datatypes are registered in\n/// the environment, definitions are checked against their annotations, and the\n/// `main` definition (or the last definition if no `main` exists) is normalized\n/// and returned as the program result.\npub fn run(path: impl AsRef\u003cPath\u003e) -\u003e Result\u003cRunOutput, RunError\u003e {\n    let path = path.as_ref();\n    let source = std::fs::read_to_string(path)?;\n    run_source(path, &source)\n}\n\n/// Typecheck and evaluate cubical source from a string, using the current\n/// directory for import resolution.\npub fn run_str(source: &str) -\u003e Result\u003cRunOutput, RunError\u003e {\n    run_source(Path::new(\".\"), source)\n}\n\nfn run_source(root_path: &Path, source: &str) -\u003e Result\u003cRunOutput, RunError\u003e {\n    let mut env = Env::new();\n    let mut loaded = HashSet::new();\n    let import_base = root_path.parent().unwrap_or_else(|| Path::new(\".\"));\n    let mut last_def = None;\n\n    process_file_source(\n        source,\n        import_base,\n        &mut env,\n        &mut loaded,\n        &mut HashSet::new(),\n        &mut last_def,\n    )?;\n\n    // Prefer `main` over the last definition when both exist.\n    if let Some(main_entry) = env.defs.iter().find(|(name, _, _)| name == \"main\") {\n        let (name, ty, val) = main_entry;\n        Ok(RunOutput {\n            name: name.clone(),\n            ty: ty.clone(),\n            value: nbe_eval(val),\n            global_names: env.defs.iter().map(|(n, _, _)| n.clone()).collect(),\n        })\n    } else {\n        last_def.ok_or(RunError::NoEntryPoint)\n    }\n}\n\nfn resolve_import_path(base: &Path, path: &str) -\u003e PathBuf {\n    let requested = Path::new(path);\n    if requested.is_absolute() {\n        requested.to_path_buf()\n    } else {\n        base.join(requested)\n    }\n}\n\nfn canonical_import_path(path: &Path) -\u003e PathBuf {\n    std::fs::canonicalize(path).unwrap_or_else(|_| path.to_path_buf())\n}\n\nfn process_file_source(\n    source: &str,\n    import_base: &Path,\n    env: &mut Env,\n    loaded: &mut HashSet\u003cPathBuf\u003e,\n    loading: &mut HashSet\u003cPathBuf\u003e,\n    last_def: &mut Option\u003cRunOutput\u003e,\n) -\u003e Result\u003c(), RunError\u003e {\n    let mut parser = ProgramParser::new(source)?;\n    while let Some(decl) = parser.next_decl()? {\n        match decl {\n            Decl::Import { path } =\u003e {\n                load_import(&path, env, loaded, loading, import_base, last_def)?;\n                parser.sync_from_env(env);\n            }\n            Decl::Data(dt) =\u003e {\n                process_data(&dt, env)?;\n            }\n            Decl::Def { name, ty, val } =\u003e {\n                *last_def = Some(process_def(&name, &ty, &val, env)?);\n            }\n        }\n    }\n    Ok(())\n}\n\nfn load_import(\n    path: &str,\n    env: &mut Env,\n    loaded: &mut HashSet\u003cPathBuf\u003e,\n    loading: &mut HashSet\u003cPathBuf\u003e,\n    import_base: &Path,\n    last_def: &mut Option\u003cRunOutput\u003e,\n) -\u003e Result\u003c(), RunError\u003e {\n    let resolved = resolve_import_path(import_base, path);\n    let canonical = canonical_import_path(&resolved);\n\n    if loaded.contains(&canonical) {\n        return Ok(());\n    }\n    if !loading.insert(canonical.clone()) {\n        return Err(RunError::Import(format!(\n            \"circular import involving '{}'\",\n            resolved.display()\n        )));\n    }\n\n    let source = std::fs::read_to_string(&resolved).map_err(|err| {\n        RunError::Import(format!(\"cannot read '{}': {}\", resolved.display(), err))\n    })?;\n\n    let nested_base = resolved.parent().unwrap_or(import_base);\n    process_file_source(&source, nested_base, env, loaded, loading, last_def)?;\n\n    loading.remove(&canonical);\n    loaded.insert(canonical);\n    Ok(())\n}\n\nfn process_data(dt: &crate::cubical::syntax::Datatype, env: &mut Env) -\u003e Result\u003c(), RunError\u003e {\n    env.declare_datatype(dt.clone());\n    for con in &dt.cons {\n        for arg_ty in &con.arg_tys {\n            check_closed_dt(&env.datatypes, arg_ty, &Term::TUniv(0)).map_err(|e| RunError::Type(Box::new(e)))?;\n        }\n    }\n    Ok(())\n}\n\nfn process_def(name: &Name, ty: &Term, val: &Term, env: &mut Env) -\u003e Result\u003cRunOutput, RunError\u003e {\n    println!(\"{}: ✓\", name);\n    let closed_ty_globals = apply_globals(&env.defs, ty);\n    let closed_val = val.clone();\n\n    // Normalize only for the universe-level check; keep the original\n    // structure (e.g., Glue types) intact for body checking.\n    let closed_ty_nf = nbe_eval(&closed_ty_globals);\n    match nbe_eval(&infer_with_full_env(env, &closed_ty_nf)?) {\n        Term::TUniv(_) =\u003e {}\n        other =\u003e return Err(TypeError::ExpectedUniverse(other).into()),\n    }\n    // Register before checking the body so recursive calls resolve.\n    env.define(name.clone(), closed_ty_globals.clone(), closed_val.clone());\n    check_with_full_env(env, &closed_val, &closed_ty_globals)?;\n    let output = RunOutput {\n        name: name.clone(),\n        ty: closed_ty_globals.clone(),\n        value: nbe_eval(&closed_val),\n        global_names: env.defs.iter().map(|(n, _, _)| n.clone()).collect(),\n    };\n\n    Ok(output)\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n    use std::fs;\n    use std::io::Write;\n\n    #[test]\n    fn run_with_import_merges_declarations() {\n        let dir = std::env::temp_dir().join(format!(\"cubical_import_test_{}\", std::process::id()));\n        fs::create_dir_all(&dir).unwrap();\n\n        let nat_path = dir.join(\"nat.uwuc\");\n        let main_path = dir.join(\"main.uwuc\");\n\n        fs::write(&nat_path, \"data Nat = | zero : Nat | suc : Nat -\u003e Nat\\n\").unwrap();\n        fs::write(\n            &main_path,\n            \"import \\\"nat.uwuc\\\"\\n\\ndef main : Nat -\u003e Nat = \\\\n. n\\n\",\n        )\n        .unwrap();\n\n        let output = run(&main_path).expect(\"imported program should run\");\n        assert_eq!(output.name, \"main\");\n\n        let _ = fs::remove_dir_all(&dir);\n    }\n\n    #[test]\n    fn run_reports_circular_import() {\n        let dir = std::env::temp_dir().join(format!(\"cubical_cycle_test_{}\", std::process::id()));\n        fs::create_dir_all(&dir).unwrap();\n\n        let a_path = dir.join(\"a.uwuc\");\n        let b_path = dir.join(\"b.uwuc\");\n\n        let mut a_file = fs::File::create(&a_path).unwrap();\n        writeln!(a_file, \"import \\\"b.uwuc\\\"\").unwrap();\n        writeln!(a_file, \"def a : U0 = U0\").unwrap();\n\n        let mut b_file = fs::File::create(&b_path).unwrap();\n        writeln!(b_file, \"import \\\"a.uwuc\\\"\").unwrap();\n        writeln!(b_file, \"def b : U0 = U0\").unwrap();\n\n        let err = run(&a_path).unwrap_err();\n        assert!(matches!(err, RunError::Import(_)));\n\n        let _ = fs::remove_dir_all(&dir);\n    }\n\n    #[test]\n    fn run_plus_on_nat() {\n        let src = \"data Nat = | zero : Nat | suc : Nat -\u003e Nat\\n\\\n                   def plus : Nat -\u003e Nat -\u003e Nat = \\\\m n. elim (\\\\_. Nat) \\\n                   { | zero =\u003e n | suc m' =\u003e suc (plus m' n) } m\\n\\\n                   def four : Nat = plus (suc (suc zero)) (suc (suc zero))\";\n        let dir = std::env::temp_dir().join(format!(\"cubical_plus_test_{}\", std::process::id()));\n        fs::create_dir_all(&dir).unwrap();\n        let path = dir.join(\"main.uwuc\");\n        fs::write(&path, src).unwrap();\n        let output = run(&path).expect(\"plus should typecheck\");\n        assert_eq!(output.name, \"four\");\n        let _ = fs::remove_dir_all(&dir);\n    }\n\n    #[test]\n    fn transport_over_ua_still_works() {\n        let src = \"\\\ndef id : (A : U0) -\u003e A -\u003e A = \\\\A x. x\\n\\\ndef transportExample : (A B : U0) -\u003e Equiv A B -\u003e A -\u003e B =\\n\\\n  \\\\A B e a. transport (\u003ci\u003e ua e @ i) a\\n\\\ndef main : (A B : U0) -\u003e Equiv A B -\u003e A -\u003e B = transportExample\\n\";\n        let dir = std::env::temp_dir().join(format!(\"cubical_transport_ua_{}\", std::process::id()));\n        fs::create_dir_all(&dir).unwrap();\n        let path = dir.join(\"main.uwuc\");\n        fs::write(&path, src).unwrap();\n        let output = run(&path).expect(\"transport over ua should typecheck\");\n        // `run()` prefers `main` over earlier definitions\n        assert_eq!(output.name, \"main\");\n        let _ = fs::remove_dir_all(&dir);\n    }\n}"},{"id":"src/cubical/nbe.rs","name":"nbe.rs","dir":"src/cubical","ext":".rs","size":52079,"binary":false,"truncated":false,"content":"#![allow(dead_code)]\n#![allow(clippy::enum_variant_names)]\n\nuse std::cell::RefCell;\nuse std::rc::Rc;\n\nuse crate::cubical::interval::{DNF, I, dnf_bot, dnf_top, eval_interval};\nuse crate::cubical::syntax::{ElimCase, Level, Name, Term, beta, equiv_dom, is_bot_dnf, is_top_dnf, max_var, shift, subst};\n\npub type Env = Vec\u003cValue\u003e;\n\n/// A shared reference to the global definition values.\n/// All closures created during evaluation share the same `Globals` so that\n/// recursive self-references resolve correctly after placeholder replacement.\npub type Globals = Rc\u003cRefCell\u003cVec\u003cValue\u003e\u003e\u003e;\n\n#[derive(Debug, Clone)]\npub enum Value {\n    VNeutral(Neutral),\n    VLam(Name, Closure),\n    VApp(Box\u003cValue\u003e, Box\u003cValue\u003e),\n    VPi(Name, Box\u003cValue\u003e, Closure),\n    VSigma(Name, Box\u003cValue\u003e, Closure),\n    VPair(Box\u003cValue\u003e, Box\u003cValue\u003e),\n    VPath(Box\u003cValue\u003e, Box\u003cValue\u003e, Box\u003cValue\u003e),\n    VPLam(Name, IClosure),\n    VPApp(Box\u003cValue\u003e, Box\u003cValue\u003e),\n    VUniv(Level),\n    VIntervalTy,\n    VInterval(I),\n    VIntervalVar(usize),\n    VCube(DNF),\n    VData(Name),\n    VCon(Name, Name, Vec\u003cValue\u003e),\n    VPCon(Name, Name, Vec\u003cValue\u003e, Box\u003cValue\u003e),\n    VElim(Box\u003cValue\u003e, Vec\u003cElimCase\u003e, Box\u003cValue\u003e),\n    VGlue(Box\u003cValue\u003e, DNF, Box\u003cValue\u003e),\n    VGlueElem(DNF, Box\u003cValue\u003e, Box\u003cValue\u003e),\n    VUnglue(DNF, Box\u003cValue\u003e, Box\u003cValue\u003e),\n    VEquiv(Box\u003cValue\u003e, Box\u003cValue\u003e),\n    VMkEquiv(\n        Box\u003cValue\u003e,\n        Box\u003cValue\u003e,\n        Box\u003cValue\u003e,\n        Box\u003cValue\u003e,\n        Box\u003cValue\u003e,\n        Box\u003cValue\u003e,\n    ),\n    VEquivFwd(Box\u003cValue\u003e, Box\u003cValue\u003e),\n    VUa(Box\u003cValue\u003e),\n    VTransport(Box\u003cValue\u003e, Box\u003cValue\u003e),\n    VHComp(Box\u003cValue\u003e, DNF, Box\u003cValue\u003e, Box\u003cValue\u003e),\n    VFst(Box\u003cValue\u003e),\n    VSnd(Box\u003cValue\u003e),\n}\n\n#[derive(Debug, Clone)]\npub struct Closure {\n    pub env: Env,\n    pub globals: Globals,\n    pub global_offset: usize,\n    pub body: Term,\n}\n\n#[derive(Debug, Clone)]\npub struct IClosure {\n    pub env: Env,\n    pub globals: Globals,\n    pub global_offset: usize,\n    pub body: Term,\n}\n\n#[derive(Debug, Clone)]\npub enum Neutral {\n    NVar(usize),\n    NApp(Box\u003cNeutral\u003e, Box\u003cValue\u003e),\n    NPApp(Box\u003cNeutral\u003e, Box\u003cValue\u003e),\n    NFst(Box\u003cNeutral\u003e),\n    NSnd(Box\u003cNeutral\u003e),\n    NElim(Box\u003cValue\u003e, Vec\u003cElimCase\u003e, Box\u003cNeutral\u003e),\n    NTransport(Box\u003cValue\u003e, Box\u003cValue\u003e),\n    NHComp(Box\u003cValue\u003e, DNF, Box\u003cValue\u003e, Box\u003cValue\u003e),\n}\n\nimpl Closure {\n    pub fn apply(&self, v: Value) -\u003e Value {\n        let mut env = vec![v];\n        env.extend_from_slice(&self.env);\n        eval_nbe(&env, &self.globals, self.global_offset, &self.body)\n    }\n}\n\nimpl IClosure {\n    pub fn apply_i(&self, i: I) -\u003e Value {\n        self.apply_interval_value(Value::VInterval(i))\n    }\n\n    fn apply_i_var(&self, level: usize) -\u003e Value {\n        self.apply_interval_value(Value::VIntervalVar(level))\n    }\n\n    fn apply_interval_value(&self, v: Value) -\u003e Value {\n        let mut env = vec![v];\n        env.extend_from_slice(&self.env);\n        eval_nbe(&env, &self.globals, self.global_offset, &self.body)\n    }\n}\n\n/// Evaluate a term with local variables in `env` and global definitions in `globals`.\n///\n/// `global_offset` is the index into `globals` (in env.defs order, most-recent-first)\n/// corresponding to the definition whose body is being evaluated.\n/// A TVar(k) where k \u003e= env.len() is a global reference:\n///   globals[global_offset + (k - env.len())]\n/// UNLESS that is also out of bounds — in which case we create a neutral.\npub fn eval_nbe(env: &[Value], globals: &Globals, global_offset: usize, t: &Term) -\u003e Value {\n    match t {\n        Term::TVar(i) =\u003e {\n            let i = *i as usize;\n            if i \u003c env.len() {\n                env[i].clone()\n            } else {\n                let g = globals.borrow();\n                let global_idx = global_offset + (i - env.len());\n                if global_idx \u003c g.len() {\n                    g[global_idx].clone()\n                } else {\n                    Value::VNeutral(Neutral::NVar(global_idx n            eval_nbe(env, globals, global_offset, base),\n        ),\n        Term::TEquiv(a, b) =\u003e Value::VEquiv(\n            Box::new(eval_nbe(env, globals, global_offset, a)),\n            Box::new(eval_nbe(env, globals, global_offset, b)),\n        ),\n        Term::TMkEquiv(a, b, f, g, eta, eps) =\u003e Value::VMkEquiv(\n            Box::new(eval_nbe(env, globals, global_offset, a)),\n            Box::new(eval_nbe(env, globals, global_offset, b)),\n            Box::new(eval_nbe(env, globals, global_offset, f)),\n            Box::new(eval_nbe(env, globals, global_offset, g)),\n            Box::new(eval_nbe(env, globals, global_offset, eta)),\n            Box::new(eval_nbe(env, globals, global_offset, eps)),\n        ),\n        Term::TEquivFwd(e, x) =\u003e do_equiv_fwd(\n            eval_nbe(env, globals, global_offset, e),\n            eval_nbe(env, globals, global_offset, x),\n        ),\n        Term::TUa(e) =\u003e Value::VUa(Box::new(eval_nbe(env, globals, global_offset, e))),\n        Term::TTransport(p, x) =\u003e {\n            let p_val = eval_nbe(env, globals, global_offset, p);\n            let x_val = eval_nbe(env, globals, global_offset, x);\n            let res = do_transport(env, globals, global_offset, p_val.clone(), x_val.clone());\n            match &res {\n                Value::VTransport(_, _) | Value::VNeutral(Neutral::NTransport(_, _)) =\u003e {\n                    let p_term = quote(env.len(), globals, global_offset, p_val);\n                    let x_term = quote(env.len(), globals, global_offset, x_val);\n                    let reduced = transport_term_fallback(p_term, x_term);\n                    match reduced {\n                        Term::TTransport(_, _) =\u003e res,\n                        _ =\u003e eval_nbe(env, globals, global_offset, &reduced),\n                    }\n                }\n                _ =\u003e res,\n            }\n        }\n        Term::TGlue(a, phi, te) =\u003e {\n            let phi = value_to_dnf(eval_nbe(env, globals, global_offset, phi));\n            let te = eval_nbe(env, globals, global_offset, te);\n            if phi == dnf_top() {\n                match te {\n                    Value::VLam(_, clos) =\u003e {\n                        let body = clos.apply(Value::VInterval(I::I1));\n                        equiv_dom_value(body)\n                    }\n                    other =\u003e equiv_dom_value(other),\n                }\n            } else if phi == dnf_bot() {\n                eval_nbe(env, globals, global_offset, a)\n            } else {\n                Value::VGlue(Box::new(eval_nbe(env, globals, global_offset, a)), phi, Box::new(te))\n            }\n        }\n        Term::TGlueElem(phi, t, a) =\u003e {\n            let phi = value_to_dnf(eval_nbe(env, globals, global_offset, phi));\n            if phi == dnf_top() {\n                eval_nbe(env, globals, global_offset, t)\n            } else if phi == dnf_bot() {\n                eval_nbe(env, globals, global_offset, a)\n            } else {\n                Value::VGlueElem(phi, Box::new(eval_nbe(env, globals, global_offset, t)), Box::new(eval_nbe(env, globals, global_offset, a)))\n            }\n        }\n        Term::TUnglue(phi, te, g) =\u003e {\n            let phi = value_to_dnf(eval_nbe(env, globals, global_offset, phi));\n            let te = eval_nbe(env, globals, global_offset, te);\n            let g_val = eval_nbe(env, globals, global_offset, g);\n            if phi == dnf_top() {\n                do_equiv_fwd(te, g_val)\n            } else if phi == dnf_bot() {\n                g_val\n            } else {\n                match &g_val {\n                    Value::VGlueElem(g_phi, _, a) if *g_phi == phi =\u003e *a.clone(),\n                    _ =\u003e Value::VUnglue(phi, Box::new(te), Box::new(g_val)),\n                }\n            }\n        }\n        Term::TSigma(x, a, b) =\u003e Value::VSigma(\n            x.clone(),\n            Box::new(eval_nbe(env, globals, global_offset, a)),\n            Closure {\n                env: env.to_vec(),\n                globals: globals.clone(),\n                global_offset,\n                body: (**b).clone(),\n            },\n        ),\n        Term::TPair(a, b) =\u003e Value::VPair(\n            Box::new(eval_nbe(env, globals, global_offset, a)),\n            Box::new(eval_nbe(env, globals, global_offset, b)),\n        ),\n        Term::TFst(p) =\u003e do_fst(eval_nbe(env, globals, global_offset, p)),\n        Term::TSnd(p) =\u003e do_snd(eval_nbe(env, globals, global_offset, p)),\n        Term::TData(d) =\u003e Value::VData(d.clone()),\n        Term::TCon(data, con, args) =\u003e Value::VCon(\n            data.clone(),\n            con.clone(),\n            args.iter().map(|a| eval_nbe(env, globals, global_offset, a)).collect(),\n        ),\n        Term::TPCon(data, con, args, r) =\u003e Value::VPCon(\n            data.clone(),\n            con.clone(),\n            args.iter().map(|a| eval_nbe(env, globals, global_offset, a)).collect(),\n            Box::new(eval_nbe(env, globals, global_offset, r)),\n        ),\n        Term::TElim(motive, cases, scrut) =\u003e {\n            do_elim(\n                eval_nbe(env, globals, global_offset, motive),\n                cases,\n                eval_nbe(env, globals, global_offset, scrut),\n                env,\n                globals,\n                global_offset,\n            )\n        }\n    }\n}\n\npub fn do_apply(f: Value, a: Value) -\u003e Value {\n    match f {\n        Value::VLam(_, clos) =\u003e clos.apply(a),\n        Value::VNeutral(n) =\u003e Value::VNeutral(Neutral::NApp(Box::new(n), Box::new(a))),\n        other =\u003e Value::VApp(Box::new(other), Box::new(a)),\n    }\n}\n\npub fn do_papp(p: Value, r: Value) -\u003e Value {\n    if let Some(i) = value_to_endpoint(&r)\n        && let Value::VPLam(_, clos) = p {\n            return clos.apply_i(i);\n        }\n\n    match p {\n        Value::VPLam(_, clos) =\u003e match r {\n            Value::VInterval(i) =\u003e clos.apply_i(i),\n            Value::VIntervalVar(level) =\u003e clos.apply_i_var(level),\n            other =\u003e Value::VPApp(\n                Box::new(Value::VPLam(\"_\".to_string(), clos)),\n                Box::new(other),\n            ),\n        },\n        Value::VNeutral(n) =\u003e Value::VNeutral(Neutral::NPApp(Box::new(n), Box::new(r))),\n        other =\u003e Value::VPApp(Box::new(other), Box::new(r)),\n    }\n}\n\npub fn do_fst(p: Value) -\u003e Value {\n    match p {\n        Value::VPair(a, _) =\u003e *a,\n        Value::VNeutral(n) =\u003e Value::VNeutral(Neutral::NFst(Box::new(n))),\n        other =\u003e Value::VFst(Box::new(other)),\n    }\n}\n\npub fn do_snd(p: Value) -\u003e Value {\n    match p {\n        Value::VPair(_, b) =\u003e *b,\n        Value::VNeutral(n) =\u003e Value::VNeutral(Neutral::NSnd(Box::new(n))),\n        other =\u003e Value::VSnd(Box::new(other)),\n    }\n}\n\npub fn do_elim(motive: Value, cases: &[ElimCase], scrut: Value, env: &[Value], globals: &Globals, global_offset: usize) -\u003e Value {\n    match scrut {\n        Value::VCon(_, con, args) =\u003e match cases.iter().find(|case| case.con == con) {\n            Some(case) =\u003e {\n                let mut env2: Env = args.into_iter().rev().collect();\n                env2.extend_from_slice(env);\n                eval_nbe(&env2, globals, global_offset, &case.body)\n            }\n            None =\u003e Value::VElim(\n                Box::new(motive),\n                cases.to_vec(),\n                Box::new(Value::VCon(\"\".into(), con, args)),\n            ),\n        },\n        Value::VPCon(_, con, args, r) =\u003e match cases.iter().find(|case| case.con == con) {\n            Some(case) =\u003e {\n                let mut env2: Env = args.into_iter().rev().collect();\n                env2.extend_from_slice(env);\n                let body = eval_nbe(&env2, globals, global_offset, &case.body);\n                do_papp(body, *r)\n            }\n            None =\u003e Value::VElim(\n                Box::new(motive),\n                cases.to_vec(),\n                Box::new(Value::VPCon(\"\".into(), con, args, r)),\n            ),\n        },\n        Value::VNeutral(n) =\u003e stuck_elim(motive, cases, n),\n        other =\u003e Value::VElim(Box::new(motive), cases.to_vec(), Box::new(other)),\n    }\n}\n\npub fn do_transport(env: &[Value], globals: &Globals, global_offset: usize, p: Value, x: Value) -\u003e Value {\n    match p {\n        Value::VUa(e) =\u003e do_equiv_fwd(*e, x),\n        Value::VPLam(ref i_name, ref clos) =\u003e {\n            let b0 = clos.apply_i(I::I0);\n            let b1 = clos.apply_i(I::I1);\n            if quote(0, globals, global_offset, b0.clone()) == quote(0, globals, global_offset, b1.clone()) {\n                return x;\n            }\n\n\n            match (&b0, &b1) {\n                (Value::VUniv(_), Value::VUniv(_)) =\u003e x,\n\n                // Pi transport (non-dependent codomain only)\n                (Value::VPi(arg_name, _, _), Value::VPi(_, _, _)) =\u003e {\n                    transport_pi(env, globals, global_offset, i_name, clos, arg_name, x)\n                }\n\n                // Path transport\n                (Value::VPath(_, _, _), Value::VPath(_, _, _)) =\u003e {\n                    transport_path(env, globals, global_offset, i_name, clos, x)\n                }\n\n                // Sigma transport (pair only)\n                (Value::VSigma(_, _, _), Value::VSigma(_, _, _)) =\u003e {\n                    match x {\n                        Value::VPair(ref a, ref b) =\u003e {\n                            transport_sigma_pair(env, globals, global_offset, i_name, clos, a, b)\n                        }\n                        _ =\u003e Value::VTransport(Box::new(Value::VPLam(\"_\".to_string(), clos.clone())), Box::new(x)),\n                    }\n                }\n\n                // Glue transport (phi=bot or phi=top)\n                (Value::VGlue(_, phi0, _), Value::VGlue(_, _, _)) =\u003e {\n                    let r = transport_glue(env, globals, global_offset, i_name, clos, phi0, &x);\n                    r.unwrap_or_else(|| {\n                        Value::VTransport(Box::new(Value::VPLam(\"_\".to_string(), clos.clone())), Box::new(x))\n                    })\n                }\n\n                _ =\u003e Value::VTransport(Box::new(Value::VPLam(\"_\".to_string(), clos.clone())), Box::new(x)),\n            }\n        }\n        other =\u003e Value::VNeutral(Neutral::NTransport(Box::new(other), Box::new(x))),\n    }\n}\n\n/// Evaluate the body of a PLam at a formal interval variable (TVar(0) in the\n/// returned term will be the interval binder).\nfn eval_body_at_formal_interval(env: &[Value], globals: &Globals, global_offset: usize, clos: &IClosure) -\u003e (Vec\u003cValue\u003e, Value) {\n    let body_with_var = beta(\n        &shift(1, 0, &clos.body),\n        &Term::TVar(0),\n    );\n    let mut formal_env = vec![Value::VIntervalVar(env.len())];\n    formal_env.extend_from_slice(env);\n    let evaluated = eval_nbe(&formal_env, globals, global_offset, &body_with_var);\n    (formal_env, evaluated)\n}\n\n/// Apply a Closure with a dummy argument (for non-dependent extraction).\nfn apply_non_dep(clos: &Closure) -\u003e Value {\n    clos.apply(Value::VInterval(I::I0))\n}\n\n/// Check whether a term references the first de Bruijn variable (index 0).\nfn uses_tvar_0(t: &Term) -\u003e bool {\n    match t {\n        Term::TVar(i) =\u003e *i == 0,\n        Term::TApp(f, a) =\u003e uses_tvar_0(f) || uses_tvar_0(a),\n        Term::TAbs(_, b) =\u003e uses_tvar_0(b),\n        Term::TPi(_, a, b) =\u003e uses_tvar_0(a) || uses_tvar_0(b),\n        Term::TPath(a, u, v) =\u003e uses_tvar_0(a) || uses_tvar_0(u) || uses_tvar_0(v),\n        Term::PLam(_, b) =\u003e uses_tvar_0(b),\n        Term::PApp(p, r) =\u003e uses_tvar_0(p) || uses_tvar_0(r),\n        Term::THComp(a, phi, u, u0) =\u003e uses_tvar_0(a) || uses_tvar_0(phi) || uses_tvar_0(u) || uses_tvar_0(u0),\n        Term::TEquiv(a, b) =\u003e uses_tvar_0(a) || uses_tvar_0(b),\n        Term::TMkEquiv(a, b, f, g, eta, eps) =\u003e {\n            uses_tvar_0(a) || uses_tvar_0(b) || uses_tvar_0(f) || uses_tvar_0(g) || uses_tvar_0(eta) || uses_tvar_0(eps)\n        }\n        Term::TEquivFwd(e, x) =\u003e uses_tvar_0(e) || uses_tvar_0(x),\n        Term::TUa(e) =\u003e uses_tvar_0(e),\n        Term::TTransport(p, x) =\u003e uses_tvar_0(p) || uses_tvar_0(x),\n        Term::TGlue(a, phi, te) =\u003e uses_tvar_0(a) || uses_tvar_0(phi) || uses_tvar_0(te),\n        Term::TGlueElem(phi, t, a) =\u003e uses_tvar_0(phi) || uses_tvar_0(t) || uses_tvar_0(a),\n        Term::TUnglue(phi, te, g) =\u003e uses_tvar_0(phi) || uses_tvar_0(te) || uses_tvar_0(g),\n        Term::TSigma(_, a, b) =\u003e uses_tvar_0(a) || uses_tvar_0(b),\n        Term::TPair(a, b) =\u003e uses_tvar_0(a) || uses_tvar_0(b),\n        Term::TFst(p) =\u003e uses_tvar_0(p),\n        Term::TSnd(p) =\u003e uses_tvar_0(p),\n        Term::TUniv(_) | Term::TIntervalTy | Term::TInterval(_) | Term::TCube(_) | Term::TData(_) =\u003e false,\n        Term::TCon(_, _, args) =\u003e args.iter().any(uses_tvar_0),\n        Term::TPCon(_, _, args, r) =\u003e args.iter().any(uses_tvar_0) || uses_tvar_0(r),\n        Term::TElim(motive, cases, scrut) =\u003e {\n            uses_tvar_0(motive) || uses_tvar_0(scrut) || cases.iter().any(|c| uses_tvar_0(&c.body))\n        }\n    }\n}\n\n/// Transport through Pi types.\nfn transport_pi(env: &[Value], globals: &Globals, global_offset: usize, i_name: &str, clos: &IClosure, arg_name: &str, x: Value) -\u003e Value {\n    let (formal_env, pi_at_var) = eval_body_at_formal_interval(env, globals, global_offset, clos);\n    let cod_clos = match &pi_at_var {\n        Value::VPi(_, _, cod_clos) =\u003e cod_clos,\n        _ =\u003e return Value::VTransport(\n            Box::new(Value::VPLam(\"_\".to_string(), clos.clone())),\n            Box::new(x),\n        ),\n    };\n\n    if !uses_tvar_0(&cod_clos.body) {\n        let b_val = apply_non_dep(cod_clos);\n        let b_body = shift(1, 1, &quote(formal_env.len(), globals, global_offset, b_val));\n        let b_fam = Term::PLam(i_name.to_string(), Box::new(b_body));\n        let x_term = quote(env.len(), globals, global_offset, x);\n        let result = Term::TAbs(\n            arg_name.to_string(),\n            Box::new(Term::TTransport(\n                Box::new(b_fam),\n                Box::new(Term::TApp(\n                    Box::new(shift(1, 0, &x_term)),\n                    Box::new(Term::TVar(0)),\n                )),\n            )),\n        );\n        eval_nbe(env, globals, global_offset, &result)\n    } else {\n        let p_term = quote(env.len(), globals, global_offset, Value::VPLam(i_name.to_string(), clos.clone()));\n        let x_term = quote(env.len(), globals, global_offset, x.clone());\n        let reduced = transport_term_fallback(p_term, x_term);\n        match reduced {\n            Term::TTransport(_, _) =\u003e Value::VTransport(\n                Box::new(Value::VPLam(\"_\".to_string(), clos.clone())),\n                Box::new(x),\n            ),\n            _ =\u003e eval_nbe(env, globals, global_offset, &reduced),\n        }\n    }\n}\n\n/// Transport through Path types.\nfn transport_path(env: &[Value], globals: &Globals, global_offset: usize, i_name: &str, clos: &IClosure, x: Value) -\u003e Value {\n    let (formal_env, path_at_var) = eval_body_at_formal_interval(env, globals, global_offset, clos);\n    let a_val = match &path_at_var {\n        Value::VPath(a, _, _) =\u003e *a.clone(),\n        _ =\u003e return Value::VTransport(\n            Box::new(Value::VPLam(\"_\".to_string(), clos.clone())),\n            Box::new(x),\n        ),\n    };\n    let a_body = shift(1, 1, &quote(formal_env.len(), globals, global_offset, a_val));\n    let a_fam = Term::PLam(i_name.to_string(), Box::new(a_body));\n    let x_term = quote(env.len(), globals, global_offset, x);\n    let a_fam_s = shift(1, 0, &a_fam);\n    let result = Term::PLam(\n        \"j\".to_string(),\n        Box::new(Term::TTransport(\n            Box::new(a_fam_s),\n            Box::new(Term::PApp(\n                Box::new(shift(1, 0, &x_term)),\n                Box::new(Term::TVar(0)),\n            )),\n        )),\n    );\n    eval_nbe(env, globals, global_offset, &result)\n}\n\n/// Transport through Sigma types (pair decomposition).\nfn transport_sigma_pair(\n    env: &[Value],\n    globals: &Globals,\n    global_offset: usize,\n    i_name: &str,\n    clos: &IClosure,\n    a: &Value,\n    b: &Value,\n) -\u003e Value {\n    let (formal_env, sigma_at_var) = eval_body_at_formal_interval(env, globals, global_offset, clos);\n    let a_val = match &sigma_at_var {\n        Value::VSigma(_, a_val, _) =\u003e *a_val.clone(),\n        _ =\u003e Value::VUniv(0),\n    };\n    let a_body = shift(1, 1, &quote(formal_env.len(), globals, global_offset, a_val));\n    let a_fam = Term::PLam(i_name.to_string(), Box::new(a_body));\n\n    let a_prime = eval_nbe(env, globals, global_offset, &Term::TTransport(\n        Box::new(a_fam.clone()),\n        Box::new(quote(env.len(), globals, global_offset, a.clone())),\n    ));\n\n    let b_val = match &sigma_at_var {\n        Value::VSigma(_, _, cod_clos) =\u003e apply_non_dep(cod_clos),\n        _ =\u003e Value::VUniv(0),\n    };\n    let b_body = shift(1, 1, &quote(formal_env.len(), globals, global_offset, b_val));\n    let b_fam = Term::PLam(i_name.to_string(), Box::new(b_body));\n\n    let b_prime = eval_nbe(env, globals, global_offset, &Term::TTransport(\n        Box::new(b_fam),\n        Box::new(quote(env.len(), globals, global_offset, b.clone())),\n    ));\n\n    Value::VPair(Box::new(a_prime), Box::new(b_prime))\n}\n\n/// Transport through Glue types (phi=bot or phi=top).\nfn transport_glue(\n    env: &[Value],\n    globals: &Globals,\n    global_offset: usize,\n    i_name: &str,\n    clos: &IClosure,\n    phi0: &DNF,\n    x: &Value,\n) -\u003e Option\u003cValue\u003e {\n    if *phi0 == dnf_bot() {\n        let (formal_env, glue_at_var) = eval_body_at_formal_interval(env, globals, global_offset, clos);\n        let a_val = match &glue_at_var {\n            Value::VGlue(a, _, _) =\u003e *a.clone(),\n            _ =\u003e return None,\n        };\n        let a_body = shift(1, 1, &quote(formal_env.len(), globals, global_offset, a_val));\n        let a_fam = Term::PLam(i_name.to_string(), Box::new(a_body));\n        Some(eval_nbe(env, globals, global_offset, &Term::TTransport(\n            Box::new(a_fam),\n            Box::new(quote(env.len(), globals, global_offset, x.clone())),\n        )))\n    } else if *phi0 == dnf_top() {\n        let (formal_env, glue_at_var) = eval_body_at_formal_interval(env, globals, global_offset, clos);\n        let te_val = match &glue_at_var {\n            Value::VGlue(_, _, te) =\u003e *te.clone(),\n            _ =\u003e return None,\n        };\n        let dom = equiv_dom_value(te_val);\n        let dom_body = shift(1, 1, &quote(formal_env.len(), globals, global_offset, dom));\n        let dom_fam = Term::PLam(i_name.to_string(), Box::new(dom_body));\n        Some(eval_nbe(env, globals, global_offset, &Term::TTransport(\n            Box::new(dom_fam),\n            Box::new(quote(env.len(), globals, global_offset, x.clone())),\n        )))\n    } else {\n        None\n    }\n}\n\n/// Term-level transport reduction.\npub fn transport_term_fallback(p_: Term, x_: Term) -\u003e Term {\n    match p_ {\n        Term::TUa(ref e) =\u003e nbe_eval(&Term::TEquivFwd(e.clone(), Box::new(x_))),\n\n        Term::PLam(ref i_name, ref body) =\u003e {\n            let b0 = nbe_eval(&beta(body, &Term::TInterval(I::I0)));\n            let b1 = nbe_eval(&beta(body, &Term::TInterval(I::I1)));\n\n            if b0 == b1 {\n                return x_;\n            }\n\n            match (&b0, &b1) {\n                (Term::TPi(arg_name, a0, _), Term::TPi(_, a1, _)) =\u003e {\n                    let arg_name = arg_name.clone();\n                    let i_name = i_name.clone();\n\n                    let a0_eval = nbe_eval(a0);\n                    let a1_eval = nbe_eval(a1);\n                    if a0_eval == a1_eval {\n                        let b_fam = Term::PLam(\n                            i_name.clone(),\n                            Box::new(match nbe_eval(&beta(&shift(1, 0, body), &Term::TVar(0))) {\n                                Term::TPi(_, _, b_i) =\u003e {\n                                    let max_idx = max_var(&b_i);\n                                    let temp = max_idx + 1;\n                                    let tmp_var = Term::TVar(temp);\n                                    let step1 = subst(0, &tmp_var, &b_i);\n                                    let step2 = subst(1, &Term::TVar(0), &step1);\n                                    subst(temp, &Term::TVar(1), &step2)\n                                }\n                                _ =\u003e {\n                                    let b0_body = match &b0 {\n                                        Term::TPi(_, _, b) =\u003e (**b).clone(),\n                                        _ =\u003e b0.clone(),\n                                    };\n                                    shift(1, 0, &b0_body)\n                                }\n                            }),\n                        );\n                        let x_shifted = shift(1, 0, &x_);\n                        Term::TAbs(\n                            arg_name,\n                            Box::new(nbe_eval(&Term::TTransport(\n                                Box::new(b_fam),\n                                Box::new(nbe_eval(&Term::TApp(Box::new(x_shifted), Box::new(Term::TVar(0))))),\n                            ))),\n                        )\n                    } else {\n                        let b_non_dep = match &b0 {\n                            Term::TPi(_, _, b0_body) =\u003e subst(0, &Term::TUniv(0), b0_body) == **b0_body,\n                            _ =\u003e false,\n                        };\n                        if b_non_dep {\n                            let b0_body = match &b0 {\n                                Term::TPi(_, _, b) =\u003e (**b).clone(),\n                                _ =\u003e b0.clone(),\n                            };\n                            let b_fam = Term::PLam(\n                                i_name.clone(),\n                                Box::new(match nbe_eval(&beta(&shift(1, 0, body), &Term::TVar(0))) {\n                                    Term::TPi(_, _, b_i) =\u003e *b_i,\n                                    _ =\u003e shift(1, 0, &b0_body),\n                                }),\n                            );\n                            let x_shifted = shift(1, 0, &x_);\n                            Term::TAbs(\n                                arg_name,\n                                Box::new(nbe_eval(&Term::TTransport(\n                                    Box::new(b_fam),\n                                    Box::new(nbe_eval(&Term::TApp(Box::new(x_shifted), Box::new(Term::TVar(0))))),\n                                ))),\n                            )\n                        } else {\n                            let arg_name = arg_name.clone();\n                            let i_name = i_name.clone();\n\n                            let pi_at_var = nbe_eval(&beta(&shift(1, 0, body), &Term::TVar(0)));\n                            let a_i = match &pi_at_var {\n                                Term::TPi(_, a, _) =\u003e (**a).clone(),\n                                _ =\u003e shift(1, 0, a0),\n                            };\n                            let b0_body = match &b0 {\n                                Term::TPi(_, _, b) =\u003e (**b).clone(),\n                                _ =\u003e b0.clone(),\n                            };\n                            let b_i = match &pi_at_var {\n                                Term::TPi(_, _, b) =\u003e (**b).clone(),\n                                _ =\u003e shift(1, 0, &b0_body),\n                            };\n\n                            let a_fam = Term::PLam(i_name.clone(), Box::new(a_i));\n                            let a_rev_fam = Term::PLam(\n                                \"j\".to_string(),\n                                Box::new(Term::PApp(\n                                    Box::new(shift(1, 0, &a_fam)),\n                                    Box::new(Term::TInterval(I::Neg(Box::new(I::Var(0))))),\n                                )),\n                            );\n\n                            let y0_term = Term::TTransport(\n                                Box::new(shift(1, 0, &a_rev_fam)),\n                                Box::new(Term::TVar(0)),\n                            );\n\n                            let b_fam = Term::PLam(\n                                i_name.clone(),\n                                Box::new({\n                                    let max_idx = max_var(&b_i);\n                                    let temp = max_idx + 1;\n                                    let tmp_var = Term::TVar(temp);\n                                    let step1 = subst(0, &tmp_var, &b_i);\n                                    let step2 = subst(1, &Term::TVar(0), &step1);\n                                    let b_i_swapped = subst(temp, &Term::TVar(1), &step2);\n\n                                    let y0_shifted = shift(1, 0, &y0_term);\n                                    let fill_at_i = nbe_eval(&Term::TTransport(\n                                        Box::new(Term::PLam(\n                                            \"j\".to_string(),\n                                            Box::new(nbe_eval(&Term::PApp(\n                                                Box::new(shift(2, 0, &a_fam)),\n                                                Box::new(Term::TInterval(I::Meet(\n                                                    Box::new(I::Var(1)),\n                                                    Box::new(I::Var(0)),\n                                                ))),\n                                            ))),\n                                        )),\n                                        Box::new(y0_shifted),\n                                    ));\n                                    nbe_eval(&subst(1, &fill_at_i, &b_i_swapped))\n                                }),\n                            );\n\n                            let x_shifted = shift(1, 0, &x_);\n                            Term::TAbs(\n                                arg_name,\n                                Box::new(nbe_eval(&Term::TTransport(\n                                    Box::new(b_fam),\n                                    Box::new(nbe_eval(&Term::TApp(\n                                        Box::new(x_shifted),\n                                        Box::new(y0_term),\n                                    ))),\n                                ))),\n                            )\n                        }\n                    }\n                }\n\n                (Term::TPath(ty_a0, _, _), Term::TPath(_, _, _)) =\u003e {\n                    let i_name = i_name.clone();\n                    let ty_a0 = (**ty_a0).clone();\n\n                    let a_fam = Term::PLam(\n                        i_name.clone(),\n                        Box::new(match nbe_eval(&beta(&shift(1, 0, body), &Term::TVar(0))) {\n                            Term::TPath(a, _, _) =\u003e *a,\n                            _ =\u003e shift(1, 0, &ty_a0),\n                        }),\n                    );\n\n                    let a_fam_s = shift(1, 0, &a_fam);\n                    let x_shifted = shift(1, 0, &x_);\n                    Term::PLam(\n                        \"j\".to_string(),\n                        Box::new(nbe_eval(&Term::TTransport(\n                            Box::new(a_fam_s),\n                            Box::new(Term::PApp(Box::new(x_shifted), Box::new(Term::TVar(0)))),\n                        ))),\n                    )\n                }\n\n                (Term::TSigma(_, _, _), Term::TSigma(_, _, _)) =\u003e {\n                    match x_ {\n                        Term::TPair(ref a, ref b) =\u003e {\n                            let i_name = i_name.clone();\n\n                            let b0_a = match &b0 {\n                                Term::TSigma(_, a, _) =\u003e (**a).clone(),\n                                _ =\u003e b0.clone(),\n                            };\n                            let b0_b = match &b0 {\n                                Term::TSigma(_, _, bz) =\u003e (**bz).clone(),\n                                _ =\u003e b0.clone(),\n                            };\n\n                            let a_fam = Term::PLam(\n                                i_name.clone(),\n                                Box::new(match nbe_eval(&beta(&shift(1, 0, body), &Term::TVar(0))) {\n                                    Term::TSigma(_, a_i, _) =\u003e *a_i,\n                                    _ =\u003e shift(1, 0, &b0_a),\n                                }),\n                            );\n\n                            let a_prime =\n                                nbe_eval(&Term::TTransport(Box::new(a_fam.clone()), a.clone()));\n\n                            let a_clone = (**a).clone();\n                            let b_fam = Term::PLam(\n                                i_name.clone(),\n                                Box::new(match nbe_eval(&beta(&shift(1, 0, body), &Term::TVar(0))) {\n                                    Term::TSigma(_, _, b_i) =\u003e {\n                                        let fill_at_i = nbe_eval(&Term::TTransport(\n                                            Box::new(Term::PLam(\n                                                \"j\".to_string(),\n                                                Box::new(nbe_eval(&Term::PApp(\n                                                    Box::new(shift(2, 0, &a_fam)),\n                                                    Box::new(Term::TInterval(I::Meet(\n                                                        Box::new(I::Var(1)),\n                                                        Box::new(I::Var(0)),\n                                                    ))),\n                                                ))),\n                                            )),\n                                            Box::new(shift(1, 0, &a_clone)),\n                                        ));\n                                        nbe_eval(&beta(&b_i, &fill_at_i))\n                                    }\n                                    _ =\u003e shift(1, 0, &b0_b),\n                                }),\n                            );\n\n                            let b_prime = nbe_eval(&Term::TTransport(Box::new(b_fam), b.clone()));\n                            Term::TPair(Box::new(a_prime), Box::new(b_prime))\n                        }\n                        _ =\u003e Term::TTransport(\n                            Box::new(Term::PLam(i_name.clone(), body.clone())),\n                            Box::new(x_),\n                        ),\n                    }\n                }\n\n                (Term::TGlue(_, phi0, _), Term::TGlue(_, _, _)) =\u003e {\n                    let i_name = i_name.clone();\n                    if is_bot_dnf(&nbe_eval(phi0)) {\n                        nbe_eval(&Term::TTransport(\n                            Box::new(Term::PLam(\n                                i_name.clone(),\n                                Box::new(match nbe_eval(&beta(&shift(1, 0, body), &Term::TVar(0))) {\n                                    Term::TGlue(a, _, _) =\u003e *a,\n                                    other =\u003e other,\n                                }),\n                            )),\n                            Box::new(x_),\n                        ))\n                    } else if is_top_dnf(&nbe_eval(phi0)) {\n                        nbe_eval(&Term::TTransport(\n                            Box::new(Term::PLam(\n                                i_name.clone(),\n                                Box::new(match nbe_eval(&beta(&shift(1, 0, body), &Term::TVar(0))) {\n                                    Term::TGlue(_, _, te) =\u003e equiv_dom(&nbe_eval(&te)),\n                                    other =\u003e other,\n                                }),\n                            )),\n                            Box::new(x_),\n                        ))\n                    } else {\n                        Term::TTransport(Box::new(Term::PLam(i_name, body.clone())), Box::new(x_))\n                    }\n                }\n\n                _ =\u003e Term::TTransport(\n                    Box::new(Term::PLam(i_name.clone(), body.clone())),\n                    Box::new(x_),\n                ),\n            }\n        }\n\n        p_ =\u003e Term::TTransport(Box::new(p_), Box::new(x_)),\n    }\n}\n\npub fn do_hcomp(a_ty: Value, phi: DNF, tube: Value, base: Value) -\u003e Value {\n    if phi == dnf_top() {\n        do_papp(tube, Value::VInterval(I::I1))\n    } else if phi == dnf_bot() {\n        base\n    } else {\n        Value::VHComp(Box::new(a_ty), phi, Box::new(tube), Box::new(base))\n    }\n}\n\npub fn quote(size: usize, globals: &Globals, global_offset: usize, v: Value) -\u003e Term {\n    match v {\n        Value::VNeutral(n) =\u003e quote_neutral(size, globals, global_offset, n),\n        Value::VLam(x, clos) =\u003e Term::TAbs(\n            x,\n            Box::new(quote(\n                size + 1,\n                globals,\n                global_offset,\n                clos.apply(Value::VNeutral(Neutral::NVar(size))),\n            )),\n        ),\n        Value::VApp(f, a) =\u003e Term::TApp(Box::new(quote(size, globals, global_offset, *f)), Box::new(quote(size, globals, global_offset, *a))),\n        Value::VPi(x, a, b) =\u003e Term::TPi(\n            x,\n            Box::new(quote(size, globals, global_offset, *a)),\n            Box::new(quote(\n                size + 1,\n                globals,\n                global_offset,\n                b.apply(Value::VNeutral(Neutral::NVar(size))),\n            )),\n        ),\n        Value::VSigma(x, a, b) =\u003e Term::TSigma(\n            x,\n            Box::new(quote(size, globals, global_offset, *a)),\n            Box::new(quote(\n                size + 1,\n                globals,\n                global_offset,\n                b.apply(Value::VNeutral(Neutral::NVar(size))),\n            )),\n        ),\n        Value::VPair(a, b) =\u003e Term::TPair(Box::new(quote(size, globals, global_offset, *a)), Box::new(quote(size, globals, global_offset, *b))),\n        Value::VFst(p) =\u003e Term::TFst(Box::new(quote(size, globals, global_offset, *p))),\n        Value::VSnd(p) =\u003e Term::TSnd(Box::new(quote(size, globals, global_offset, *p))),\n        Value::VPath(a, u, v) =\u003e Term::TPath(\n            Box::new(quote(size, globals, global_offset, *a)),\n            Box::new(quote(size, globals, global_offset, *u)),\n            Box::new(quote(size, globals, global_offset, *v)),\n        ),\n        Value::VPLam(x, clos) =\u003e Term::PLam(x, Box::new(quote(size + 1, globals, global_offset, clos.apply_i_var(size)))),\n        Value::VPApp(p, r) =\u003e Term::PApp(Box::new(quote(size, globals, global_offset, *p)), Box::new(quote(size, globals, global_offset, *r))),\n        Value::VUniv(n) =\u003e Term::TUniv(n),\n        Value::VIntervalTy =\u003e Term::TIntervalTy,\n        Value::VInterval(i) =\u003e Term::TInterval(i),\n        Value::VIntervalVar(level) =\u003e level_to_var(size, level),\n        Value::VCube(c) =\u003e Term::TCube(c),\n        Value::VData(d) =\u003e Term::TData(d),\n        Value::VCon(d, c, args) =\u003e {\n            Term::TCon(d, c, args.into_iter().map(|a| quote(size, globals, global_offset, a)).collect())\n        }\n        Value::VPCon(d, c, args, r) =\u003e Term::TPCon(\n            d,\n            c,\n            args.into_iter().map(|a| quote(size, globals, global_offset, a)).collect(),\n            Box::new(quote(size, globals, global_offset, *r)),\n        ),\n        Value::VElim(motive, cases, scrut) =\u003e Term::TElim(\n            Box::new(quote(size, globals, global_offset, *motive)),\n            quote_cases(size, globals, global_offset, cases),\n            Box::new(quote(size, globals, global_offset, *scrut)),\n        ),\n        Value::VGlue(a, phi, te) =\u003e Term::TGlue(\n            Box::new(quote(size, globals, global_offset, *a)),\n            Box::new(Term::TCube(phi)),\n            Box::new(quote(size, globals, global_offset, *te)),\n        ),\n        Value::VGlueElem(phi, t, a) =\u003e Term::TGlueElem(\n            Box::new(Term::TCube(phi)),\n            Box::new(quote(size, globals, global_offset, *t)),\n            Box::new(quote(size, globals, global_offset, *a)),\n        ),\n        Value::VUnglue(phi, te, g) =\u003e Term::TUnglue(\n            Box::new(Term::TCube(phi)),\n            Box::new(quote(size, globals, global_offset, *te)),\n            Box::new(quote(size, globals, global_offset, *g)),\n        ),\n        Value::VEquiv(a, b) =\u003e Term::TEquiv(Box::new(quote(size, globals, global_offset, *a)), Box::new(quote(size, globals, global_offset, *b))),\n        Value::VMkEquiv(a, b, f, g, eta, eps) =\u003e Term::TMkEquiv(\n            Box::new(quote(size, globals, global_offset, *a)),\n            Box::new(quote(size, globals, global_offset, *b)),\n            Box::new(quote(size, globals, global_offset, *f)),\n            Box::new(quote(size, globals, global_offset, *g)),\n            Box::new(quote(size, globals, global_offset, *eta)),\n            Box::new(quote(size, globals, global_offset, *eps)),\n        ),\n        Value::VEquivFwd(e, x) =\u003e {\n            Term::TEquivFwd(Box::new(quote(size, globals, global_offset, *e)), Box::new(quote(size, globals, global_offset, *x)))\n        }\n        Value::VUa(e) =\u003e Term::TUa(Box::new(quote(size, globals, global_offset, *e))),\n        Value::VTransport(p, x) =\u003e {\n            Term::TTransport(Box::new(quote(size, globals, global_offset, *p)), Box::new(quote(size, globals, global_offset, *x)))\n        }\n        Value::VHComp(a, phi, tube, base) =\u003e Term::THComp(\n            Box::new(quote(size, globals, global_offset, *a)),\n            Box::new(Term::TCube(phi)),\n            Box::new(quote(size, globals, global_offset, *tube)),\n            Box::new(quote(size, globals, global_offset, *base)),\n        ),\n    }\n}\n\nfn quote_neutral(size: usize, globals: &Globals, global_offset: usize, n: Neutral) -\u003e Term {\n    match n {\n        Neutral::NVar(level) =\u003e level_to_var(size, level),\n        Neutral::NApp(f, a) =\u003e {\n            Term::TApp(Box::new(quote_neutral(size, globals, global_offset, *f)), Box::new(quote(size, globals, global_offset, *a)))\n        }\n        Neutral::NPApp(p, r) =\u003e {\n            Term::PApp(Box::new(quote_neutral(size, globals, global_offset, *p)), Box::new(quote(size, globals, global_offset, *r)))\n        }\n        Neutral::NFst(p) =\u003e Term::TFst(Box::new(quote_neutral(size, globals, global_offset, *p))),\n        Neutral::NSnd(p) =\u003e Term::TSnd(Box::new(quote_neutral(size, globals, global_offset, *p))),\n        Neutral::NElim(motive, cases, scrut) =\u003e Term::TElim(\n            Box::new(quote(size, globals, global_offset, *motive)),\n            quote_cases(size, globals, global_offset, cases),\n            Box::new(quote_neutral(size, globals, global_offset, *scrut)),\n        ),\n        Neutral::NTransport(p, x) =\u003e {\n            Term::TTransport(Box::new(quote(size, globals, global_offset, *p)), Box::new(quote(size, globals, global_offset, *x)))\n        }\n        Neutral::NHComp(a, phi, tube, base) =\u003e Term::THComp(\n            Box::new(quote(size, globals, global_offset, *a)),\n            Box::new(Term::TCube(phi)),\n            Box::new(quote(size, globals, global_offset, *tube)),\n            Box::new(quote(size, globals, global_offset, *base)),\n        ),\n    }\n}\n\nfn quote_cases(size: usize, globals: &Globals, global_offset: usize, cases: Vec\u003cElimCase\u003e) -\u003e Vec\u003cElimCase\u003e {\n    cases\n        .into_iter()\n        .map(|case| ElimCase {\n            con: case.con,\n            binders: case.binders.clone(),\n            body: Box::new(normalize_under_binders(\n                size,\n                case.binders.len(),\n                globals,\n                global_offset,\n                &case.body,\n            )),\n        })\n        .collect()\n}\n\nfn normalize_under_binders(size: usize, binders: usize, globals: &Globals, global_offset: usize, body: &Term) -\u003e Term {\n    let mut env = Vec::new();\n    for level in (size..size + binders).rev() {\n        env.push(Value::VNeutral(Neutral::NVar(level)));\n    }\n    quote(size + binders, globals, global_offset, eval_nbe(&env, globals, global_offset, body))\n}\n\npub fn normalize(env: &[Value], globals: &Globals, global_offset: usize, t: &Term) -\u003e Term {\n    quote(env.len(), globals, global_offset, eval_nbe(env, globals, global_offset, t))\n}\n\n/// Evaluate a closed term without global definitions (original behavior).\npub fn nbe_eval(t: &Term) -\u003e Term {\n    let empty_globals: Globals = Rc::new(RefCell::new(Vec::new()));\n    let mv = max_var(t);\n    if mv \u003c 0 {\n        normalize(&[], &empty_globals, 0, t)\n    } else {\n        let size = (mv + 1) as usize;\n        let mut env = Vec::with_capacity(size);\n        for level in (0..size).rev() {\n            env.push(Value::VNeutral(Neutral::NVar(level)));\n        }\n        normalize(&env, &empty_globals,
