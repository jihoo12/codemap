0, t)\n    }\n}\n\n/// Evaluate a term with access to global definition values.\n///\n/// `globals` should be ordered most-recent-first (same as `env.defs`).\n/// `global_offset` is the index into `globals` where the evaluated term's\n/// own definition lives (0 = most recent, the typical case for evaluating\n/// the target expression).\npub fn nbe_eval_with_globals(t: &Term, globals: &Globals, global_offset: usize) -\u003e Term {\n    // The env starts empty — all TVars resolve to globals.\n    // Lambdas push binders onto the env during evaluation via do_apply.\n    normalize(&[], globals, global_offset, t)\n}\n\nfn do_equiv_fwd(e: Value, x: Value) -\u003e Value {\n    match e {\n        Value::VMkEquiv(_, _, f, _, _, _) =\u003e do_apply(*f, x),\n        other =\u003e Value::VEquivFwd(Box::new(other), Box::new(x)),\n    }\n}\n\nfn equiv_dom_value(v: Value) -\u003e Value {\n    match v {\n        Value::VMkEquiv(a, _, _, _, _, _) | Value::VEquiv(a, _) =\u003e *a,\n        Value::VPair(a, _) =\u003e *a,\n        other =\u003e other,\n    }\n}\n\nfn stuck_elim(motive: Value, cases: &[ElimCase], n: Neutral) -\u003e Value {\n    Value::VNeutral(Neutral::NElim(\n        Box::new(motive),\n        cases.to_vec(),\n        Box::new(n),\n    ))\n}\n\nfn value_to_dnf(v: Value) -\u003e DNF {\n    match v {\n        Value::VCube(d) =\u003e d,\n        Value::VInterval(i) =\u003e eval_interval(&i),\n        Value::VIntervalVar(level) =\u003e eval_interval(&I::Var(level as i32)),\n        other =\u003e match quote(0, &Rc::new(RefCell::new(Vec::new())), 0, other) {\n            Term::TCube(d) =\u003e d,\n            Term::TInterval(i) =\u003e eval_interval(&i),\n            _ =\u003e dnf_bot(),\n        },\n    }\n}\n\nfn value_to_endpoint(v: &Value) -\u003e Option\u003cI\u003e {\n    match v {\n        Value::VInterval(i) =\u003e {\n            let d = eval_interval(i);\n            if d == dnf_bot() {\n                Some(I::I0)\n            } else if d == dnf_top() {\n                Some(I::I1)\n            } else {\n                None\n            }\n        }\n        Value::VCube(d) if *d == dnf_bot() =\u003e Some(I::I0),\n        Value::VCube(d) if *d == dnf_top() =\u003e Some(I::I1),\n        _ =\u003e None,\n    }\n}\n\nfn level_to_var(size: usize, level: usize) -\u003e Term {\n    if level \u003c size {\n        Term::TVar((size - level - 1) as i32)\n    } else {\n        Term::TVar(level.saturating_sub(size) as i32)\n    }\n}\n\n#[cfg(test)]\nmod tests {\n    use super::*;\n\n    fn b(t: Term) -\u003e Box\u003cTerm\u003e {\n        Box::new(t)\n    }\n\n    #[test]\n    fn identity_function_normalizes_to_itself() {\n        let id = Term::TAbs(\"x\".to_string(), b(Term::TVar(0)));\n        assert_eq!(nbe_eval(&id), id);\n    }\n\n    #[test]\n    fn beta_reduces_identity_application() {\n        let term = Term::TApp(\n            b(Term::TAbs(\"x\".to_string(), b(Term::TVar(0)))),\n            b(Term::TUniv(0)),\n        );\n        assert_eq!(nbe_eval(&term), Term::TUniv(0));\n    }\n\n    #[test]\n    fn fst_of_pair_reduces() {\n        let term = Term::TFst(b(Term::TPair(b(Term::TUniv(0)), b(Term::TUniv(1)))));\n        assert_eq!(nbe_eval(&term), Term::TUniv(0));\n    }\n\n    #[test]\n    fn transport_over_constant_family_is_identity() {\n        let family = Term::PLam(\"i\".to_string(), b(Term::TUniv(0)));\n        let term = Term::TTransport(b(family), b(Term::TUniv(1)));\n        assert_eq!(nbe_eval(&term), Term::TUniv(1));\n    }\n\n    #[test]\n    fn transport_over_nonconstant_pi_produces_lambda() {\n        let body = Term::TPi(\n            \"x\".to_string(),\n            b(Term::TApp(b(Term::TVar(1)), b(Term::TVar(0)))),\n            b(Term::TUniv(0)),\n        );\n        let fam = Term::PLam(\"i\".to_string(), b(body));\n        let arg = Term::TAbs(\"x\".to_string(), b(Term::TUniv(0)));\n        let term = Term::TTransport(b(fam), b(arg));\n        let result = nbe_eval(&term);\n        assert!(\n            matches!(&result, Term::TAbs(_, _)),\n            \"expected TAbs, got: {}\",\n            crate::cubical::syntax::show_term(&[], &result)\n        );\n    }\n\n    #[test]\n    fn deep_transport_fallback_unsticks_pi() {\n        let body = Term::TPi(\n            \"x\".to_string(),\n            b(Term::TApp(b(Term::TVar(1)), b(Term::TVar(0)))),\n            b(Term::TUniv(0)),\n        );\n        let fam = Term::PLam(\"i\".to_string(), b(body));\n        let arg = Term::TAbs(\"x\".to_string(), b(Term::TUniv(0)));\n        let term = Term::TTransport(b(fam), b(arg));\n        let result = nbe_eval(&term);\n        assert!(\n            !matches!(result, Term::TTransport(_, _)),\n            \"transport should not be stuck: {}\",\n            crate::cubical::syntax::show_term(&[], &result)\n        );\n    }\n\n    #[test]\n    fn sigma_transport_on_pair_reduces() {\n        let sigma = Term::TSigma(\n            \"x\".to_string(),\n            b(Term::TUniv(0)),\n            b(Term::TUniv(1)),\n        );\n        let fam = Term::PLam(\"i\".to_string(), b(sigma));\n        let pair = Term::TPair(b(Term::TUniv(0)), b(Term::TUniv(1)));\n        let term = Term::TTransport(b(fam), b(pair.clone()));\n        let result = nbe_eval(&term);\n        assert_eq!(result, pair);\n    }\n\n    #[test]\n    fn path_transport_produces_plam() {\n        let path = Term::TPath(\n            b(Term::TApp(b(Term::TVar(1)), b(Term::TVar(0)))),\n            b(Term::TUniv(0)),\n            b(Term::TUniv(0)),\n        );\n        let fam = Term::PLam(\"i\".to_string(), b(path));\n        let arg = Term::PLam(\"j\".to_string(), b(Term::TUniv(0)));\n        let term = Term::TTransport(b(fam), b(arg));\n        let result = nbe_eval(&term);\n        assert!(\n            matches!(&result, Term::PLam(_, _)),\n            \"expected PLam, got: {}\",\n            crate::cubical::syntax::show_term(&[], &result)\n        );\n    }\n\n    #[test]\n    fn native_pi_transport_no_deep_fallback() {\n        let body = Term::TPi(\n            \"x\".to_string(),\n            b(Term::TApp(b(Term::TVar(1)), b(Term::TVar(0)))),\n            b(Term::TUniv(0)),\n        );\n        let fam = Term::PLam(\"i\".to_string(), b(body));\n        let arg = Term::TAbs(\"x\".to_string(), b(Term::TUniv(0)));\n        let term = Term::TTransport(b(fam), b(arg));\n        let result = nbe_eval(&term);\n        assert!(\n            matches!(&result, Term::TAbs(_, _)),\n            \"expected TAbs (native Pi transport), got: {}\",\n            crate::cubical::syntax::show_term(&[], &result)\n        );\n    }\n}\n"},{"id":"src/cubical/parser/grammar.rs","name":"grammar.rs","dir":"src/cubical/parser","ext":".rs","size":31685,"binary":false,"truncated":false,"content":"//! Recursive-descent parser: consumes the [`Token`] stream produced by the\n//! [`Lexer`](super::lexer::Lexer) and builds [`Term`]s / [`Decl`]s, resolving\n//! variables to de Bruijn indices along the way.\n\nuse super::lexer::{err, Token, TokenKind};\nuse super::{Decl, ParseError};\nuse crate::cubical::interval::I;\nuse crate::cubical::syntax::{ConSig, Datatype, ElimCase, Name, PConSig, Term};\n\npub(super) struct Parser {\n    tokens: Vec\u003cToken\u003e,\n    pos: usize,\n    pub(super) term_env: Vec\u003cName\u003e,\n    pub(super) ivar_env: Vec\u003cName\u003e,\n    pub(super) global_env: Vec\u003cName\u003e,\n    pub(super) datatypes: Vec\u003cDatatype\u003e,\n    /// When true, `starts_atom` treats the keyword `with` as a stop token.\n    stop_at_with: bool,\n    /// When true, `starts_atom` treats the keyword `in` as a stop token.\n    stop_at_in: bool,\n}\n\nimpl Parser {\n    pub(super) fn new(tokens: Vec\u003cToken\u003e) -\u003e Self {\n        Self {\n            tokens,\n            pos: 0,\n            term_env: Vec::new(),\n            ivar_env: Vec::new(),\n            global_env: Vec::new(),\n            datatypes: Vec::new(),\n            stop_at_with: false,\n            stop_at_in: false,\n        }\n    }\n\n    pub(super) fn parse_import(&mut self) -\u003e Result\u003cDecl, ParseError\u003e {\n        let path = self.expect_string(\"expected string literal after 'import'\")?;\n        Ok(Decl::Import { path })\n    }\n\n    pub(super) fn parse_def(&mut self) -\u003e Result\u003cDecl, ParseError\u003e {\n        let name = self.expect_ident(\"expected definition name\")?;\n        self.expect(\n            TokenKind::Colon,\n            format!(\"expected ':' after definition name '{}'\", name),\n        )?;\n        let ty = self.parse_term()?;\n        self.expect(\n            TokenKind::Equals,\n            format!(\"expected '=' after type for definition '{}'\", name),\n        )?;\n        // Allow the definition body to refer to itself (and later globals).\n        self.global_env.insert(0, name.clone());\n        let val = self.parse_term()?;\n        Ok(Decl::Def { name, ty, val })\n    }\n\n    pub(super) fn parse_data_decl(&mut self) -\u003e Result\u003cDecl, ParseError\u003e {\n        let name = self.expect_ident(\"expected datatype name\")?;\n        self.expect(\n            TokenKind::Equals,\n            format!(\"expected '=' after datatype name '{}'\", name),\n        )?;\n        let mut cons = Vec::new();\n        let mut pcons = Vec::new();\n        let mut local_dt = Datatype {\n            name: name.clone(),\n            cons: Vec::new(),\n            pcons: Vec::new(),\n        };\n        while self.consume(&TokenKind::Pipe) {\n            let con_name = self.expect_ident(\"expected constructor name after '|'\")?;\n            self.expect(\n                TokenKind::Colon,\n                format!(\"expected ':' after constructor name '{}'\", con_name),\n            )?;\n            let (arg_tys, result) = self.parse_constructor_type(&name, &local_dt)?;\n            if result != Term::TData(name.clone()) {\n                return Err(self.error_here(format!(\n                    \"constructor '{}' must return datatype '{}'\",\n                    con_name, name\n                )));\n            }\n            if self.consume(&TokenKind::LBracket) {\n                let face0 = self.parse_face_with_extra_datatype(&local_dt)?;\n                self.expect(\n                    TokenKind::Comma,\n                    \"expected ',' between path-constructor faces\",\n                )?;\n                let face1 = self.parse_face_with_extra_datatype(&local_dt)?;\n                self.expect(\n                    TokenKind::RBracket,\n                    \"expected ']' after path-constructor faces\",\n                )?;\n                let sig = PConSig {\n                    name: con_name,\n                    arg_tys,\n                    face0,\n                    face1,\n                };\n                local_dt.pcons.push(sig.clone());\n                pcons.push(sig);\n            } else {\n                let sig = ConSig {\n                    name: con_name,\n                    arg_tys,\n                };\n                local_dt.cons.push(sig.clone());\n                cons.push(sig);\n            }\n        }\n        if cons.is_empty() && pcons.is_empty() {\n            return Err(self.error_here(format!(\n                \"datatype '{}' must declare at least one constructor\",\n                name\n            )));\n        }\n        Ok(Decl::Data(Datatype { name, cons, pcons }))\n    }\n\n    fn parse_constructor_type(\n        &mut self,\n        dt_name: &str,\n        local_dt: &Datatype,\n    ) -\u003e Result\u003c(Vec\u003cTerm\u003e, Term), ParseError\u003e {\n        let old_dts_len = self.datatypes.len();\n        self.datatypes.push(local_dt.clone());\n        let ty = self.parse_term()?;\n        self.datatypes.truncate(old_dts_len);\n        let mut args = Vec::new();\n        let mut cur = ty;\n        loop {\n            match cur {\n                Term::TPi(_, a, b) =\u003e {\n                    args.push(*a);\n                    cur = *b;\n                }\n                Term::TData(ref n) if n == dt_name =\u003e return Ok((args, cur)),\n                other =\u003e return Ok((args, other)),\n            }\n        }\n    }\n\n    fn parse_face_with_extra_datatype(&mut self, dt: &Datatype) -\u003e Result\u003cTerm, ParseError\u003e {\n        let old_len = self.datatypes.len();\n        self.datatypes.push(dt.clone());\n        let term = self.parse_arrow();\n        self.datatypes.truncate(old_len);\n        term\n    }\n\n    pub(super) fn parse_term(&mut self) -\u003e Result\u003cTerm, ParseError\u003e {\n        self.parse_lambda()\n    }\n\n    fn parse_lambda(&mut self) -\u003e Result\u003cTerm, ParseError\u003e {\n        if self.consume_ident(\"let\") {\n            return self.parse_let();\n        }\n        if self.consume(&TokenKind::Backslash) {\n            let binders = self.parse_one_or_more_idents(\"expected lambda binder after '\\\\'\")?;\n            self.expect(TokenKind::Dot, \"expected '.' after lambda binder list\")?;\n            for binder in &binders {\n                self.term_env.insert(0, binder.clone());\n            }\n            let body = self.parse_term()?;\n            for _ in &binders {\n                self.term_env.remove(0);\n            }\n            let mut term = body;\n            for binder in binders.into_iter().rev() {\n                term = Term::TAbs(binder, Box::new(term));\n            }\n            return Ok(term);\n        }\n        if self.consume_ident(\"fun\") {\n            let binders = self.parse_one_or_more_idents(\"expected binder after 'fun'\")?;\n            self.expect(\n                TokenKind::FatArrow,\n                \"expected '=\u003e' after function binder list\",\n            )?;\n            for binder in &binders {\n                self.term_env.insert(0, binder.clone());\n            }\n            let body = self.parse_term()?;\n            for _ in &binders {\n                self.term_env.remove(0);\n            }\n            let mut term = body;\n            for binder in binders.into_iter().rev() {\n                term = Term::TAbs(binder, Box::new(term));\n            }\n            return Ok(term);\n        }\n        if self.consume(&TokenKind::LAngle) {\n            let binder = self.expect_ident(\"expected interval binder after '\u003c'\")?;\n            self.expect(TokenKind::RAngle, \"expected '\u003e' after interval binder\")?;\n            self.ivar_env.insert(0, binder.clone());\n            self.term_env.insert(0, \"\".to_string());\n            let body = self.parse_term()?;\n            self.term_env.remove(0);\n            self.ivar_env.remove(0);\n            return Ok(Term::PLam(binder, Box::new(body)));\n        }\n        if self.consume_ident(\"Π\") || self.consume_ident(\"Pi\") {\n            let (binder, ty) = self.parse_parenthesized_binder(\"Pi\")?;\n            self.expect(TokenKind::Dot, \"expected '.' after Pi binder\")?;\n            self.term_env.insert(0, binder.clone());\n            let body = self.parse_term()?;\n            self.term_env.remove(0);\n            return Ok(Term::TPi(binder, Box::new(ty), Box::new(body)));\n        }\n        if self.consume_ident(\"Σ\") || self.consume_ident(\"Sigma\") {\n            let (binder, ty) = self.parse_parenthesized_binder(\"Sigma\")?;\n            self.expect(TokenKind::Dot, \"expected '.' after Sigma binder\")?;\n            self.term_env.insert(0, binder.clone());\n            let body = self.parse_term()?;\n            self.term_env.remove(0);\n            return Ok(Term::TSigma(binder, Box::new(ty), Box::new(body)));\n        }\n        self.parse_pair()\n    }\n\n    fn parse_let(&mut self) -\u003e Result\u003cTerm, ParseError\u003e {\n        let binder = self.expect_ident(\"expected binder after 'let'\")?;\n\n        if self.consume(&TokenKind::Colon) {\n            let _ty = self.parse_term()?;\n        }\n        self.expect(TokenKind::Equals, \"expected '=' after let binder\")?;\n\n        let value = {\n            self.stop_at_in = true;\n            let v = self.parse_term()?;\n            self.stop_at_in = false;\n            v\n        };\n        self.expect_ident(\"in\")?;\n\n        self.term_env.insert(0, binder.clone());\n        let body = self.parse_term()?;\n        self.term_env.remove(0);\n\n        Ok(Term::TApp(\n            Box::new(Term::TAbs(binder, Box::new(body))),\n            Box::new(value),\n        ))\n    }\n\n    fn parse_pair(&mut self) -\u003e Result\u003cTerm, ParseError\u003e {\n        let left = self.parse_arrow()?;\n        if self.consume(&TokenKind::Comma) {\n            let right = self.parse_term()?;\n            Ok(Term::TPair(Box::new(left), Box::new(right)))\n        } else {\n            Ok(left)\n        }\n    }\n\n    /// Parse `-\u003e` (non-dependent Pi) at the lowest precedence.\n    /// `A * B -\u003e C * D` parses as `(A * B) -\u003e (C * D)`.\n    fn parse_arrow(&mut self) -\u003e Result\u003cTerm, ParseError\u003e {\n        let left = self.parse_sigma()?;\n        if self.consume(&TokenKind::Arrow) {\n            self.term_env.insert(0, \"_\".to_string());\n            let right = self.parse_arrow()?;\n            self.term_env.remove(0);\n            Ok(Term::TPi(\"_\".to_string(), Box::new(left), Box::new(right)))\n        } else {\n            Ok(left)\n        }\n    }\n\n    /// Parse `*` (non-dependent Sigma/product) at a higher precedence than `-\u003e`.\n    /// `A * B * C` parses as `A * (B * C)` (right-associative).\n    fn parse_sigma(&mut self) -\u003e Result\u003cTerm, ParseError\u003e {\n        let left = self.parse_join()?;\n        if self.consume(&TokenKind::Star) {\n            self.term_env.insert(0, \"_\".to_string());\n            let right = self.parse_sigma()?;\n            self.term_env.remove(0);\n            Ok(Term::TSigma(\n                \"_\".to_string(),\n                Box::new(left),\n                Box::new(right),\n            ))\n        } else {\n            Ok(left)\n        }\n    }\n\n    fn parse_join(&mut self) -\u003e Result\u003cTerm, ParseError\u003e {\n        let mut term = self.parse_meet()?;\n        while self.consume(&TokenKind::OrSym) {\n            let rhs = self.parse_meet()?;\n            term = interval_binary(term, rhs, |a, b| I::Join(Box::new(a), Box::new(b)), self)?;\n        }\n        Ok(term)\n    }\n\n    fn parse_meet(&mut self) -\u003e Result\u003cTerm, ParseError\u003e {\n        let mut term = self.parse_tilde()?;\n        while self.consume(&TokenKind::AndSym) {\n            let rhs = self.parse_tilde()?;\n            term = interval_binary(term, rhs, |a, b| I::Meet(Box::new(a), Box::new(b)), self)?;\n        }\n        Ok(term)\n    }\n\n    fn parse_tilde(&mut self) -\u003e Result\u003cTerm, ParseError\u003e {\n        if self.consume(&TokenKind::Tilde) {\n            let term = self.parse_tilde()?;\n            let i = expect_interval(term, self)?;\n            Ok(Term::TInterval(I::Neg(Box::new(i))))\n        } else {\n            self.parse_papp()\n        }\n    }\n\n    fn parse_papp(&mut self) -\u003e Result\u003cTerm, ParseError\u003e {\n        let mut term = self.parse_app()?;\n        while self.consume(&TokenKind::At) {\n            let rhs = self.parse_tilde()?;\n            if let Term::TCon(dt, con, args) = term {\n                if self.is_path_constructor(&dt, &con) {\n                    term = Term::TPCon(dt, con, args, Box::new(rhs));\n                } else {\n                    term = Term::PApp(Box::new(Term::TCon(dt, con, args)), Box::new(rhs));\n                }\n            } else {\n                term = Term::PApp(Box::new(term), Box::new(rhs));\n            }\n        }\n        Ok(term)\n    }\n\n    fn parse_app(&mut self) -\u003e Result\u003cTerm, ParseError\u003e {\n        let first = self.parse_prefix_or_atom()?;\n        let mut args = Vec::new();\n        while self.starts_atom() {\n            args.push(self.parse_prefix_or_atom()?);\n        }\n        if let Term::TCon(dt, con, mut con_args) = first {\n            con_args.extend(args);\n            return Ok(Term::TCon(dt, con, con_args));\n        }\n        let mut term = first;\n        for arg in args {\n            term = Term::TApp(Box::new(term), Box::new(arg));\n        }\n        Ok(term)\n    }\n\n    fn parse_prefix_or_atom(&mut self) -\u003e Result\u003cTerm, ParseError\u003e {\n        if self.consume_ident(\"fst\") {\n            return Ok(Term::TFst(Box::new(self.parse_prefix_or_atom()?)));\n        }\n        if self.consume_ident(\"snd\") {\n            return Ok(Term::TSnd(Box::new(self.parse_prefix_or_atom()?)));\n        }\n        if self.consume_ident(\"ua\") {\n            return Ok(Term::TUa(Box::new(self.parse_prefix_or_atom()?)));\n        }\n        if self.consume_ident(\"transport\") {\n            let p = self.parse_prefix_or_atom()?;\n            let x = self.parse_prefix_or_atom()?;\n            return Ok(Term::TTransport(Box::new(p), Box::new(x)));\n        }\n        if self.consume_ident(\"equivFwd\") {\n            let e = self.parse_prefix_or_atom()?;\n            let x = self.parse_prefix_or_atom()?;\n            return Ok(Term::TEquivFwd(Box::new(e), Box::new(x)));\n        }\n        self.parse_atom()\n    }\n\n    fn parse_atom(&mut self) -\u003e Result\u003cTerm, ParseError\u003e {\n        if self.consume_ident(\"Path\") {\n            let a = self.parse_prefix_or_atom()?;\n            let u = self.parse_prefix_or_atom()?;\n            let v = self.parse_prefix_or_atom()?;\n            return Ok(Term::TPath(Box::new(a), Box::new(u), Box::new(v)));\n        }\n        if self.consume_ident(\"hcomp\") {\n            let a = self.parse_prefix_or_atom()?;\n            let phi = self.parse_prefix_or_atom()?;\n            let u = self.parse_prefix_or_atom()?;\n            let u0 = self.parse_prefix_or_atom()?;\n            return Ok(Term::THComp(\n                Box::new(a),\n                Box::new(phi),\n                Box::new(u),\n                Box::new(u0),\n            ));\n        }\n        if self.consume_ident(\"Equiv\") {\n            let a = self.parse_prefix_or_atom()?;\n            let b = self.parse_prefix_or_atom()?;\n            return Ok(Term::TEquiv(Box::new(a), Box::new(b)));\n        }\n        if self.consume_ident(\"mkEquiv\") {\n            let a = self.parse_prefix_or_atom()?;\n            let b = self.parse_prefix_or_atom()?;\n            let f = self.parse_prefix_or_atom()?;\n            let g = self.parse_prefix_or_atom()?;\n            let eta = self.parse_prefix_or_atom()?;\n            let eps = self.parse_prefix_or_atom()?;\n            return Ok(Term::TMkEquiv(\n                Box::new(a),\n                Box::new(b),\n                Box::new(f),\n                Box::new(g),\n                Box::new(eta),\n                Box::new(eps),\n            ));\n        }\n        if self.consume_ident(\"Glue\") {\n            let a = self.parse_prefix_or_atom()?;\n            let phi = self.parse_prefix_or_atom()?;\n            let te = self.parse_prefix_or_atom()?;\n            return Ok(Term::TGlue(Box::new(a), Box::new(phi), Box::new(te)));\n        }\n        if self.consume_ident(\"glueElem\") || self.consume_ident(\"glue\") {\n            let phi = self.parse_prefix_or_atom()?;\n            let t = self.parse_prefix_or_atom()?;\n            let a = self.parse_prefix_or_atom()?;\n            return Ok(Term::TGlueElem(Box::new(phi), Box::new(t), Box::new(a)));\n        }\n        if self.consume_ident(\"unglue\") {\n            let phi = self.parse_prefix_or_atom()?;\n            let te = self.parse_prefix_or_atom()?;\n            let g = self.parse_prefix_or_atom()?;\n            return Ok(Term::TUnglue(Box::new(phi), Box::new(te), Box::new(g)));\n        }\n        if self.consume_ident(\"elim\") {\n            return self.parse_elim();\n        }\n        if self.consume_ident(\"elim[\") {\n            return self.parse_elim();\n        }\n        if self.consume_ident(\"match\") {\n            return self.parse_match();\n        }\n\n        match self.peek().kind.clone() {\n            TokenKind::Ident(name) =\u003e {\n                self.pos += 1;\n                self.resolve_ident(name)\n            }\n            TokenKind::Int(0) =\u003e {\n                self.pos += 1;\n                Ok(Term::TInterval(I::I0))\n            }\n            TokenKind::Int(1) =\u003e {\n                self.pos += 1;\n                Ok(Term::TInterval(I::I1))\n            }\n            TokenKind::LParen =\u003e self.parse_paren(),\n            other =\u003e Err(self.error_here(format!(\"expected term, found {}\", describe(&other)))),\n        }\n    }\n\n    fn parse_paren(&mut self) -\u003e Result\u003cTerm, ParseError\u003e {\n        self.expect(TokenKind::LParen, \"expected '('\")?;\n        if let Some((names, ty)) = self.try_parse_binder_header()? {\n            self.expect(TokenKind::RParen, \"unmatched '('\")?;\n            if self.consume(&TokenKind::Arrow) {\n                // (x y : T) -\u003e body  — dependent Pi; body is an arrow-level term\n                for name in &names {\n                    self.term_env.insert(0, name.clone());\n                }\n                let body = self.parse_arrow()?;\n                for _ in &names {\n                    self.term_env.remove(0);\n                }\n                let mut term = body;\n                for (idx, name) in names.into_iter().enumerate().rev() {\n                    let shifted_ty = crate::cubical::syntax::shift(idx as i32, 0, &ty);\n                    term = Term::TPi(name, Box::new(shifted_ty), Box::new(term));\n                }\n                return Ok(term);\n            }\n            if self.consume(&TokenKind::Star) {\n                // (x y : T) * body  — dependent Sigma; body is a sigma-level term\n                for name in &names {\n                    self.term_env.insert(0, name.clone());\n                }\n                let body = self.parse_sigma()?;\n                for _ in &names {\n                    self.term_env.remove(0);\n                }\n                let mut term = body;\n                for (idx, name) in names.into_iter().enumerate().rev() {\n                    let shifted_ty = crate::cubical::syntax::shift(idx as i32, 0, &ty);\n                    term = Term::TSigma(name, Box::new(shifted_ty), Box::new(term));\n                }\n                return Ok(term);\n            }\n            if names.len() == 1 {\n                return self.resolve_ident(names[0].clone());\n            } else {\n                return Err(self.error_here(\"expected '-\u003e' or '*' after multiple binder headers\"));\n            }\n        }\n        let term = self.parse_term()?;\n        if self.consume(&TokenKind::Colon) {\n            let _ty = self.parse_term()?;\n            self.expect(TokenKind::RParen, \"unmatched '('\")?;\n            return Ok(term);\n        }\n        self.expect(TokenKind::RParen, \"unmatched '('\")?;\n        Ok(term)\n    }\n\n    fn parse_parenthesized_binder(&mut self, form: &str) -\u003e Result\u003c(Name, Term), ParseError\u003e {\n        self.expect(\n            TokenKind::LParen,\n            format!(\"expected '(' after {} type former\", form),\n        )?;\n        let binder = self.expect_ident(format!(\"expected binder name in {} type former\", form))?;\n        self.expect(\n            TokenKind::Colon,\n            format!(\"expected ':' after binder name '{}'\", binder),\n        )?;\n        let ty = self.parse_term()?;\n        self.expect(TokenKind::RParen, \"unmatched '('\")?;\n        Ok((binder, ty))\n    }\n\n    fn try_parse_binder_header(&mut self) -\u003e Result\u003cOption\u003c(Vec\u003cName\u003e, Term)\u003e, ParseError\u003e {\n        let save = self.pos;\n        let mut names = Vec::new();\n        while let TokenKind::Ident(n) = self.peek().kind.clone() {\n            self.pos += 1;\n            names.push(n);\n        }\n        if names.is_empty() {\n            self.pos = save;\n            return Ok(None);\n        }\n        if !self.consume(&TokenKind::Colon) {\n            self.pos = save;\n            return Ok(None);\n        }\n        let ty = self.parse_term()?;\n        Ok(Some((names, ty)))\n    }\n\n    fn parse_elim(&mut self) -\u003e Result\u003cTerm, ParseError\u003e {\n        let bracketed = self.consume(&TokenKind::LBracket);\n        let motive = self.parse_term()?;\n        if bracketed {\n            self.expect(TokenKind::RBracket, \"expected ']' after eliminator motive\")?;\n        }\n        let cases = self.parse_elim_cases(true)?;\n        let scrutinee = self.parse_term()?;\n        Ok(Term::TElim(Box::new(motive), cases, Box::new(scrutinee)))\n    }\n\n    fn parse_match(&mut self) -\u003e Result\u003cTerm, ParseError\u003e {\n        let (scrutinee, binder) = if let TokenKind::Ident(name) = self.peek().kind.clone() {\n            self.pos += 1;\n            let scrut = self.resolve_ident(name.clone())?;\n            (scrut, name)\n        } else {\n            (self.parse_term()?, \"_match\".to_string())\n        };\n\n        self.term_env.insert(0, binder.clone());\n        self.expect_ident(\"return\")?;\n        self.stop_at_with = true;\n        let return_type = self.parse_term()?;\n        self.stop_at_with = false;\n        self.term_env.remove(0);\n\n        self.expect_ident(\"with\")?;\n        let cases = self.parse_elim_cases(false)?;\n        let motive = Term::TAbs(binder, Box::new(return_type));\n        Ok(Term::TElim(Box::new(motive), cases, Box::new(scrutinee)))\n    }\n\n    /// Parse eliminator/match case arms. When `require_brace` is true (`elim`), `{`\n    /// is mandatory; when false (`match`), cases may start with `|` or `{ | ... }`.\n    fn parse_elim_cases(&mut self, require_brace: bool) -\u003e Result\u003cVec\u003cElimCase\u003e, ParseError\u003e {\n        let braced = if require_brace {\n            self.expect(TokenKind::LBrace, \"expected '{' before eliminator cases\")?;\n            true\n        } else {\n            let braced = self.consume(&TokenKind::LBrace);\n            if !braced && !self.at(&TokenKind::Pipe) {\n                return Err(self.error_here(\"expected '{' or '|' before match cases\"));\n            }\n            braced\n        };\n\n        let mut cases = Vec::new();\n        self.consume(&TokenKind::Pipe);\n        loop {\n            if braced && self.at(&TokenKind::RBrace) {\n                break;\n            }\n\n            let con = self.expect_ident(\"expected constructor name in eliminator case\")?;\n            let mut binders = Vec::new();\n            while let TokenKind::Ident(name) = self.peek().kind.clone() {\n                if name == \"=\u003e\" {\n                    break;\n                }\n                self.pos += 1;\n                binders.push(name);\n            }\n            if self.consume(&TokenKind::FatArrow) || self.consume(&TokenKind::Arrow) {\n                                // Determine if this is a path constructor: if so, the last\n                // binder is the interval variable and should go into ivar_env.\n                let is_path_con = self\n                    .find_constructor(&con)\n                    .is_some_and(|(_, is_path)| is_path);\n                let (ord_binders, ivar_binder) = if is_path_con && !binders.is_empty() {\n                    let split = binders.len() - 1;\n                    (&binders[..split], Some(&binders[split]))\n                } else {\n                    (&binders[..], None)\n                };\n                for binder in ord_binders.iter().rev() {\n                    self.term_env.insert(0, binder.clone());\n                }\n                if let Some(iv) = ivar_binder {\n                    self.ivar_env.insert(0, iv.clone());\n                    self.term_env.insert(0, \"\".to_string());\n                }\n                let body = self.parse_term()?;\n                for _ in ord_binders {\n                    self.term_env.remove(0);\n                }\n                if ivar_binder.is_some() {\n                    self.term_env.remove(0);\n                    self.ivar_env.remove(0);\n                }\n                cases.push(ElimCase {\n                    con,\n                    binders,\n                    body: Box::new(body),\n                });\n            } else {\n                return Err(self.error_here(\"expected '=\u003e' after eliminator case binders\"));\n            }\n            if !self.consume(&TokenKind::Pipe) {\n                break;\n            }\n        }\n\n        if braced {\n            self.expect(TokenKind::RBrace, \"expected '}' after eliminator cases\")?;\n        }\n        Ok(cases)\n    }\n\n    fn resolve_ident(&self, name: Name) -\u003e Result\u003cTerm, ParseError\u003e {\n        if name == \"Type\" {\n            return Ok(Term::TUniv(0));\n        }\n        if name == \"I\" || name == \"𝕀\" {\n            return Ok(Term::TIntervalTy);\n        }\n        if name == \"i0\" {\n            return Ok(Term::TInterval(I::I0));\n        }\n        if name == \"i1\" {\n            return Ok(Term::TInterval(I::I1));\n        }\n        if let Some(level) = parse_universe(&name) {\n            return Ok(Term::TUniv(level));\n        }\n        if let Some(idx) = self.term_env.iter().position(|n| n == &name) {\n            return Ok(Term::TVar(idx as i32));\n        }\n        if let Some(idx) = self.global_env.iter().position(|n| n == &name) {\n            return Ok(Term::TVar((self.term_env.len() + idx) as i32));\n        }\n        if let Some(idx) = self.ivar_env.iter().position(|n| n == &name) {\n            return Ok(Term::TInterval(I::Var(idx as i32)));\n        }\n        if let Some((dt, is_path)) = self.find_constructor(&name) {\n            if is_path {\n                return Ok(Term::TCon(dt, name, Vec::new()));\n            }\n            return Ok(Term::TCon(dt, name, Vec::new()));\n        }\n        if self.datatypes.iter().any(|dt| dt.name == name) {\n            return Ok(Term::TData(name));\n        }\n        Err(self.error_here(format!(\"unknown name or constructor '{}'\", name)))\n    }\n\n    fn find_constructor(&self, name: &str) -\u003e Option\u003c(Name, bool)\u003e {\n        for dt in self.datatypes.iter().rev() {\n            if dt.cons.iter().any(|c| c.name == name) {\n                return Some((dt.name.clone(), false));\n            }\n            if dt.pcons.iter().any(|c| c.name == name) {\n                return Some((dt.name.clone(), true));\n            }\n        }\n        None\n    }\n\n    fn is_path_constructor(&self, dt_name: &str, con_name: &str) -\u003e bool {\n        self.datatypes\n            .iter()\n            .rev()\n            .find(|dt| dt.name == dt_name)\n            .is_some_and(|dt| dt.pcons.iter().any(|c| c.name == con_name))\n    }\n\n    fn parse_one_or_more_idents(\n        &mut self,\n        message: impl Into\u003cString\u003e,\n    ) -\u003e Result\u003cVec\u003cName\u003e, ParseError\u003e {\n        let first = self.expect_ident(message)?;\n        let mut names = vec![first];\n        while let TokenKind::Ident(name) = self.peek().kind.clone() {\n            self.pos += 1;\n            names.push(name);\n        }\n        Ok(names)\n    }\n\n    fn is_decl_start(&self) -\u003e bool {\n        matches!(\n            &self.peek().kind,\n            TokenKind::Ident(name) if name == \"def\" || name == \"data\" || name == \"import\"\n        )\n    }\n\n    fn starts_atom(&self) -\u003e bool {\n        if self.is_decl_start() {\n            return false;\n        }\n        if self.stop_at_with\n            && let TokenKind::Ident(name) = &self.peek().kind\n                && name == \"with\" {\n                    return false;\n                }\n        if self.stop_at_in\n            && let TokenKind::Ident(name) = &self.peek().kind\n                && name == \"in\" {\n                    return false;\n                }\n        matches!(\n            &self.peek().kind,\n            TokenKind::Ident(_) | TokenKind::Int(_) | TokenKind::LParen\n        )\n    }\n\n    fn expect_ident(&mut self, message: impl Into\u003cString\u003e) -\u003e Result\u003cName, ParseError\u003e {\n        match self.peek().kind.clone() {\n            TokenKind::Ident(name) =\u003e {\n                self.pos += 1;\n                Ok(name)\n            }\n            _ =\u003e Err(self.error_here(message)),\n        }\n    }\n\n    fn expect_string(&mut self, message: impl Into\u003cString\u003e) -\u003e Result\u003cString, ParseError\u003e {\n        match self.peek().kind.clone() {\n            TokenKind::String(path) =\u003e {\n                self.pos += 1;\n                Ok(path)\n            }\n            _ =\u003e Err(self.error_here(message)),\n        }\n    }\n\n    pub(super) fn consume_ident(&mut self, expected: &str) -\u003e bool {\n        match &self.peek().kind {\n            TokenKind::Ident(name) if name == expected =\u003e {\n                self.pos += 1;\n                true\n            }\n            _ =\u003e false,\n        }\n    }\n\n    fn consume(&mut self, expected: &TokenKind) -\u003e bool {\n        if self.at(expected) {\n            self.pos += 1;\n            true\n        } else {\n            false\n        }\n    }\n\n    pub(super) fn expect(\n        &mut self,\n        expected: TokenKind,\n        message: impl Into\u003cString\u003e,\n    ) -\u003e Result\u003c(), ParseError\u003e {\n        if self.consume(&expected) {\n            Ok(())\n        } else {\n            Err(self.error_here(message))\n        }\n    }\n\n    pub(super) fn at(&self, expected: &TokenKind) -\u003e bool {\n        std::mem::discriminant(&self.peek().kind) == std::mem::discriminant(expected)\n    }\n\n    fn peek(&self) -\u003e &Token {\n        &self.tokens[self.pos]\n    }\n\n    pub(super) fn error_here(&self, message: impl Into\u003cString\u003e) -\u003e ParseError {\n        let token = self.peek();\n        err(message, token.line, token.col)\n    }\n}\n\nfn parse_universe(name: &str) -\u003e Option\u003ci32\u003e {\n    let rest = name.strip_prefix('U')?;\n    if rest.is_empty() {\n        return None;\n    }\n    rest.parse::\u003ci32\u003e().ok()\n}\n\nfn expect_interval(term: Term, parser: &Parser) -\u003e Result\u003cI, ParseError\u003e {\n    match term {\n        Term::TInterval(i) =\u003e Ok(i),\n        Term::TVar(idx) =\u003e Ok(I::Var(idx)),\n        other =\u003e Err(parser.error_here(format!(\"expected interval expression, got {:?}\", other))),\n    }\n}\n\nfn interval_binary(\n    left: Term,\n    right: Term,\n    mk: fn(I, I) -\u003e I,\n    parser: &Parser,\n) -\u003e Result\u003cTerm, ParseError\u003e {\n    let l = expect_interval(left, parser)?;\n    let r = expect_interval(right, parser)?;\n    Ok(Term::TInterval(mk(l, r)))\n}\n\nfn describe(kind: &TokenKind) -\u003e String {\n    match kind {\n        TokenKind::Ident(s) =\u003e format!(\"'{}'\", s),\n        TokenKind::Int(n) =\u003e n.to_string(),\n        TokenKind::LParen =\u003e \"'('\".to_string(),\n        TokenKind::RParen =\u003e \"')'\".to_string(),\n        TokenKind::LBrace =\u003e \"'{'\".to_string(),\n        TokenKind::RBrace =\u003e \"'}'\".to_string(),\n        TokenKind::LAngle =\u003e \"'\u003c'\".to_string(),\n        TokenKind::RAngle =\u003e \"'\u003e'\".to_string(),\n        TokenKind::Colon =\u003e \"':'\".to_string(),\n        TokenKind::Comma =\u003e \"','\".to_string(),\n        TokenKind::Dot =\u003e \"'.'\".to_string(),\n        TokenKind::Arrow =\u003e \"'-\u003e'\".to_string(),\n        TokenKind::FatArrow =\u003e \"'=\u003e'\".to_string(),\n        TokenKind::Pipe =\u003e \"'|'\".to_string(),\n        TokenKind::At =\u003e \"'@'\".to_string(),\n        TokenKind::Backslash =\u003e \"'\\\\'\".to_string(),\n        TokenKind::Star =\u003e \"'*'\".to_string(),\n        TokenKind::Slash =\u003e \"'/'\".to_string(),\n        TokenKind::AndSym =\u003e \"'/\\\\'\".to_string(),\n        TokenKind::OrSym =\u003e \"'\\\\/'\".to_string(),\n        TokenKind::Tilde =\u003e \"'~'\".to_string(),\n        TokenKind::LBracket =\u003e \"'['\".to_string(),\n        TokenKind::RBracket =\u003e \"']'\".to_string(),\n        TokenKind::Equals =\u003e \"'='\".to_string(),\n        TokenKind::String(s) =\u003e format!(\"\\\"{}\\\"\", s),\n        TokenKind::Eof =\u003e \"end of input\".to_string(),\n    }\n}"},{"id":"src/cubical/parser/lexer.rs","name":"lexer.rs","dir":"src/cubical/parser","ext":".rs","size":9564,"binary":false,"truncated":false,"content":"//! Lexer: turns source text into a flat token stream for the [`Parser`](crate::cubical::parser::grammar::Parser).\n\nuse super::ParseError;\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub(super) enum TokenKind {\n    Ident(String),\n    Int(i32),\n    LParen,\n    RParen,\n    LBrace,\n    RBrace,\n    LAngle,\n    RAngle,\n    Colon,\n    Comma,\n    Dot,\n    Arrow,\n    FatArrow,\n    Pipe,\n    At,\n    Backslash,\n    Star,\n    Slash,\n    AndSym,\n    OrSym,\n    Tilde,\n    LBracket,\n    RBracket,\n    Equals,\n    String(String),\n    Eof,\n}\n\n#[derive(Debug, Clone)]\npub(super) struct Token {\n    pub(super) kind: TokenKind,\n    pub(super) line: usize,\n    pub(super) col: usize,\n}\n\npub(super) struct Lexer\u003c'a\u003e {\n    chars: std::str::Chars\u003c'a\u003e,\n    peeked: Option\u003cchar\u003e,\n    line: usize,\n    col: usize,\n}\n\nimpl\u003c'a\u003e Lexer\u003c'a\u003e {\n    pub(super) fn new(src: &'a str) -\u003e Self {\n        Self {\n            chars: src.chars(),\n            peeked: None,\n            line: 1,\n            col: 1,\n        }\n    }\n\n    pub(super) fn lex(mut self) -\u003e Result\u003cVec\u003cToken\u003e, ParseError\u003e {\n        let mut tokens = Vec::new();\n        while let Some(ch) = self.peek() {\n            let line = self.line;\n            let col = self.col;\n            match ch {\n                c if c.is_whitespace() =\u003e {\n                    self.bump();\n                }\n                '-' =\u003e {\n                    self.bump();\n                    if self.peek() == Some('-') {\n                        while let Some(c) = self.peek() {\n                            self.bump();\n                            if c == '\\n' {\n                                break;\n                            }\n                        }\n                    } else if self.peek() == Some('\u003e') {\n                        self.bump();\n                        tokens.push(tok(TokenKind::Arrow, line, col));\n                    } else {\n                        return Err(err(\"unexpected '-'\", line, col));\n                    }\n                }\n                '=' =\u003e {\n                    self.bump();\n                    if self.peek() == Some('\u003e') {\n                        self.bump();\n                        tokens.push(tok(TokenKind::FatArrow, line, col));\n                    } else {\n                        tokens.push(tok(TokenKind::Equals, line, col));\n                    }\n                }\n                '/' =\u003e {\n                    self.bump();\n                    if self.peek() == Some('\\\\') {\n                        self.bump();\n                        tokens.push(tok(TokenKind::AndSym, line, col));\n                    } else {\n                        tokens.push(tok(TokenKind::Slash, line, col));\n                    }\n                }\n                '\\\\' =\u003e {\n                    self.bump();\n                    if self.peek() == Some('/') {\n                        self.bump();\n                        tokens.push(tok(TokenKind::OrSym, line, col));\n                    } else {\n                        tokens.push(tok(TokenKind::Backslash, line, col));\n                    }\n                }\n                '(' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::LParen, line, col));\n                }\n                ')' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::RParen, line, col));\n                }\n                '{' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::LBrace, line, col));\n                }\n                '}' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::RBrace, line, col));\n                }\n                '\u003c' | '⟨' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::LAngle, line, col));\n                }\n                '\u003e' | '⟩' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::RAngle, line, col));\n                }\n                ':' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::Colon, line, col));\n                }\n                ',' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::Comma, line, col));\n                }\n                '.' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::Dot, line, col));\n                }\n                '|' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::Pipe, line, col));\n                }\n                '@' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::At, line, col));\n                }\n                '*' | '×' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::Star, line, col));\n                }\n                '[' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::LBracket, line, col));\n                }\n                ']' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::RBracket, line, col));\n                }\n                '~' | '¬' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::Tilde, line, col));\n                }\n                '∧' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::AndSym, line, col));\n                }\n                '∨' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::OrSym, line, col));\n                }\n                'λ' =\u003e {\n                    self.bump();\n                    tokens.push(tok(TokenKind::Backslash, line, col));\n                }\n                '\"' =\u003e tokens.push(self.lex_string(line, col)?),\n                c if c.is_ascii_digit() =\u003e tokens.push(self.lex_int(line, col)?),\n                c if is_ident_start(c) =\u003e tokens.push(self.lex_ident(line, col)),\n                other =\u003e return Err(err(format!(\"unexpected character '{}'\", other), line, col)),\n            }\n        }\n        tokens.push(tok(TokenKind::Eof, self.line, self.col));\n        Ok(tokens)\n    }\n\n    fn lex_int(&mut self, line: usize, col: usize) -\u003e Result\u003cToken, ParseError\u003e {\n        let mut text = String::new();\n        while let Some(c) = self.peek() {\n            if c.is_ascii_digit() {\n                text.push(c);\n                self.bump();\n            } else {\n                break;\n            }\n        }\n        match text.parse::\u003ci32\u003e() {\n            Ok(n) =\u003e Ok(tok(TokenKind::Int(n), line, col)),\n            Err(_) =\u003e Err(err(\"integer literal is too large\", line, col)),\n        }\n    }\n\n    fn lex_ident(&mut self, line: usize, col: usize) -\u003e Token {\n        let mut text = String::new();\n        while let Some(c) = self.peek() {\n            if is_ident_continue(c) {\n                text.push(c);\n                self.bump();\n            } else {\n                break;\n            }\n        }\n        tok(TokenKind::Ident(text), line, col)\n    }\n\n    fn lex_string(&mut self, line: usize, col: usize) -\u003e Result\u003cToken, ParseError\u003e {\n        self.bump(); // opening \"\n        let mut text = String::new();\n        while let Some(c) = self.peek() {\n            match c {\n                '\"' =\u003e {\n                    self.bump();\n                    return Ok(tok(TokenKind::String(text), line, col));\n                }\n                '\\\\' =\u003e {\n                    self.bump();\n                    match self.peek() {\n                        Some('\"') =\u003e {\n                            self.bump();\n                            text.push('\"');\n                        }\n                        Some('\\\\') =\u003e {\n                            self.bump();\n                            text.push('\\\\');\n                        }\n                        Some(other) =\u003e {\n                            return Err(err(\n                                format!(\"invalid escape sequence '\\\\{}'\", other),\n                                self.line,\n                                self.col,\n                            ));\n                        }\n                        None =\u003e {\n                            return Err(err(\"unterminated string literal\", line, col));\n                        }\n                    }\n                }\n                '\\n' =\u003e {\n                    return Err(err(\"unterminated string literal\", line, col));\n                }\n                other =\u003e {\n                    text.push(other);\n                    self.bump();\n                }\n            }\n        }\n        Err(err(\"unterminated string literal\", line, col))\n    }\n\n    fn peek(&mut self) -\u003e Option\u003cchar\u003e {\n        if self.peeked.is_none() {\n            self.peeked = self.chars.next();\n        }\n        self.peeked\n    }\n\n    fn bump(&mut self) -\u003e Option\u003cchar\u003e {\n        let ch = match self.peeked.take() {\n            Some(c) =\u003e Some(c),\n            None =\u003e self.chars.next(),\n        }?;\n        if ch == '\\n' {\n            self.line += 1;\n            self.col = 1;\n        } else {\n            self.col += 1;\n        }\n        Some(ch)\n    }\n}\n\npub(super) fn is_ident_start(c: char) -\u003e bool {\n    c == '_' || c.is_alphabetic()\n}\n\npub(super) fn is_ident_continue(c: char) -\u003e bool {\n    c == '_' || c == '\\'' || c == '?' || c == '!' || c == '-' || c.is_alphanumeric()\n}\n\npub(super) fn tok(kind: TokenKind, line: usize, col: usize) -\u003e Token {\n    Token { kind, line, col }\n}\n\npub(super) fn err(message: impl Into\u003cString\u003e, line: usize, col: usize) -\u003e ParseError {\n    ParseError {\n        message: message.into(),\n        line,\n        col,\n    }\n}"},{"id":"src/cubical/parser/mod.rs","name":"mod.rs","dir":"src/cubical/parser","ext":".rs","size":5284,"binary":false,"truncated":false,"content":"//! Hand-written parser for the cubical surface language.\n//!\n//! The parser resolves ordinary variables and interval variables to de Bruijn\n//! indices as it parses. Top-level definitions parsed earlier in a program are\n//! available to later declarations as globals.\n//!\n//! The implementation is split into:\n//! - [`lexer`]: turns source text into a token stream.\n//! - [`grammar`]: the recursive-descent [`grammar::Parser`] that consumes tokens.\n//! - this module: the public API ([`parse_term`], [`parse_program`],\n//!   [`ProgramParser`], [`typecheck_program`]) built on top of the two.\n\nmod grammar;\nmod lexer;\n#[cfg(test)]\nmod tests;\n\nuse grammar::Parser;\nuse lexer::{Lexer, TokenKind};\nuse std::fmt;\n\nuse crate::cubical::syntax::{Datatype, Name, Term};\n\n// ---------------------------------------------------------------------------\n// Public API\n// ---------------------------------------------------------------------------\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub struct ParseError {\n    pub message: String,\n    pub line: usize,\n    pub col: usize,\n}\n\nimpl fmt::Display for ParseError {\n    fn fmt(&self, f: &mut fmt::Formatter\u003c'_\u003e) -\u003e fmt::Result {\n        write!(f, \"{} at {}:{}\", self.message, self.line, self.col)\n    }\n}\n\nimpl std::error::Error for ParseError {}\n\n#[derive(Debug, Clone, PartialEq, Eq)]\npub enum Decl {\n    Def { name: Name, ty: Term, val: Term },\n    Data(Datatype),\n    Import { path: String },\n}\n\n#[allow(dead_code)]\npub fn parse_term(src: &str) -\u003e Result\u003cTerm, ParseError\u003e {\n    let tokens = Lexer::new(src).lex()?;\n    let mut parser = Parser::new(tokens);\n    let term = parser.parse_term()?;\n    parser.expect(TokenKind::Eof, \"expected end of input\")?;\n    Ok(term)\n}\n\n#[allow(dead_code)]\npub fn parse_program(src: &str) -\u003e Result\u003cVec\u003cDecl\u003e, ParseError\u003e {\n    let mut parser = ProgramParser::new(src)?;\n    let mut decls = Vec::new();\n    while let Some(decl) = parser.next_decl()? {\n        decls.push(decl);\n    }\n    Ok(decls)\n}\n\n/// Incremental top-level parser for multi-file programs.\n///\n/// After processing `import` declarations at runtime, call [`sync_from_env`]\n/// so later declarations can resolve names from the merged environment.\npub struct ProgramParser {\n    parser: Parser,\n}\n\nimpl ProgramParser {\n    pub fn new(src: &str) -\u003e Result\u003cSelf, ParseError\u003e {\n        let tokens = Lexer::new(src).lex()?;\n        Ok(Self {\n            parser: Parser::new(tokens),\n        })\n    }\n\n    pub fn sync_from_env(&mut self, env: &crate::cubical::env::Env) {\n        self.parser.global_env = env.defs.iter().map(|(name, _, _)| name.clone()).collect();\n        self.parser.datatypes = env.datatypes.clone();\n    }\n\n    pub fn next_decl(&mut self) -\u003e Result\u003cOption\u003cDecl\u003e, ParseError\u003e {\n        if self.parser.at(&TokenKind::Eof) {\n            return Ok(None);\n        }\n        let decl = if self.parser.consume_ident(\"def\") {\n            self.parser.parse_def()?\n        } else if self.parser.consume_ident(\"data\") {\n            self.parser.parse_data_decl()?\n        } else if self.parser.consume_ident(\"import\") {\n            self.parser.parse_import()?\n        } else {\n            return Err(self.parser.error_here(\"expected top-level declaration\"));\n        };\n        match &decl {\n            Decl::Def { .. } =\u003e {}\n            Decl::Data(dt) =\u003e self.parser.datatypes.push(dt.clone()),\n            Decl::Import { .. } =\u003e {}\n        }\n        Ok(Some(decl))\n    }\n}\n\n/// Parse and typecheck a complete program.\n///\n/// Declarations are processed in order. Each `data` declaration is added to\n/// the datatype environment before the next declaration is checked, so a `def`\n/// can refer to any datatype declared above it — exactly the behaviour the\n/// user expects.\n///\n/// Returns the list of successfully checked definitions (name, type, value)\n/// together with the collected datatypes, or a human-readable error string.\n#[allow(dead_code, clippy::type_complexity)]\npub fn typecheck_program(\n    src: &str,\n) -\u003e Result\u003c\n    (\n        Vec\u003ccrate::cubical::syntax::Datatype\u003e,\n        Vec\u003c(\n            String,\n            crate::cubical::syntax::Term,\n            crate::cubical::syntax::Term,\n        )\u003e,\n    ),\n    String,\n\u003e {\n    use crate::cubical::syntax::Datatype;\n    use crate::cubical::typechecker::check_closed_dt;\n\n    let decls = parse_program(src).map_err(|e| e.to_string())?;\n\n    let mut dts: Vec\u003cDatatype\u003e = Vec::new();\n    let mut defs: Vec\u003c(\n        String,\n        crate::cubical::syntax::Term,\n        crate::cubical::syntax::Term,\n    )\u003e = Vec::new();\n\n    for decl in decls {\n        match decl {\n            Decl::Import { .. } =\u003e {\n                return Err(\"import requires a file path; use cubical::run instead\".to_string());\n            }\n            Decl::Data(dt) =\u003e {\n                // Make the datatype available to all subsequent declarations.\n                dts.push(dt);\n            }\n            Decl::Def { name, ty, val } =\u003e {\n                // Check the definition body against its declared type, with\n                // all datatypes declared so far in scope.\n                check_closed_dt(&dts, &val, &ty)\n                    .map_err(|e| format!(\"type error in '{}': {}\", name, e))?;\n                defs.push((name, ty, val));\n            }\n        }\n    }\n\n    Ok((dts, defs))\n}"},{"id":"src/cubical/parser/tests.rs","name":"tests.rs","dir":"src/cubical/parser","ext":".rs","size":10206,"binary":false,"truncated":false,"content":"use super::grammar::Parser;\nuse super::lexer::{Lexer, TokenKind};\nuse super::*;\nuse crate::cubical::interval::I;\nuse crate::cubical::syntax::{Term, show_term};\n\n#[test]\nfn parses_lambda_identity() {\n    assert_eq!(\n        parse_term(\"\\\\x. x\").unwrap(),\n        Term::TAbs(\"x\".to_string(), Box::new(Term::TVar(0)))\n    );\n}\n\n#[test]\nfn parses_dependent_pi() {\n    assert_eq!(\n        parse_term(\"(x : U0) -\u003e x\").unwrap(),\n        Term::TPi(\n            \"x\".to_string(),\n            Box::new(Term::TUniv(0)),\n            Box::new(Term::TVar(0))\n        )\n    );\n}\n\n#[test]\nfn parses_path_lambda() {\n    assert_eq!(\n        parse_term(\"\u003ci\u003e i0\").unwrap(),\n        Term::PLam(\"i\".to_string(), Box::new(Term::TInterval(I::I0)))\n    );\n}\n\n#[test]\nfn parses_path_application() {\n    let mut parser = Parser::new(Lexer::new(\"p @ i0\").lex().unwrap());\n    parser.term_env.push(\"p\".to_string());\n    let term = parser.parse_term().unwrap();\n    assert_eq!(\n        term,\n        Term::PApp(Box::new(Term::TVar(0)), Box::new(Term::TInterval(I::I0)))\n    );\n}\n\n#[test]\nfn parses_import_declaration() {\n    let decls = parse_program(\"import \\\"foo.uwuc\\\"\").unwrap();\n    assert_eq!(decls.len(), 1);\n    match &decls[0] {\n        Decl::Import { path } =\u003e assert_eq!(path, \"foo.uwuc\"),\n        _ =\u003e panic!(\"expected import declaration\"),\n    }\n}\n\n#[test]\nfn parses_string_literal_with_escapes() {\n    let tokens = Lexer::new(\"\\\"foo\\\\\\\"bar\\\\\\\\baz\\\"\").lex().unwrap();\n    assert_eq!(\n        tokens[0].kind,\n        TokenKind::String(\"foo\\\"bar\\\\baz\".to_string())\n    );\n}\n\n#[test]\nfn import_without_string_is_parse_error() {\n    let err = parse_program(\"import foo\").unwrap_err();\n    assert!(err.message.contains(\"string literal\"));\n}\n\n#[test]\nfn typecheck_program_rejects_import() {\n    let err = typecheck_program(\"import \\\"foo.uwuc\\\"\").unwrap_err();\n    assert!(err.contains(\"import requires a file path\"));\n}\n\n#[test]\nfn parses_nat_declaration() {\n    let decls = parse_program(\"data Nat = | zero : Nat | suc : Nat -\u003e Nat\").unwrap();\n    assert_eq!(decls.len(), 1);\n    match &decls[0] {\n        Decl::Data(dt) =\u003e {\n            assert_eq!(dt.name, \"Nat\");\n            assert_eq!(dt.cons.len(), 2);\n            assert_eq!(dt.cons[0].name, \"zero\");\n            assert_eq!(dt.cons[1].name, \"suc\");\n            assert_eq!(dt.cons[1].arg_tys, vec![Term::TData(\"Nat\".to_string())]);\n        }\n        _ =\u003e panic!(\"expected data declaration\"),\n    }\n}\n\n#[test]\nfn parses_def_then_data() {\n    let src = \"def main : U1 = U0\\ndata Nat = | zero : Nat | suc : Nat -\u003e Nat\";\n    let decls = parse_program(src).unwrap();\n    assert_eq!(decls.len(), 2);\n    match &decls[0] {\n        Decl::Def { name, .. } =\u003e assert_eq!(name, \"main\"),\n        _ =\u003e panic!(\"expected def declaration\"),\n    }\n    match &decls[1] {\n        Decl::Data(dt) =\u003e assert_eq!(dt.name, \"Nat\"),\n        _ =\u003e panic!(\"expected data declaration\"),\n    }\n}\n\n#[test]\nfn parses_data_then_def() {\n    let src = \"data Nat = | zero : Nat | suc : Nat -\u003e Nat\\ndef main : U1 = U0\";\n    let decls = parse_program(src).unwrap();\n    assert_eq!(decls.len(), 2);\n    match &decls[0] {\n        Decl::Data(dt) =\u003e assert_eq!(dt.name, \"Nat\"),\n        _ =\u003e panic!(\"expected data declaration\"),\n    }\n    match &decls[1] {\n        Decl::Def { name, .. } =\u003e assert_eq!(name, \"main\"),\n        _ =\u003e panic!(\"expected def declaration\"),\n    }\n}\n\n#[test]\nfn parses_two_defs() {\n    let src = \"def a : U0 = U0\\ndef b : U0 = U0\";\n    let decls = parse_program(src).unwrap();\n    assert_eq!(decls.len(), 2);\n    match &decls[0] {\n        Decl::Def { name, .. } =\u003e assert_eq!(name, \"a\"),\n        _ =\u003e panic!(\"expected def declaration\"),\n    }\n    match &decls[1] {\n        Decl::Def { name, .. } =\u003e assert_eq!(name, \"b\"),\n        _ =\u003e panic!(\"expected def declaration\"),\n    }\n}\n\n#[test]\nfn parses_eliminator() {\n    let src = \"elim motive { | zero =\u003e body0 | suc n =\u003e body1 } scrutinee\";\n    let mut parser = Parser::new(Lexer::new(src).lex().unwrap());\n    parser.global_env = vec![\n        \"scrutinee\".to_string(),\n        \"body1\".to_string(),\n        \"body0\".to_string(),\n        \"motive\".to_string(),\n    ];\n    let term = parser.parse_term().unwrap();\n    match term {\n        Term::TElim(_, cases, _) =\u003e {\n            assert_eq!(cases.len(), 2);\n            assert_eq!(cases[0].con, \"zero\");\n            assert_eq!(cases[1].con, \"suc\");\n            assert_eq!(cases[1].binders, vec![\"n\".to_string()]);\n        }\n        _ =\u003e panic!(\"expected eliminator\"),\n    }\n}\n\n#[test]\nfn parses_match() {\n    let src = \"match n return Nat with | zero =\u003e z | suc m =\u003e s\";\n    let mut parser = Parser::new(Lexer::new(src).lex().unwrap());\n    parser.global_env = vec![\n        \"s\".to_string(),\n        \"z\".to_string(),\n        \"Nat\".to_string(),\n        \"n\".to_string(),\n    ];\n    let term = parser.parse_term().unwrap();\n    match term {\n        Term::TElim(motive, cases, scrut) =\u003e {\n            assert_eq!(*scrut, Term::TVar(3));\n            assert_eq!(\n                *motive,\n                Term::TAbs(\"n\".to_string(), Box::new(Term::TVar(3)))\n            );\n            assert_eq!(cases.len(), 2);\n            assert_eq!(cases[0].con, \"zero\");\n            assert_eq!(cases[0].binders, Vec::\u003cString\u003e::new());\n            assert_eq!(cases[1].con, \"suc\");\n            assert_eq!(cases[1].binders, vec![\"m\".to_string()]);\n        }\n        _ =\u003e panic!(\"expected match to desugar to eliminator\"),\n    }\n}\n\n#[test]\nfn parses_match_with_braced_cases() {\n    let src = \"match n return Nat with { | zero =\u003e z | suc m =\u003e s }\";\n    let mut parser = Parser::new(Lexer::new(src).lex().unwrap());\n    parser.global_env = vec![\n        \"s\".to_string(),\n        \"z\".to_string(),\n        \"Nat\".to_string(),\n        \"n\".to_string(),\n    ];\n    let term = parser.parse_term().unwrap();\n    assert!(matches!(term, Term::TElim(_, _, _)));\n}\n\n#[test]\nfn parses_match_dependent_return_type() {\n    let src = \"match n return n with | zero =\u003e z | suc m =\u003e s\";\n    let mut parser = Parser::new(Lexer::new(src).lex().unwrap());\n    parser.global_env = vec![\"s\".to_string(), \"z\".to_string(), \"n\".to_string()];\n    let term = parser.parse_term().unwrap();\n    match term {\n        Term::TElim(motive, _, _) =\u003e {\n            assert_eq!(\n                *motive,\n                Term::TAbs(\"n\".to_string(), Box::new(Term::TVar(0)))\n            );\n        }\n        _ =\u003e panic!(\"expected match to desugar to eliminator\"),\n    }\n}\n\n#[test]\nfn match_desugars_to_equivalent_elim() {\n    let src = \"match n return Nat with | zero =\u003e z | suc m =\u003e s\";\n    let mut parser = Parser::new(Lexer::new(src).lex().unwrap());\n    parser.global_env = vec![\n        \"s\".to_string(),\n        \"z\".to_string(),\n        \"Nat\".to_string(),\n        \"n\".to_string(),\n    ];\n    let from_match = parser.parse_term().unwrap();\n\n    let elim_src = \"elim (\\\\n. Nat) { | zero =\u003e z | suc m =\u003e s } n\";\n    let mut elim_parser = Parser::new(Lexer::new(elim_src).lex().unwrap());\n    elim_parser.global_env = vec![\n        \"s\".to_string(),\n        \"z\".to_string(),\n        \"Nat\".to_string(),\n        \"n\".to_string(),\n    ];\n    let from_elim = elim_parser.parse_term().unwrap();\n\n    assert_eq!(from_match, from_elim);\n}\n\nfn parse_let_with_globals(src: &str, globals: &[&str]) -\u003e Term {\n    let mut parser = Parser::new(Lexer::new(src).lex().unwrap());\n    parser.global_env = globals.iter().map(|s| s.to_string()).collect();\n    parser.parse_term().unwrap()\n}\n\n#[test]\nfn parses_let() {\n    let term = parse_let_with_globals(\"let x = t in x\", &[\"t\"]);\n    assert_eq!(\n        term,\n        Term::TApp(\n            Box::new(Term::TAbs(\"x\".to_string(), Box::new(Term::TVar(0)))),\n            Box::new(Term::TVar(0))\n        )\n    );\n}\n\n#[test]\nfn let_desugars_to_application_of_lambda() {\n    let from_let = parse_let_with_globals(\"let x = a in b\", &[\"a\", \"b\"]);\n\n    let mut parser = Parser::new(Lexer::new(\"(\\\\x. b) a\").lex().unwrap());\n    parser.global_env = vec![\"a\".to_string(), \"b\".to_string()];\n    let from_lambda = parser.parse_term().unwrap();\n\n    assert_eq!(from_let, from_lambda);\n}\n\n#[test]\nfn parses_s1_declaration() {\n    let decls = parse_program(\"data S1 = | base : S1 | loop : S1 [ base , base ]\").unwrap();\n    match &decls[0] {\n        Decl::Data(dt) =\u003e {\n            assert_eq!(dt.name, \"S1\");\n            assert_eq!(dt.cons.len(), 1);\n            assert_eq!(dt.pcons.len(), 1);\n            assert_eq!(\n                dt.pcons[0].face0,\n                Term::TCon(\"S1\".to_string(), \"base\".to_string(), vec![])\n            );\n        }\n        _ =\u003e panic!(\"expected data declaration\"),\n    }\n}\n\n#[test]\nfn round_trip_with_show_term() {\n    let term = parse_term(\"\\\\x. (x , x)\").unwrap();\n    let printed = show_term(&[], &term);\n    let reparsed = parse_term(&printed).unwrap();\n    assert_eq!(term, reparsed);\n}\n#[test]\nfn dependent_arrow_type_typechecks() {\n    use crate::cubical::typechecker::infer;\n    let ctx = Vec::new();\n    let ty = parse_term(\"(A : U0) -\u003e A -\u003e A\").unwrap();\n    let inferred = infer(&ctx, &ty).expect(\"type should be well-formed\");\n    assert_eq!(inferred, Term::TUniv(0));\n}\n\n#[test]\nfn multi_binder_lambda_matches_nested() {\n    let nested = parse_term(\"\\\\A. \\\\x. x\").unwrap();\n    let multi = parse_term(\"\\\\A x. x\").unwrap();\n    assert_eq!(nested, multi);\n}\n\n#[test]\nfn id_definition_typechecks() {\n    use crate::cubical::typechecker::{check, infer};\n    let ctx = Vec::new();\n    let ty = parse_term(\"(A : U0) -\u003e A -\u003e A\").unwrap();\n    let val = parse_term(\"\\\\A x. x\").unwrap();\n    infer(&ctx, &ty).expect(\"id type\");\n    check(&ctx, &val, &ty).expect(\"id body\");\n}\n\n#[test]\nfn recursive_definition_parses() {\n    let src = \"data Nat = | zero : Nat | suc : Nat -\u003e Nat\\n\\\n               def plus : Nat -\u003e Nat -\u003e Nat = \\\\m n. plus\";\n    let decls = parse_program(src).expect(\"recursive def should parse\");\n    assert_eq!(decls.len(), 2);\n}\n\n#[test]\nfn recursive_plus_case_parses_global_reference() {\n    let src = \"data Nat = | zero : Nat | suc : Nat -\u003e Nat\\n\\\n               def plus : Nat -\u003e Nat -\u003e Nat = \\\\m n. elim (\\\\_. Nat) \\\n               { | zero =\u003e n | suc m' =\u003e suc (plus m' n) } m\";\n    let decls = parse_program(src).expect(\"recursive def should parse\");\n    assert_eq!(decls.len(), 2);\n}"},{"id":"src/cubical/syntax.rs","name":"syntax.rs","dir":"src/cubical","ext":".rs","size":23254,"binary":false,"truncated":false,"content":"// Cubical Syntax — Rust port of syntax.hs\n//\n// Depends on types from interval.rs:\n//   use crate::interval::{I, DNF};\n\nuse crate::cubical::interval::{DNF, I, dnf_bot, dnf_top};\nuse std::fmt;\n\npub type Name = String;\npub type Level = i32;\n\n// ---------------------------------------------------------------------------\n// Term Syntax\n// ---------------------------------------------------------------------------\n\n#[derive(Debug, Clone, PartialEq, Eq, Hash)]\npub enum Term {\n    TVar(i32),\n    TApp(Box\u003cTerm\u003e, Box\u003cTerm\u003e),\n    TAbs(Name, Box\u003cTerm\u003e),\n    TUniv(Level),\n    TIntervalTy,\n    TPi(Name, Box\u003cTerm\u003e, Box\u003cTerm\u003e),\n    TInterval(I),\n    TCube(DNF),\n    TPath(Box\u003cTerm\u003e, Box\u003cTerm\u003e, Box\u003cTerm\u003e),\n    PLam(Name, Box\u003cTerm\u003e),\n    PApp(Box\u003cTerm\u003e, Box\u003cTerm\u003e),\n    THComp(Box\u003cTerm\u003e, Box\u003cTerm\u003e, Box\u003cTerm\u003e, Box\u003cTerm\u003e),\n    TEquiv(Box\u003cTerm\u003e, Box\u003cTerm\u003e),\n    TMkEquiv(\n        Box\u003cTerm\u003e,\n        Box\u003cTerm\u003e,\n        Box\u003cTerm\u003e,\n        Box\u003cTerm\u003e,\n        Box\u003cTerm\u003e,\n        Box\u003cTerm\u003e,\n    ),\n    TEquivFwd(Box\u003cTerm\u003e, Box\u003cTerm\u003e),\n    TUa(Box\u003cTerm\u003e),\n    TTransport(Box\u003cTerm\u003e, Box\u003cTerm\u003e),\n    TGlue(Box\u003cTerm\u003e, Box\u003cTerm\u003e, Box\u003cTerm\u003e),\n    TGlueElem(Box\u003cTerm\u003e, Box\u003cTerm\u003e, Box\u003cTerm\u003e),\n    TUnglue(Box\u003cTerm\u003e, Box\u003cTerm\u003e, Box\u003cTerm\u003e),\n    TSigma(Name, Box\u003cTerm\u003e, Box\u003cTerm\u003e),\n    TPair(Box\u003cTerm\u003e, Box\u003cTerm\u003e),\n    TFst(Box\u003cTerm\u003e),\n    TSnd(Box\u003cTerm\u003e),\n\n    // -- Inductive types / Higher Inductive Types (HITs) --------------------\n    /// Reference to a declared datatype, used as a type. `TData(\"S1\")` ~ `S¹`.\n    TData(Name),\n    /// Ordinary constructor application: `TCon(datatype, constructor, args)`.\n    /// `args` are positional, in declaration order.\n    TCon(Name, Name, Vec\u003cTerm\u003e),\n    /// Path-constructor application: `TPCon(datatype, constructor, args, r)`.\n    /// `r` is the interval argument. `args` are the constructor's ordinary\n    /// arguments only (the interval argument is kept separate as `r`,\n    /// matching how `PLam`/`PApp` separate interval abstraction from term\n    /// abstraction).\n    TPCon(Name, Name, Vec\u003cTerm\u003e, Box\u003cTerm\u003e),\n    /// Eliminator (dependent recursor) for a datatype.\n    /// `TElim(motive, cases, scrutinee)`.\n    /// `motive : (x : TData(d)) -\u003e U_n`, given as a `TAbs`-shaped term\n    /// (i.e. `motive` itself binds the scrutinee, index 0 in its body).\n    TElim(Box\u003cTerm\u003e, Vec\u003cElimCase\u003e, Box\u003cTerm\u003e),\n}\n\n/// One arm of an eliminator. Binds `binders.len()` fresh variables over\n/// `body`, declared outermost-first (matching `ConSig`/`PConSig` telescopes).\n///\n/// For an ordinary-constructor case (`con` names a `ConSig`):\n///   `binders` has length `arity`, one name per constructor argument,\n///   and `body` has type `motive (con binders...)`.\n///\n/// For a path-constructor case (`con` names a `PConSig`):\n///   `binders` has length `arity + 1`: the constructor's ordinary\n///   arguments (outermost-first), then the interval variable LAST.\n///   `body` has type `Path (motive (pcon args... @ i)) face0case face1case`,\n///   where `body` itself is a `PLam`-shaped term over the interval variable\n///   (i.e. the interval binder in `binders` corresponds to a `PApp`/`PLam`\n///   style abstraction, not an ordinary `TAbs`).\n///   Substituting `i = 0` / `i = 1` into `body` must be `definitionally_equal`\n///   to the case's own arguments substituted into the datatype's declared\n///   `face0` / `face1` for that path constructor.\n///\n/// Binder scoping: `binders` is listed outermost-to-innermost (declaration\n/// order), matching `ConSig::arg_tys` / `PConSig::arg_tys`. When pushed into\n/// a context (which is innermost-first — see `Ctx` in typechecker.rs and\n/// equality.rs), the LAST element of `binders` becomes index 0. For a path\n/// constructor, this means the interval variable is index 0 and the last\n/// ordinary argument is index 1, etc. — exactly mirroring how `PLam`/`TAbs`\n/// chains nest in this codebase.\n#[derive(Debug, Clone, PartialEq, Eq, Hash)]\npub struct ElimCase {\n    pub con: Name,\n    pub binders: Vec\u003cName\u003e,\n    pub body: Box\u003cTerm\u003e,\n}\n\n// ---------------------------------------------------------------------------\n// Datatype schema (the \"data\" declaration mechanism)\n// ---------------------------------------------------------------------------\n\n/// Signature of an ordinary (point) constructor.\n/// `arg_tys[k]` is the type of the k-th argument (0-indexed, outermost\n/// first), in a scope where index 0 refers to argument 0, index 1 to\n/// argument 1, etc. — i.e. `arg_tys` forms a telescope exactly like a\n/// chain of `TPi` binders, read outermost-first, indices counting up.\n///\n/// Non-dependent / non-recursive constructors (the common case — `Bool`,\n/// `Nat`, `List`) just use types that don't mention earlier arguments.\n/// A self-referencing argument (recursion, e.g. `suc : Nat -\u003e Nat`) uses\n/// `TData(d)` directly as the argument type — no special-casing needed,\n/// since `TData` is an ordinary term-former.\n#[derive(Debug, Clone, PartialEq, Eq, Hash)]\npub struct ConSig {\n    pub name: Name,\n    pub arg_tys: Vec\u003cTerm\u003e,\n}\n\nimpl ConSig {\n    pub fn arity(&self) -\u003e usize {\n        self.arg_tys.len()\n    }\n}\n\n/// Signature of a path constructor (the HIT part).\n/// E.g. for S¹: `PConSig { name: \"loop\", arg_tys: vec![], face0: TCon(S1,base,[]), face1: TCon(S1,base,[]) }`.\n///\n/// `arg_tys` follows the same telescope convention as `ConSig::arg_tys`\n/// (outermost-first, counting up). `face0` / `face1` are terms in that\n/// same scope of `arg_tys.len()` variables — the ordinary arguments only.\n/// The interval argument is NOT in scope in `face0`/`face1`, since at each\n/// face it is fixed to `I0`/`I1` and therefore is not a free variable of\n/// the boundary term.\n#[derive(Debug, Clone, PartialEq, Eq, Hash)]\npub struct PConSig {\n    pub name: Name,\n    pub arg_tys: Vec\u003cTerm\u003e,\n    pub face0: Term,\n    pub face1: Term,\n}\n\nimpl PConSig {\n    pub fn arity(&self) -\u003e usize {\n        self.arg_tys.len()\n    }\n}\n\n/// A full datatype declaration: `data Name = con1 ... | con2 ... | pcon1 ...`\n#[derive(Debug, Clone, PartialEq, Eq, Hash)]\npub struct Datatype {\n    pub name: Name,\n    pub cons: Vec\u003cConSig\u003e,\n    pub pcons: Vec\u003cPConSig\u003e,\n}\n\nimpl Datatype {\n    pub fn find_con(&self, name: &str) -\u003e Option\u003c&ConSig\u003e {\n        self.cons.iter().find(|c| c.name == name)\n    }\n    pub fn find_pcon(&self, name: &str) -\u003e Option\u003c&PConSig\u003e {\n        self.pcons.iter().find(|c| c.name == name)\n    }\n}\n\n// ---------------------------------------------------------------------------\n// Pretty-printing\n// ---------------------------------------------------------------------------\n\n/// If the term is a Nat literal in normal form (chains of `suc` ending in\n/// `zero`), return the integer value. Otherwise return None.\npub fn nat_to_int(t: &Term) -\u003e Option\u003ci64\u003e {\n    match t {\n        Term::TCon(d, c, args) if d == \"Nat\" =\u003e match (c.as_str(), args.as_slice()) {\n            (\"zero\", []) =\u003e Some(0),\n            (\"suc\", [arg]) =\u003e nat_to_int(arg).map(|n| n + 1),\n            _ =\u003e None,\n        },\n        _ =\u003e None,\n    }\n}\n\npub fn show_term(env: &[Name], t: &Term) -\u003e String {\n    match t {\n        Term::TVar(i) =\u003e {\n            let i = *i as usize;\n            if i \u003c env.len() {\n                env[i].clone()\n            } else {\n                format!(\"#{}\", i)\n            }\n        }\n        Term::TApp(f, a) =\u003e format!(\"({} {})\", show_term(env, f), show_term(env, a)),\n        Term::TAbs(x, b) =\u003e {\n            let mut env2 = vec![x.clone()];\n            env2.extend_from_slice(env);\n            format!(\"λ{}. {}\", x, show_term(&env2, b))\n        }\n        Term::TUniv(n) =\u003e format!(\"U{}\", n),\n        Term::TIntervalTy =\u003e \"𝕀\".to_string(),\n        Term::TPi(x, a, b) =\u003e {\n            let mut env2 = vec![x.clone()];\n            env2.extend_from_slice(env);\n            format!(\"Π({}:{}). {}\", x, show_term(env, a), show_term(&env2, b))\n        }\n        Term::TInterval(i) =\u003e format!(\"{}\", i),\n        Term::TCube(c) =\u003e format!(\"{}\", c),\n        Term::TPath(a, u, v) =\u003e format!(\n            \"Path {} {} {}\",\n            show_term(env, a),\n            show_term(env, u),\n            show_term(env, v)\n        ),\n        Term::PLam(i, b) =\u003e {\n            let mut env2 = vec![i.clone()];\n            env2.extend_from_slice(env);\n            format!(\"⟨{}⟩ {}\", i, show_term(&env2, b))\n        }\n        Term::PApp(p, r) =\u003e format!(\"{} @ {}\", show_term(env, p), show_term(env, r)),\n        Term::THComp(a, phi, u, u0) =\u003e format!(\n            \"hcomp {} [{}] ({}) {}\",\n            show_term(env, a),\n            show_term(env, phi),\n            show_term(env, u),\n            show_term(env, u0)\n        ),\n        Term::TEquiv(a, b) =\u003e format!(\"Equiv {} {}\", show_term(env, a), show_term(env, b)),\n        Term::TMkEquiv(a, b, f, g, eta, eps) =\u003e format!(\n            \"mkEquiv {} {} {} {} {} {}\",\n            show_term(env, a),\n            show_term(env, b),\n            show_term(env, f),\n            show_term(env, g),\n            show_term(env, eta),\n            show_term(env, eps)\n        ),\n        Term::TEquivFwd(e, x) =\u003e format!(\"equivFwd ({}) {}\", show_term(env, e), show_term(env, x)),\n        Term::TUa(e) =\u003e format!(\"ua ({})\", show_term(env, e)),\n        Term::TTransport(p, x) =\u003e {\n            format!(\"transport ({}) {}\", show_term(env, p), show_term(env, x))\n        }\n        Term::TGlue(a, phi, te) =\u003e format!(\n            \"Glue {} [{}] ({})\",\n            show_term(env, a),\n            show_term(env, phi),\n            show_term(env, te)\n        ),\n        Term::TGlueElem(phi, t, a) =\u003e format!(\n            \"glue [{}] ({}) {}\",\n            show_term(env, phi),\n            show_term(env, t),\n            show_term(env, a)\n        ),\n        Term::TUnglue(phi, te, g) =\u003e format!(\n            \"unglue [{}] ({}) {}\",\n            show_term(env, phi),\n            show_term(env, te),\n            show_term(env, g)\n        ),\n        Term::TSigma(x, a, b) =\u003e {\n            let mut env2 = vec![x.clone()];\n            env2.extend_from_slice(env);\n            format!(\"Σ({}:{}). {}\", x, show_term(env, a), show_term(&env2, b))\n        }\n        Term::TPair(a, b) =\u003e format!(\"({} , {})\", show_term(env, a), show_term(env, b)),\n        Term::TFst(p) =\u003e format!(\"fst {}\", show_term(env, p)),\n        Term::TSnd(p) =\u003e format!(\"snd {}\", show_term(env, p)),\n        Term::TData(d) =\u003e d.clone(),\n        t @ Term::TCon(_, c, args) =\u003e {\n            if let Some(n) = nat_to_int(t) {\n                return format!(\"{}\", n);\n            }\n            if args.is_empty() {\n                c.clone()\n            } else {\n                let parts: Vec\u003cString\u003e = args.iter().map(|a| show_term(env, a)).collect();\n                format!(\"({} {})\", c, parts.join(\" \"))\n            }\n        }\n        Term::T
