m":"test/test_phase1_comprehensive.hk","to":"otaru/src/main.rs","via":"main"},{"from":"test/test_phase1_comprehensive.hk","to":"src-cpp/main.cpp","via":"main"},{"from":"test/test_phase1_comprehensive.hk","to":"test/pkgtest/main.hk","via":"main"},{"from":"test/test_phase1_comprehensive.hk","to":"testnix/src/main.hk","via":"main"},{"from":"test/test_phase1_comprehensive.hk","to":"otaru/src/new.rs","via":"new"},{"from":"test/test_phase1.hk","to":"otaru/src/main.rs","via":"main"},{"from":"test/test_phase1.hk","to":"src-cpp/main.cpp","via":"main"},{"from":"test/test_phase1.hk","to":"test/pkgtest/main.hk","via":"main"},{"from":"test/test_phase1.hk","to":"testnix/src/main.hk","via":"main"},{"from":"test/test_phase2.hk","to":"otaru/src/main.rs","via":"main"},{"from":"test/test_phase2.hk","to":"src-cpp/main.cpp","via":"main"},{"from":"test/test_phase2.hk","to":"test/pkgtest/main.hk","via":"main"},{"from":"test/test_phase2.hk","to":"testnix/src/main.hk","via":"main"},{"from":"test/test_phase3.hk","to":"otaru/src/main.rs","via":"main"},{"from":"test/test_phase3.hk","to":"src-cpp/main.cpp","via":"main"},{"from":"test/test_phase3.hk","to":"test/pkgtest/main.hk","via":"main"},{"from":"test/test_phase3.hk","to":"testnix/src/main.hk","via":"main"},{"from":"test/test_phase4.hk","to":"otaru/src/main.rs","via":"main"},{"from":"test/test_phase4.hk","to":"src-cpp/main.cpp","via":"main"},{"from":"test/test_phase4.hk","to":"test/pkgtest/main.hk","via":"main"},{"from":"test/test_phase4.hk","to":"testnix/src/main.hk","via":"main"},{"from":"test/test_phase5.hk","to":"otaru/src/main.rs","via":"main"},{"from":"test/test_phase5.hk","to":"src-cpp/main.cpp","via":"main"},{"from":"test/test_phase5.hk","to":"test/pkgtest/main.hk","via":"main"},{"from":"test/test_phase5.hk","to":"testnix/src/main.hk","via":"main"},{"from":"test/test_phase5b.hk","to":"otaru/src/add.rs","via":"add"},{"from":"test/test_phase5b.hk","to":"otaru/src/main.rs","via":"main"},{"from":"test/test_phase5b.hk","to":"src-cpp/main.cpp","via":"main"},{"from":"test/test_phase5b.hk","to":"test/pkgtest/main.hk","via":"main"},{"from":"test/test_phase5b.hk","to":"testnix/src/main.hk","via":"main"},{"from":"testnix/src/main.hk","to":"otaru/src/main.rs","via":"main"},{"from":"testnix/src/main.hk","to":"src-cpp/main.cpp","via":"main"},{"from":"testnix/src/main.hk","to":"test/pkgtest/main.hk","via":"main"}]};

document.getElementById('proj-title').textContent = DATA.projectName || 'Codemap';
document.getElementById('proj-sub').textContent =
  DATA.nodes.length + ' files · ' + DATA.dirs.length + ' directories · ' + DATA.edges.length + ' references';

if (!DATA.nodes.length) {
  document.getElementById('empty-state').style.display = 'flex';
} else {
  runCodemap(DATA);
}

function runCodemap(data) {
  const nodesById = new Map(data.nodes.map(n => [n.id, n]));

  // ---- color per top-level directory (or per extension if flat) ----
  const dirColorScale = d3.scaleOrdinal(d3.schemeTableau10.concat(d3.schemeSet3));
  function topGroup(dirPath) {
    if (!dirPath) return '(root)';
    return dirPath.split('/')[0];
  }
  const groupNames = Array.from(new Set(data.nodes.map(n => n.dir === '' ? '(root)' : n.dir)));
  // Use full directory (not just top-level) as the "group" per the spec: subdirectory = group
  const allDirs = data.dirs.length ? data.dirs.map(d => d === '' ? '(root)' : d) : ['(root)'];
  const groupColor = d3.scaleOrdinal().domain(allDirs).range(d3.schemeTableau10.concat(d3.schemeSet3).concat(d3.schemePastel1));

  const simNodes = data.nodes.map(n => ({
    id: n.id, name: n.name, dir: n.dir === '' ? '(root)' : n.dir,
    ext: n.ext, size: n.size, binary: n.binary, truncated: n.truncated,
    content: n.content, x: Math.random()*800, y: Math.random()*600,
  }));

  const simLinks = data.edges
    .filter(e => nodesById.has(e.from) && nodesById.has(e.to))
    .map(e => ({ source: e.from, target: e.to, via: e.via }));

  // outgoing/incoming ref lookup for the side panel
  const outgoing = new Map(), incoming = new Map();
  for (const n of simNodes) { outgoing.set(n.id, []); incoming.set(n.id, []); }
  for (const e of simLinks) {
    outgoing.get(e.source).push(e.target);
    incoming.get(e.target).push(e.source);
  }

  const svg = d3.select('#graph');
  const wrap = document.getElementById('canvas-wrap');
  let width = wrap.clientWidth, height = wrap.clientHeight;

  const zoomLayer = svg.append('g').attr('class', 'zoom-layer');
  const hullLayer = zoomLayer.append('g').attr('class', 'hulls');
  const linkLayer = zoomLayer.append('g').attr('class', 'links');
  const nodeLayer = zoomLayer.append('g').attr('class', 'nodes-layer');

  svg.append('defs').append('marker')
    .attr('id', 'arrow')
    .attr('viewBox', '0 -5 10 10')
    .attr('refX', 18)
    .attr('refY', 0)
    .attr('markerWidth', 7)
    .attr('markerHeight', 7)
    .attr('orient', 'auto')
    .append('path')
    .attr('d', 'M0,-5L10,0L0,5')
    .attr('fill', '#5fb3ff');

  const zoom = d3.zoom().scaleExtent([0.15, 4]).on('zoom', (ev) => {
    zoomLayer.attr('transform', ev.transform);
  });
  svg.call(zoom);

  document.getElementById('reset-zoom').addEventListener('click', () => {
    svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
  });

  // size nodes by rough content length (loc proxy), clamped
  function nodeRadius(n) {
    const len = n.binary ? 0 : (n.content ? n.content.length : 0);
    return 6 + Math.min(10, Math.sqrt(len) / 12);
  }

  function extColor(ext) {
    const palette = {
      '.js': '#f1e05a', '.jsx': '#f1e05a', '.ts': '#3178c6', '.tsx': '#3178c6',
      '.py': '#3572A5', '.json': '#8bc34a', '.md': '#b0b0b0', '.html': '#e34c26',
      '.css': '#563d7c', '.scss': '#c6538c', '.java': '#b07219', '.go': '#00ADD8',
      '.rb': '#701516', '.php': '#4F5D95', '.c': '#555555', '.cpp': '#f34b7d',
      '.rs': '#dea584', '.yml': '#cb171e', '.yaml': '#cb171e', '.sh': '#89e051',
    };
    return palette[ext] || '#8b93a3';
  }

  const simulation = d3.forceSimulation(simNodes)
    .force('link', d3.forceLink(simLinks).id(d => d.id).distance(70).strength(0.15))
    .force('charge', d3.forceManyBody().strength(-140))
    .force('collide', d3.forceCollide().radius(d => nodeRadius(d) + 10))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('cluster', clusterForce())
    .on('tick', ticked);

  // custom force: pull nodes toward the centroid of their own directory group
  function clusterForce() {
    let nodes;
    function force(alpha) {
      const centroids = new Map();
      for (const n of nodes) {
        if (!centroids.has(n.dir)) centroids.set(n.dir, { x: 0, y: 0, count: 0 });
        const c = centroids.get(n.dir);
        c.x += n.x; c.y += n.y; c.count++;
      }
      for (const c of centroids.values()) { c.x /= c.count; c.y /= c.count; }
      const k = alpha * 0.25;
      for (const n of nodes) {
        const c = centroids.get(n.dir);
        n.vx += (c.x - n.x) * k;
        n.vy += (c.y - n.y) * k;
      }
    }
    force.initialize = (ns) => { nodes = ns; };
    return force;
  }

  const link = linkLayer.selectAll('path.link')
    .data(simLinks)
    .join('path')
    .attr('class', 'link')
    .attr('marker-end', 'url(#arrow)');

  const node = nodeLayer.selectAll('g.node')
    .data(simNodes)
    .join('g')
    .attr('class', 'node')
    .call(d3.drag()
      .on('start', (ev, d) => { if (!ev.active) simulation.alphaTarget(0.2).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
      .on('end', (ev, d) => { if (!ev.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

  node.append('circle')
    .attr('r', d => nodeRadius(d))
    .attr('fill', d => extColor(d.ext))
    .attr('stroke', d => d3.color(groupColor(d.dir)));

  node.append('text')
    .attr('dy', d => nodeRadius(d) + 11)
    .attr('text-anchor', 'middle')
    .text(d => d.name.length > 18 ? d.name.slice(0, 16) + '…' : d.name);

  node.append('title').text(d => d.dir + '/' + d.name);

  node.on('click', (ev, d) => { ev.stopPropagation(); selectNode(d); });

  svg.on('click', () => closePanel());

  function ticked() {
    link.attr('d', d => {
      const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
      const dr = Math.sqrt(dx*dx + dy*dy) * 1.6; // gentle curve
      return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
    });
    node.attr('transform', d => `translate(${d.x},${d.y})`);
    drawHulls();
  }

  function drawHulls() {
    const byDir = new Map();
    for (const n of simNodes) {
      if (!byDir.has(n.dir)) byDir.set(n.dir, []);
      byDir.get(n.dir).push([n.x, n.y]);
    }
    const hullData = [];
    for (const [dir, pts] of byDir) {
      let hull;
      if (pts.length < 3) {
        // pad with jittered points so hull() has enough to work with
        const [x, y] = pts[0];
        hull = pts.length === 2
          ? [pts[0], pts[1], [x + 20, y + 20]]
          : [[x-20,y-20],[x+20,y-20],[x,y+20]];
      } else {
        hull = d3.polygonHull(pts);
      }
      if (!hull) continue;
      const centroid = d3.polygonCentroid(hull);
      const padded = hull.map(p => {
        const dx = p[0] - centroid[0], dy = p[1] - centroid[1];
        const len = Math.sqrt(dx*dx + dy*dy) || 1;
        return [p[0] + (dx/len) * 26, p[1] + (dy/len) * 26];
      });
      hullData.push({ dir, path: 'M' + padded.map(p => p.join(',')).join('L') + 'Z', top: d3.min(padded, p => p[1]), cx: centroid[0] });
    }

    const hullSel = hullLayer.selectAll('path.group-hull').data(hullData, d => d.dir);
    hullSel.join('path')
      .attr('class', 'group-hull')
      .attr('fill', d => groupColor(d.dir))
      .attr('stroke', d => groupColor(d.dir))
      .attr('d', d => d.path);

    const labelSel = hullLayer.selectAll('text.group-label').data(hullData, d => d.dir);
    labelSel.join('text')
      .attr('class', 'group-label')
      .attr('x', d => d.cx)
      .attr('y', d => d.top - 8)
      .attr('text-anchor', 'middle')
      .text(d => d.dir);
  }

  // ---- side panel ----
  const panel = document.getElementById('panel');
  let selectedId = null;

  function selectNode(d) {
    selectedId = d.id;
    node.classed('selected', n => n.id === d.id);
    highlightLinks(d.id);

    document.getElementById('p-fname').textContent = d.name;
    document.getElementById('p-fdir').textContent = d.dir === '(root)' ? '/' : '/' + d.dir;

    const meta = document.getElementById('p-meta');
    meta.innerHTML = '';
    addMeta(meta, 'size', formatBytes(d.size));
    addMeta(meta, 'type', d.ext || '(no ext)');
    if (d.truncated) addMeta(meta, 'note', 'content truncated for display');

    const refsEl = document.getElementById('p-refs');
    const outs = outgoing.get(d.id) || [];
    const ins = incoming.get(d.id) || [];
    let refsHtml = '<h4>References (' + outs.length + ')</h4>';
    refsHtml += outs.length
      ? outs.map(id => `<a class="ref-item" data-id="${escapeAttr(id)}">→ ${escapeHtml(id)}</a>`).join('')
      : '<div class="none">none detected</div>';
    refsHtml += '<h4 style="margin-top:10px;">Referenced by (' + ins.length + ')</h4>';
    refsHtml += ins.length
      ? ins.map(id => `<a class="ref-item" data-id="${escapeAttr(id)}">← ${escapeHtml(id)}</a>`).join('')
      : '<div class="none">none detected</div>';
    refsEl.innerHTML = refsHtml;
    refsEl.querySelectorAll('.ref-item').forEach(el => {
      el.addEventListener('click', () => {
        const target = simNodes.find(n => n.id === el.dataset.id);
        if (target) selectNode(target);
      });
    });

    const contentEl = document.getElementById('p-content');
    if (d.binary) {
      contentEl.innerHTML = '<div class="binary-note">Binary file — content preview not available.</div>';
    } else if (!d.content) {
      contentEl.innerHTML = '<div class="empty-note">(empty file)</div>';
    } else {
      contentEl.innerHTML = '<pre></pre>';
      contentEl.querySelector('pre').textContent = d.content;
    }

    panel.classList.add('open');
  }

  function addMeta(container, label, value) {
    const span = document.createElement('span');
    span.innerHTML = '<strong style="color:var(--text)">' + escapeHtml(label) + ':</strong> ' + escapeHtml(String(value));
    container.appendChild(span);
  }

  document.getElementById('p-close').addEventListener('click', closePanel);
  function closePanel() {
    selectedId = null;
    panel.classList.remove('open');
    node.classed('selected', false);
    highlightLinks(null);
  }

  function highlightLinks(id) {
    if (!id) {
      link.classed('highlight', false).classed('dimmed', false);
      node.classed('dimmed', false);
      return;
    }
    const connected = new Set([id]);
    simLinks.forEach(l => {
      if (l.source.id === id) connected.add(l.target.id);
      if (l.target.id === id) connected.add(l.source.id);
    });
    link.classed('highlight', l => l.source.id === id || l.target.id === id)
        .classed('dimmed', l => !(l.source.id === id || l.target.id === id));
    node.classed('dimmed', n => !connected.has(n.id));
  }

  // ---- legend ----
  const legend = document.getElementById('legend');
  legend.innerHTML = '<h4>Directories</h4>' + allDirs.map(d =>
    `<div class="item"><span class="swatch" style="background:${groupColor(d)}"></span>${escapeHtml(d)}</div>`
  ).join('');

  // ---- search/filter ----
  document.getElementById('search').addEventListener('input', (ev) => {
    const q = ev.target.value.trim().toLowerCase();
    if (!q) { node.classed('dimmed', false); link.classed('dimmed', false).classed('highlight', false); return; }
    const matchIds = new Set(simNodes.filter(n => n.name.toLowerCase().includes(q) || n.dir.toLowerCase().includes(q)).map(n => n.id));
    node.classed('dimmed', n => !matchIds.has(n.id));
    link.classed('dimmed', l => !matchIds.has(l.source.id) && !matchIds.has(l.target.id));
  });

  // ---- resize ----
  window.addEventListener('resize', () => {
    width = wrap.clientWidth; height = wrap.clientHeight;
    simulation.force('center', d3.forceCenter(width / 2, height / 2));
    simulation.alpha(0.3).restart();
  });

  function formatBytes(n) {
    if (n < 1024) return n + ' B';
    if (n < 1024*1024) return (n/1024).toFixed(1) + ' KB';
    return (n/1024/1024).toFixed(1) + ' MB';
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function escapeAttr(s) { return escapeHtml(s); }
}
</script>
